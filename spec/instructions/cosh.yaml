# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: COSH
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Real number" }
    returns: { type: double, desc: "Hyperbolic cosine of value" }

summary: "Returns the hyperbolic cosine of value."

semantics:
  - "cosh(value) = (e^value + e^-value) / 2; result is always Double, >= 1."
  - "COSH(0)=1, COSH(1)=1.54308."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/cosh.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: COSH(0)=1, COSH(1)=1.54308", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: zero, code: "PRINT COSH(0)", expect: { stdout: "1" } }
  - { name: one,  code: "PRINT COSH(1)", expect: { stdout: "1.54308" } }
  - { name: string_type_mismatch, code: 'A=COSH("x")', expect: { error: { errnum: 8 } } }
