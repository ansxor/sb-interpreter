id: DIALOG
kind: statement
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: text, type: string, desc: "Body text to display (CHR$(10)/CHR$(13) inserts a line break)" }
    note: "DIALOG text — show an OK dialog and wait; result in system variable RESULT (form 1)."
  - args:
      - { name: text, type: string, desc: "Body text" }
      - { name: select_type, type: integer, range: "0|5", optional: true, default: 0, desc: "0: OK (default), 5: Next" }
      - { name: caption, type: string, optional: true, desc: "Caption shown in the title field" }
      - { name: timeout, type: integer, optional: true, default: 0, desc: "Seconds before auto-close (0: never; negative: counted in frames)" }
    note: "DIALOG text [,select_type] [,caption] [,timeout] — statement form (form 2)."
  - args:
      - { name: text, type: string, desc: "Body text" }
      - { name: select_type, type: integer, range: "0..5", optional: true, default: 0, desc: "0:OK 1:No/Yes 2:Back/Next 3:Cancel/Confirm 4:Cancel/Execute 5:Next" }
      - { name: caption, type: string, optional: true, desc: "Caption" }
      - { name: timeout, type: integer, optional: true, default: 0, desc: "Seconds (0: never; negative: frames)" }
    returns: { type: integer, desc: "-1: negation (left), 0: timeout, 1: affirmation (right). Also stored in RESULT." }
    note: "result = DIALOG(text [,select_type] [,caption] [,timeout]) — two-choice form (form 3)."
  - args:
      - { name: text, type: string, desc: "Body text" }
      - { name: button_type, type: integer, desc: "Negated bitmask of detectable inputs: |b00| ABXY(1) |b01| +Pad(2) |b02| L/R(4) |b03| Touch(8); pass -(OR of bits); -1 = ABXY only" }
      - { name: caption, type: string, optional: true, desc: "Caption" }
      - { name: timeout, type: integer, optional: true, default: 0, desc: "Seconds (0: never; negative: frames)" }
    returns: { type: integer, desc: "Code of the pressed input: 128=A 129=B 130=X 131=Y 132..135=+Pad U/D/L/R 136=L 137=R 140=Touch" }
    note: "result = DIALOG(text, button_type [,caption] [,timeout]) — hardware-button form (form 4)."
  - args:
      - { name: initial, type: string, desc: "Initial editable string" }
      - { name: caption, type: string, desc: "Caption" }
      - { name: maxlen, type: integer, range: "<=14", optional: true, desc: "Maximum characters (up to 14)" }
    returns: { type: string, desc: "The entered string; if RESULT=-1 the input was cancelled (string invalid)" }
    note: "string = DIALOG(initial, caption [,maxlen]) — software-keyboard filename input form (form 5)."

summary: "Displays a modal dialog on the Touch Screen and waits for input. Statement forms put the choice in RESULT; function forms return the choice/pressed-button/entered-string. Interactive — not deterministically harvestable."

semantics:
  - "Dialogs always appear on the Touch (lower) Screen; total text + caption length must be <= 256 characters."
  - "CHR$(10) or CHR$(13) inside the text inserts a line break at that point."
  - "Statement forms (1,2) set the system variable RESULT: 1 (confirmed), -1 (cancelled), 0 (timeout)."
  - "Two-choice function form (3) returns -1 (left/negation), 0 (timeout), or 1 (right/affirmation); the same value is left in RESULT."
  - "Hardware-button form (4) takes a NEGATED bitmask selecting which inputs are detectable (ABXY=1,+Pad=2,L/R=4,Touch=8; e.g. -3 = ABXY+Pad; -1 = ABXY only; ZL/ZR cannot be detected) and returns the pressed-input code (128..140)."
  - "Filename-input form (5) shows the software keyboard and returns the entered string (<=14 chars); RESULT=-1 means cancelled."
  - "Timeout is in seconds; 0 (default) never auto-closes; a NEGATIVE timeout is counted in frames instead of seconds."
  - "Special/Japanese characters are passed as CHR$ of their UTF-16 code points (form 6)."
  - "DIALOG blocks until a button is pressed or the timeout elapses — it is interactive and cannot be value-harvested from the deterministic oracle (queued)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an argument has the wrong type" }
  - { errnum: 10, name: "Out of range", when: "text + caption exceeds 256 characters, or maxlen exceeds 14 (oracle-pending exact errnum)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/dialog.md (6 forms: OK; statement w/ select_type/caption/timeout; two-choice function -1/0/1; hardware-button negated-bitmask -> 128..140; filename-input -> string; RESULT 1/-1/0; <=256 chars; CHR$(10/13) line break; negative timeout = frames)" }
  - { type: disassembled, ref: "cia_3.6.0.lst DIALOG handler FUN_0018102c/@0x181050: builds and shows the modal dialog, parses the optional select_type/caption/timeout (and the negated button bitmask), blocks for input, and writes the choice to RESULT / the return slot" }
  - { type: community, ref: "sbsave corpus: function form R=DIALOG(text,seltype,caption,timeout) common with RESULT checked afterwards (~235 RESULT checks, e.g. 43SXXEJ3/TXT/-ALPHA_OS-); negative timeout = frame units real (~47, DIALOG(...,-200) in CE3YF3H4/TXT/0-RPG.3DS); negated seltype hardware-button form (DIALOG(...,-1,...)); filename-input S$=DIALOG(init$,caption$,maxlen) used" }

confidence: disassembled

tests:
  - { name: dialog_ok_statement, code: "DIALOG \"Hello\"", expect: { stdout: "" } }
  - { name: dialog_with_caption, code: "DIALOG \"Body\",0,\"Title\",0", expect: { stdout: "" } }
