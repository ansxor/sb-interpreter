id: GSPOIT
kind: function
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, range: "0..399", desc: "Pixel X coordinate" }
      - { name: y, type: integer, range: "0..239", desc: "Pixel Y coordinate" }
    returns: { type: integer, desc: "32-bit ARGB color of the pixel (0 if transparent/unset)" }
    note: "color = GSPOIT(x, y) — read the color of a graphics pixel."

summary: "Returns the 32-bit ARGB color at pixel (x,y) on the current manipulation GRP page. The value may differ from what was drawn because the GRP buffer is RGBA5551 (the read-back is rounded)."

semantics:
  - "GSPOIT(x,y) reads the pixel at (x,y) on the manipulation page (selected by GPAGE) and returns its 32-bit ARGB color."
  - "An unset / transparent pixel (e.g. right after GCLS) returns 0; an opaque drawn pixel returns a negative i32 (the alpha high bit is set)."
  - "Because the GRP buffer stores RGBA5551 (5 bits per channel + 1 alpha), the returned color is ROUNDED relative to the 8-bit color drawn — e.g. a pixel drawn RGB(255,255,255) reads back as 0xFFF8F8F8 (-460552), RGB(255,0,0) as 0xFFF80000 (-524288). (The docs explicitly warn the value may not equal what was drawn.)"
  - "GSPOIT is the standard way to inspect drawn graphics programmatically (used throughout the S-T7 conformance harvest)."

errors:
  - { errnum: 10, name: "Out of range", when: "coordinates outside the page (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gspoit.md (Variable=GSPOIT(X,Y); returns the ARGB color; value may differ from drawn due to internal color representation)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GSPOIT handler FUN_0015436c @0x15436c: reads the manipulation-page pixel and returns its color (upsampled from the RGBA5551 buffer)" }
  - { type: community, ref: "sbsave corpus: GSPOIT used for pixel-collision/sampling; note the RGBA5551 read-back rounding when comparing to a drawn color" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7a-e): after GPAGE 0,0:GCLS, GSPOIT(0,0)=0 (transparent); a GPSET RGB(255,255,255) pixel reads back -460552 (0xFFF8F8F8, RGBA5551-rounded) and is negative (opaque); GSPOIT(set)!=0 vs GSPOIT(unset)=0 underpins every S-T7 draw test" }

confidence: hw_verified

tests:
  - { name: gspoit_unset_zero, code: "GPAGE 0,0\nGCLS\nPRINT GSPOIT(0,0)", expect: { stdout: "0" } }
  - { name: gspoit_reads_drawn, code: "GPAGE 0,0\nGCLS\nGPSET 3,3,RGB(255,255,255)\nPRINT GSPOIT(3,3)", expect: { stdout: "-460552" } }
  - { name: gspoit_drawn_nonzero, code: "GPAGE 0,0\nGCLS\nGPSET 3,3,RGB(255,0,0)\nPRINT GSPOIT(3,3)!=0", expect: { stdout: "1" } }
