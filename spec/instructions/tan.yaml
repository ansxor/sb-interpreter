id: TAN
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: angle, type: number, range: "any", desc: "Angle in radians" }
    returns: { type: double, desc: "Tangent of angle" }

summary: "Returns the tangent of an angle given in radians, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double (e.g. TAN(0)=0)."
  - "Angle is interpreted in radians; use RAD() to convert from degrees (TAN(RAD(45))=1)."
  - "If the computed tangent overflows to infinity, an Overflow error is raised instead of returning Inf."

errors:
  - { errnum: 9, name: Overflow, when: "the tangent result is infinite (e.g. near pi/2)" }
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/tan.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst TAN handler @0x148d90; argcount!=1 -> errnum 4; arg coerced via to-double method (vtable +0x44, non-number -> errnum 8); tan called @0x299e30; result compared against +inf constant 0x7FF0000000000000 (@0x148e68) and -> errnum 9 (Overflow) if equal; otherwise returned as Double" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: TAN(0)=0, TAN(RAD(45))=1 (SB prints doubles to 6 significant figures)" }

confidence: hw_verified

tests:
  - { name: zero,            code: "PRINT TAN(0)",        expect: { stdout: "0" } }
  - { name: forty_five_deg,  code: "PRINT TAN(RAD(45))",  expect: { stdout: "1" } }
  - { name: string_type_mismatch, code: 'A=TAN("x")',     expect: { error: { errnum: 8 } } }
