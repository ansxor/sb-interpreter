# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: TAN
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: angle, type: number, range: "any", desc: "Angle in radians" }
    returns: { type: double, desc: "Tangent of angle" }

summary: "Returns the tangent of angle (angle is in radians)."

semantics:
  - "Argument is in radians (use RAD() to convert from degrees)."
  - "Result is always Double. TAN(0)=0, TAN(RAD(45))=1."

errors:
  - { errnum: 8, name: TypeMismatch, when: "angle is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/tan.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: TAN(0)=0, TAN(RAD(45))=1", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: zero,    code: "PRINT TAN(0)",       expect: { stdout: "0" } }
  - { name: deg45,   code: "PRINT TAN(RAD(45))", expect: { stdout: "1" } }
  - { name: string_type_mismatch, code: 'A=TAN("x")', expect: { error: { errnum: 8 } } }
