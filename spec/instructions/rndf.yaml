# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: RNDF
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: seed_id, type: integer, range: "0-7", optional: true, default: 0, desc: "Random number series (default 0)" }
    returns: { type: double, desc: "Random real in (0, 1)" }

summary: "Returns a real (Double) pseudo-random number greater than 0 and less than 1.0, from one of 8 random-number series (0-7)."

semantics:
  - "Result is a Double in the open interval (0, 1)."
  - "Eight independent series (0-7); if seed_id is omitted, series 0 is used. Seed a series with RANDOMIZE."
  - "Each series is a TinyMT32 generator. After RANDOMIZE 0,12345 the first RNDF(0) is 0.801218."

errors:
  - { errnum: 10, name: OutOfRange, when: "seed_id is outside 0-7" }

see_also: "RND (integer random), RANDOMIZE (seed a series)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/rndf.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: RANDOMIZE 0,12345 then RNDF(0)=0.801218", confidence: hw_verified }

confidence: hw_verified

tests:
  - name: seeded_first
    code: "RANDOMIZE 0,12345:PRINT RNDF(0)"
    expect: { stdout: "0.801218" }
