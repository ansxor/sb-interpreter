id: STEP
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: increment, type: number, range: "any", desc: "Amount added to the loop variable each pass" }
    note: "Optional clause of FOR: FOR var=initial TO end STEP increment. Defaults to 1 if omitted."

summary: "Specifies the increment added to a FOR loop variable each pass (default 1)."

semantics:
  - "When omitted, the increment is 1."
  - "A positive increment counts up (loop while variable <= end); a negative increment counts down (loop while variable >= end)."
  - "A fractional increment is allowed but may cause the iteration count to differ from the naive expectation due to floating-point error (documented caveat)."
  - "See [[for]] for full loop semantics."

errors:
  - { errnum: 3, name: SyntaxError, when: "STEP appears outside a well-formed FOR statement" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/step.md (increment; default 1; fractional caveat)" }
  - { type: disassembled, ref: "cia_3.6.0.lst STEP is a parser keyword (token @0x2ee638), not in the builtin dispatch table; consumed by the FOR compiler" }
  - { type: hw_verified, ref: "sb-oracle loop probe 2026-06-22: default step 1 (FOR I=1 TO 3 runs 3x); positive step counts up (STEP 2 over 0..9 runs 5x, leaves I=10); negative step counts down (FOR I=5 TO 1 STEP -1 runs, leaves I=0); a step in the wrong direction yields 0 iterations (FOR I=1 TO 5 STEP -1)." }

confidence: hw_verified

tests:
  - { name: step_three, code: "FOR I=0 TO 9 STEP 3\nPRINT I;\nNEXT", expect: { stdout: "0369" } }
  - { name: default_one, code: "S=0\nFOR I=1 TO 3\nS=S+1\nNEXT\nPRINT S", expect: { stdout: "3" } }
  - { name: negative_down, code: "FOR I=5 TO 1 STEP -2\nPRINT I;\nNEXT", expect: { stdout: "531" } }
