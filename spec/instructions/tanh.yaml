# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: TANH
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Real number" }
    returns: { type: double, desc: "Hyperbolic tangent of value" }

summary: "Returns the hyperbolic tangent of value."

semantics:
  - "tanh(value) = sinh(value)/cosh(value); result is always Double, in -1.0 to 1.0."
  - "TANH(0)=0, TANH(0.5)=0.462117."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/tanh.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: TANH(0)=0, TANH(0.5)=0.462117", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: zero, code: "PRINT TANH(0)",   expect: { stdout: "0" } }
  - { name: half, code: "PRINT TANH(0.5)", expect: { stdout: "0.462117" } }
  - { name: string_type_mismatch, code: 'A=TANH("x")', expect: { error: { errnum: 8 } } }
