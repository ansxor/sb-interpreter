id: TANH
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Real number" }
    returns: { type: double, desc: "Hyperbolic tangent of value" }

summary: "Returns the hyperbolic tangent of value, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double (e.g. TANH(0)=0)."
  - "Computes tanh(x) = sinh(x)/cosh(x) via libm; result is bounded in (-1, 1)."
  - "TANH is odd: TANH(-x) == -TANH(x). Saturates to +/-1 for large magnitude input."

errors:
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/tanh.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst TANH handler @0x149a08; argcount!=1 -> errnum 4; arg coerced via to-double method (vtable +0x44, non-number -> errnum 8); libm tanh called @0x299ee0; result returned as Double; no range check" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: TANH(0)=0, TANH(0.5)=0.462117, TANH(-0.5)=-0.462117 (odd; doubles to 6 significant figures); TANH(\"x\") -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle PRINT read-back 2026-06-23: PRINT renders doubles via %.8f (M7-T4) — PRINT TANH(0.5)=0.46211716, TANH(-0.5)=-0.46211716; distinct from STR$ %g shown above" }

confidence: hw_verified

tests:
  - { name: zero,        code: "PRINT TANH(0)",   expect: { stdout: "0" } }
  - { name: half,        code: "PRINT TANH(0.5)", expect: { stdout: "0.46211716" } }
  - { name: negative_odd, code: "PRINT TANH(-0.5)", expect: { stdout: "-0.46211716" } }
  - { name: string_type_mismatch, code: 'A=TANH("x")', expect: { error: { errnum: 8 } } }
