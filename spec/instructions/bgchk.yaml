id: BGCHK
kind: function
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — function form.
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Number of the BG layer to check." }
    returns: { type: integer, desc: "Animation-status bitmask: which automatic-animation targets are currently running. 0 = animation stopped (none running)." }
    note: "status = BGCHK(layer) — get the layer's animation-target bitmask."

summary: "Returns a bitmask of which automatic-animation channels (set up by BGANIM) are currently running for a BG layer. Each bit corresponds to one animation target: b00 XY-coordinates (#CHKXY,1), b01 Z (#CHKZ,2), b04 rotation (#CHKR,16), b05 magnification XY (#CHKS,32), b06 display color (#CHKC,64), b07 variable (#CHKV,128). A return of 0 means animation is stopped (none running, or the layer was BGSTOP'd). BG layers always exist (0..3), so unlike SPCHK there is no 'before setup' error. Per the disassembly the handler accepts return-count 1, so both the function form and a `BGCHK layer OUT v` form work."

semantics:
  - "Call-shape gate: argcount [r4,#0x4] must be 1 AND result-count [r4,#0xc] must be 1 (cmp r0,#0x1 / ldreq r0,[r4,#0xc] / cmpeq r0,#0x1 / beq 0x163f58 @0x163f30-0x163f3c). Any other shape raises errnum 4 (Illegal function call) with errline -1 (mov r2,#0x0 / mvn r1,#0x0 / mov r0,#0x4 / bl 0x1fffdc @0x163f40-0x163f4c). Because a function call `v=BGCHK(L)` and an OUT call `BGCHK L OUT v` both present (argcount 1, result-count 1), the handler treats them identically."
  - "Layer is evaluated and range-checked by the shared BG-layer getter FUN_001e2504 (bl 0x1e2504 @0x163f68); a value < 0 or >= the live BG-layer count [[0x315d60]+0x60] (= 4) raises errnum 10 (Out of range). There is NO active-bit / BGSCREEN guard — every layer 0..3 exists (this is why BGCHK, unlike SPCHK, has no 'used before setup' errnum 4 case)."
  - "Status read: the layer record's first word (the flags word, base [[0x315d60]+0x5c], per-layer stride 0xe3*8) is loaded ldr r1,[r1,r0,lsl#0x3] @0x163f98. If the animation-stopped bit 0x40 is set (set by BGSTOP) the result is forced to 0 (tst r1,#0x40 / movne r1,#0x0 @0x163fa0-0x163fa4) — matching the docs 'If 0 is assigned for all bits, animation is being stopped'. Otherwise the flags word's running-channel bits are returned directly via the result vtable [r4,#0x10]->[+0x14] blx (@0x163f9c-0x163fb0). NOTE: unlike sprite SPCHK there is NO `>>17 & 0xFF` shift — the #CHK* running bits live in the low byte of the layer flags word."
  - "The documented bits map to the BGANIM targets: 1 #CHKXY, 2 #CHKZ, 16 #CHKR, 32 #CHKS, 64 #CHKC, 128 #CHKV (BG has no UV(#CHKUV,4) or definition-I(#CHKI,8) channel that sprites have — those bits are unused). A non-zero result means at least one channel is mid-animation; zero means all are stopped. The mid-animation bit layout is `1<<channel` raw (NO shift): hw_verified for XY — a running `BGANIM 0,0,…` reads BGCHK(0)=1 (#CHKXY) — see the M7-T2 run-35 source."
  - "State pointer literal [0x163fbc]=0x00315D60, layer-record base [0x163fc0]=0x019A2F50."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the call shape is not (1 arg, 1 result)" }
  - { errnum: 10, name: "Out of range", when: "the layer is not in 0..3" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgchk.md (`Variable=BGCHK(Layer)` — 'Gets BG animation status'; Layer 0-3; return bits b00 #CHKXY(1) / b01 #CHKZ(2) / b04 #CHKR(16) / b05 #CHKS(32) / b06 #CHKC(64) / b07 #CHKV(128); 'A target is assigned for each bit (If 0 is assigned for all bits, animation is being stopped)'; example ST=BGCHK(0))" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGCHK handler @0x163f20: shape gate cmp r0,#0x1 (argcount [r4,#0x4]) / ldreq r0,[r4,#0xc] / cmpeq r0,#0x1 (result-count) / beq 0x163f58 @0x163f30, else errnum 4 errline -1 mov r2,#0x0 mvn r1,#0x0 mov r0,#0x4 bl 0x1fffdc @0x163f40; layer via FUN_001e2504 bl 0x1e2504 @0x163f68 (errnum 10 @0x1e2560); flags word base [[0x315d60]+0x5c] stride mov r1,#0xe3 mul lsl#3 ldr r1,[r1,r0,lsl#0x3] @0x163f98; stopped-bit clear tst r1,#0x40 movne r1,#0x0 @0x163fa0 (return 0 while BGSTOP'd); result returned RAW (no shift, unlike SPCHK's lsl#7/lsr#0x18) via [r4,#0x10]->[+0x14] blx @0x163fb0. Literals [0x163fbc]=0x00315D60 (state), [0x163fc0]=0x019A2F50 (layer base)." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG layer animation status flags (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bBGCHK\\b'): 47 files, 67 lines — all the documented function form, overwhelmingly read into a variable or tested bitwise, e.g. `IF BGCHK(0)==0 THEN` (43SXXEJ3/TXT/-ALPHA_OS-), `BGCHK(0) AND #CHKV THEN` (DK384E4S/TXT/GAME), `(BGCHK(2) AND #CHKXY)` (EDD3E3GJ/TXT/HNZRDJ). No statement/OUT form observed in real programs (the OUT form is permitted by the handler but unused in the corpus)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9d): BGCHK(0) -> 0 and BGCHK(3) -> 0 (no animation running -> 0, readable with NO BGSCREEN setup, confirming layers 0..3 exist by default); BGCHK(4) -> errnum 10 and BGCHK(-1) -> errnum 10 (layer out of range), errline 1." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2 run 35, bgstartstop_rt.tsv): mid-animation #CHKXY bit RESOLVED — a running XY BGANIM (`BGANIM 0,0,60,100,100,0`) gives BGCHK(0)=1, confirming bit 0 (b00 = #CHKXY = 1) is set raw with NO `>>17` shift (unlike sprite SPCHK). BGSTOP forces it back to 0 and BGSTART restores the 1 (see [[bgstop]]/[[bgstart]] run 35). The remaining #CHK* channels (Z=2/R=16/S=32/C=64/V=128) follow the same `1<<channel` raw-bit layout." }

confidence: hw_verified

tests:
  # No-animation=0 + error cases hw_verified (sb-oracle s_t9d). Stopped=0 follows from the disassembly (BGSTOP sets bit 0x40 -> BGCHK forces 0). Mid-animation bit values oracle-pending (need a running BGANIM, see HARVEST_QUEUE.md). `stdout` is the console scrape (`console_text()`, trailing newline trimmed), so `PRINT BGCHK(0)` reads back "0", not "0\n".
  - { name: running_xy_bit, code: "BGANIM 0,0,60,100,100,0\nPRINT BGCHK(0)", expect: { stdout: "1" } }
  - { name: no_anim_returns_zero, code: "PRINT BGCHK(0)", expect: { stdout: "0" } }
  - { name: layer3_no_anim_zero, code: "PRINT BGCHK(3)", expect: { stdout: "0" } }
  - { name: stopped_returns_zero, code: "BGSCREEN 0,32,32\nBGSTOP 0\nPRINT BGCHK(0)", expect: { stdout: "0" } }
  - { name: layer_out_of_range, code: "PRINT BGCHK(4)", expect: { error: { errnum: 10 } } }
  - { name: layer_negative, code: "PRINT BGCHK(-1)", expect: { error: { errnum: 10 } } }
