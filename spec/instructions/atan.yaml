# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: ATAN
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Tangent value" }
    returns: { type: double, desc: "Arc tangent in radians, -PI/2 to PI/2" }
    note: "ATAN (1): single-argument form."
  - args:
      - { name: y, type: number, range: "any", desc: "Y-coordinate (given first)" }
      - { name: x, type: number, range: "any", desc: "X-coordinate" }
    returns: { type: double, desc: "Angle of (x,y) from the origin, -PI to PI (atan2)" }
    note: "ATAN (2): two-argument form. Y is the FIRST argument."

summary: "Returns the arc tangent (in radians). One arg: atan(value). Two args: atan2(y, x), the angle of point (x,y)."

semantics:
  - "Single-arg result ranges -PI/2 to PI/2; two-arg result ranges -PI to PI."
  - "The two-arg form takes the Y-coordinate FIRST, then X: ATAN(Y, X)."
  - "Result is always Double. ATAN(1)=0.785398 (PI/4), ATAN(1,1)=0.785398, ATAN(0)=0."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/atan.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: ATAN(1)=0.785398, ATAN(1,1)=0.785398, ATAN(0)=0", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: one_arg,   code: "PRINT ATAN(1)",   expect: { stdout: "0.785398" } }
  - { name: two_arg,   code: "PRINT ATAN(1,1)", expect: { stdout: "0.785398" } }
  - { name: zero,      code: "PRINT ATAN(0)",   expect: { stdout: "0" } }
  - { name: string_type_mismatch, code: 'A=ATAN("x")', expect: { error: { errnum: 8 } } }
