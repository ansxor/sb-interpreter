id: BGPUT
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
      - { name: x, type: integer, range: "0..width-1", desc: "Column to place the character at, in character (tile) units. width is the layer's BGSCREEN width." }
      - { name: y, type: integer, range: "0..height-1", desc: "Row to place the character at, in character (tile) units. height is the layer's BGSCREEN height." }
      - { name: screen_data, type: "integer | string", desc: "Screen data: a 16-bit value (character number + rotation/flip attributes) or an equivalent 4-digit hex string \"0000\"-\"FFFF\". Character number 0 displays nothing." }
    note: "BGPUT layer, x, y, screenData — place one BG character (tile) into a layer's tilemap at (X,Y) (4 args, no return value)."

summary: "Places a BG character on the BG screen (tilemap) of one layer, at character-unit coordinate (X,Y). The screen data packs the character number with rotation and horizontal/vertical flip flags, and may be given as a number or a 4-digit hex string. Character number 0 shows nothing (empty cell)."

semantics:
  - "Statement only with exactly 4 arguments: if a return value is requested (used as a function) or the argument count is not 4, the handler raises errnum 4 (Illegal function call) — argcount r0=[r4,#0x4] cmp #0x4 with cmpeq return-count [r4,#0xc],#0, else mov r0,#0x4 @0x164688."
  - "LAYER must be in 0..3: the layer is evaluated and range-checked by the shared layer getter FUN_001e2504 (bl @0x1646a0); a value < 0 or >= the live BG-layer count [[0x315d60]+0x60] (= 4) raises errnum 10 (Out of range) — mov r0,#0xa @0x1e2560."
  - "X must be in 0..width-1: X<0 (cmp X,#0 blt @0x164714) or X>=the layer's map width ([r0,#0xc], cmp width,X bgt = ok @0x164738) raises errnum 10 (Out of range) — mov r0,#0xa, r1=#1 @0x164748."
  - "Y must be in 0..height-1: Y<0 or Y>=the layer's map height ([r0,#0xc], cmpge height,Y bgt = ok @0x164764) raises errnum 10 (Out of range) — mov r0,#0xa, r1=#2 @0x164774."
  - "SCREEN DATA (4th argument) may be a number OR a string. If a string is supplied (type tag ldrb [r2,#0x2] != 0 @0x164794) it is parsed as a 4-digit hexadecimal value (\"0000\"-\"FFFF\") via the layer's string-to-data method (blx [r2,#0x50] @0x1647b8); otherwise the numeric value is used directly. The low 16 bits are stored into the tilemap cell at (X,Y)."
  - "Screen-data bit layout (documented): bits b0-b11 = character number 0-4095 (the displayed glyph repeats with a cycle of 1024); rotation is selected by the #BGROT0/#BGROT90/#BGROT180/#BGROT270 attribute bits; horizontal flip = #BGREVH; vertical flip = #BGREVV. Character number 0 displays nothing (empty/transparent cell)."
  - "BGPUT writes a single cell; it does not change the layer size (BGSCREEN), visibility (BGSHOW/BGHIDE), scroll (BGOFS) or graphic page (BGPAGE)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "used as a function (return requested) or the argument count is not 4" }
  - { errnum: 10, name: "Out of range", when: "layer not in 0..3, X not in 0..width-1, or Y not in 0..height-1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgput.md (BGPUT Layer,X,Y,ScreenData — 'Places a BG character on the BG screen'; 'No image will be displayed for character number 0'; Layer 0-3; X,Y 0..BGSCREEN-1; screen data = char number 0-4095 (cycle 1024) + rotation b12/b13 + h/v inversion b14/b15, or a 4-digit hex string \"0000\"-\"FFFF\"; e.g. BGPUT 0,0,0,5 and BGPUT 0,20,15,\"80FF\")" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGPUT handler @0x164660: argcount [r4,#0x4] cmp #0x4 + cmpeq return-count [r4,#0xc],#0, else mov r0,#0x4 errnum 4 @0x164688; layer range-check via bl 0x1e2504 (errnum 10 @0x1e2560); X<0 or X>=width [r0,#0xc] -> mov r0,#0xa errnum 10 @0x164748 (cmp @0x164714/@0x164738); Y<0 or Y>=height -> mov r0,#0xa errnum 10 @0x164774 (cmp @0x16475c/@0x164764); screen-data string-vs-number branch ldrb [r2,#0x2] @0x164794, string parse via blx [r2,#0x50] @0x1647b8; state ptr 0x315d60, map base const @0x164890." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG tilemap put handling (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: ~4900 calls, all 4-arg. screenData is most often a numeric literal/hex string but is freely an expression — numeric variable (~158x), array element (~119x), and a STRING variable holding the 4-digit hex form (~5x, e.g. 'BGPUT 2,I,J,T$' in 81DYX3N4/TXT/SLIMEGUY, 'BGPUT 0,SPX,SPY,BGVAL$' in Y3ENE491/TXT/TILELOAD), confirming the string path applies to runtime string values, not just literals. No 3-arg or 5+-arg form. (oracle-pending: exact rotation/flip bit effect, queued)" }

  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9b): BGPUT 4,0,0,5 -> errnum 10 (layer out of range); BGSCREEN 0,32,32:BGPUT 0,32,0,5 -> errnum 10 (X out of range); BGSCREEN 0,32,32:BGPUT 0,0,32,5 -> errnum 10 (Y out of range). Valid BGPUT 0,0,0,5 and BGPUT 0,20,15,\"80FF\" raise nothing. All errline 1." }

confidence: disassembled

tests:
  # Tilemap write side effects (and the exact rotation/flip bit positions vs the #BG* constants)
  # need the BG framebuffer oracle (O-T6, queued); error expects below are hw_verified
  # (sb-oracle 2026-06-22 s_t9b).
  - { name: put_ok_num, code: "BGSCREEN 0,32,32\nBGPUT 0,0,0,5", expect: { stdout: "" } }
  - { name: put_ok_hexstr, code: "BGSCREEN 0,32,32\nBGPUT 0,20,15,\"80FF\"", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGPUT 4,0,0,5", expect: { error: { errnum: 10 } } }
  - { name: x_out_of_range, code: "BGSCREEN 0,32,32\nBGPUT 0,32,0,5", expect: { error: { errnum: 10 } } }
  - { name: y_out_of_range, code: "BGSCREEN 0,32,32\nBGPUT 0,0,32,5", expect: { error: { errnum: 10 } } }
