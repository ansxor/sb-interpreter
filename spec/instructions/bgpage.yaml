id: BGPAGE
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — SET: assign the graphic page used for BG rendering.
  - args:
      - { name: graphic_page, type: integer, range: "0..5 (GRP0-GRP5)", desc: "Graphic page the BG system draws its tiles from. Default is 5 (GRP5)." }
    note: "BGPAGE page — SET form: assigns the graphic page used for BG rendering (1 arg, no return value)."
  # Form 2 — GET: read the current BG graphic page.
  - args: []
    returns: { type: integer, desc: "Current BG graphic page (0..5)." }
    note: "page = BGPAGE() — GET form: returns the current BG graphic page (0 args, 1 return). Also callable as 'BGPAGE OUT var'."

summary: "Sets, or with no argument returns, the graphic page (GRP0-GRP5) that BG layers fetch their tile images from. Default is GRP5."

semantics:
  - "Two forms selected by whether a return value is requested. Return-count r1=[r0,#0xc] == 0 -> SET path @0x165e74; == 1 with argcount [r0,#0x4] == 0 -> GET path @0x165eec; any other combination raises errnum 4 (Illegal function call) — mov r0,#0x4 @0x165e6c / @0x165e88."
  - "SET form (BGPAGE page): requires exactly 1 argument (argcount cmp #1 @0x165e78, else errnum 4 @0x165e88). The page is evaluated and must be 0..5: a value >= 6 raises errnum 10 (Out of range) — cmp r0,#6 bcc(ok) else mov r0,#0xa @0x165ed0; then the page is applied via bl 0x14f568. (Negative values likewise fail the unsigned cmp #6 -> errnum 10.)"
  - "GET form (page = BGPAGE() or BGPAGE OUT page): takes no arguments and returns the current BG page read from the BG state — ldr [[0x315d60]+0x64] @0x165eec-0x165ef8. Default value is 5 (GRP5)."
  - "The default BG graphic page at power-on / ACLS is 5 (GRP5) (documented). Sprites default to GRP4 (see SPPAGE)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the SET form is given other than 1 argument, or the GET form is given any argument / mismatched return count" }
  - { errnum: 10, name: "Out of range", when: "the SET-form page is negative or > 5 (not in 0..5)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgpage.md (BGPAGE Graphic page — '0-5 (GRP0-GRP5) By default, the graphic page for BG is 5 (GRP5)'; SET 'BGPAGE 5'; GET 'P=BGPAGE()' returns 0-5)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGPAGE handler @0x165e44: return-count [r0,#0xc] ==0 -> SET @0x165e74, ==1 & argcount==0 -> GET @0x165eec, else mov r0,#0x4 errnum 4 @0x165e6c/@0x165e88; SET requires argcount==1 (cmp #1 @0x165e78); page eval then cmp r0,#6 bcc(ok) else mov r0,#0xa errnum 10 @0x165ed0, apply via bl 0x14f568; GET reads [[0x315d60]+0x64] @0x165eec-0x165ef8 (default 5)." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG graphic-page assignment (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: both forms heavily used — SET 'BGPAGE 5' (~37x) and 'BGPAGE BPP'/'BGPAGE GP' (variable); GET 'BGPAGE()' (e.g. GPAGE VP_,BGPAGE()) and the OUT-call form 'BGPAGE OUT BGP' (24x, e.g. KDNNS384/TXT/-START-), confirming the function form is also callable via OUT. (oracle-pending: default page value, queued)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9a): BGPAGE 6 -> errnum 10 (out of range); BGPAGE -1 -> errnum 10. Both errline 1." }

confidence: disassembled

tests:
  # GET return value (default page) and SET side effects need the BG framebuffer oracle (O-T6,
  # queued); error expects are hw_verified (sb-oracle 2026-06-22 s_t9a).
  - { name: set_ok, code: "BGPAGE 3", expect: { stdout: "" } }
  - { name: get_default, code: "BGPAGE 4\nPRINT BGPAGE()", expect: { stdout: "4" } }
  - { name: page_out_of_range, code: "BGPAGE 6", expect: { error: { errnum: 10 } } }
  - { name: page_negative, code: "BGPAGE -1", expect: { error: { errnum: 10 } } }
