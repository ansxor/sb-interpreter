id: SWAP
kind: statement
category: Variables and Arrays
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: variable1, type: any, desc: "First lvalue (scalar variable or array element)" }
      - { name: variable2, type: any, desc: "Second lvalue (scalar variable or array element)" }
    note: "SWAP var1, var2 â€” both operands must be lvalues of the same base type."

summary: "Swaps the values of two variables in place. Both operands must be the same base type (both numeric, or both string). Mixing string and numeric is not allowed."

semantics:
  - "SWAP A,B exchanges the values of A and B atomically (no temporary visible externally)."
  - "Both operands must be lvalues: scalars, array elements (with any valid index expression), or typed variables."
  - "Type must match at the base-type level: numericâ†”numeric and stringâ†”string are allowed; numericâ†”string raises errnum 8 (TypeMismatch)."
  - "Within numeric types, integerâ†”double swapping is allowed (consistent with the broader numeric type group); the values are coerced on assignment."
  - "Array elements are valid operands: SWAP A[I],A[J] swaps two elements; SWAP A[X1,Y1],A[X2,Y2] works for 2D arrays."
  - "Mixed-kind operands (scalar vs. array element) are also legal: SWAP SCALAR,ARRAY[I]."
  - "The corpus shows no cross-type (% â†” #) issues in practice; programmers swap same-suffix variables. Whether an integer-var and double-var can be swapped is oracle-pending."

errors:
  - { errnum: 8, name: TypeMismatch, when: "one operand is a string and the other is numeric" }
  - { errnum: 3, name: SyntaxError, when: "an operand is not an lvalue (e.g. a literal or expression)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/swap.md (SWAP var1,var2; same type only; 'Replacing a character string with a numerical value, or vice versa, is not allowed')" }
  - { type: disassembled, ref: "cia_3.6.0.lst: SWAP keyword in DATA table @0x3067fc (name ptr 0x2ed654, token id 328 = 0x148); not in builtin dispatch table â€” compiled to a VM opcode handled in FUN_0019D508 (@0x19d508); a two-operand-dereference handler in that table (caseD_42 @0x19da44) loads both operand types and errors when mismatched, consistent with SWAP TypeMismatch" }
  - { type: community, ref: "sbsave corpus: SWAP on array elements (SWAP A_X_L[L],A_X_L[L-1], SWAP BVX[N],BVY[N]) in 200+ uses, e.g. 13D4DV3V/TXT/MAIN_PRG_V2; SWAP between scalar and array element (SWAP EXPS%,STRAGE[MAX_STRAGE,0]) in 30+ uses; SWAP on string arrays (SWAP RING$[I],RING$[J]) in 10+ uses; zero corpus instances of cross-type (stringâ†”number) swap" }

confidence: documented

tests:
  - { name: int_swap,        code: "A=1\nB=2\nSWAP A,B\nPRINT A;B",    expect: { stdout: "21" } }
  - { name: str_swap,        code: "A$=\"X\"\nB$=\"Y\"\nSWAP A$,B$\nPRINT A$;B$", expect: { stdout: "YX" } }
  - { name: array_swap,      code: "DIM A[3]\nA[0]=10\nA[2]=99\nSWAP A[0],A[2]\nPRINT A[0];A[2]", expect: { stdout: "9910" } }
  - { name: scalar_arr_swap, code: "X=5\nDIM B[3]\nB[1]=9\nSWAP X,B[1]\nPRINT X;B[1]", expect: { stdout: "95" } }
  - { name: type_mismatch,   code: "A=1\nB$=\"x\"\nSWAP A,B$",          expect: { error: { errnum: 8 } } }
