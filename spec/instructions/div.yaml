id: DIV
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: a, type: number, desc: "Dividend" }
      - { name: b, type: number, range: "!=0", desc: "Divisor (zero raises an error)" }
    returns: { type: integer, desc: "Integer quotient of a / b" }
    note: "a DIV b — infix integer-division operator."

summary: "Integer division: the integer part of a divided by b. Dividing by zero raises Divide by zero (errnum 7)."

semantics:
  - "DIV returns the integer quotient of a / b. The result is an Integer."
  - "Operands are taken as integers; the division discards the fractional part of the quotient."
  - "Negative-operand rounding direction is oracle-confirmed (see hw_verified): -7 DIV 2 = -3, i.e. truncation toward zero."
  - "Dividing by zero raises errnum 7 (Divide by zero)."
  - "It is an infix operator (a parser special form), not a function."

errors:
  - { errnum: 7, name: "Divide by zero", when: "the divisor is zero" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/div.md (Variable=Num1 DIV Num2; integer value of Num1/Num2; dividing by zero gives an error)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: DIV operator keyword name @0x2ed3e2 (token-name table region); an infix operator handled in the expression compiler (not in the builtin dispatch table) — integer-quotient VM op; zero divisor -> errnum 7; exact handler not pinned, name addr only" }
  - { type: community, ref: "sbsave corpus: DIV is common (~4,455 lines) for integer division (grid/index math, e.g. I DIV W with MOD)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 200 DIV 5 -> 40; 7 DIV 2 -> 3; -7 DIV 2 -> -3 and 7 DIV -2 -> -3 (truncation toward zero, NOT floor); 7.5 DIV 2 -> 3 (operands coerced to int); 5 DIV 0 -> errnum 7 (Divide by zero)" }

confidence: hw_verified

tests:
  - { name: div_basic, code: "PRINT 200 DIV 5", expect: { stdout: "40" } }
  - { name: div_truncates, code: "PRINT 7 DIV 2", expect: { stdout: "3" } }
  - { name: div_negative_trunc, code: "PRINT -7 DIV 2", expect: { stdout: "-3" } }
  - { name: div_negative_divisor, code: "PRINT 7 DIV -2", expect: { stdout: "-3" } }
  - { name: div_double_coerce, code: "PRINT 7.5 DIV 2", expect: { stdout: "3" } }
  - { name: div_by_zero, code: "A=5 DIV 0", expect: { error: { errnum: 7 } } }
