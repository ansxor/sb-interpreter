id: MIN
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: values, type: number, range: "any", desc: "One or more numeric values, comma-separated (variadic)" }
    returns: { type: number, desc: "Smallest of the values; keeps the winning element's own type (Integer or Double)" }
    note: "Varargs form: MIN(a, b, c, ...). Needs at least one value; comparisons are done in Double but the original value is returned."
  - args:
      - { name: array, type: number_array, desc: "A numeric array; the smallest element is returned" }
    returns: { type: number, desc: "Smallest element of the array" }
    note: "Array form: MIN(arr). Scans every element."

summary: "Returns the smallest of the supplied numeric values, or the smallest element of a numeric array."

semantics:
  - "Two call forms: MIN(arr) over a numeric array, or MIN(a,b,...) over directly-enumerated values."
  - "Comparison is performed in Double, but the returned value keeps the original type of the chosen element (e.g. MIN(3,2.5)=2.5 Double; MIN(50,3)=3 Integer)."
  - "With a single numeric value the result is that value; with an empty array the result is element-wise empty (see errors)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "any argument or array element is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "called with no arguments" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/min.md (forms: 2 — array and varargs)" }
  - { type: disassembled, ref: "cia_3.6.0.lst MIN handler @0x148558; array path uses compare vtable +0x34; coerces each element to Double (vtable +0x44); string element -> errnum 8 (mov r0,#8 @0x14861c); selected element returned via its own return method, preserving Integer/Double type" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: MIN(1,2,3,4)=1, MIN(50,3)=3, MIN(-5,2,-10)=-10, MIN(1.5,2.5)=1.5, MIN(3,2.5)=2.5 (Double type preserved); MIN(1,\"x\") -> errnum 8. Array form MIN(TMP) queued (multi-statement, not batch-harvestable)." }

confidence: hw_verified

tests:
  - { name: varargs_ints,  code: "PRINT MIN(1,2,3,4)", expect: { stdout: "1" } }
  - { name: two_ints,      code: "PRINT MIN(50,3)",    expect: { stdout: "3" } }
  - { name: negatives,     code: "PRINT MIN(-5,2,-10)", expect: { stdout: "-10" } }
  - { name: doubles,       code: "PRINT MIN(1.5,2.5)", expect: { stdout: "1.5" } }
  - { name: mixed_keeps_double, code: "PRINT MIN(3,2.5)", expect: { stdout: "2.5" } }
  - { name: array_form,    code: "DIM TMP[2]:TMP[0]=50:TMP[1]=3:PRINT MIN(TMP)", expect: { stdout: "3" } }
  - { name: string_type_mismatch, code: 'A=MIN(1,"x")', expect: { error: { errnum: 8 } } }
