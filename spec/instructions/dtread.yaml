id: DTREAD
kind: statement
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: date, type: string, optional: true, desc: "Date string in \"YYYY/MM/DD\" format; if omitted, the current date is used" }
      - { name: year, type: integer, desc: "OUT: variable receiving the year" }
      - { name: month, type: integer, desc: "OUT: variable receiving the month (1-12)" }
      - { name: day, type: integer, desc: "OUT: variable receiving the day (1-31)" }
      - { name: weekday, type: integer, optional: true, desc: "OUT: variable receiving the day of week (0=Sunday .. 6=Saturday)" }
    note: "DTREAD [\"date\"] OUT year, month, day [, weekday] — parse a date string into numeric components."

summary: "Converts a date string (\"YYYY/MM/DD\", or the current date if omitted) into numeric year, month, day, and optional day-of-week values via OUT."

semantics:
  - "DTREAD parses a \"YYYY/MM/DD\" date string and writes the components to the OUT variables."
  - "If the date string is omitted, the current (real-time) date is used — that form is non-deterministic and not part of the conformance fixtures."
  - "The optional 4th OUT variable receives the day of the week as a number: 0=Sunday, 1=Monday, ... 6=Saturday."
  - "Uses the multi-return OUT calling form (see [[def]] OUT); the OUT targets are lvalues (scalars or array elements, e.g. OUT A[11],A[12],A[13])."
  - "Individual OUT targets may be omitted with empty commas to discard a field, e.g. DTREAD \"...\" OUT Y,,D keeps year and day but discards month."
  - "The date argument may be any string expression (literal, variable, or built string like STR$(Y)+\"/\"+...)."
  - "Output values are integers."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "wrong number/shape of OUT arguments" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/dtread.md (DTREAD [\"date\"] OUT Y,M,D[,W]; YYYY/MM/DD; W: 0=Sunday; current date if omitted)" }
  - { type: disassembled, ref: "cia_3.6.0.lst DTREAD handler FUN_00145e0c @0x145e0c: parses the date string fields and computes the weekday; writes results back through the OUT variable slots" }
  - { type: community, ref: "sbsave corpus: ~106 DTREAD; no-arg (current date) ~44% and explicit/variable date string ~45%; weekday (4th OUT) used ~23%; built date strings (DTREAD STR$(Y)+\"/\"+FORMAT$(\"%02D\",M)+\"/01\" OUT ... in QDH3J37D/TXT/CLOCKZ_3-4); array-element OUT and partial-OUT empty slots (DTREAD OUT Y%,, in B2B43VHE/TXT/SPLASH)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4e): DTREAD \"2014/10/12\" OUT Y,M,D -> 2014,10,12; OUT ...,W -> W=0 (2014-10-12 is Sunday); partial OUT Y,,D -> 2014,12 (month discarded)" }

confidence: hw_verified

tests:
  - { name: dtread_ymd, code: "DTREAD \"2014/10/12\" OUT Y,M,D\nPRINT Y;\",\";M;\",\";D", expect: { stdout: "2014,10,12" } }
  - { name: dtread_weekday, code: "DTREAD \"2014/10/12\" OUT Y,M,D,W\nPRINT W", expect: { stdout: "0" } }
  - { name: dtread_partial_out, code: "DTREAD \"2014/10/12\" OUT Y,,D\nPRINT Y;\",\";D", expect: { stdout: "2014,12" } }
