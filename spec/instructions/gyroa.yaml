id: GYROA
kind: statement
category: Various kinds of input
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args: []
    out:
      - { name: p, type: number, desc: "Receives Pitch — angle about the X axis (unit: radian)." }
      - { name: r, type: number, desc: "Receives Roll — angle about the Y axis (unit: radian)." }
      - { name: y, type: number, desc: "Receives Yaw — angle about the Z axis (unit: radian)." }
    note: "GYROA OUT P,R,Y — read the gyro sensor's accumulated angle (exactly 3 OUT variables; requires XON MOTION)."

summary: "Reads the gyro sensor's accumulated orientation angle into three OUT variables — Pitch (about X), Roll (about Y), Yaw (about Z) — in radians. The motion sensor must be enabled first with XON MOTION, otherwise it raises 'Motion sensor is not available' (errnum 37). The hardware reports angle in revolutions, which the handler multiplies by 2π to give radians. Because angle is integrated over time it accumulates drift; use GYROSYNC to reset it. See [[gyrov]] for angular velocity and [[gyrosync]] for resyncing."

semantics:
  - "GYROA takes no arguments and ALWAYS requires exactly 3 OUT variables (P,R,Y): the handler requires argcount [r4,#0x4]==0 AND return-count [r4,#0xc]==3 (cmp #0x0 @0x15b630 / ldreq r0,[r4,#0xc] / cmpeq r0,#0x3 @0x15b638 / beq @0x15b658) and otherwise raises errnum 4 (Illegal function call: mov r0,#0x4 @0x15b650 / b 0x1fffdc)."
  - "The motion sensor must be enabled with XON MOTION first: the handler loads the system state ([0x15b6f8] -> 0x01D04070) and tests the motion-enable flag [state+0xec] (cmp #0x0 @0x15b660). If it is 0 it raises errnum 37 (Motion sensor is not available: mov r0,#0x25 @0x15b6e8 / b 0x1fffdc)."
  - "Each axis is read as a 32-bit float and multiplied by the constant 2π (0x40C90FDB = 6.2831855, vldr.32 s16,[pc,#0x88] @0x15b66c) to convert revolutions to radians, then converted to double (vcvt.f64.f32 d0,s0) for storage. P = [state+0xac]*2π (@0x15b668-0x15b678), R = [state+0xb4]*2π (s18, @0x15b698), Y = [state+0xb0]*2π (s17, @0x15b6b8). Results are stored to the OUT descriptors at [r4,#0x10] (store method [obj,#0x18])."
  - "The reading is a live hardware value that accumulates integration drift over time (the docs warn error accumulates if gyro info is retrieved repeatedly); call GYROSYNC to reset it. It is not deterministically harvestable in a headless emulator."
  - "Empty OUT slots are accepted: a receiver variable may be omitted with a placeholder comma — the omitted result is discarded and the slot still counts toward the required 3."

errors:
  - { errnum: 4, name: "Illegal function call", when: "GYROA is given any argument, or does not have exactly three OUT variables" }
  - { errnum: 37, name: "Motion sensor is not available", when: "GYROA is used without first enabling the motion sensor with XON MOTION" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gyroa.md (`GYROA OUT P,R,Y` — 'Gets information on the angle of the gyro sensor. Motion sensor(s) should be enabled beforehand with XON MOTION'; P = Pitch (angle of the X-coordinate), R = Roll (angle of the Y-coordinate), Y = Yaw (angle of the Z-coordinate), unit radian; example `XON MOTION` then `GYROA OUT P,R,Y`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GYROA handler @0x15b620: requires argcount [r4,#0x4]==0 AND return-count [r4,#0xc]==3 (cmp #0/cmpeq #3 @0x15b630-0x15b638) else mov r0,#0x4 errnum 4 (@0x15b650 -> b 0x1fffdc); motion-enable flag [state+0xec] (state=0x01D04070 via [0x15b6f8]) cmp #0 -> mov r0,#0x25 errnum 37 (@0x15b6e8); float32 axes [state+0xac/0xb0/0xb4] each multiplied by 2π const 0x40C90FDB (=6.2831855, @0x15b6fc; vmul.f32 s0,s0,s16 @0x15b678) then vcvt.f64.f32 d0,s0; P=[+0xac], R=[+0xb4](s18), Y=[+0xb0](s17); OUT store via [r4,#0x10] [obj,#0x18]" }
  - { type: community, ref: "osb/SMILEBASIC/builtinfunctions.d GYROA (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bGYROA\\b OUT'): ~33 occurrences, all the documented 3-var `GYROA OUT P,R,Y` form with varied var names (PITCH,ROLL,YAW; HID_GYAP#,HID_GYAR#,HID_GYAY#) and occasional non-standard axis orderings chosen by the programmer (e.g. `GYROA OUT Y,P,R`). No extra-argument forms. (oracle-pending: live angle values + with-XON behavior, queued)" }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar) batch 2026-06-22 (s_t11b): GYROA OUT P,R,Y without XON MOTION raises errnum 37 (Motion sensor is not available, errline 1); GYROA OUT P,R (only 2 OUT vars) raises errnum 4 (Illegal function call, errline 1), confirming the return-count guard fires before the motion-enable check. Live angle values need motion hardware and remain unharvested (queued)." }

confidence: disassembled

tests:
  # Live gyro angle needs hardware (not harvestable headless). The XON-MOTION guard
  # (errnum 37) and the no-arg / exactly-3-OUT shape are pinned from the handler body.
  - { name: no_motion_enabled, code: "GYROA OUT P,R,Y", expect: { error: { errnum: 37 } } }
  - { name: too_few_out_vars, code: "GYROA OUT P,R", expect: { error: { errnum: 4 } } }
