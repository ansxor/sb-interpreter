id: WIDTH
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: size, type: integer, range: "8|16", desc: "Console font size: 8 (8x8, standard) or 16 (16x16, double)" }
    note: "WIDTH size — set the console character size."
  - args: []
    returns: { type: integer, desc: "The current console font size (8 or 16)" }
    note: "size = WIDTH() — read the current console character size."

summary: "Sets the console character size to 8x8 (standard) or 16x16 (double). The function form WIDTH() returns the current size. 16 only enlarges (no smooth zoom)."

semantics:
  - "WIDTH 8 selects the standard 8x8 console font; WIDTH 16 selects 16x16 (double size on both axes)."
  - "16 simply doubles the pixels (no smooth scaling); it is an accessibility aid for readability."
  - "Switching to WIDTH 16 halves the effective console columns/rows (characters are larger)."
  - "The function form WIDTH() returns the currently active size (8 or 16); the default at startup is 8."
  - "A size other than 8 or 16 raises errnum 10 (Out of range) — oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "size is not 8 or 16 (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/width.md (WIDTH FontSize; 8=8x8 standard, 16=16x16; enlarge only; A=WIDTH() reads current)" }
  - { type: disassembled, ref: "cia_3.6.0.lst WIDTH handler FUN_0014c1b0 @0x14c1b0: sets/returns the console font-size state (8 or 16)" }
  - { type: community, ref: "sbsave corpus: ~406 WIDTH statements (only 8 or 16) + ~37 WIDTH() reads; save/restore idiom OLDW=WIDTH():WIDTH 8 (e.g. D2NQA34J/TXT/SBSMILE); WIDTH() in conditionals (IF WIDTH()==8 in 515XV3C4/TXT/BBZH) and arithmetic (WIDTH() DIV 8 in B2B43VHE/TXT/CONSIN)" }

confidence: hw_verified

tests:
  - { name: width_default, code: "PRINT WIDTH()", expect: { stdout: "8" } }
  - { name: width_set_16, code: "WIDTH 16\nPRINT WIDTH()", expect: { stdout: "16" } }
  - { name: width_set_back_8, code: "WIDTH 16\nWIDTH 8\nPRINT WIDTH()", expect: { stdout: "8" } }
