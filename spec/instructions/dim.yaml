id: DIM
kind: statement
category: Variables and Arrays
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: name, type: identifier, desc: "Array variable name" }
      - { name: dim1, type: integer, range: ">=0", desc: "Number of elements in dimension 1" }
      - { name: dim2, type: integer, range: ">=0", optional: true, desc: "Elements in dimension 2" }
      - { name: dim3, type: integer, range: ">=0", optional: true, desc: "Elements in dimension 3" }
      - { name: dim4, type: integer, range: ">=0", optional: true, desc: "Elements in dimension 4" }
    note: "DIM name[dim1[,dim2[,dim3[,dim4]]]] [, ...] — declares a 1–4D array."
  - args:
      - { name: name, type: identifier, desc: "Scalar variable name to declare" }
      - { name: init, type: any, optional: true, desc: "Optional initial value" }
    note: "DIM name [= init] [, ...] — declares one or more scalar variables (same as VAR form 1)."

summary: "Declares arrays or scalar variables. DIM and VAR are fully interchangeable; the array form is the more common usage."

semantics:
  - "DIM and VAR are interchangeable: both forms can declare scalars and arrays in any combination on the same line."
  - "Arrays must always be declared before use (even without OPTION STRICT)."
  - "Array subscripts start at 0; DIM A[N] gives elements A[0]..A[N-1]."
  - "Up to 4 dimensions: DIM MAP[8,8,4,2] declares a 4D array."
  - "All numeric elements default to 0; all string elements default to \"\"."
  - "A scalar may receive an initial value: DIM X=56, MAX=24*9. The init expression is evaluated at runtime."
  - "Type suffix (% for integer, # for double, $ for string) is valid on any name: DIM GH%[321,241], DIM M#[10], DIM FILE$[0]."
  - "Mixed declarations are allowed on one line: DIM A=1, B[10], C$[5], M#[3,3]."
  - "Declaring the same variable name twice raises errnum 18 (Duplicate variable)."
  - "Assigning a Double to an integer-typed (%) array element truncates toward zero, exactly like a % scalar: DIM Q%[1]:Q%[0]=2.7 stores 2 (hw_verified)."
  - "Indexing an array with an out-of-range or negative subscript raises errnum 31 (Subscript out of range): DIM Z[3]:A=Z[3] → errnum 31 (hw_verified)."
  - "Indexing an array with the wrong NUMBER of subscripts (a rank mismatch) raises errnum 3 (Syntax error), NOT errnum 31: DIM Z[3,2]:A=Z[1] → errnum 3; DIM Z[3]:A=Z[1,1] → errnum 3 (hw_verified)."

errors:
  - { errnum: 31, name: SubscriptOutOfRange, when: "an array subscript is < 0 or >= the declared dimension size" }
  - { errnum: 3,  name: SyntaxError, when: "an array is indexed with the wrong number of subscripts (rank mismatch)" }
  - { errnum: 18, name: DuplicateVariable, when: "the same variable name is declared more than once" }
  - { errnum: 3,  name: SyntaxError, when: "() used instead of [] for array size, or brackets malformed" }
  - { errnum: 11, name: OutOfMemory, when: "the declared array is too large to allocate" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/dim.md (array form and scalar form; bracket-only; up to 4D; interchangeable with VAR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: DIM keyword in DATA table @0x3068dc (name ptr 0x2ed6ec, token id 313 = 0x139; sequential to VAR=312, confirming they share a code path); not in builtin dispatch table — parsed as a special compiler form" }
  - { type: community, ref: "sbsave corpus: DIM with initial value (DIM X=56, DIM MAX=24*9) in 2,092+ programs, e.g. 13D4DV3V/TXT/MAIN_PRG_V2; type-suffixed arrays (DIM GH%[321,241], DIM M#[10]) in 2,400+ programs, e.g. 1DVK34J/TXT/HNZMJG and 1DE453HV/TXT/SPACE_MOLE; 4D arrays (DIM PEN_STAMP[8,8,4,2]) in ~6 programs, e.g. 1DVENVAE/TXT/PICS_R1_1V" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4a): DIM B[3] gives B[0]=0; DIM A[5]:A[2]=7->7; DIM POS[3,2]:POS[2,1]=9->9; DIM X=56->56; DIM N->0; DIM A=1,B[3]:B[0]=2->1,2; DIM G%[4]:G%[1]=99->99; DIM M#[2]:M#[0]=3.5->3.5; DIM S$[3]:S$[1]=\"hi\"->hi; DIM MAX=24*9->216 (init expr evaluated)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-23 (m1_t4): DIM Q%[1]:Q%[0]=2.7->2 (Double->Integer array element truncates toward zero, same as a % scalar); DIM Z[3]:A=Z[3] -> errnum 31 (OOR); DIM Z[3,2]:A=Z[1] -> errnum 3 and DIM Z[3]:A=Z[1,1] -> errnum 3 (rank mismatch = Syntax error, NOT Subscript out of range)" }
  - { type: hw_verified, ref: "sb-oracle errcase probe 2026-06-26 (s_t4a secondary edges): DIM A(3) / DIM A(3,2) / DIM A(3,2,1) / DIM A(3):A[0]=1 all -> errnum 3 (Syntax error — () instead of [] for the array-size form), errline 1. Over-large array -> errnum 11 (Out of memory), errline 1: DIM A[10000,10000] (1e8 elements) -> 11. Cap probe (numeric arrays, single DIM): a 1D int/double array succeeds at 1,035,000 elements and OOMs at 1,040,000; a string array succeeds at 2,075,000 and OOMs at 2,080,000 — so the cap is per-type, not a single byte budget (the exact limit + its disassembly site are oracle-pending, queued for a sb-disasm handler read once cia_3.6.0.functions.txt is rebuilt — bead sb-interpreter-zvj; sb-core memory-limit guard tracked in bead sb-interpreter-4vd)." }
  - { type: disassembled, ref: "cia_3.6.0.lst (bead sb-interpreter-bac, 2026-06-26): the OutOfMemory (errnum 11) path is GENERIC HEAP EXHAUSTION, not a DIM-level byte cap. An array constructor (e.g. FUN_00152274 @0x152274) sizes its data buffer (mov r1,r4,lsl #0x2 = count*4 bytes) and calls the allocator front-door FUN_001ef32c @0x1ef32c; on a NULL return it raises errnum 11 at @0x152494 (mov r0,#0xb; b @0x1fffdc, the generic errnum trampoline with errnum in r0). FUN_001ef32c rounds the request (add r0,r1,#0x1b; bic r6,r0,#0x7 = +0x1b header, 8-byte align) then size-classes it (cmp r6,#0x100; bhi) — large array buffers take the big-block path FUN_001f49f4 @0x1f49f4 -> the dlmalloc-family allocator FUN_001331ac @0x1331ac (bounds 0x1331ac..0x134834, malloc-state global @[0x133c2c]), which returns NULL only when the user heap is exhausted. NO ~8.3MB cap literal exists in .rodata (swept literal pools 0x7A0000..0x830000: only 0x800000-base MMIO addresses and 0x7FFFFF INT clamps) — so the measured ~8.3MB boundary is the FREE user-heap size at program start (an emergent runtime value set by 3DS heap init), not a compile-time constant. The 8/4-byte element weights of the community model are consistent with this allocator." }
  - { type: community, ref: "memory-cap model (bead sb-interpreter-4vd, 2026-06-26): the 2026-06-26 probe's ~2× string-vs-numeric element cap is reproduced by ONE shared user-heap byte budget B with a numeric element weighing 8 SB-bytes (tagged double slot) and a string element 4 (heap handle): floor(B/8) in [1_035_000,1_040_000) and floor(B/4) in [2_075_000,2_080_000) jointly pin B in [8_300_000,8_320_000). sb-core enforces this in SbArray::new (crates/sb-core/src/array.rs MAX_ARRAY_BYTES=8_300_000) so over-large DIM/VAR raise errnum 11 cleanly instead of OOMing the host; conformance cases spec/tests/dim.yaml {oom_2d_huge,oom_numeric_1d,oom_string_1d}. Per bead sb-interpreter-bac the disassembled mechanism is now known (the allocator chain above): there is no single DIM byte-cap constant — the cap is dlmalloc heap exhaustion, and the 8.3MB byte-budget model is the deterministic stand-in for the free-heap-at-start that sb-core (which has no real heap to exhaust) cannot otherwise reproduce. Pinning the EXACT 3DS user-heap region size (the emergent ~8.3MB) would require reading the heap-region init, tracked in bead sb-interpreter-4vd." }

confidence: hw_verified

tests:
  - { name: array_1d_declare,  code: "DIM A[5]\nA[2]=7\nPRINT A[2]",  expect: { stdout: "7" } }
  - { name: array_default_zero, code: "DIM B[3]\nPRINT B[0]",           expect: { stdout: "0" } }
  - { name: array_2d,          code: "DIM POS[3,2]\nPOS[2,1]=9\nPRINT POS[2,1]", expect: { stdout: "9" } }
  - { name: scalar_init,       code: "DIM X=56\nPRINT X",              expect: { stdout: "56" } }
  - { name: scalar_default,    code: "DIM N\nPRINT N",                 expect: { stdout: "0" } }
  - { name: multi_mixed,       code: "DIM A=1,B[3]\nB[0]=2\nPRINT A;B[0]", expect: { stdout: "12" } }
  - { name: type_int_array,    code: "DIM G%[4]\nG%[1]=99\nPRINT G%[1]",    expect: { stdout: "99" } }
  - { name: type_dbl_array,    code: "DIM M#[2]\nM#[0]=3.5\nPRINT M#[0]",   expect: { stdout: "3.5" } }
  - { name: string_array,      code: "DIM S$[3]\nS$[1]=\"hi\"\nPRINT S$[1]", expect: { stdout: "hi" } }
  - { name: scalar_init_expr,  code: "DIM MAX=24*9\nPRINT MAX",          expect: { stdout: "216" } }
  - { name: array_int_coerce,  code: "DIM Q%[1]\nQ%[0]=2.7\nPRINT Q%[0]", expect: { stdout: "2" } }
  - { name: subscript_oor,     code: "DIM Z[3]\nA=Z[3]",   expect: { error: { errnum: 31 } } }
  - { name: rank_too_few,      code: "DIM Z[3,2]\nA=Z[1]", expect: { error: { errnum: 3 } } }
  - { name: rank_too_many,     code: "DIM Z[3]\nA=Z[1,1]", expect: { error: { errnum: 3 } } }
