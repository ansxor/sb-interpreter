id: TMREAD
kind: statement
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: time, type: string, optional: true, desc: "Time string in \"HH:MM:SS\" format; if omitted, the current time is used" }
      - { name: hour, type: integer, desc: "OUT: variable receiving the hours (0-23)" }
      - { name: minute, type: integer, desc: "OUT: variable receiving the minutes (0-59)" }
      - { name: second, type: integer, desc: "OUT: variable receiving the seconds (0-59)" }
    note: "TMREAD [\"time\"] OUT hour, minute, second — parse a time string into numeric components."

summary: "Converts a time string (\"HH:MM:SS\", or the current time if omitted) into numeric hour, minute, and second values via OUT."

semantics:
  - "TMREAD parses an \"HH:MM:SS\" time string and writes the components to the three OUT variables."
  - "Hours are 0-23 (24-hour clock); minutes and seconds are 0-59."
  - "If the time string is omitted, the current (real-time) time is used — that form is non-deterministic and not part of the conformance fixtures."
  - "Uses the multi-return OUT calling form (see [[def]] OUT); the OUT targets are lvalues (scalars or array elements, e.g. OUT SAVEDATA#[3],SAVEDATA#[4],SAVEDATA#[5])."
  - "Individual OUT targets may be omitted with empty commas to discard a field, e.g. TMREAD \"...\" OUT ,,S keeps only the seconds."
  - "The time argument may be any string expression (literal like TIME$, a variable, or MID$(...) of a longer datetime string)."
  - "Output values are integers."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "wrong number/shape of OUT arguments" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/tmread.md (TMREAD [\"time\"] OUT H,M,S; HH:MM:SS; H 0-23; current time if omitted)" }
  - { type: disassembled, ref: "cia_3.6.0.lst TMREAD handler FUN_001461a0 @0x1461a0: parses the time string fields (hour/minute/second) and writes results back through the OUT variable slots" }
  - { type: community, ref: "sbsave corpus: ~141 TMREAD; no-arg (current time) ~53%, explicit TIME$ ~26%; partial OUT with empty slots common (TMREAD OUT ,,S in Q3HE34KD/TXT/@BACKUP.PRG); array-element OUT (43Y5BEH3/TXT/LIBRARY); MID$-substring time arg (DFPZ4HD/TXT/__@D_DESK.CDK)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4e): TMREAD \"12:59:31\" OUT H,M,S -> 12,59,31; \"00:00:00\" -> 0,0,0; partial OUT ,,S -> S=31; array OUT DIM A[3]:TMREAD \"01:02:03\" OUT A[0],A[1],A[2] -> 1,2,3" }

confidence: hw_verified

tests:
  - { name: tmread_hms, code: "TMREAD \"12:59:31\" OUT H,M,S\nPRINT H;\",\";M;\",\";S", expect: { stdout: "12,59,31" } }
  - { name: tmread_midnight, code: "TMREAD \"00:00:00\" OUT H,M,S\nPRINT H;\",\";M;\",\";S", expect: { stdout: "0,0,0" } }
  - { name: tmread_partial_out, code: "TMREAD \"12:59:31\" OUT ,,S\nPRINT S", expect: { stdout: "31" } }
  - { name: tmread_array_out, code: "DIM A[3]\nTMREAD \"01:02:03\" OUT A[0],A[1],A[2]\nPRINT A[0];A[1];A[2]", expect: { stdout: "123" } }
