id: SPHIDE
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Management number of the sprite to hide" }
    note: "SPHIDE id — turn off display of a sprite (it keeps existing)."

summary: "Hides a sprite (turns its display flag OFF) without releasing it. The sprite continues to exist and can be shown again with SPSHOW. Using it before SPSET raises an error."

semantics:
  - "SPHIDE id clears the sprite's display flag; it is no longer drawn, but its slot, transform, and SPVARs remain intact."
  - "Contrast [[spclr]] (which frees the slot) and [[spshow]] (which re-shows)."
  - "Using SPHIDE on a management number that has not been SPSET raises errnum 4 (Illegal function call) — oracle-confirmed."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "the sprite was never SPSET (used before creation)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sphide.md (SPHIDE Management; hides the sprite; it continues to exist; error if used before SPSET)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPHIDE handler FUN_00142694 @0x142694: clears the sprite display flag" }
  - { type: community, ref: "sbsave corpus: SPHIDE used to hide sprites without freeing them (paired with SPSHOW for toggles)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8a): ACLS:SPHIDE 5 (sprite never SPSET) -> errnum 4 (Illegal function call); after SPSET, SPHIDE then SPSHOW run without error and the sprite persists" }

confidence: hw_verified

tests:
  - { name: sphide_before_spset_errors, code: "ACLS\nSPHIDE 5", expect: { error: { errnum: 4 } } }
  - { name: sphide_after_spset_ok, code: "ACLS\nSPSET 5,0,0,16,16,1\nSPHIDE 5\nSPSHOW 5\nPRINT 1", expect: { stdout: "1" } }
