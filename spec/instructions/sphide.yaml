id: SPHIDE
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management (control) number of the sprite to hide. The sprite must already exist (SPSET)." }
    note: "SPHIDE mgmt — sets the display flag of an existing sprite OFF (1 arg, no return value)."

summary: "Hides a sprite (turns its display attribute OFF) without destroying it; the sprite continues to exist and can be shown again with SPSHOW. Must already exist or an error is raised."

semantics:
  - "Takes exactly 1 argument and returns no value. Any other argument count, or requesting a return value (used as a function), raises errnum 4 (Illegal function call) — arg-count r1=[r0,#0x4] cmp #1 / return-count [r0,#0xc] cmp #0 (beq body) else mov r0,#0x4 (errnum 4) @0x142694-0x1426b8."
  - "The management number is fetched through the sprite-index getter FUN_001eece0 and must be in 0..(sprite count - 1) = 0..511; a value < 0, or >= the live sprite count, raises errnum 10 (Out of range) — getter range guard then mov r0,#0xa (errnum 10) @0x1eed3c (sprite count = [[0x315d60]+0x48])."
  - "The sprite slot is located at sprite-base + mgmt*2296 bytes (stride = mgmt*287*8 @0x1426e8-0x142704). The sprite must be active: the handler tests tst [slot+0x4],#0x80000000 and, if the sprite was NOT created with SPSET (bit clear), raises errnum 4 (Illegal function call) @0x142710 / mov r0,#0x4 @0x14274c — the documented 'If used before SPSET, an error will occur'."
  - "For an active sprite, the display attribute (b00 / #SPSHOW) is cleared and the sprite is removed from rendering (bl 0x17e674, bl 0x17e344 @0x142724-0x142730). This ONLY hides the sprite; it continues to exist (position, rotation, SPVAR, collision data all preserved) and can be re-shown with SPSHOW. Hiding an already-hidden sprite is a harmless no-op (idempotent)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the argument count is not 1 / a return value is requested, OR the target sprite has not been created with SPSET (inactive slot)" }
  - { errnum: 10, name: "Out of range", when: "the management number is negative or >= the sprite count (not in 0..511)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sphide.md (SPHIDE Management number 0-511 — Hides a sprite; 'This only hides the sprite; it continues to exist'; 'If used before SPSET, an error will occur'; e.g. SPHIDE 43)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPHIDE handler @0x142694: arg-count r1=[r0,#0x4] cmp #1 + return-count [r0,#0xc] cmp #0 beq body @0x1426c8 else mov r2,#0/mvn r1/mov r0,#0x4 bl 0x1fffdc (errnum 4) @0x1426b0; mgmt fetched via sprite-index getter bl 0x1eece0 (out-of-range -> mov r0,#0xa errnum 10 @0x1eed3c, count=[[0x315d60]+0x48]); slot = base[0x142768] + mgmt*2296 (rsb *31 / add lsl#8 *287 / add lsl#3) @0x1426e8; active-flag tst [slot+0x4],#0x80000000 beq @0x14274c -> mov r0,#0x4 (errnum 4, sprite not SPSET); hide via bl 0x17e674 / bl 0x17e344 @0x142724 (sprite-base ptr 0x142764/0x142768)." }
  - { type: community, ref: "osb/SMILEBASIC/sprite.d SpriteData display/active flag handling (3.5.0 structural cross-check only)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8a): SPHIDE 0 with no prior SPSET -> errnum 4, errline 1 (confirms the active-bit guard); SPHIDE 512 -> errnum 10 (mgmt out of range)." }

confidence: disassembled

tests:
  # hide side-effect needs the sprite-framebuffer oracle (O-T6, queued); error expects are hw_verified (sb-oracle 2026-06-22 s_t8a).
  - { name: hide_after_spset_ok, code: "SPSET 0,0\nSPHIDE 0", expect: { stdout: "" } }
  - { name: hide_before_spset_errors, code: "SPHIDE 0", expect: { error: { errnum: 4 } } }
  - { name: mgmt_out_of_range, code: "SPHIDE 512", expect: { error: { errnum: 10 } } }
  - { name: mgmt_negative, code: "SPHIDE -1", expect: { error: { errnum: 10 } } }
