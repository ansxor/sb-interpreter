id: GFILL
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x1, type: integer, desc: "Start (corner) X" }
      - { name: y1, type: integer, desc: "Start (corner) Y" }
      - { name: x2, type: integer, desc: "End (opposite corner) X" }
      - { name: y2, type: integer, desc: "End (opposite corner) Y" }
      - { name: color, type: integer, optional: true, desc: "32-bit ARGB color; if omitted, the current GCOLOR is used" }
    note: "GFILL x1,y1, x2,y2 [, color] — draw a FILLED rectangle."

summary: "Draws a solid (filled) rectangle with opposite corners (x1,y1) and (x2,y2). Unlike GBOX (outline only), GFILL fills the interior."

semantics:
  - "GFILL fills the entire axis-aligned rectangle between the two corner points with the draw color (interior included)."
  - "An optional color argument overrides the current GCOLOR for this call."
  - "Pixels are stored as RGBA5551 (GSPOIT read-back is rounded); drawing respects the write clip ([[gclip]])."
  - "Contrast [[gbox]], which draws only the rectangle outline."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gfill.md (GFILL SX,SY,EX,EY[,ColorCode]; draws a quadrangle and fills it; color per GCOLOR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GFILL handler FUN_00152e9c/@0x153110: fills the rectangle interior into the manipulation page" }
  - { type: community, ref: "sbsave corpus: GFILL pervasive (~8,341 lines) for filled rects/backgrounds" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7c): GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GFILL 0,0,10,10 -> the interior (5,5), a corner (0,0) and an edge (10,5) are all set (GSPOIT!=0), confirming a solid fill (vs GBOX whose interior stays 0); a pixel outside the rect (20,20)=0" }

confidence: hw_verified

tests:
  - { name: gfill_interior_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGFILL 0,0,10,10\nPRINT GSPOIT(5,5)!=0", expect: { stdout: "1" } }
  - { name: gfill_corner_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGFILL 0,0,10,10\nPRINT GSPOIT(0,0)!=0", expect: { stdout: "1" } }
  - { name: gfill_outside_empty, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGFILL 0,0,10,10\nPRINT GSPOIT(20,20)", expect: { stdout: "0" } }
