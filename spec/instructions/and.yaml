id: AND
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: a, type: integer, desc: "Left operand (bit string)" }
      - { name: b, type: integer, desc: "Right operand (bit string)" }
    returns: { type: integer, desc: "Bitwise AND of a and b" }
    note: "a AND b — infix bitwise-AND operator."

summary: "Bitwise AND of two integers (per-bit multiplication). Also serves as the logical-AND in conditions (nonzero = true)."

semantics:
  - "AND computes the bitwise AND of its two operands as 32-bit integers (Integer = i32)."
  - "Double operands are coerced to integer before the operation (the fractional part is dropped)."
  - "Used both for bit masking (A AND &HFF) and as a logical AND in IF conditions (a nonzero result is true)."
  - "Negative operands use two's-complement i32 bit patterns (e.g. -1 AND 255 = 255)."
  - "It is an infix operator (a parser special form), not a function."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an operand is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/and.md (Variable=Num1 AND Num2; logical AND / multiplication of bits)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: AND operator keyword name @0x2ed5d4 (token-name table region); an infix operator handled in the expression compiler (not in the builtin dispatch table) — operands coerced to i32, bitwise-AND VM op; exact handler not pinned, name addr only" }
  - { type: community, ref: "sbsave corpus: AND is pervasive (~48,916 lines); both bitmask (IF BUTTON(2) AND #UP THEN in 13D4DV3V/TXT/MAIN_PRG_V2) and logical-condition use" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 5 AND 3 -> 1; 200 AND &HE7 -> 192; -1 AND 255 -> 255 (two's-complement i32); 5.9 AND 3 -> 1 (double operand coerced to int 5 before the bitwise op)" }

confidence: hw_verified

tests:
  - { name: and_basic, code: "PRINT 5 AND 3", expect: { stdout: "1" } }
  - { name: and_mask, code: "PRINT 200 AND &HE7", expect: { stdout: "192" } }
  - { name: and_neg, code: "PRINT -1 AND 255", expect: { stdout: "255" } }
  - { name: and_double_coerce, code: "PRINT 5.9 AND 3", expect: { stdout: "1" } }
