id: ROUND
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Source numerical value" }
    returns: { type: number, desc: "value rounded to the nearest whole number (Double in, Double out; Integer in, Integer out)" }

summary: "Returns value rounded to the nearest whole number, rounding halves away from zero."

semantics:
  - "Rounds to the nearest whole number; exact halves round AWAY from zero: ROUND(2.5)=3, ROUND(-2.5)=-3, ROUND(0.5)=1, ROUND(-0.5)=-1."
  - "ROUND(12.345)=12. ROUND(12.5)=13, ROUND(-12.5)=-13."
  - "Algorithm (handler @0x144c50): for value >= 0 the result is FLOOR(value + 0.5); for value < 0 the result is CEIL(value - 0.5). The 0.0 and 0.5 constants are embedded at 0x144d10/0x144d18."
  - "An Integer argument is returned unchanged (Integer); a Double argument yields a whole-numbered Double (the rounding helper returns a double, pushed via the Double return path at vtable +0x18 — NOT coerced to Integer)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/round.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst ROUND handler @0x144c50; value>=0 -> FLOOR(v+0.5) via floor helper @0x1ed970, value<0 -> CEIL(v-0.5) via ceil helper @0x1ed760; consts @0x144d10=0.0 @0x144d18=0.5" }
  - { type: disassembled, ref: "errnum 8 for non-number arg = `mov r0,#0x8` in the handler; not oracle-trappable (SB has no error trapping, only a halt is observable)", confidence: disassembled }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: ROUND(12.345)=12, ROUND(2.5)=3, ROUND(-2.5)=-3, ROUND(0.5)=1, ROUND(-0.5)=-1, ROUND(2.4)=2 (half-away-from-zero confirmed)" }

confidence: hw_verified

tests:
  # numeric expects below are hw_verified (sb-oracle 2026-06-22); error case is disassembled.
  - { name: doc_example,         code: "PRINT ROUND(12.345)", expect: { stdout: "12" } }
  - { name: positive_half_up,    code: "PRINT ROUND(2.5)",    expect: { stdout: "3" } }
  - { name: negative_half_away,  code: "PRINT ROUND(-2.5)",   expect: { stdout: "-3" } }
  - { name: half_one,            code: "PRINT ROUND(0.5)",    expect: { stdout: "1" } }
  - { name: negative_half_one,   code: "PRINT ROUND(-0.5)",   expect: { stdout: "-1" } }
  - { name: rounds_down,         code: "PRINT ROUND(2.4)",    expect: { stdout: "2" } }
  - { name: integer_passthrough, code: "PRINT ROUND(5)",      expect: { stdout: "5" } }
  - { name: string_type_mismatch, code: 'A=ROUND("x")',       expect: { error: { errnum: 8 } } }
