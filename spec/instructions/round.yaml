# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: ROUND
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Source numerical value" }
    returns: { type: integer, desc: "value rounded to the nearest integer" }

summary: "Rounds value to the nearest integer; halves round away from zero."

semantics:
  - "Integer input is returned unchanged."
  - "Result type is always Integer, even for a Double input."
  - "Rounds half AWAY from zero (NOT banker's rounding): ROUND(0.5)=1, ROUND(1.5)=2, ROUND(2.5)=3, ROUND(-0.5)=-1, ROUND(-2.5)=-3."
  - "ROUND(12.345)=12, ROUND(12.5)=13, ROUND(-12.5)=-13."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

see_also: "FLOOR (round down), CEIL (round up)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/round.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: ROUND(0.5)=1, ROUND(1.5)=2, ROUND(2.5)=3, ROUND(-2.5)=-3, ROUND(12.5)=13", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: typical,            code: "PRINT ROUND(12.345)", expect: { stdout: "12" } }
  - { name: half_up_0,          code: "PRINT ROUND(0.5)",    expect: { stdout: "1" } }
  - { name: half_up_1,          code: "PRINT ROUND(1.5)",    expect: { stdout: "2" } }
  - { name: half_up_2,          code: "PRINT ROUND(2.5)",    expect: { stdout: "3" } }
  - { name: half_down_neg,      code: "PRINT ROUND(-0.5)",   expect: { stdout: "-1" } }
  - { name: half_down_neg2,     code: "PRINT ROUND(-2.5)",   expect: { stdout: "-3" } }
  - { name: string_type_mismatch, code: 'A=ROUND("x")',      expect: { error: { errnum: 8 } } }
