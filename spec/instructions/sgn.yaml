id: SGN
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Numerical value for which to get the sign" }
    returns: { type: integer, desc: "Sign of value: -1, 0, or 1" }

summary: "Returns the sign of value as an Integer: -1 if negative, 0 if zero, 1 if positive."

semantics:
  - "SGN(12.345)=1, SGN(-5)=-1, SGN(0)=0. The result is always an Integer regardless of the argument type."
  - "Integer path: value<0 -> -1, value==0 -> 0, value>0 -> 1. Double path compares against 0.0 the same way (-0.0 compares equal to 0.0 -> 0)."
  - "Edge case (disassembled): SGN(NaN)=1 — the unordered VFP compare falls through to the positive branch (matches osb). NaN is not directly expressible, so this is documented from the handler, not harvested."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sgn.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst SGN handler @0x148bb8; Integer path @0x148c38 (cmp 0 -> -1/0/1), Double path @0x148c60 (vcmp vs const 0.0 @0x148c88); result pushed via Integer return path; non-number arg -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: SGN(12.345)=1, SGN(-5)=-1, SGN(0)=0, SGN(5)=1, SGN(-3.2)=-1, SGN(0.0)=0" }

confidence: hw_verified

tests:
  # numeric expects below are hw_verified (sb-oracle 2026-06-22); the NaN->1 edge and the
  # string-error case are disassembled.
  - { name: doc_positive,        code: "PRINT SGN(12.345)", expect: { stdout: "1" } }
  - { name: negative_integer,    code: "PRINT SGN(-5)",     expect: { stdout: "-1" } }
  - { name: zero,                code: "PRINT SGN(0)",      expect: { stdout: "0" } }
  - { name: positive_integer,    code: "PRINT SGN(5)",      expect: { stdout: "1" } }
  - { name: negative_fraction,   code: "PRINT SGN(-3.2)",   expect: { stdout: "-1" } }
  - { name: zero_double,         code: "PRINT SGN(0.0)",    expect: { stdout: "0" } }
  - { name: string_type_mismatch, code: 'A=SGN("x")',       expect: { error: { errnum: 8 } } }
