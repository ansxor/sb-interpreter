id: FOR
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: variable, type: number, desc: "Loop control variable (assigned the initial value, incremented each pass)" }
      - { name: initial, type: number, range: "any", desc: "Starting value of the loop variable" }
      - { name: end, type: number, range: "any", desc: "End value (TO); loop continues while not past it" }
      - { name: step, type: number, range: "any", optional: true, default: 1, desc: "Increment added each pass (STEP); defaults to 1" }
    note: "FOR var=initial TO end [STEP step] ... NEXT — counts var from initial by step until it passes end."

summary: "Repeats the block between FOR and NEXT, counting a loop variable from an initial value to an end value by an optional step."

semantics:
  - "STEP defaults to 1 when omitted."
  - "The continue test is evaluated at the TOP of the loop, so the body may run zero times: with a positive step the loop runs while variable <= end; with a negative step, while variable >= end."
  - "FOR I=5 TO 1 (default step +1) runs the body zero times; FOR I=5 TO 1 STEP -1 runs it (5,4,3,2,1)."
  - "After the loop ends, the variable holds the first value that failed the test (FOR I=1 TO 3 leaves I=4; FOR I=0 TO 9 STEP 2 leaves I=10)."
  - "The step may be fractional; floating-point error can make the iteration count differ from the naive expectation (documented caveat)."
  - "Overflow promotion (hw_verified 2026-06-26, sb95p): a SUFFIX-LESS loop counter that overruns i32 MAX during the step-add is promoted Int→Double — exactly like `INC` / `counter=counter+step` — so the loop TERMINATES instead of wrapping. `FOR I=2147483640 TO 2147483647` runs 8 passes and leaves I=2.14748e+09 (2147483648.0, a Double past the limit). An EXPLICIT `%`-integer counter (`FOR I%=2147483640 TO 2147483647`) does NOT promote — it wraps i32 (→ -2147483648) and the loop runs ENDLESSLY (hangs), matching the documented `%`-store wrap rule. So promotion is keyed on the counter's runtime type being suffix-less/Double, the same rule the compiler derives from `name_is_real_typed(var) || is_real_typed(step)`."
  - "Loops may be nested; each FOR pairs with one NEXT."

errors:
  - { errnum: 20, name: "FOR without NEXT", when: "a FOR has no matching NEXT (the block ends first)" }
  - { errnum: 3, name: SyntaxError, when: "the FOR/TO structure is otherwise malformed (e.g. TO missing)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/for.md, to.md, step.md (FOR var=init TO end [STEP inc]; 'may not be executed at all'; STEP default 1)" }
  - { type: disassembled, ref: "cia_3.6.0.lst FOR/TO/STEP/NEXT are parser keywords (not in builtin dispatch table); tokens in the compiler keyword table (NEXT @0x2ed6e0, STEP @0x2ee638); compiled to an init + top-of-loop compare + body + increment + back-jump" }
  - { type: hw_verified, ref: "sb-oracle loop probe 2026-06-22 (error-as-signal, : -chained programs): FOR I=1 TO 3 runs 3x (S==3) and leaves I=4; FOR I=0 TO 9 STEP 2 runs 5x and leaves I=10; FOR I=5 TO 1 (default +1) runs 0x (top-checked); FOR I=5 TO 1 STEP -1 runs (counts down, leaves I=0); FOR I=1 TO 5 STEP -1 runs 0x. STEP default 1 confirmed." }
  - { type: hw_verified, ref: "sb-oracle structural-error probe 2026-06-23 (|err): an unterminated FOR (FOR I=0 TO 3 with no NEXT) raises errnum 20 (FOR without NEXT) — not generic Syntax error 3. See [[next]]." }
  - { type: hw_verified, ref: "sb-oracle audit 49r isolated re-probe 2026-06-26 (run_case.py errcase, harness/harvest/out/audit_49r_single.tsv): the 2026-06-23 batch |err value for the loop family was re-verified via isolated run_error_case probes (the reliable path that exposed the IF/ENDIF 26/27/28 mis-harvest in commit 0e165f3). `FOR I=0 TO 3` (no NEXT) → errnum 20 errline 4 (EOF) — CONFIRMED, no mis-harvest. A stray `NEXT` (no open FOR) → 21 errline 1; non-leading `PRINT 1\\nNEXT` → 21 errline 2; `A=1\\nB=2\\nNEXT` → 21 errline 3 — uniform (errline = the NEXT's own line). Leading-`:` exception: `:NEXT` / `::NEXT` → errnum 3 (the `:` is an empty preceding statement) — the leading-`:` rule is general (any statement, not just closers; audit 49r 2026-06-26)." }
  - { type: hw_verified, ref: "sb-oracle progcase 2026-06-26 (fractional STEP drift): FOR I=0 TO 1 STEP 0.25 runs 5 passes (I=0,0.25,0.5,0.75,1.0; exact in f64) and leaves I=1.25. FOR I=0 TO 2 STEP 0.1 runs 20 passes — NOT 21 — and leaves I=2 (float drift accumulates so the 21st value exceeds 2 and fails the top test; the loop variable is Double when STEP is fractional)." }
  - { type: hw_verified, ref: "sb-oracle progcase 2026-06-26 (sb95p, harness/harvest/out/sb95p.tsv): FOR counter overflow promotion. SUFFIX-LESS counter `FOR I=2147483640 TO 2147483647:NEXT` runs 8 passes (C=8) and leaves I=2.14748e+09 (=2147483648.0, a Double promoted past i32 MAX) — the loop TERMINATES because the counter promotes Int→Double on the step-add, exactly like INC. EXPLICIT `%` counter `FOR I%=2147483640 TO 2147483647:NEXT` does NOT promote (wraps i32 → -2147483648) and the loop HANGS (no SAVE produced / None) — matching the documented `%`-store wrap rule. Confirms the assumption 'FOR counter promotes exactly like counter=counter+step / INC' (suffix-less promotes, `%` wraps)." }

confidence: hw_verified

tests:
  - { name: basic_sum,    code: "S=0\nFOR I=1 TO 5\nS=S+I\nNEXT\nPRINT S", expect: { stdout: "15" } }
  - { name: step_two,     code: "FOR I=0 TO 9 STEP 2\nPRINT I;\",\";\nNEXT", expect: { stdout: "0,2,4,6,8," } }
  - { name: zero_iterations, code: "FOR I=5 TO 1\nPRINT \"X\"\nNEXT\nPRINT \"DONE\"", expect: { stdout: "DONE" } }
  - { name: negative_step, code: "FOR I=3 TO 1 STEP -1\nPRINT I;\nNEXT", expect: { stdout: "321" } }
  - { name: final_value,  code: "FOR I=1 TO 3\nNEXT\nPRINT I", expect: { stdout: "4" } }
  - { name: for_without_next, code: "FOR I=0 TO 3\nPRINT I", expect: { error: { errnum: 20 } } }
  - { name: step_quarter_count, code: "C=0\nFOR I=0 TO 1 STEP 0.25\nC=C+1\nNEXT\nPRINT C", expect: { stdout: "5" } }
  - { name: step_tenth_count,  code: "C=0\nFOR I=0 TO 2 STEP 0.1\nC=C+1\nNEXT\nPRINT C", expect: { stdout: "20" } }
  - { name: step_quarter_final, code: "FOR I=0 TO 1 STEP 0.25\nNEXT\nPRINT I", expect: { stdout: "1.25" } }
  # Overflow promotion: a suffix-less counter overruning i32 MAX promotes to Double and
  # terminates (hw_verified sb95p). Runs 8 passes (2147483640..2147483647), leaves 2147483648.0.
  - { name: overflow_promotes_terminates, code: "C=0\nFOR I=2147483640 TO 2147483647\nC=C+1\nNEXT\nPRINT C", expect: { stdout: "8" } }
