id: BGCLR
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: layer, type: integer, range: "0..3", optional: true, desc: "Target BG layer. If omitted, all layers are cleared." }
    note: "BGCLR [layer] — clear one BG layer's tilemap, or with no argument clear all layers (0 or 1 arg, no return value)."

summary: "Clears the BG screen (tilemap) — fills the layer's map with empty tiles. With one argument it clears that layer; with no argument it clears every BG layer."

semantics:
  - "Statement only: if a return value is requested (used as a function) the handler raises errnum 4 (Illegal function call) — return-count r1=[r0,#0xc] cmp #0 / bne -> error path @0x1641d4 (mov r0,#0x4 @0x1641dc)."
  - "Accepts exactly 0 OR 1 arguments. Argcount r1=[r0,#0x4] == 0 -> clear-all @0x1641ec; == 1 -> clear-one @0x164244; any other count raises errnum 4 — mov r0,#0x4 @0x1641dc."
  - "ZERO-ARGUMENT form (BGCLR): clears every BG layer. The handler loops r5 from 0 while r5 < the BG-layer count [[0x315d60]+0x60] (= 4), zeroing each layer's tilemap entries (str r6(=0) per cell) and invalidating via bl 0x00139c9c @0x164200-0x164234."
  - "ONE-ARGUMENT form (BGCLR layer): the layer must be in 0..3. The layer is evaluated and range-checked by the shared layer getter FUN_001e2504 (bl @0x164250): a value < 0, or >= the layer count, raises errnum 10 (Out of range) — mov r0,#0xa @0x1e2560. The single layer's tilemap is then zeroed @0x164260-0x164284."
  - "Clearing fills the map with empty/transparent tiles; it does not change the layer's size (BGSCREEN), visibility (BGSHOW/BGHIDE), scroll (BGOFS) or graphic page (BGPAGE)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "more than 1 argument is given, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "the layer is negative or > 3 (not in 0..3), in the 1-argument form" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgclr.md (BGCLR [Layer] — 'Clears the BG screen'; 'Layer 0-3 (If omitted, all layers)'; e.g. BGCLR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGCLR handler @0x1641a0: return-count [r0,#0xc] bne -> mov r0,#0x4 errnum 4 @0x1641dc; argcount [r0,#0x4] ==0 beq clear-all @0x1641ec / ==1 beq clear-one @0x164244 else errnum 4 @0x1641d4; clear-all loops r5<[[0x315d60]+0x60] zeroing cells (str r6) + bl 0x139c9c @0x164200; clear-one evaluates layer via bl 0x1e2504 (errnum 10 @0x1e2560) then zeroes the layer @0x164260; state ptr 0x315d60 [0x164294], map base 0x19a2f50 [0x164298]." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG map clear handling (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: both forms heavily used — the bare no-argument 'BGCLR' (clear all, ~859x, e.g. 'CLS:GCLS 0:BGCLR' in 1DVK34J/TXT/HNZMJG) and the 1-arg 'BGCLR 0'/'BGCLR I' (~274x literals + ~36x variable). No multi-arg form. (oracle-pending: clear side effect, queued)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9a): BGCLR 4 -> errnum 10 (out of range); BGCLR -1 -> errnum 10. Both errline 1." }

confidence: disassembled

tests:
  # Tilemap clear side effects need the BG framebuffer oracle (O-T6, queued); error expects are
  # hw_verified (sb-oracle 2026-06-22 s_t9a).
  - { name: clear_all_ok, code: "BGSCREEN 0,32,32\nBGCLR", expect: { stdout: "" } }
  - { name: clear_one_ok, code: "BGSCREEN 0,32,32\nBGCLR 0", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGCLR 4", expect: { error: { errnum: 10 } } }
  - { name: layer_negative, code: "BGCLR -1", expect: { error: { errnum: 10 } } }
