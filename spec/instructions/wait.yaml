id: WAIT
kind: statement
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: frames, type: integer, range: ">=0", optional: true, default: 1, desc: "Frames to wait, counted from the present point (0: ignore; default 1)" }
    note: "WAIT [frames] — block for the given number of vertical-sync frames from the current point."

summary: "Stops the program until the specified number of vertical-sync frames has elapsed, counted from the present moment."

semantics:
  - "WAIT n blocks for n frames measured from the CURRENT point in execution. Contrast [[vsync]], which counts from the last VSYNC to keep a fixed cadence."
  - "The argument defaults to 1 if omitted; WAIT 0 is ignored (no wait)."
  - "Frames are vertical-sync units at 60 fps (one frame ~= 1/60 s); WAIT 60 pauses about one second. See the frame-and-timing concept spec (S-C4)."
  - "WAIT does not return a value; it advances the frame clock."
  - "The wait DURATION is real-time/timing behavior and is not value-harvestable from the deterministic oracle; the conformance check verifies the program continues correctly after WAIT (queued for the timing model)."

errors:
  - { errnum: 10, name: "Out of range", when: "a negative frame count is given (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/wait.md (WAIT [frames]; counts from the present point; 0: ignore; default 1)" }
  - { type: disassembled, ref: "cia_3.6.0.lst WAIT handler FUN_0014afb0 @0x14afb0: blocks the VM for n frames measured from the current frame counter" }
  - { type: community, ref: "sbsave corpus: ~1,303 WAIT; frame count as expression common (WAIT RND(20) in XCMD libs; WAIT 60*N, WAIT D*60); bare WAIT (~115); WAIT 0 rare (~2); literal counts 1..240" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4f): the program CONTINUES correctly after WAIT (bare WAIT then A=5 -> 5; WAIT 0 -> 7; WAIT 2 -> 3). NOTE: only execution-continuation is verified; the wait DURATION (timing) is not oracle-verifiable and keeps the top-level confidence at disassembled." }

confidence: disassembled

tests:
  - { name: wait_default_continues, code: "WAIT\nPRINT 5", expect: { stdout: "5" } }
  - { name: wait_zero_ignored, code: "WAIT 0\nPRINT 7", expect: { stdout: "7" } }
  - { name: wait_n_continues, code: "WAIT 2\nA=3\nPRINT A", expect: { stdout: "3" } }
