# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: ABS
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Numerical value" }
    returns: { type: number, desc: "Absolute value (preserves the input's numeric type)" }

summary: "Returns the absolute value of value."

semantics:
  - "Returns value with its sign removed: |value|."
  - "Type is preserved: an Integer argument returns Integer, a Double argument returns Double."
  - "ABS(-9)=9, ABS(-12.345)=12.345, ABS(0)=0."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/abs.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: ABS(-12.345)=12.345, ABS(-9)=9, ABS(0)=0", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: negative_double, code: "PRINT ABS(-12.345)", expect: { stdout: "12.345" } }
  - { name: negative_int,    code: "PRINT ABS(-9)",      expect: { stdout: "9" } }
  - { name: zero,            code: "PRINT ABS(0)",       expect: { stdout: "0" } }
  - { name: string_type_mismatch, code: 'A=ABS("x")',    expect: { error: { errnum: 8 } } }
