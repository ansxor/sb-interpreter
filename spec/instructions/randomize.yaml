id: RANDOMIZE
kind: statement
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: seed_id, type: integer, range: "0-7", desc: "Random series to (re)initialize" }
      - { name: seed_value, type: integer, optional: true, default: 0, desc: "Seed; 0 or omitted -> seed from system entropy" }
    note: "Statement (no return value). Reinitializes one of the 8 TinyMT random series."

summary: "Initializes one of the 8 random number series, making subsequent RND/RNDF draws from it deterministic for a given non-zero seed."

semantics:
  - "Selects series seed_id (0-7) and reseeds its TinyMT128 state (table @0x1d08000)."
  - "If seed_value is 0 or omitted, the series is seeded from system entropy (non-deterministic); a non-zero seed_value gives a reproducible sequence."
  - "Only the named series is affected; the other series keep their state."
  - "After RANDOMIZE seed_id, seed_value with a non-zero seed, the sequence from RND(seed_id, ...)/RNDF(seed_id) is deterministic."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "called with no arguments, or more than 2" }
  - { errnum: 10, name: OutOfRange, when: "seed_id is outside 0-7" }
  - { errnum: 8, name: TypeMismatch, when: "an argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/randomize.md (RANDOMIZE Seed ID [, Seed value]; Seed ID 0-7; seed 0/omitted -> entropy)" }
  - { type: disassembled, ref: "cia_3.6.0.lst RANDOMIZE handler @0x1468a8; argcount 0 or >2 -> errnum 4 (@0x1468d0); seed_id coerced to int (vtable +0x40), >=8 -> errnum 10 (@0x146914); seed via @0x1ec22c -> seed_value 0 takes entropy path @0x271104, non-zero -> @0x26f580" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22 (errors only): RANDOMIZE (no arg) -> errnum 4; RANDOMIZE 8 -> errnum 10; RANDOMIZE \"x\" -> errnum 8." }
  - { type: hw_verified, ref: "sb-oracle prog-case run 2026-06-23 (RESEED EFFECT, deterministic golden): RANDOMIZE 0,1 then RND(100) -> 89,33,33,52,...; reseeding restarts the sequence; RANDOMIZE seed_id,seed_value reseeds ONLY that series (RANDOMIZE 5,1 -> RND(5,100) = 89, same seed/same sequence). Confirms RANDOMIZE = tinymt32_init(seed) with no extra discard draw. Matches otya_test.sb3." }

# After RANDOMIZE with a non-zero seed the downstream RND/RNDF sequence is deterministic and
# now frozen as an hw_verified golden (sb-oracle 2026-06-23); seed 0/omitted = entropy stays
# non-deterministic by design.
confidence: hw_verified

tests:
  - { name: ok_seed,            code: "RANDOMIZE 0,1", expect: { stdout: "" } }
  - { name: no_arg_illegal,     code: "RANDOMIZE", expect: { error: { errnum: 4 } } }
  - { name: seed_id_out_of_range, code: "RANDOMIZE 8", expect: { error: { errnum: 10 } } }
  - { name: string_type_mismatch, code: 'RANDOMIZE "x"', expect: { error: { errnum: 8 } } }
  # Reseed effect (hw_verified): RANDOMIZE makes the downstream sequence deterministic.
  - { name: reseed_makes_deterministic, code: "RANDOMIZE 0,1\nPRINT RND(100)", expect: { stdout: "89" } }
