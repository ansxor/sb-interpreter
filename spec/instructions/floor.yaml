# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: FLOOR
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Source numerical value" }
    returns: { type: integer, desc: "Largest integer <= value" }

summary: "Returns the largest integer not greater than value (rounds toward negative infinity)."

semantics:
  - "Integer input is returned unchanged (no coercion error)."
  - "Result type is always Integer, even for a Double input."
  - "Rounds toward negative infinity: FLOOR(3.7)=3, FLOOR(-2.1)=-3 (NOT -2), FLOOR(-12.5)=-13."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/floor.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: FLOOR(-2.1)=-3", confidence: hw_verified }
  # errnum for the string case is documented-only until O-T5 (error capture) lands.

confidence: hw_verified

tests:
  - { name: positive_fraction,    code: "PRINT FLOOR(3.7)",   expect: { stdout: "3" } }
  - { name: negative_rounds_down, code: "PRINT FLOOR(-2.1)",  expect: { stdout: "-3" } }
  - { name: integer_passthrough,  code: "PRINT FLOOR(5)",     expect: { stdout: "5" } }
  - { name: string_type_mismatch, code: 'A=FLOOR("x")',       expect: { error: { errnum: 8 } } }
