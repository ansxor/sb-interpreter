id: COPY
kind: statement
category: Variables and Arrays
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: dest, type: array, desc: "Destination array (overwritten with source content)" }
      - { name: dest_offset, type: integer, range: ">=0", optional: true, default: 0, desc: "First destination element to overwrite" }
      - { name: src, type: array, desc: "Source array" }
      - { name: src_offset, type: integer, range: ">=0", optional: true, default: 0, desc: "First source element to copy" }
      - { name: count, type: integer, range: ">=0", optional: true, desc: "Number of elements to copy (default: to end of source)" }
    note: "COPY dest [,dest_offset], src [[,src_offset], count] — array-to-array copy (form 1)."
  - args:
      - { name: dest, type: array, desc: "Destination array (overwritten with the DATA sequence)" }
      - { name: dest_offset, type: integer, range: ">=0", optional: true, default: 0, desc: "First destination element to overwrite" }
      - { name: label, type: string, desc: "\"@Label\" naming the DATA line(s) to read; or \"SLOT:@Label\" to read from another program slot (requires USE SLOT first)" }
      - { name: count, type: integer, range: ">=0", optional: true, desc: "Number of DATA items to read (default: dest element count)" }
    note: "COPY dest [,dest_offset], \"@Label\" [,count] — read a DATA sequence into the array (form 2). The label may be slot-qualified as \"SLOT:@Label\" (1-3) to read DATA from another program slot."

summary: "Copies one array into another (form 1), or reads a DATA sequence into an array (form 2). For 1D arrays the destination auto-extends if too small."

semantics:
  - "Form 1 copies elements from src into dest; form 2 reads a DATA sequence (named by an \"@Label\" string) into dest."
  - "The form and the optional offsets are disambiguated by argument TYPE: an array in the 2nd slot means no dest_offset (it is src); a number means dest_offset; a string literal selects form 2."
  - "For 1D arrays, if the destination has too few elements the required elements are added automatically (the destination grows)."
  - "Both source and destination ignore dimensions — the copy operates on the flat element sequence regardless of declared shape."
  - "If count is omitted in form 1, elements are copied through the end of the source."
  - "In form 2, if count is omitted the DATA is read to fill the destination's element count; if fewer DATA items are available than required, errnum 13 (Out of DATA) is raised. The same applies when an explicit count exceeds the available DATA items."
  - "In form 2, a label string that names no defined label (\"@NOPE\") raises errnum 14 (Undefined label)."
  - "In form 2, the label may be slot-qualified as \"SLOT:@Label\" (SLOT 1-3) to read DATA from another program slot. The target slot must have a program loaded (LOAD \"PRGSLOT:name\",0) AND be enabled with USE SLOT first, or errnum 14 (Undefined label) is raised. A slot-qualified label that names no defined label in the target slot also raises errnum 14. (Same slot-qualifier model as RESTORE \"SLOT:@Label\" — see sb-docs/smilebasic-3/restore.md.)"
  - "Copying between mismatched element types (e.g. numeric array <-> string array) raises errnum 8 (Type mismatch)."
  - "Wrong argument count raises errnum 4 (Illegal function call)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "source and destination element types differ (numeric vs string)" }
  - { errnum: 4, name: IllegalFunctionCall, when: "wrong number of arguments" }
  - { errnum: 13, name: "Out of DATA", when: "form 2: fewer DATA items available than required (omitted or explicit count)" }
  - { errnum: 14, name: "Undefined label", when: "form 2: the \"@Label\" string names no defined label" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/copy.md (two forms: array-to-array and DATA-to-array; 1D dest auto-extends; dimensions ignored; offsets/count optional)" }
  - { type: disassembled, ref: "cia_3.6.0.lst COPY handler FUN_00149a94 @0x149a94: wrong argc -> errnum 4 (mov r0,#4 @0x149ac8 -> 0x1fffdc); type-tag checks @0x149af8-0x149b20 (tags 2/3/4/5 distinguish number vs array operands and disambiguate the offset/form) with mismatch -> errnum 8 (mov r0,#8 @0x149b34)" }
  - { type: community, ref: "sbsave corpus: ~2,182 COPY (excl. GCOPY/BGCOPY); full 5-arg form COPY dest,destOff,src,srcOff,count dominant (~819, e.g. 2BC4738V/TXT/MOH_JUHSY237D); DATA form COPY arr,\"@LABEL\"[,count] (~592) incl. slot-qualified labels COPY arr,\"1:@LABEL\" (e.g. 13D4DV3V/TXT/MAIN_PRG_V2); string arrays in both forms (e.g. COPY TEXT$,@TEXT)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4c): COPY D,S copies (D[1]=2); auto-extend DIM D[0]:COPY D,S -> LEN 3; COPY D,1,S -> D[1..2]=src; COPY D,S,0,2 -> first 2 only (D[2] left 0); 5-arg COPY D,1,S,2,2 -> D[1..2]=S[2..3]=3,4; DATA form COPY D,\"@SRC\" with DATA 5,1,1,2,4 -> D[0]=5,D[4]=4; numeric<-string COPY A,S$ -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-26 (s_t4c form-2 errors): DIM A[3]:COPY A,\"@L\" with DATA 1,2 (fewer than 3) -> errnum 13 (Out of DATA); DIM S$[3]:COPY S$,\"@L\" with DATA \"a\",\"b\" -> errnum 13; DIM A[3]:COPY A,\"@NOPE\" (undefined) -> errnum 14 (Undefined label)" }
  - { type: hw_verified, ref: "sb-oracle slotcopy_harvest 2026-06-26 (sb-interpreter-kbv): slot-qualified form COPY A,\"1:@L\" with slot 1 loaded (LOAD \"PRG1:Q\",0) + USE 1 + Q holding @L/DATA 10,20,30 -> A[0..2]=10,20,30; count COPY A,\"1:@L\",2 -> 10,20,0; string cross-slot COPY S$,\"1:@S\" with DATA \"x\",\"y\",\"z\" -> \"xyz\"; WITHOUT USE 1 -> errnum 14 (errline=3); slot-qualified undefined label \"1:@NOPE\" -> errnum 14 (errline=4); slot 1 not loaded -> errnum 14 (errline=3)" }

confidence: hw_verified

tests:
  - { name: copy_basic, code: "DIM S[3]\nS[0]=1\nS[1]=2\nS[2]=3\nDIM D[3]\nCOPY D,S\nPRINT D[1]", expect: { stdout: "2" } }
  - { name: copy_autoextend, code: "DIM S[3]\nDIM D[0]\nCOPY D,S\nPRINT LEN(D)", expect: { stdout: "3" } }
  - { name: copy_dest_offset, code: "DIM S[2]\nS[0]=7\nS[1]=8\nDIM D[4]\nCOPY D,1,S\nPRINT D[1];D[2]", expect: { stdout: "78" } }
  - { name: copy_count, code: "DIM S[3]\nS[0]=1\nS[1]=2\nS[2]=3\nDIM D[3]\nCOPY D,S,0,2\nPRINT D[0];D[1];D[2]", expect: { stdout: "120" } }
  - { name: copy_five_arg, code: "DIM S[4]\nS[0]=1\nS[1]=2\nS[2]=3\nS[3]=4\nDIM D[4]\nCOPY D,1,S,2,2\nPRINT D[1];D[2]", expect: { stdout: "34" } }
  - { name: copy_from_data, code: "DIM D[5]\nCOPY D,\"@SRC\"\nPRINT D[0];D[4]\n@SRC\nDATA 5,1,1,2,4", expect: { stdout: "54" } }
  - { name: copy_type_mismatch, code: "DIM A[1]\nDIM S$[1]\nCOPY A,S$", expect: { error: { errnum: 8 } } }
  - { name: copy_short_data, code: "DIM A[3]\nCOPY A,\"@L\"\nEND\n@L\nDATA 1,2", expect: { error: { errnum: 13 } } }
  - { name: copy_undefined_label, code: "DIM A[3]\nCOPY A,\"@NOPE\"", expect: { error: { errnum: 14 } } }
