id: ATTR
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: attribute, type: integer, range: "0..15 (rotation bits b0-b1 + H-invert b2 + V-invert b3)", desc: "Display attribute. Bits b0-b1: rotation 0/90/180/270 deg (#TROT0=0,#TROT90=1,#TROT180=2,#TROT270=3). Bit b2: horizontal inversion (#TREVH=4). Bit b3: vertical inversion (#TREVV=8). Values combine, e.g. 3 = #TROT270, 12 = #TREVH|#TREVV." }
    note: "ATTR attribute — sets the rotation/inversion attributes applied to subsequently PRINTed console characters. Exactly 1 argument slot; statement only."

summary: "Sets the rotation/inversion attribute applied to console characters drawn afterward (rotation 0/90/180/270 deg plus optional horizontal/vertical inversion)."

semantics:
  - "Takes exactly 1 argument slot and no return value (statement). A different argument-slot count, or use as a function (requesting a return value), raises errnum 4 (Illegal function call) — argcount guard cmp r1,#1 with return-count [r0+0xc]==0 check, else mov r0,#0x4 @0x14c0bc."
  - "The attribute is an Integer in range 0..15 inclusive; a value < 0 or > 15 raises errnum 10 (Out of range) — range guard cmp r0,#0 (blt)/cmp r0,#0xf (ble ok), else mov r0,#0xa @0x14c128."
  - "Bit layout: b0-b1 select rotation (0=0deg #TROT0, 1=90deg #TROT90, 2=180deg #TROT180, 3=270deg #TROT270); b2 toggles horizontal inversion (#TREVH=4); b3 toggles vertical inversion (#TREVV=8). The handler masks the value with &0xff before storing it into the console state (and r0,r0,#0xff; str r0,[r4,#0x3c] @0x14c0fc), but the 0..15 range guard means only the low 4 bits are ever reachable."
  - "The attribute is persistent console state: it affects every character printed after the ATTR call until changed (it is not per-PRINT). The constants #TROT0/#TROT90/#TROT180/#TROT270/#TREVH/#TREVV are the documented way to compose the value."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument-slot count is not 1, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "attribute is < 0 or > 15" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/attr.md (ATTR Display attribute; b00-b01 rotation #TROT0/90/180/270, b02 horizontal inversion #TREVH, b03 vertical inversion #TREVV; example ATTR 3:PRINT \"ABC\")" }
  - { type: disassembled, ref: "cia_3.6.0.lst ATTR handler @0x14c090: argcount cmp r1,#0x1 (r1=[r0+0x4]) + return-count cmpeq r1(=[r0+0xc]),#0x0, else mov r0,#0x4 (errnum 4) bl 0x1fffdc @0x14c0bc. Eval arg via vtable [r2+0x40]. Range guard @0x14c10c: cmp r0,#0 (blt 0x14c120)/cmp r0,#0xf (ble ok), else mov r0,#0xa (errnum 10) bl 0x1fffdc @0x14c128. Store: and r0,r0,#0xff; str r0,[r4,#0x3c] (console state) @0x14c0fc.", confidence: disassembled }
  - { type: community, ref: "osb/SMILEBASIC/console.d ATTR: stores text attribute byte used when drawing console glyphs (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: `ATTR 0` reset idiom is dominant (~39 uses); the #TROT* constants are used directly, e.g. 2BC4738V/TXT/MOH_JUHSY237D line 3513 `ATTR #TROT270:?\"⇔\";:ATTR #TROT0:...` (~8 uses). Operand is also given as a variable/expression (e.g. `ATTR 8*HANTEN_F`, `ATTR (TX+I) MOD 4`), confirming any integer expression in 0..15 is legal. (oracle-pending)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5c): ATTR 16 -> errnum 10 errline 1; ATTR -1 -> errnum 10 errline 1; A=ATTR(3) (used as a function) -> errnum 4 errline 1." }

confidence: hw_verified

tests:
  # error expects (errnum 4/10) are hw_verified (sb-oracle 2026-06-22). PRINT side-effect cases stdout-only.
  - { name: rotate_180, code: 'ATTR 2:PRINT "A"', expect: { stdout: "A" } }
  - { name: combine_invert, code: 'ATTR 12:PRINT "A"', expect: { stdout: "A" } }
  - { name: max_value_ok, code: 'ATTR 15:PRINT "A"', expect: { stdout: "A" } }
  - { name: out_of_range, code: "ATTR 16", expect: { error: { errnum: 10 } } }
  - { name: negative_out_of_range, code: "ATTR -1", expect: { error: { errnum: 10 } } }
  - { name: as_function_errors, code: "A=ATTR(3)", expect: { error: { errnum: 4 } } }
