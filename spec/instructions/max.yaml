id: MAX
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: values, type: number, range: "any", desc: "One or more numeric values, comma-separated (variadic)" }
    returns: { type: number, desc: "Largest of the values; keeps the winning element's own type (Integer or Double)" }
    note: "Varargs form: MAX(a, b, c, ...). Needs at least one value; comparisons are done in Double but the original value is returned."
  - args:
      - { name: array, type: number_array, desc: "A numeric array; the largest element is returned" }
    returns: { type: number, desc: "Largest element of the array" }
    note: "Array form: MAX(arr). Scans every element."

summary: "Returns the largest of the supplied numeric values, or the largest element of a numeric array."

semantics:
  - "Two call forms: MAX(arr) over a numeric array, or MAX(a,b,...) over directly-enumerated values."
  - "Comparison is performed in Double, but the returned value keeps the original type of the chosen element (e.g. MAX(3,2.5)=3 Integer; MAX(1.5,2.5)=2.5 Double)."
  - "Mirror of MIN, using the greater-than comparison method."

errors:
  - { errnum: 8, name: TypeMismatch, when: "any argument or array element is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "called with no arguments" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/max.md (forms: 2 — array and varargs)" }
  - { type: disassembled, ref: "cia_3.6.0.lst MAX handler @0x148230; array path uses compare vtable +0x38 (vs MIN's +0x34); coerces each element to Double (vtable +0x44); string element -> errnum 8 (mov r0,#8 @0x1482f4); selected element returned via its own return method, preserving Integer/Double type" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: MAX(1,2,3,4)=4, MAX(50,3)=50, MAX(-5,2,-10)=2, MAX(1.5,2.5)=2.5, MAX(3,2.5)=3 (Integer type preserved). String-element (errnum 8) and array form MAX(TMP) queued (oracle capture flaked / multi-statement); errnum 8 is the verified MIN mirror." }

confidence: hw_verified

tests:
  - { name: varargs_ints,  code: "PRINT MAX(1,2,3,4)", expect: { stdout: "4" } }
  - { name: two_ints,      code: "PRINT MAX(50,3)",    expect: { stdout: "50" } }
  - { name: negatives,     code: "PRINT MAX(-5,2,-10)", expect: { stdout: "2" } }
  - { name: doubles,       code: "PRINT MAX(1.5,2.5)", expect: { stdout: "2.5" } }
  - { name: mixed_keeps_int, code: "PRINT MAX(3,2.5)", expect: { stdout: "3" } }
  - { name: array_form,    code: "DIM TMP[2]:TMP[0]=50:TMP[1]=3:PRINT MAX(TMP)", expect: { stdout: "50" } }
  - { name: string_type_mismatch, code: 'A=MAX(1,"x")', expect: { error: { errnum: 8 } } }
