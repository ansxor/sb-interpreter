# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: MAX
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: array, type: number_array, range: "any", desc: "Numerical array storing the values" }
    returns: { type: number, desc: "Largest element of the array" }
    note: "MAX (1): array form."
  - args:
      - { name: value, type: number, range: "any", desc: "First value" }
      - { name: more,  type: number, range: "any", optional: true, desc: "Additional values, comma-separated (2 or more total)" }
    returns: { type: number, desc: "Largest of the listed values" }
    note: "MAX (2): variadic form, two or more values."

summary: "Returns the largest of the given numbers — either across one numerical array, or across two or more values listed directly."

semantics:
  - "Array form scans every element of the passed numerical array."
  - "Variadic form compares all comma-separated arguments."
  - "MAX(1,2,3,4)=4, MAX(50,3)=50."
  - "Type: the two-value form returns Integer when BOTH args are Integer; otherwise Double. The array form and the 3+-value form return Double (osb cross-check; verify the exact int/double rule via O-T5)."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "no arguments are given" }
  - { errnum: 8, name: TypeMismatch, when: "an argument is a string / non-numeric array" }

see_also: "MIN (smallest value)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/max.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: MAX(1,2,3,4)=4, MAX(50,3)=50, MAX([50,3])=50", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: variadic,  code: "PRINT MAX(1,2,3,4)", expect: { stdout: "4" } }
  - { name: two_value, code: "PRINT MAX(50,3)",    expect: { stdout: "50" } }
  - name: array_form
    code: "DIM T[2]:T[0]=50:T[1]=3:PRINT MAX(T)"
    expect: { stdout: "50" }
