# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: RAD
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Degree value (typically 0-360)" }
    returns: { type: double, desc: "Equivalent radian value" }

summary: "Converts a degree value to radians (value * PI / 180)."

semantics:
  - "RAD(value) = value * PI / 180. Result is always Double."
  - "RAD(45)=0.785398 (PI/4), RAD(180)=3.14159 (PI)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

see_also: "DEG (radians to degrees)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/rad.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: RAD(45)=0.785398, RAD(180)=3.14159", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: deg45_is_quarterpi, code: "PRINT RAD(45)",  expect: { stdout: "0.785398" } }
  - { name: deg180_is_pi,       code: "PRINT RAD(180)", expect: { stdout: "3.14159" } }
  - { name: string_type_mismatch, code: 'A=RAD("x")',   expect: { error: { errnum: 8 } } }
