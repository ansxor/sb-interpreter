id: RAD
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Angle in degrees (documented 0-360, but not enforced)" }
    returns: { type: double, desc: "Angle in radians" }

summary: "Converts a degree value to radians, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double."
  - "Computes value * PI/180 exactly as (value * PI) * (1/180), with the two factors held as the doubles PI (0x400921FB54442D18) and 0.005555555555555556 (0x3F76C16C16C16C17 = 1/180)."
  - "Combined scale factor is 0.017453292519943295; RAD(180)=PI(), RAD(90)=0.5*PI()."
  - "Documented degree range is 0-360, but the handler applies no range check — any finite value (negative, >360) is accepted."

errors:
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/rad.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst RAD handler @0x148980; argcount!=1 -> errnum 4; arg coerced via to-double method (vtable +0x44, non-number -> errnum 8); two vmul.f64 by consts @0x148a08=PI and @0x148a10=1/180; result returned as Double" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: RAD(0)=0, RAD(45)=0.785398, RAD(180)=3.14159; RAD(\"x\") -> errnum 8" }

confidence: hw_verified

tests:
  - { name: zero,          code: "PRINT RAD(0)",   expect: { stdout: "0" } }
  - { name: forty_five,    code: "PRINT RAD(45)",  expect: { stdout: "0.785398" } }
  - { name: one_eighty_pi, code: "PRINT RAD(180)", expect: { stdout: "3.14159" } }
  - { name: string_type_mismatch, code: 'A=RAD("x")', expect: { error: { errnum: 8 } } }
