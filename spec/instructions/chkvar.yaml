id: CHKVAR
kind: function
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: name, type: string, desc: "Name of the variable to check" }
    returns: { type: integer, desc: "TRUE (1) if a variable with that name exists, else FALSE (0)" }
    note: "result = CHKVAR(\"name\") — test whether a variable of that name exists."

summary: "Returns TRUE (1) if a variable with the given name can be referenced, otherwise FALSE (0)."

semantics:
  - "CHKVAR(\"name\") returns 1 (TRUE) when a variable of that name exists (has been declared/used), 0 (FALSE) otherwise."
  - "The name is the bare variable name; a type suffix (%, #, $) is part of the name when present."
  - "Used to probe for an optional variable before referencing it dynamically."
  - "Whether the checked name must include the type suffix to match a typed variable is oracle-pending."

errors:
  - { errnum: 8, name: TypeMismatch, when: "the argument is not a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/chkvar.md (Variable=CHKVAR(\"string\"); FALSE=does not exist, TRUE=exists)" }
  - { type: disassembled, ref: "cia_3.6.0.lst CHKVAR handler FUN_001456a8 @0x1456a8: looks the name up in the variable symbol table and returns a boolean (1/0)" }
  - { type: community, ref: "sbsave corpus: ~212 CHKVAR, dominantly variable/computed names (CHKVAR(A$); concatenated CHKVAR(P2SLOT$+\"PRGVER\") in NRQ4B33D/TXT/-MKIILIB; array-element CHKVAR(CYFS_DA$[DSKID%]) in 73AN3J9P/TXT/_CYW4SB3-LIB), mostly inside IF/!IF; no use with a bare type suffix like CHKVAR(\"X%\")" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4e): COUNTX=5:CHKVAR(\"COUNTX\") -> 1; CHKVAR(\"NOSUCHVAR\") -> 0; a DIM'd array name DIM Q[3]:CHKVAR(\"Q\") -> 1 (arrays count as existing variables)" }

confidence: hw_verified

tests:
  - { name: chkvar_exists, code: "COUNTX=5\nPRINT CHKVAR(\"COUNTX\")", expect: { stdout: "1" } }
  - { name: chkvar_missing, code: "A=1\nPRINT CHKVAR(\"NOSUCHVAR\")", expect: { stdout: "0" } }
  - { name: chkvar_array, code: "DIM Q[3]\nPRINT CHKVAR(\"Q\")", expect: { stdout: "1" } }
