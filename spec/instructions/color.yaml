id: COLOR
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: fg, type: integer, range: "0..15", optional: true, desc: "Text (drawing) color 0-15; omit (COLOR ,bg) to change only the background" }
      - { name: bg, type: integer, range: "0..15", optional: true, desc: "Per-character background color 0-15; if omitted, unchanged" }
    note: "COLOR fg [,bg] — set the console text color (and optional background)."

summary: "Sets the console text drawing color and optional per-character background color (palette 0-15). Named constants #TBLACK..#TWHITE are available."

semantics:
  - "COLOR fg sets the text drawing color used by subsequent PRINT; COLOR fg,bg also sets the per-character background color."
  - "COLOR ,bg (drawing color omitted) changes only the background color."
  - "Palette: 0 transparent, 1 black (#TBLACK), 2 dark red (#TMAROON), 3 red (#TRED), 4 dark green (#TGREEN), 5 green (#TLIME), 6 dark yellow (#TOLIVE), 7 yellow (#TYELLOW), 8 dark blue (#TNAVY), 9 blue (#TBLUE), 10 dark magenta (#TPURPLE), 11 magenta (#TMAGENTA), 12 dark cyan (#TTEAL), 13 cyan (#TCYAN), 14 gray (#TGRAY), 15 white (#TWHITE)."
  - "The #T* constants are integers 1..15 matching the palette above (#TBLACK=1, #TRED=3, #TBLUE=9, #TWHITE=15)."
  - "A color index outside 0..15 raises errnum 10 (Out of range) — oracle-pending."
  - "The on-screen color result is a visual effect (not a value); its exact rendering is verified via the graphics/screenshot oracle, not the value oracle (queued)."

errors:
  - { errnum: 10, name: "Out of range", when: "a color index is outside 0..15 (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/color.md (COLOR fg[,bg]; 0-15 palette with #TBLACK..#TWHITE names; COLOR ,bg sets background only)" }
  - { type: disassembled, ref: "cia_3.6.0.lst COLOR handler FUN_0014b1dc/@0x14b28c: sets the console text foreground/background color state used by the console renderer" }
  - { type: community, ref: "sbsave corpus: COLOR is common for console UI; COLOR fg, COLOR fg,bg, and the COLOR ,bg (background-only) form all appear, with #T* constants and literal indices" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5a): the text-color CONSTANT values are #TBLACK=1, #TRED=3, #TYELLOW=7, #TBLUE=9, #TWHITE=15 (palette table). NOTE: only the constant values are oracle-verified; the on-screen color RESULT of the COLOR instruction is a visual effect (queued for the graphics/screenshot oracle), so the top-level confidence stays disassembled." }

confidence: disassembled

tests:
  - { name: color_const_white, code: "PRINT #TWHITE", expect: { stdout: "15" } }
  - { name: color_const_red, code: "PRINT #TRED", expect: { stdout: "3" } }
  - { name: color_const_yellow, code: "PRINT #TYELLOW", expect: { stdout: "7" } }
  - { name: color_const_black, code: "PRINT #TBLACK", expect: { stdout: "1" } }
