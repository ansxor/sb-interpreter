id: COLOR
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: fgcolor, type: integer, range: "0..15 (palette index; 0 = transparent)", desc: "Text drawing (foreground) color. 0:Transparent 1:Black(#TBLACK) ... 15:White(#TWHITE)." }
      - { name: bgcolor, type: integer, optional: true, range: "0..15", desc: "Per-character background color. Omit (comma placeholder) to change only one." }
    note: "COLOR fg[,bg] — sets console text colors. 1 or 2 argument slots; fg may be omitted via comma to change only the background (`COLOR ,0`)."

summary: "Sets the console text drawing (foreground) and optional per-character background color, each a 0..15 palette index (0 = transparent)."

semantics:
  - "Takes 1 or 2 argument slots; any other count, or use as a function (requesting a return value), raises errnum 4 (Illegal function call) — argcount guard cmp #1/cmp #2 with return-count check @0x14b2d0."
  - "Each color index must be in 0..15; out of range raises errnum 10 (Out of range) — range check cmp r0,#0/blt + cmp r0,#0xf/ble @0x14b324 (fg) and @0x14b3b0 (bg)."
  - "Color 0 is the transparent color; 1..15 map to the text palette #TBLACK..#TWHITE (1:Black 2:Maroon 3:Red 4:Green 5:Lime 6:Olive 7:Yellow 8:Navy 9:Blue 10:Purple 11:Magenta 12:Teal 13:Cyan 14:Gray 15:White)."
  - "The drawing color may be omitted with a comma placeholder (`COLOR ,bg`) to change only the background; the omitted argument keeps its previous value (the absent-operand path skips the store)."
  - "The stored drawing color is masked to its low 8 bits (and r0,r0,#0xff @0x14b310) before being saved, though the 0..15 range guard already constrains it."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument slot count is not 1 or 2, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "a color index is not in 0..15" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/color.md (COLOR Drawing color[,Background color]; 0:Transparent, 1:Black #TBLACK .. 15:White #TWHITE; background may be set alone by omitting drawing color, e.g. COLOR ,0)" }
  - { type: disassembled, ref: "cia_3.6.0.lst COLOR handler @0x14b28c: return-count [r0+0xc]!=0 -> errnum 4; argcount r0=[r4+0x4], cmp #1 beq 1-arg form @0x14b2e0, cmp #2 beq 2-arg form @0x14b354, else mov r0,#0x4 (errnum 4) @0x14b2d0. fg range: cmp r0,#0/blt + cmp r0,#0xf/ble @0x14b324 else mov r0,#0xa (errnum 10) @0x14b340. Store: and r0,r0,#0xff @0x14b310; str r0,[r5,#0x34]. bg range check @0x14b3b0 else mov r0,#0xa @0x14b3d0.", confidence: disassembled }
  - { type: community, ref: "osb/SMILEBASIC/console.d COLOR: sets fg/bg palette indices for subsequent text (3.5.0 structural cross-check only)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5a): COLOR 16 -> errnum 10, errline 1; COLOR 0,16 -> errnum 10, errline 1 (color index > 15 out of range); A=COLOR(7) (used as a function) -> errnum 4, errline 1." }

confidence: hw_verified

tests:
  # error expects are hw_verified (sb-oracle 2026-06-22); stdout cases are disassembled.
  - { name: fg_only, code: 'COLOR 7:PRINT "X"', expect: { stdout: "X" } }
  - { name: fg_and_bg, code: 'COLOR 7,4:PRINT "X"', expect: { stdout: "X" } }
  - { name: const_alias, code: 'COLOR #TWHITE:PRINT "X"', expect: { stdout: "X" } }
  - { name: fg_out_of_range, code: "COLOR 16", expect: { error: { errnum: 10 } } }
  - { name: bg_out_of_range, code: "COLOR 0,16", expect: { error: { errnum: 10 } } }
  - { name: as_function_errors, code: "A=COLOR(7)", expect: { error: { errnum: 4 } } }
