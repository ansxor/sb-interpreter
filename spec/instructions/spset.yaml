id: SPSET
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Management number of the sprite to create" }
      - { name: def_no, type: integer, range: "0..4095", desc: "Template definition number (from SPDEF)" }
    note: "SPSET id, def_no — create a sprite from an SPDEF template (form 1)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Management number" }
      - { name: u, type: integer, range: "0..511", desc: "Source image U" }
      - { name: v, type: integer, range: "0..511", desc: "Source image V" }
      - { name: w, type: integer, optional: true, default: 16, desc: "Source width (default 16; U+W must be <=512)" }
      - { name: h, type: integer, optional: true, default: 16, desc: "Source height (default 16; V+H must be <=512)" }
      - { name: attribute, type: integer, desc: "Attribute bitfield (b0 display, b1-b2 rotation, b3 H-flip, b4 V-flip, b5 additive)" }
    note: "SPSET id, u,v [,w,h], attribute — create a sprite from explicit image info (form 2)."
  - args:
      - { name: def_no, type: integer, range: "0..4095", desc: "Template definition number" }
      - { name: ix, type: integer, desc: "OUT: allocated management number (0-511, or -1 if none free)" }
    note: "SPSET def_no OUT ix — auto-allocate a free sprite number from a template (form 3)."
  - args:
      - { name: u, type: integer, desc: "Source U" }
      - { name: v, type: integer, desc: "Source V" }
      - { name: w, type: integer, desc: "Source width" }
      - { name: h, type: integer, desc: "Source height" }
      - { name: attribute, type: integer, desc: "Attribute bitfield" }
      - { name: ix, type: integer, desc: "OUT: allocated management number (0-511, -1 if none)" }
    note: "SPSET u,v,w,h,attribute OUT ix — auto-allocate from explicit image info (form 4)."
  - args:
      - { name: upper, type: integer, range: "0..511", desc: "Search range upper bound" }
      - { name: lower, type: integer, range: "0..511", desc: "Search range lower bound" }
      - { name: rest, type: any, desc: "def_no, or u,v,w,h,attribute (forms 5/6)" }
      - { name: ix, type: integer, desc: "OUT: allocated number within [upper,lower] (-1 if none)" }
    note: "SPSET upper,lower, <template|image> OUT ix — auto-allocate within a number range (forms 5/6)."

summary: "Creates (registers) a sprite for use, either from an SPDEF template or from explicit image coordinates/attributes. OUT-IX forms auto-allocate a free management number (whole range or a sub-range). SPSET resets the sprite's rotation/scale/SPVARs."

semantics:
  - "SPSET makes the management number (0-511) usable as a sprite; subsequent SP* ops target it. It initializes rotation, scale, and all SPVARs to 0/defaults."
  - "The attribute bitfield: b0 display on/off (#SPSHOW), b1-b2 rotation (#SPROT0/90/180/270), b3 horizontal flip (#SPREVH), b4 vertical flip (#SPREVV), b5 additive blend (#SPADD); if omitted it defaults to 0x01 (display ON)."
  - "The W,H source size defaults to 16x16; U+W or V+H exceeding 512 raises an error."
  - "OUT-IX forms find an available number (form 3/4 from the whole 0-511 range; forms 5/6 within [upper,lower]) and return it in IX, or -1 if none is free."
  - "For collision detection, call SPCOL after SPSET (see [[spcol]])."
  - "The sprite source image comes from the sprite GRP page set by [[sppage]] (default GRP4)."

errors:
  - { errnum: 10, name: "Out of range", when: "U+W or V+H exceeds 512, or an id/def number is out of range" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spset.md (6 forms: SPSET id,defno; SPSET id,U,V[,W,H],attr; +OUT IX auto-alloc whole-range and [upper,lower]-range; attr bitfield; default attr 0x01; W/H default 16; U+W/V+H<=512)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPSET handler FUN_001415a0 @0x1415a0: registers the sprite slot and initializes its transform/SPVAR state; OUT-IX forms scan for a free management number" }
  - { type: community, ref: "sbsave corpus: SPSET pervasive; all forms used (template id,defno; explicit U,V,W,H,attr; OUT-IX auto-alloc)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8a): after ACLS, SPSET 0,0,16,16,1 OUT IX -> IX=0 (first free); a second auto-alloc returns 1 (0 now taken); SPCLR 0 then auto-alloc returns 0 again (slot freed/reusable) — confirms SPSET allocates and OUT-IX finds the lowest free number" }

confidence: hw_verified

tests:
  - { name: spset_out_first_free, code: "ACLS\nSPSET 0,0,16,16,1 OUT IX\nPRINT IX", expect: { stdout: "0" } }
  - { name: spset_out_next_free, code: "ACLS\nSPSET 0,0,16,16,1 OUT A\nSPSET 0,0,16,16,1 OUT B\nPRINT B", expect: { stdout: "1" } }
