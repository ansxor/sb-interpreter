id: PI
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args: []
    returns: { type: double, desc: "The circle constant pi" }

summary: "Returns the circle constant pi (3.14159265...) as a Double, taking no arguments."

semantics:
  - "Niladic function: written PI() with empty parentheses; returns the IEEE-754 double nearest pi = 3.141592653589793 (0x400921FB54442D18)."
  - "Same double constant the RAD handler loads for its degree->radian conversion."
  - "SB prints doubles to 6 significant figures, so PRINT PI() shows 3.14159."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "an argument is supplied (PI takes none)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/pi.md (documented value 3.14159265)" }
  - { type: disassembled, ref: "cia_3.6.0.lst niladic-function name table @0x2c9288 -> name 'PI' @0x2ef420 / full form 'PI()' @0x2eeebc (PI takes no args); returned value is the pi double constant 0x400921FB54442D18 (=3.141592653589793), the same literal the RAD handler loads @0x148a08. NOTE: exact dispatch handler not pinned (constant-folded niladic function, not in builtin dispatch table) — value is disassembled-grade, dispatch path inferred." }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: PI()=3.14159, PI()*2=6.28319 (printed to 6 significant figures). NOTE: the 'PI() with argument -> errnum 4' edge is not yet harvested (queued)." }

confidence: hw_verified

tests:
  - { name: value,   code: "PRINT PI()",     expect: { stdout: "3.14159" } }
  - { name: doubled, code: "PRINT PI()*2",   expect: { stdout: "6.28319" } }
  - { name: deg_roundtrip, code: "PRINT DEG(PI())", expect: { stdout: "180" } }
