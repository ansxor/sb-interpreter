# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: CEIL
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Source numerical value" }
    returns: { type: integer, desc: "Smallest integer >= value" }

summary: "Returns the smallest integer not less than value (rounds toward positive infinity)."

semantics:
  - "Integer input is returned unchanged."
  - "Result type is always Integer, even for a Double input."
  - "Rounds toward positive infinity: CEIL(12.5)=13, CEIL(-12.5)=-12, CEIL(12.345)=13."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

see_also: "FLOOR (round down), ROUND (round to nearest)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/ceil.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: CEIL(12.5)=13, CEIL(-12.5)=-12, CEIL(5)=5", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: positive_fraction,   code: "PRINT CEIL(12.345)", expect: { stdout: "13" } }
  - { name: half_up,             code: "PRINT CEIL(12.5)",   expect: { stdout: "13" } }
  - { name: negative_rounds_up,  code: "PRINT CEIL(-12.5)",  expect: { stdout: "-12" } }
  - { name: integer_passthrough, code: "PRINT CEIL(5)",      expect: { stdout: "5" } }
  - { name: string_type_mismatch, code: 'A=CEIL("x")',       expect: { error: { errnum: 8 } } }
