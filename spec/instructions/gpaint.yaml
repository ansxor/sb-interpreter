id: GPAINT
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, desc: "Seed X to start filling from" }
      - { name: y, type: integer, desc: "Seed Y to start filling from" }
      - { name: fill_color, type: integer, optional: true, desc: "32-bit ARGB fill color; if omitted, the current GCOLOR is used" }
      - { name: border_color, type: integer, optional: true, desc: "Boundary color to stop at; if omitted, the color at the seed point is used (fill the contiguous same-color region)" }
    note: "GPAINT x, y [, fill_color [, border_color]] — flood-fill from a seed point."

summary: "Flood-fills a region of the graphics page starting at (x,y). With a border color it fills up to that boundary; without one it replaces the contiguous area that matches the seed pixel's color."

semantics:
  - "GPAINT performs a flood fill from the seed (x,y): adjacent pixels are filled with the fill color until the boundary is reached."
  - "If border_color is given, the fill spreads until it hits pixels of that color (filling within an outline)."
  - "If border_color is omitted, the color currently at the seed point is taken as the region color and that contiguous same-color area is replaced with the fill color."
  - "fill_color defaults to the current GCOLOR if omitted."
  - "Pixels are stored as RGBA5551 (GSPOIT read-back is rounded); the fill respects the write clip ([[gclip]])."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gpaint.md (GPAINT SX,SY[,FillColor[,BorderColor]]; flood fill; border omitted -> use the color range at the start point)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GPAINT handler FUN_0015436c/@0x1544f8: flood-fills from the seed into the manipulation page up to the border color" }
  - { type: community, ref: "sbsave corpus: GPAINT used (~1,408 lines) for flood fills (with and without an explicit border color)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7c): GPAGE 0,0:GCLS, GBOX 0,0,20,20 (white outline), then GPAINT 10,10,RGB(255,0,0),RGB(255,255,255) -> the interior seed (10,10) becomes set (GSPOIT!=0, filled red up to the white border) while a pixel outside the box (30,30)=0 (fill stayed within the border)" }

confidence: hw_verified

tests:
  - { name: gpaint_fills_inside, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGBOX 0,0,20,20\nGPAINT 10,10,RGB(255,0,0),RGB(255,255,255)\nPRINT GSPOIT(10,10)!=0", expect: { stdout: "1" } }
  - { name: gpaint_bounded, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGBOX 0,0,20,20\nGPAINT 10,10,RGB(255,0,0),RGB(255,255,255)\nPRINT GSPOIT(30,30)", expect: { stdout: "0" } }
