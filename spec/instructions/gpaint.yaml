id: GPAINT
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate (visible 0-399 x, 0-239 y)", desc: "X to start filling from" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Y to start filling from" }
    note: "GPAINT x,y — flood-fills from (x,y) in the current GCOLOR draw color, bounded by the region of the color found at the start point (2 args)."
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "X to start filling from" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Y to start filling from" }
      - { name: fill_color, type: integer, optional: true, range: "any 32-bit ARGB value", desc: "ARGB8888 fill color (see GCOLOR)." }
    note: "GPAINT x,y,fill — flood-fills with the given color, bounded by the region of the color found at the start point (3 args; border omitted)."
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "X to start filling from" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Y to start filling from" }
      - { name: fill_color, type: integer, range: "any 32-bit ARGB value", desc: "ARGB8888 fill color (see GCOLOR)." }
      - { name: border_color, type: integer, optional: true, range: "any 32-bit ARGB value", desc: "ARGB8888 border color: fill spreads until it hits this color (see GCOLOR)." }
    note: "GPAINT x,y,fill,border — flood-fills with `fill`, spreading until it reaches pixels of `border` color (4 args)."

summary: "Flood-fills a connected region of the current graphic page starting at (x,y). When the border color is omitted, the fill is bounded by the color found at the start point; when given, it spreads until it reaches the border color."

semantics:
  - "Flood fill (seed fill) from the start point. With a border color given, the fill spreads over connected pixels until it reaches pixels of the border color. With the border omitted, the boundary is implicit: the run of the color sampled at the start point is replaced (fill spreads across the contiguous region matching the start-point color)."
  - "Takes 2, 3, or 4 args and returns no value. Any other argument count, or requesting a return value, raises errnum 4 (Illegal function call) — return-count [r4,#0xc] cmp #0 bne error @0x154518, argcount [r4,#0x4] cmp #2 (beq @0x154554) / cmp #3 (beq @0x1545a8) / cmp #4 (beq @0x15461c) else mov r0,#0x4 (errnum 4) @0x154544."
  - "With 2 args the fill color defaults to the current GCOLOR draw color (the 2-arg path loads it from graphics-context field +0xc: ldr r3,[r6,#0xc] @0x154598). With 3+ args the explicit fill color is used. Border color is present only in the 4-arg form."
  - "The 2- and 3-arg (no-border) forms call the border-less paint helper bl 0x191870 @0x154614; the 4-arg (with-border) form calls a distinct helper bl 0x191b1c @0x1546bc that takes the border color (border at sp+0x10 -> sp+0, x/y/fill in r1/r2/r3). The handler reads the graphics context via [[0x315d60]+0x20] (r6); coordinates and colors are fetched through the arg-fetch vtable slot [r2,#0x40]."
  - "Colors are full 32-bit ARGB values (8 bits each A,R,G,B), NOT range-checked; signed/&H/#CONSTANT operands are accepted. Start coordinates are integer-coerced."
  - "The fill is 4-connected (a horizontal-span scanline flood that propagates to the row above and below — no diagonal spread). Both forms compare and write in the page's native RGBA5551 framebuffer space (the fill/border ARGB8888 is truncated 8->5 per channel, alpha bit set only when A==255 — identical to GPSET/GLINE/GBOX/GFILL/GCIRCLE), so two ARGB colors that collapse to the same RGBA5551 cell are equal for boundary/no-op purposes. hw_verified via GSPOIT read-back: white(RGB 255,255,255)=-460552, red(RGB 255,0,0)=-524288, blue(RGB 0,0,255)=-16776968."
  - "Implicit (no-border) form replaces the contiguous region whose pixels match the color SAMPLED AT THE START POINT (the seed). It STOPS at any pixel of a different color — `GBOX 30,10,40,20,white:GLINE 35,11,35,19,blue:GPAINT 32,15,red` fills only the left half ((32,15)/(33,15)=red), leaving the blue divider (35,15)=blue and the right half (37,15)=0 untouched. A seed on a clear page floods the whole connected page (`GPAINT 0,0,red` -> (0,0)/(200,120)/(399,239) all red)."
  - "Border (4-arg) form spreads over every connected pixel that is NOT the border color, CROSSING internal colors — same scene with `GPAINT 32,15,red,white` fills the whole interior including overwriting the blue divider ((35,15)/(37,15)=red), bounded only by the white outline. Both forms stay inside a closed drawn outline (the outline pixels are either the seed-boundary or the border)."
  - "No-op cases: implicit form where the seed pixel already equals the fill color (`GPSET 50,50,red:GPAINT 50,50,red` -> (50,50)=red, neighbour (51,50)=0 — nothing spreads); border form where the seed pixel already equals the border color. A seed outside the draw window does nothing (no error)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument count is not 2, 3, or 4, or a return value is requested (used as a function)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gpaint.md (GPAINT Start point X, Start point Y [,Fill Color [,Border color]] — fills the graphic screen with color; if the border color is omitted, the color range at the start point coordinates will be used; coords X:0-399 Y:0-239; e.g. GPAINT 200,120,RGB(255,0,0),RGB(0,0,0))" }
  - { type: disassembled, ref: "cia_3.6.0.lst GPAINT handler @0x1544f8: graphics state ptr ldr [0x1546cc]->0x315d60, gfx-context = [[..]+0x20] (r6); return-count r0=[r4,#0xc] cmp #0 bne 0x15453c -> errnum 4 @0x154518; argcount r0=[r4,#0x4] cmp #2 beq 0x154554 / cmp #3 beq 0x1545a8 / cmp #4 beq 0x15461c, else mov r2,#0/mvn r1/mov r0,#0x4 bl 0x1fffdc (errnum 4) @0x154544; 2-arg path defaults fill color ldr r3,[r6,#0xc] @0x154598; no-border helper bl 0x191870 @0x154614 (2/3-arg), with-border helper bl 0x191b1c @0x1546bc (4-arg); coords/colors via vtable [r2,#0x40]; no range guard." }
  - { type: community, ref: "osb/SMILEBASIC/graphic.d Graphic2 GPAINT: flood fill on the active graphic page (3.5.0 structural cross-check only)." }
  - { type: disassembled, ref: "cia_3.6.0.lst no-border (implicit) fill helper FUN_00191870 [0x191870..0x191b0c] (called @0x154614 for the 2/3-arg paths): r0=gfx-context, r1=y, r2=x, r3=fill ARGB. Seed clipped to the draw window cmp r12,r0 / bgt 0x191b04 (out-of-window seed -> no-op return) against [r6,#0x10..0x1c] @0x191898-@0x1918b8; ARGB8888->RGBA5551 build @0x1918bc-@0x191900 (mov r5,#0x7c0 / and r9,r5,r3,lsr#0x5 green, mov r1,#0x3e / and r8,r1,r3,lsr#0x2 red, mov r1,#0xf800 / and r1,r1,r3,lsr#0x8 blue, alpha bit orreq r1,r1,#0x1 only when 0xff==r3,lsr#0x18 @0x1918fc — IDENTICAL channel layout to GPSET/GFILL/GCIRCLE); reads the SEED pixel from the tiled framebuffer ([r6,#0x4] base, 8-pixel tile addr and r12,r4,#0x7 @0x191904) ldrh r0,[r0] @0x191940, then cmp r1,r0 / beq 0x191b04 @0x191948 — fill==seed is an immediate NO-OP. The body is a 4-connected horizontal-span scanline flood: per-row span-test predicate bl 0x1d6584 (@0x19196c,@0x1919d8,@0x191a64) matches against the captured seed color, vertical propagation to the row above ([r6,#0x18] top @0x1919bc) and below ([r6,#0x1c] bottom @0x191a48), span stack alloc/free 0x1fff10/0x1ffef0 + push 0x1d6810; no range error anywhere." }
  - { type: disassembled, ref: "cia_3.6.0.lst with-border (4-arg) fill helper FUN_00191b1c [0x191b1c..) (called @0x1546bc, border passed at sp+0x10->sp+0): builds TWO RGBA5551 values — r11=fill (from r3) and r1=border (from r2), each with the alpha bit orreq only when A==255 (@0x191b70-@0x191bf4). Reads the seed pixel ldrh r0,[r0] @0x191c18 then cmp r0,r1 / beq 0x191de0 @0x191c1c — seed already == border is an immediate NO-OP. The span predicate for this form is the DISTINCT helper bl 0x1d62c4 (@0x191c48,@0x191cb4) testing 'pixel == border?' to bound the flood, so the fill spreads over every connected pixel != border (crossing other colors) and writes r11 (fill); same 4-connected scanline structure + row±1 propagation ([r6,#0x18]/[r6,#0x1c]); a 0x8000-byte visited mask init bl 0x20c6a0 @0x191c2c. Confirms the implicit-vs-border boundary rule from the code." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7c): GPAINT 200 (1 arg) -> errnum 4, errline 1; GPAINT 0,0,1,2,3 (5 args) -> errnum 4; A=GPAINT(0,0) (used as a function) -> errnum 4." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2 run 45, harness/harvest/out/gpaint.tsv) — flood-fill side-effects via GSPOIT read-back (framebuffer-free, same method as gpset/gline/gbox/gfill/gcircle; each case ACLS-clears first since GRP state persists across progstr programs). white=-460552 red=-524288 blue=-16776968. Implicit bounded: GBOX 10,10,20,20,white:GPAINT 15,15,red -> interior (15,15)/(12,12)/(18,18)=red, outline (10,10)=white, outside (5,5)/(21,21)=0. Implicit stops at a different-color barrier: GBOX 30,10,40,20,white:GLINE 35,11,35,19,blue:GPAINT 32,15,red -> (32,15)/(33,15)=red, (35,15)=blue, (37,15)=0. Border crosses internal colors, stops at border: same scene + GPAINT 32,15,red,white -> (32,15)/(35,15)/(37,15)=red, (30,10)=white. Unbounded implicit: GPAINT 0,0,red -> (0,0)/(200,120)/(399,239)=red. 2-arg GCOLOR default: GCOLOR RGB(0,0,255):GBOX 60,10,70,20,white:GPAINT 65,15 -> (65,15)=blue, (60,10)=white. No-op seed==fill: GPSET 50,50,red:GPAINT 50,50,red -> (50,50)=red, (51,50)=0. Border bounded: GBOX 80,10,90,20,white:GPAINT 85,15,blue,white -> (85,15)/(82,12)=blue, (80,10)=white, (95,15)=0. sb-core (sb-render raster.rs Grp::gpaint) matched all 7 with NO code change." }
  - { type: community, ref: "sbsave corpus: GPAINT appears ~1335x. Confirms the 3-arg (fill only, e.g. 1K8XDW8E/TXT/HARDQUIZ 'GPAINT 0,100,RGB(0,0,50)') and 4-arg (fill+border) forms, with both colors as plain numerics (DFPZ4HD/TXT/_RECOVERY 'GPAINT 385,225,8,8'), RGB(), &H hex (1233728E/TXT/MG_DOG 'GPAINT 127,127,&HFFFFFF80'), and negative (-1, 2RD4S3RJ/TXT/GAME 'GPAINT 80,8,-1') operands — all legal. No real form with a count other than 2-4." }

confidence: hw_verified

tests:
  # arg-count/return errors hw_verified (sb-oracle 2026-06-22 s_t7c); flood-fill pixel
  # side-effects hw_verified via GSPOIT read-back (M7-T2 run 45, harness/harvest/out/gpaint.tsv).
  # white=-460552, red=-524288, blue=-16776968 (RGBA5551 8->5, identical to GPSET/GFILL/GSPOIT).
  # Each side-effect case ACLS-clears first (matches the oracle harvest; harmless on sb-core's
  # already-clean page).
  - { name: paint_seed_only_ok, code: "GPAINT 200,120", expect: { stdout: "" } }
  - { name: paint_fill_color_ok, code: "GPAINT 200,120,RGB(255,0,0)", expect: { stdout: "" } }
  - { name: paint_fill_border_ok, code: "GPAINT 200,120,RGB(255,0,0),RGB(0,0,0)", expect: { stdout: "" } }
  - { name: one_arg_errors, code: "GPAINT 200", expect: { error: { errnum: 4 } } }
  - { name: five_args_errors, code: "GPAINT 0,0,1,2,3", expect: { error: { errnum: 4 } } }
  - { name: as_function_errors, code: "A=GPAINT(0,0)", expect: { error: { errnum: 4 } } }
  # --- implicit (no-border) flood fill: contiguous seed-color region, bounded by a drawn outline ---
  - { name: implicit_interior, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(15,15)", expect: { stdout: "-524288" } }
  - { name: implicit_interior2, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(12,12)", expect: { stdout: "-524288" } }
  - { name: implicit_interior3, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(18,18)", expect: { stdout: "-524288" } }
  - { name: implicit_outline_kept, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(10,10)", expect: { stdout: "-460552" } }
  - { name: implicit_no_leak_out, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(5,5)", expect: { stdout: "0" } }
  - { name: implicit_no_leak_corner, code: "ACLS:GBOX 10,10,20,20,RGB(255,255,255):GPAINT 15,15,RGB(255,0,0):PRINT GSPOIT(21,21)", expect: { stdout: "0" } }
  # --- implicit fill STOPS at an internal different-colored barrier (blue line splits the box) ---
  - { name: implicit_barrier_left_filled, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0):PRINT GSPOIT(33,15)", expect: { stdout: "-524288" } }
  - { name: implicit_barrier_line_kept, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0):PRINT GSPOIT(35,15)", expect: { stdout: "-16776968" } }
  - { name: implicit_barrier_right_unfilled, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0):PRINT GSPOIT(37,15)", expect: { stdout: "0" } }
  # --- border form CROSSES internal colors, stops only at the border color ---
  - { name: border_crosses_line, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0),RGB(255,255,255):PRINT GSPOIT(35,15)", expect: { stdout: "-524288" } }
  - { name: border_crosses_right, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0),RGB(255,255,255):PRINT GSPOIT(37,15)", expect: { stdout: "-524288" } }
  - { name: border_outline_kept, code: "ACLS:GBOX 30,10,40,20,RGB(255,255,255):GLINE 35,11,35,19,RGB(0,0,255):GPAINT 32,15,RGB(255,0,0),RGB(255,255,255):PRINT GSPOIT(30,10)", expect: { stdout: "-460552" } }
  # --- unbounded implicit fill: a clear page is one connected region -> the whole page fills ---
  - { name: unbounded_origin, code: "ACLS:GPAINT 0,0,RGB(255,0,0):PRINT GSPOIT(0,0)", expect: { stdout: "-524288" } }
  - { name: unbounded_center, code: "ACLS:GPAINT 0,0,RGB(255,0,0):PRINT GSPOIT(200,120)", expect: { stdout: "-524288" } }
  - { name: unbounded_corner, code: "ACLS:GPAINT 0,0,RGB(255,0,0):PRINT GSPOIT(399,239)", expect: { stdout: "-524288" } }
  # --- 2-arg form defaults the fill to the current GCOLOR draw color ---
  - { name: gcolor_default_fill, code: "ACLS:GCOLOR RGB(0,0,255):GBOX 60,10,70,20,RGB(255,255,255):GPAINT 65,15:PRINT GSPOIT(65,15)", expect: { stdout: "-16776968" } }
  - { name: gcolor_default_outline, code: "ACLS:GCOLOR RGB(0,0,255):GBOX 60,10,70,20,RGB(255,255,255):GPAINT 65,15:PRINT GSPOIT(60,10)", expect: { stdout: "-460552" } }
  # --- no-op: seed already equals the fill color -> nothing spreads ---
  - { name: noop_seed_kept, code: "ACLS:GPSET 50,50,RGB(255,0,0):GPAINT 50,50,RGB(255,0,0):PRINT GSPOIT(50,50)", expect: { stdout: "-524288" } }
  - { name: noop_no_spread, code: "ACLS:GPSET 50,50,RGB(255,0,0):GPAINT 50,50,RGB(255,0,0):PRINT GSPOIT(51,50)", expect: { stdout: "0" } }
  # --- border (4-arg) form stays inside the border outline ---
  - { name: border_bounded_fill, code: "ACLS:GBOX 80,10,90,20,RGB(255,255,255):GPAINT 85,15,RGB(0,0,255),RGB(255,255,255):PRINT GSPOIT(85,15)", expect: { stdout: "-16776968" } }
  - { name: border_bounded_interior, code: "ACLS:GBOX 80,10,90,20,RGB(255,255,255):GPAINT 85,15,RGB(0,0,255),RGB(255,255,255):PRINT GSPOIT(82,12)", expect: { stdout: "-16776968" } }
  - { name: border_bounded_outline, code: "ACLS:GBOX 80,10,90,20,RGB(255,255,255):GPAINT 85,15,RGB(0,0,255),RGB(255,255,255):PRINT GSPOIT(80,10)", expect: { stdout: "-460552" } }
  - { name: border_bounded_no_leak, code: "ACLS:GBOX 80,10,90,20,RGB(255,255,255):GPAINT 85,15,RGB(0,0,255),RGB(255,255,255):PRINT GSPOIT(95,15)", expect: { stdout: "0" } }
