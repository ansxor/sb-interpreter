id: MOD
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value1, type: number, range: "any", desc: "Dividend (number or expression to divide)" }
      - { name: value2, type: number, range: "any", desc: "Divisor (number or expression to divide by; must be non-zero)" }
    returns: { type: integer, desc: "Integer remainder, taking the sign of the dividend" }
    note: "Infix binary operator: value1 MOD value2"

summary: "Integer remainder of value1 divided by value2. Both operands are truncated to integers first, then an integer remainder is taken with the sign of the dividend; the result is always Integer."

semantics:
  - "Both operands are converted to 32-bit integers by truncation toward zero BEFORE the operation — MOD is a pure INTEGER remainder, NOT a floating-point fmod. 7.5 MOD 2.5 == 1 (computed as 7 MOD 2, NOT fmod(7.5,2.5)=0); 6 MOD 2.5 == 0 (6 MOD 2); 10 MOD 3.5 == 1 (10 MOD 3); 5.5 MOD 2 == 1. (This differs from osb 3.5.0, which uses a double fmod for Double operands.)"
  - "The remainder takes the SIGN OF THE DIVIDEND (C-style %, the truncated-division remainder): 7 MOD 3 == 1, -7 MOD 3 == -1 (NOT 2), 7 MOD -3 == 1 (NOT -2), -7 MOD -3 == -1. 200 MOD 5 == 0. The identity a == (a DIV b)*b + (a MOD b) holds with truncated DIV."
  - "The result type is always Integer."
  - "Precedence (getOPRank): MOD sits at the same level as * / and DIV (tighter than +/-), and is left-associative: 10 MOD 3 * 2 == (10 MOD 3) * 2 == 2."
  - "Common wraparound idiom (X+N-1) MOD N stays in range as long as the truncated operands keep the dividend non-negative (e.g. (0+5-1) MOD 5 == 4)."
  - "Dividing by zero raises errnum 7 (Divide by zero); because the divisor is truncated first, a divisor whose truncation is zero also errors."

errors:
  - { errnum: 7, name: DivideByZero, when: "the divisor (after truncation to integer) is zero" }
  - { errnum: 8, name: TypeMismatch, when: "either operand is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/mod.md (Gets the remainder of Numerical value 1 divided by Numerical value 2; 'Dividing by zero gives an error'; example A=200 MOD 5)" }
  - { type: community, ref: "sbsave corpus: circular-buffer wrap `(PG+MAXP-1) MOD MAXP`, `(IZ+C_SPN-1)MOD C_SPN` (1DVENVAE/TXT/PICS_R1_1V, 1DVK34J/TXT/HNZCDRV); 2D index decompose `(C MOD 32)*16`; Double-var operands `EdVR# MOD 45` (2BC4738V/TXT/MOH_JUHSY237D); ~7746 MOD uses" }
  - { type: hypothesis, ref: "cia_3.6.0.lst: MOD is not in the builtin dispatch table (parsed as an operator, compiled to a VM bytecode opcode); keyword name @0x2ed684/0x2ef138. Handler body not pinned — index-dispatched in the expression VM; behavior here is fixed by the oracle harvest" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 200 MOD 5=0; 7 MOD 3=1; -7 MOD 3=-1; 7 MOD -3=1; -7 MOD -3=-1 (sign of dividend); 5.5 MOD 2=1; 7.5 MOD 2.5=1; 6 MOD 2.5=0; 10 MOD 3.5=1 (operands truncated to int FIRST, integer remainder not fmod); (0+5-1) MOD 5=4; 10 MOD 3 * 2=2 (precedence); 1 MOD 0 -> errnum 7" }

confidence: hw_verified

tests:
  - { name: doc_example,        code: "PRINT 200 MOD 5", expect: { stdout: "0" } }
  - { name: simple,             code: "PRINT 7 MOD 3",   expect: { stdout: "1" } }
  - { name: neg_dividend,       code: "PRINT -7 MOD 3",  expect: { stdout: "-1" } }
  - { name: neg_divisor,        code: "PRINT 7 MOD -3",  expect: { stdout: "1" } }
  - { name: both_negative,      code: "PRINT -7 MOD -3", expect: { stdout: "-1" } }
  - { name: double_is_integer,  code: "PRINT 5.5 MOD 2", expect: { stdout: "1" } }
  - { name: operands_trunc_first, code: "PRINT 7.5 MOD 2.5", expect: { stdout: "1" } }
  - { name: operands_trunc_first2, code: "PRINT 6 MOD 2.5", expect: { stdout: "0" } }
  - { name: wrap_idiom,         code: "PRINT (0+5-1) MOD 5", expect: { stdout: "4" } }
  - { name: precedence_mul,     code: "PRINT 10 MOD 3 * 2", expect: { stdout: "2" } }
  - { name: divide_by_zero,     code: "X=1 MOD 0",       expect: { error: { errnum: 7 } } }
