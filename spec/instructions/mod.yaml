id: MOD
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: a, type: number, desc: "Dividend" }
      - { name: b, type: number, range: "!=0", desc: "Divisor (zero raises an error)" }
    returns: { type: integer, desc: "Remainder of a / b" }
    note: "a MOD b — infix modulo operator."

summary: "Remainder of a divided by b. Dividing by zero raises Divide by zero (errnum 7)."

semantics:
  - "MOD returns the remainder of a / b as an Integer."
  - "Operands are taken as integers."
  - "The sign of the result for negative operands is oracle-confirmed (see hw_verified): the remainder takes the sign of the dividend (-7 MOD 3 = -1; 7 MOD -3 = 1), consistent with truncated division (a = (a DIV b)*b + (a MOD b))."
  - "Dividing by zero raises errnum 7 (Divide by zero)."
  - "It is an infix operator (a parser special form), not a function."

errors:
  - { errnum: 7, name: "Divide by zero", when: "the divisor is zero" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/mod.md (Variable=Num1 MOD Num2; remainder of Num1/Num2; dividing by zero gives an error)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: MOD operator keyword name @0x2ed684 (token-name table region); an infix operator handled in the expression compiler (not in the builtin dispatch table) — remainder VM op; zero divisor -> errnum 7; exact handler not pinned, name addr only" }
  - { type: community, ref: "sbsave corpus: MOD is common (~8,237 lines) for wrapping/cycling (I MOD N) and grid math" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 200 MOD 5 -> 0; 7 MOD 3 -> 1; -7 MOD 3 -> -1 and 7 MOD -3 -> 1 (remainder takes the sign of the DIVIDEND, consistent with truncated DIV); 7.5 MOD 2 -> 1 (operands coerced to int); 5 MOD 0 -> errnum 7" }

confidence: hw_verified

tests:
  - { name: mod_basic, code: "PRINT 200 MOD 5", expect: { stdout: "0" } }
  - { name: mod_remainder, code: "PRINT 7 MOD 3", expect: { stdout: "1" } }
  - { name: mod_negative_dividend, code: "PRINT -7 MOD 3", expect: { stdout: "-1" } }
  - { name: mod_negative_divisor, code: "PRINT 7 MOD -3", expect: { stdout: "1" } }
  - { name: mod_double_coerce, code: "PRINT 7.5 MOD 2", expect: { stdout: "1" } }
  - { name: mod_by_zero, code: "A=5 MOD 0", expect: { error: { errnum: 7 } } }
