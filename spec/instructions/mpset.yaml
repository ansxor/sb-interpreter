id: MPSET
kind: statement
category: Wireless communication
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: mgmt_number, type: integer, range: "0-8: internal management number (the slot of the user-defined data to write)" }
      - { name: value, type: integer, range: "any integer: numeric value to register (only integer values are allowed)" }
    returns: { type: void }
    note: "MPSET mgmt_number, value — writes value into this terminal's own user-defined data slot mgmt_number (0-8) so other terminals can read it with MPGET. Takes exactly 2 arguments."

summary: "Writes a numeric value into one of this terminal's user-defined data slots (management number 0-8) within a wireless communication session. Each terminal owns 9 such slots; peers read them with MPGET. Only integer values are accepted. Communication is dropped if the system enters sleep mode."

semantics:
  - "Argument count is fixed at exactly 2 (a statement, 0 return slots): the handler requires value-arg-count (dispatch block +0x4) == 2 and return-count (+0xc) == 0, otherwise it raises errnum 4 (Illegal function call) — `cmp r0,#0x2` @0x183aac -> `mov r0,#0x4` @0x183ac4."
  - "MP-restriction guard: the global byte flag @0x305612 is tested; when it is non-zero MPSET raises errnum 52 (Incompatible statement) — `ldrb`/`cmp r0,#0x0` @0x183acc..0x183ad4 -> `mov r0,#0x34` @0x183ae4. Same flag as MPSTART/MPEND/MPSTAT."
  - "mgmt_number range is 0..8 inclusive: `cmp r0,#0x0`/`blt` then `cmp r0,#0x8`/`ble` @0x183b78..0x183b88; outside that range raises errnum 10 (Out of range) -> `mov r0,#0xa` @0x183b8c. The operand may be a variable/expression (corpus shows literals 0-8 and arithmetic operands)."
  - "On success the handler stores the value into the management array indexed by mgmt_number (`add r1,r1,r2,lsl #0x2` / `str r0,[r1,#0x9d4]` @0x183b60..0x183b68) and returns 0; MPSET has no return value or console output."
  - "Only integer values are documented ('Only an integer value is allowed'); the body evaluates the 2nd operand to an integer. hw_verified (2026-06-27): a Double operand is silently TRUNCATED toward zero (`MPSET 5,1.9` / `MPSET 5,-1.9` both succeed, no error), while a STRING operand raises errnum 8 (Type mismatch) — so 'only an integer value' means a numeric value coerced to integer, not a literal-integer-only restriction."

errors:
  - { errnum: 4,  name: "Illegal function call", when: "argument count is not exactly 2 (e.g. the corpus 3-arg form)" }
  - { errnum: 8,  name: "Type mismatch", when: "the value operand (arg 1) is a string (a Double is truncated, not rejected)" }
  - { errnum: 52, name: "Incompatible statement", when: "MP is unavailable in the current context (global MP-restriction flag @0x305612 is non-zero)" }
  - { errnum: 10, name: "Out of range", when: "mgmt_number is outside 0-8" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/mpset.md (1 form: `MPSET Internal management number, Numerical value`. 'Writes to user-defined data in a wireless communication session'; management number 0-8; 'Numerical value to register (Only an integer value is allowed)'; 'Communication will be terminated if the system goes into sleep mode'. Example `MPSET 5,123`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst MPSET handler @0x183a9c (FUN_00183a9c): argcount!=2 -> errnum 4 (`cmp r0,#0x2` @0x183aac, `mov r0,#0x4` @0x183ac4); MP-restriction byte @0x305612 non-zero -> errnum 52 (`mov r0,#0x34` @0x183ae4); mgmt_number guarded `cmp r0,#0x0`/`cmp r0,#0x8` @0x183b78..0x183b88 with errnum 10 (`mov r0,#0xa` @0x183b8c); on success stores via `str r0,[r1,#0x9d4]` @0x183b68. errnum 52 string @0x2e9a38 = 'Incompatible statement' (error pointer table entry 52 @0x3055c8, base @0x3054f8)." }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar), 2026-06-23: `MPSET 5` (1 arg) -> errnum 4, errline 1; `MPSET -1,0` (mgmt_number < 0) -> errnum 10, errline 1; `MPSET 9,0` (mgmt_number > 8) -> errnum 10, errline 1. Confirms the argcount!=2 guard (`cmp r0,#0x2` @0x183aac -> errnum 4) and the mgmt_number 0..8 range guard (`cmp r0,#0x0`/`cmp r0,#0x8` @0x183b78 -> errnum 10). Crucially, the range guard sits AFTER the MP-restriction flag check (@0x305612 -> errnum 52), so its firing as errnum 10 (not 52) PROVES the flag is 0 in a normal RUN context — errnum 52 (Incompatible statement) does not surface for an ordinary program and remains oracle-pending (can't force the flag headless)." }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar), 2026-06-27 (bd:sb-interpreter-90l; harness/harvest/out/90l_mp_probe.tsv): single-device value/error surface — `MPSET 5,123` (valid 2-arg) succeeds with NO session (NOERR: the store into the local management array @0x9d4 needs no peer); the corpus 3-arg anomaly `MPSET 5,123,1` AND a 4-arg `MPSET 5,123,1,2` both raise errnum 4 (argcount!=2), confirming `MPSET MULTINUM,5,CHNBX` (C2NVX3QJ/PETITWORLD) is a latent program bug; a Double value `MPSET 5,1.9` and `MPSET 5,-1.9` both succeed (NOERR — truncated toward zero, NOT errnum 8); a STRING value `MPSET 5,\"X\"` raises errnum 8 (Type mismatch), errline 1. So the value operand is coerced to integer (Double truncated) but a string is rejected. The cross-device store-then-MPGET payload still needs a real 2-peer session (4kf)." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bMPSET\\b', 36 files): documented 2-arg form dominates, with literal/variable/array/arithmetic operands (e.g. mgmt 0-8 and value expressions). One file uses a 3-argument form `MPSET MULTINUM,5,CHNBX` (C2NVX3QJ/TXT/PETITWORLD, 4 lines, MULTINUM is a 0/1 terminal index) — the handler requires EXACTLY 2 args (`cmp r0,#0x2`), so this 3-arg call raises errnum 4 at runtime (CONFIRMED hw_verified 2026-06-27): a latent program bug, NOT a legal form." }
  - { type: community, ref: "osb/SMILEBASIC/petitcomputer.d MPSET (3.5.0 structural cross-check only)" }

# argcount/range/type errnums (4/8/10), the Double-truncate-vs-string-reject coercion rule and the
# corpus 3-arg anomaly are now hw_verified (2026-06-27). errnum 52 (MP-restriction flag) is unreachable
# headless and the cross-device store->MPGET payload needs real peers (4kf), so the top-level stays disassembled.
confidence: disassembled

tests:
  - { name: wrong_argcount, code: 'MPSET 5', expect: { error: { errnum: 4 } } }
  - { name: three_args, code: 'MPSET 5,123,1', expect: { error: { errnum: 4 } } }
  - { name: four_args, code: 'MPSET 5,123,1,2', expect: { error: { errnum: 4 } } }
  - { name: mgmt_negative, code: 'MPSET -1,0', expect: { error: { errnum: 10 } } }
  - { name: mgmt_too_large, code: 'MPSET 9,0', expect: { error: { errnum: 10 } } }
  - { name: value_string, code: 'MPSET 5,"X"', expect: { error: { errnum: 8 } } }
  # hw_verified: a valid 2-arg call (and a truncated Double) succeeds with no session — local store.
  - { name: valid_store, code: 'MPSET 5,123', expect: { stdout: "" } }
  - { name: value_double_truncates, code: 'MPSET 5,1.9', expect: { stdout: "" } }
