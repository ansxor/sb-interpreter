id: SPPAGE
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: page, type: integer, range: "0..5", desc: "GRP page (GRP0-GRP5) to use as the sprite source image" }
    note: "SPPAGE page — set the graphics page sprites take their image from."
  - args: []
    returns: { type: integer, desc: "The current sprite source GRP page (0-5)" }
    note: "page = SPPAGE() — read the current sprite source page."

summary: "Sets (or, in the function form, reads) the graphics page that sprites use as their source image. The default sprite page is GRP4."

semantics:
  - "SPPAGE page selects which GRP page (0-5) sprite definitions sample their pixels from; the default is 4 (GRP4)."
  - "The function form SPPAGE() returns the currently assigned sprite page."
  - "Changing the sprite page affects how subsequently-set/drawn sprites are textured."
  - "A page outside 0..5 raises errnum 10 (Out of range) — oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "page is outside 0..5 (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sppage.md (SPPAGE GraphicPage; 0-5, default 4; SPPAGE() reads current)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPPAGE handler FUN_00142ad0 @0x142ad0: sets/returns the sprite source GRP page index" }
  - { type: community, ref: "sbsave corpus: SPPAGE used to point sprites at a custom GRP page; SPPAGE() read-back in libraries" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8a): default SPPAGE()=4 (after ACLS); SPPAGE 2 then SPPAGE()=2 (the set page is read back); SPPAGE 4 -> 4" }

confidence: hw_verified

tests:
  - { name: sppage_default, code: "ACLS\nPRINT SPPAGE()", expect: { stdout: "4" } }
  - { name: sppage_set_read, code: "SPPAGE 2\nPRINT SPPAGE()", expect: { stdout: "2" } }
