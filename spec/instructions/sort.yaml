id: SORT
kind: statement
category: Variables and Arrays
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: start, type: integer, range: ">=0", optional: true, default: 0, desc: "Index in array1 from which to start sorting" }
      - { name: count, type: integer, range: ">=1", optional: true, desc: "Number of elements of array1 to sort (default: whole array)" }
      - { name: array1, type: array, desc: "Key array to sort in ascending order (numeric or string; strings sort lexically)" }
      - { name: array2plus, type: array, optional: true, desc: "Up to 7 additional arrays reordered to follow array1's sort (array2..array8)" }
    note: "SORT [start, count,] array1 [,array2, ...] — ascending sort; the optional leading start/count pair is detected by type (two numbers before the first array)."

summary: "Sorts a numeric array in ascending order. Additional parallel arrays are reordered to follow the same permutation. A subrange may be sorted with a leading start/count pair."

semantics:
  - "SORT array1 sorts the whole array in ascending numeric order."
  - "A leading start,count pair (two numbers before the first array) sorts only array1[start..start+count-1]; elements outside the range are left in place."
  - "array1 is the key array (numeric). array2..array8 (up to 7 more) are reordered by the SAME permutation as array1 — parallel-array sort (e.g. sort scores while keeping names aligned)."
  - "The leading start/count pair is distinguished from the first array operand by argument TYPE: a number in the first slot is start, an array is array1."
  - "Sort is ascending; see [[rsort]] for descending."
  - "SORT is STABLE: elements with equal keys keep their original relative order (so a parallel array's tied entries are not reordered among themselves). hw_verified: key 2,3,1,1 with parallel 3,4,1,2 -> parallel 1,2,3,4 (the two equal 1-keys hold their order). [[rsort]] is the exact reverse of this, not a stable descending sort."
  - "The key array (array1) may be an integer, double, OR string array; numeric arrays sort numerically (e.g. float keys 3.5,1.5,2.5 -> 1.5,2.5,3.5) and string arrays sort lexically (e.g. \"c\",\"a\",\"b\" -> \"a\",\"b\",\"c\"). The parallel arrays (array2..array8) may be any type independent of the key's type."
  - "Wrong argument count (e.g. SORT with no operands) raises errnum 4 (Illegal function call)."
  - "Out-of-range start/count raises errnum 10 (Out of range): start<0, count<0, OR start+count>LEN(A) all raise it. The boundary start+count==LEN(A) is VALID (sorts the tail). count==0 is a no-op (array unchanged, no error). hw_verified: LEN 3 -> SORT 3,1,A (start==LEN) -> errnum 10; SORT 2,3,A / SORT 2,2,A (start+count>LEN) -> errnum 10; SORT 2,1,A (start+count==LEN) OK; SORT 0,0,A no-op; SORT -1,1,A / SORT 0,-1,A -> errnum 10."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "wrong number/shape of arguments (no operands raises it)" }
  - { errnum: 10, name: OutOfRange, when: "with a leading start,count pair: start<0, count<0, OR start+count>LEN(array1). Boundary start+count==LEN is valid; count==0 is a no-op." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sort.md (SORT [Start,Number,] Array1[,Array2,...]; ascending; Array1 keys; Array2..Array8 reordered to match; up to 8 arrays)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SORT handler FUN_0014aae0 @0x14aae0: parses a variadic argument list, type-checks each operand (array tag 5 etc. @0x14abec), and detects the optional leading start/count numbers vs the first array operand" }
  - { type: community, ref: "sbsave corpus: bare SORT ARR dominant (~78%); leading start,count prefix rare but real (SORT 0,120,MD5,MD4,MD6$ in TSDXX334/TXT/RUNE_WARS); string-array key SORT S$ real (SORT DIC_E$,DIC_J$ in 53N35N3V/TXT/GAME_START; SORT A$ in 4K45X3R3/TXT/ABGCHECK); up to 8 parallel arrays + float key (SORT TMPI#,FACEC#,TX1,TY1,TX2,TY2,TX3,TY3 in D3E8YE9F/TXT/TEST-3DPLY)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4c): SORT A (3,1,2) -> 1,2,3; SORT 0,3,A -> 1,2,3; SORT 1,2,A on (4,3,2,1) -> 4,2,3,1 (only range sorted); SORT A,B reorders parallel B (30,10,20 -> 10,20,30); string key SORT S$ (c,a,b) -> a,b,c; float key SORT A# (3.5,1.5,2.5) -> 1.5,2.5,3.5" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-23 (M1-T14): STABLE ascending — key 2,3,1,1 + parallel 3,4,1,2 -> parallel 1,2,3,4 (tied 1-keys keep order); SORT 1,9,A,B on A[9]=-1/B[9]=12345 -> A[0]=0 (untouched), A[1]=-1, B[1]=12345 (range-restricted parallel sort)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-26 (s_t4c noargs): SORT (no operands) -> errnum 4" }
  - { type: hw_verified, ref: "sb-oracle 2026-06-26 (s_t4c oob): out-of-range start/count -> errnum 10 — LEN 3: SORT 3,1,A (start==LEN) / SORT 5,1,A / SORT 2,3,A / SORT 2,2,A (start+count>LEN) all errnum 10; SORT -1,1,A (neg start) / SORT 0,-1,A (neg count) errnum 10; SORT 2,1,A (start+count==LEN) OK; SORT 0,0,A (count==0) no-op, array unchanged (3,1,2 stays 3,1,2)" }

confidence: hw_verified

tests:
  - { name: sort_basic, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT A\nPRINT A[0];A[1];A[2]", expect: { stdout: "123" } }
  - { name: sort_with_range_prefix, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 0,3,A\nPRINT A[0];A[1];A[2]", expect: { stdout: "123" } }
  - { name: sort_partial, code: "DIM A[4]\nA[0]=4\nA[1]=3\nA[2]=2\nA[3]=1\nSORT 1,2,A\nPRINT A[0];A[1];A[2];A[3]", expect: { stdout: "4231" } }
  - { name: sort_parallel, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nDIM B[3]\nB[0]=30\nB[1]=10\nB[2]=20\nSORT A,B\nPRINT B[0];B[1];B[2]", expect: { stdout: "102030" } }
  - { name: sort_string_key, code: "DIM S$[3]\nS$[0]=\"c\"\nS$[1]=\"a\"\nS$[2]=\"b\"\nSORT S$\nPRINT S$[0];S$[1];S$[2]", expect: { stdout: "abc" } }
  - { name: sort_float_key, code: "DIM A#[3]\nA#[0]=3.5\nA#[1]=1.5\nA#[2]=2.5\nSORT A#\nPRINT A#[0];\",\";A#[1];\",\";A#[2]", expect: { stdout: "1.5,2.5,3.5" } }
  - { name: sort_stable_parallel, code: "DIM A[4]\nDIM B[4]\nA[0]=2\nA[1]=3\nA[2]=1\nA[3]=1\nB[0]=3\nB[1]=4\nB[2]=1\nB[3]=2\nSORT A,B\nPRINT B[0];B[1];B[2];B[3]", expect: { stdout: "1234" } }
  - { name: sort_noargs, code: "SORT", expect: { error: { errnum: 4 } } }
  - { name: sort_oob_start_eq_len, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 3,1,A", expect: { error: { errnum: 10 } } }
  - { name: sort_oob_start_past_len, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 5,1,A", expect: { error: { errnum: 10 } } }
  - { name: sort_oob_start_plus_count_gt_len, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 2,3,A", expect: { error: { errnum: 10 } } }
  - { name: sort_oob_neg_start, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT -1,1,A", expect: { error: { errnum: 10 } } }
  - { name: sort_oob_neg_count, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 0,-1,A", expect: { error: { errnum: 10 } } }
  - { name: sort_boundary_start_plus_count_eq_len, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 2,1,A\nPRINT A[0];A[1];A[2]", expect: { stdout: "312" } }
  - { name: sort_count_zero_noop, code: "DIM A[3]\nA[0]=3\nA[1]=1\nA[2]=2\nSORT 0,0,A\nPRINT A[0];A[1];A[2]", expect: { stdout: "312" } }
