id: SPCHR
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: def_no, type: integer, range: "0..4095", desc: "Template definition number (from SPDEF)" }
    note: "SPCHR id, def_no — change the sprite's character to an SPDEF template (form 1)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: u, type: integer, range: "0..511", optional: true, desc: "Source U (skippable)" }
      - { name: v, type: integer, range: "0..511", optional: true, desc: "Source V (skippable)" }
      - { name: w, type: integer, optional: true, default: 16, desc: "Source width (default 16)" }
      - { name: h, type: integer, optional: true, default: 16, desc: "Source height (default 16)" }
      - { name: attribute, type: integer, optional: true, default: 1, desc: "Attribute bitfield (default 0x01 display ON)" }
    note: "SPCHR id, [u],[v],[w],[h],[attr] — change the sprite's character from explicit image info (form 2)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: u, type: integer, desc: "OUT: source U" }
      - { name: v, type: integer, desc: "OUT: source V" }
      - { name: w, type: integer, optional: true, desc: "OUT: source width" }
      - { name: h, type: integer, optional: true, desc: "OUT: source height" }
      - { name: a, type: integer, optional: true, desc: "OUT: attribute" }
    note: "SPCHR id OUT u,v [,w,h [,a]] — read the sprite's image definition (form 3)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: defno, type: integer, desc: "OUT: current definition number" }
    note: "SPCHR id OUT defno — read the sprite's template definition number (form 4)."

summary: "Changes (or, in the OUT forms, reads) a sprite's character definition — either an SPDEF template number or explicit image U,V,W,H,attribute. The sprite must be SPSET first."

semantics:
  - "SPCHR id,def_no re-points the sprite at an SPDEF template; SPCHR id,u,v,w,h,attr sets the source image directly (U/V skippable; W,H default 16; attr default 0x01 display-on)."
  - "The OUT image form (SPCHR id OUT u,v[,w,h[,a]]) reads back the image rectangle and attribute; the OUT defno form (SPCHR id OUT defno) reads the template number."
  - "The attribute bitfield matches SPSET (b0 display, b1-b2 rotation, b3/b4 flips, b5 additive)."
  - "Using SPCHR on a sprite that was not SPSET raises errnum 4 (Illegal function call)."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "the sprite was not SPSET" }
  - { errnum: 10, name: "Out of range", when: "U+W or V+H exceeds 512" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spchr.md (4 forms: SPCHR id,defno; SPCHR id,[U],[V],[W],[H],[attr]; SPCHR id OUT U,V[,W,H[,A]]; SPCHR id OUT DEFNO; UV skippable; W/H default 16; attr default 0x01; error before SPSET)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPCHR handler FUN_0013ee4c @0x13ee4c: sets/returns the sprite character definition (template or explicit image)" }
  - { type: community, ref: "sbsave corpus: SPCHR common for sprite animation frames (changing the source rect each frame)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8b): ACLS:SPSET 0,0,0,16,16,1:SPCHR 0,64,64,16,16,1 then SPCHR 0 OUT U,V -> U=64,V=64 (image rect read back)" }

confidence: hw_verified

tests:
  - { name: spchr_set_read_uv, code: "ACLS\nSPSET 0,0,0,16,16,1\nSPCHR 0,64,64,16,16,1\nSPCHR 0 OUT U,V\nPRINT U;\",\";V", expect: { stdout: "64,64" } }
