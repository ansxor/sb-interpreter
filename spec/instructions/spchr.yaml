id: SPCHR
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — set the character from an SPDEF template.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the sprite to redefine." }
      - { name: definition_number, type: integer, range: "0..4095", desc: "SPDEF template number to use for image/size/origin." }
    note: "SPCHR mgmt, defn — redefine the sprite from an SPDEF template (2 args, no return)."
  # Form 2 — set the character from a directly-specified image.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite." }
      - { name: u, type: integer, optional: true, range: "0..511", desc: "X of the source rectangle. May be omitted (empty arg) to keep current." }
      - { name: v, type: integer, optional: true, range: "0..511", desc: "Y of the source rectangle." }
      - { name: w, type: integer, optional: true, default: 16, range: "1..512 (U+W <= 512)", desc: "Width of the source rectangle. Default 16." }
      - { name: h, type: integer, optional: true, default: 16, range: "1..512 (V+H <= 512)", desc: "Height of the source rectangle. Default 16." }
      - { name: attribute, type: integer, optional: true, default: 1, range: "attribute bitfield (see below)", desc: "Display/rotation/flip/additive bits. Default &H01 (display ON only)." }
    note: "SPCHR mgmt,[U],[V],[W],[H],[attr] — redefine from a direct image (3..6 args, no return). Any argument other than mgmt may be omitted/empty; W,H default 16,16 and attribute defaults to &H01."
  # Form 3 — read the directly-specified character info.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite." }
    out:
      - { name: U, type: integer, desc: "Receives the source-rectangle X." }
      - { name: V, type: integer, desc: "Receives the source-rectangle Y." }
      - { name: W, type: integer, optional: true, desc: "Receives the width." }
      - { name: H, type: integer, optional: true, desc: "Receives the height." }
      - { name: A, type: integer, optional: true, desc: "Receives the attribute." }
    note: "SPCHR mgmt OUT U,V[,W,H[,A]] — read the character image info (1 arg, 2/4/5 returns). A 3-return form `SPCHR mgmt OUT U,V,X` is also accepted, but its THIRD value is the ATTRIBUTE (not the width) — hw_verified: `SPCHR 0,64,64,32,32,1 : SPCHR 0 OUT U,V,X` → 64,64,1 (X = attr 1, not W 32)."
  # Form 4 — read the character definition number.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite." }
    out:
      - { name: DEFNO, type: integer, desc: "Receives the definition (template) number." }
    note: "SPCHR mgmt OUT DEFNO — read the definition number (1 arg, 1 return)."

summary: "Sets or gets a sprite's character (image) definition. The set forms redefine the sprite either from an SPDEF template (mgmt,defn) or from a directly-specified source rectangle (mgmt,U,V[,W,H][,attr]); omitted direct args keep current/default values. The get forms return either the image rectangle/attribute (OUT U,V[,W,H[,A]]) or the template number (OUT DEFNO), selected by the number of OUT targets. Using SPCHR on a sprite that has not been SPSET raises an error."

semantics:
  - "Form family is chosen first by the return count r7=[r0,#0xc]: r7==0 selects the SET forms (cmp r7,#0 beq @0x13ee78 then cmp r6,#0x2 / blt error @0x13ee7c — SET needs argcount >= 2); r7!=0 selects the GET forms, which require argcount 1 (cmp r6,#0x1 / beq @0x13ee70 else b error @0x13ee74)."
  - "Management number is fetched via the sprite-index getter FUN_001eece0 (bl 0x1eece0 @0x13ee8c); out of 0..511 raises errnum 10 (Out of range). The slot address is base[0x13f21c] + index*0x48 (rsb r1,r0,r0,lsl#5 / add r4,r1,r0,lsl#3 @0x13eeb0-0x13eebc)."
  - "The sprite must exist: tst r0,#0x80000000 on the slot flags [r4,#0x4]; if the active bit is clear, errnum 4 (Illegal function call) is raised — mov r0,#0x4 / bl 0x1fffdc @0x13eefc — the documented 'used before SPSET' error (errnum 4, hw_verified via oracle)."
  - "After the guards, the handler switches on the RETURN count via a jump table: cmp r7,#0x6 / ldrcc pc,[pc,r7,lsl#2] @0x13eed0 with table @0x13eed8 -> r7=0 SET (@0x13ef0c), r7=1 GET DEFNO (@0x13f504, form 4), r7=2 GET U,V (@0x13f524), r7=3 GET U,V,A (@0x13f560), r7=4 GET U,V,W,H (@0x13f59c), r7=5 GET U,V,W,H,A (@0x13f690, form 3 full); r7>=6 -> default b 0x13f798 error (errnum 4). hw_verified: a 6-OUT `SPCHR 0 OUT A,B,C,D,E,F` raises errnum 4."
  - "GET DEFNO (r7=1, @0x13f504) reads the stored definition number (ldrsh r1,[r4,#0x2c]). hw_verified contract: a template SPCHR `SPCHR 0,42` reads back DEFNO=42; SPSET'ing a sprite by template (`SPSET 0,7`) reads back DEFNO=7; a DIRECT-image SPCHR (`SPCHR 0,64,64,16,16,1`) drops the template association and reads back DEFNO=0 (even after a prior `SPSET 0,7`)."
  - "GET attribute (the LAST value of the 3-return and 5-return forms, shared code @0x13f774) is `flags & 0x3F` (ldrb r0,[r4,#0x4] / and r1,r0,#0x3f) — so its b00 reflects the LIVE display state. The 3-return form is U,V,ATTRIBUTE (NOT U,V,W). hw_verified: `SPCHR 0,64,64,32,32,1 : SPCHR 0 OUT U,V,X` → 64,64,1."
  - "GET W,H (4/5-return forms, @0x13f59c/@0x13f690) read the float source-rect W,H from [r4,#0x20]/[r4,#0x24] and apply a 90/270-degree rotation swap (ands r0,r0,#0x6 then cmp #0x2 / #0x6 -> swap branch @0x13f640) — but the SET path stores them with the same rotation swap, so the source rectangle round-trips VERBATIM regardless of rotation. hw_verified: W=32,H=8 with attr &H02 (rot90) / &H04 (rot180) / &H06 (rot270) all read back 32,8."
  - "SET dispatch (@0x13ef0c) branches on argcount: r6==2 is form 1 (mgmt,defn) at @0x13ef64 — defn fetched via the bounded getter FUN_001eec7c with upper bound from [0x13f230] (4095), out of range raises errnum 10; the template (stride 14 bytes: rsb r1,r0,r0,lsl#3 / add lsl#1 @0x13efa8) supplies U,V (ldrsh @0x13efb0/0x13efb4) and W,H (ldrh @0x13efd4/0x13efd8) and the template-mode flag bit 0x40 is set (orr r0,r0,#0x40 @0x13f004) on [r4,#0x4]. r6 in 3..6 is form 2 (direct image) — default W,H=16.0 (vldr.32 s16,s17 @0x13ef18-0x13ef1c) and default attribute=1 (mov r8,#1 @0x13ef20); r6<2 or r6>6 raises errnum 4 with errline -1 (mvn r1 / mov r0,#0x4 / bl 0x1fffdc @0x13ef50)."
  - "Form 1 (template) re-images an EXISTING sprite WITHOUT re-creating it: it copies the template's source rectangle (U,V,W,H), the template origin -> the sprite's home (vstmia to slot+0x18 @0x13efcc), the definition number, the template-mode flag bit 0x40, and the template's attribute bits 1-5; it does NOT reset the sprite's transform. hw_verified: `SPDEF 100,40,48,24,32,7,9,&H21 : SPSET 0,0 : SPCHR 0,100` -> OUT U,V,W,H=40,48,24,32, DEFNO=100, SPHOME=7,9, OUT attr=33 (&H21, display bit preserved); a prior `SPOFS 0,50,60` survives the SPCHR (position 50,60). A direct-image SPCHR likewise preserves position."
  - "The SET attribute (form 1 template attr, form 2 attr arg) applies ONLY bits 1-5 (rotation/flip/blend): the handler does `bic r1,r1,#0x3e` (clear bits 1-5) then ORs the new bits (@0x13f008-0x13f00c), PRESERVING the display bit b00. SPCHR's attribute does NOT show/hide the sprite — only SPSHOW/SPHIDE do. hw_verified: starting from a shown sprite, `SPCHR 0,...,&H08` -> OUT attr 9 (8 | preserved display 1); `...,0` -> 1; `...,&H3F` -> 63."
  - "Form 2 supports SKIPPED middle arguments: each direct param may be left empty (e.g. `SPCHR 6,,,32,32,1` sets only W,H,attr; `SPCHR M0,,,,,AV` sets only the attribute) — an empty arg keeps the sprite's current value rather than the default (the per-arg getter checks [arg+0x4] and reads the existing slot field, ldrsh [r4,#0x40]/[r4,#0x42] @0x13f03c/0x13f088, when empty). An ABSENT param (shorter argcount) instead takes the default: W,H -> 16, attribute bits 1-5 -> 0. hw_verified: `SPCHR 0,64,64,32,32,1 : SPCHR 0,,,8,8 : SPCHR 0 OUT U,V,W,H` -> 64,64,8,8 (U,V kept); `SPCHR 0,10,20 : SPCHR 0 OUT U,V,W,H,A` -> 10,20,16,16,1 (W,H default 16). A direct-image SPCHR also resets DEFNO to 0."
  - "U+W or V+H over 512 raises errnum 10 (Out of range). hw_verified (was assumed): `SPSET 0,0 : SPCHR 0,500,0,20,16,1` (U+W=520) -> errnum 10 errline 1; `SPCHR 0,0,500,16,20,1` (V+H=520) -> errnum 10 errline 1."
  - "Attribute bitfield (shared with SPSET): b00 = display 0/1 (#SPSHOW &H01); b01-b02 = 90-degree rotation #SPROT0/#SPROT90/#SPROT180/#SPROT270 = &H00/&H02/&H04/&H06; b03 = horizontal flip (#SPREVH &H08); b04 = vertical flip (#SPREVV &H10); b05 = additive blending (#SPADD &H20). See spec/reference/constants.yaml."
errors:
  - { errnum: 4, name: "Illegal function call", when: "the sprite has not been SPSET (used before SPSET); the SET form is given fewer than 2 or more than 6 arguments; or the GET form requests more than 5 OUT values" }
  - { errnum: 10, name: "Out of range", when: "the management number is not in 0..511, the definition number (form 1) is not in 0..4095, or U+W / V+H exceeds 512 (hw_verified)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spchr.md (4 forms: SPCHR mgmt,defn (defn 0-4095, from SPDEF template); SPCHR mgmt,[U],[V],[W],[H],[attr] direct (U,V 0-511, W,H default 16,16, U+W/V+H>512 errors, attr default 0x01, args other than mgmt omittable, example `SPCHR 6,,,32,32,1`); SPCHR mgmt OUT U,V[,W,H[,A]] get image info; SPCHR mgmt OUT DEFNO get definition number; mgmt 0-511; 'If used before SPSET, an error will occur'. Attribute bits b00 #SPSHOW, b01-02 rotation #SPROT0/90/180/270, b03 #SPREVH, b04 #SPREVV, b05 #SPADD)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPCHR handler @0x13ee4c: return-count r7=[r0,#0xc] argcount r6=[r0,#0x4]; r7==0 -> SET cmp r6,#0x2 blt error @0x13ee7c, r7!=0 -> GET requires r6==1 cmp r6,#0x1 beq @0x13ee70; mgmt via sprite-index getter bl 0x1eece0 @0x13ee8c (errnum 10 out-of-range); slot = base[0x13f21c]+index*0x48 (rsb r1,r0,r0,lsl#5 @0x13eeb0 / add r4,r1,r0,lsl#3 @0x13eebc); active-bit guard tst r0,#0x80000000 on [r4,#0x4] @0x13eec4 beq -> mov r0,#0x4 bl 0x1fffdc errnum 4 @0x13eefc (used before SPSET); return-count switch cmp r7,#0x6 ldrcc pc,[pc,r7,lsl#2] @0x13eed0 table @0x13eed8 (0->0x13ef0c,1->0x13f504,2->0x13f524,3->0x13f560,4->0x13f59c,5->0x13f690) default b 0x13f798; SET form1 r6==2 defn via bounded getter bl 0x1eec7c upper=[0x13f230] @0x13ef7c (errnum 10), template stride 14 rsb r1,r0,r0,lsl#3 @0x13efa8 ldrsh U,V @0x13efb0/0x13efb4 ldrh W,H @0x13efd4/0x13efd8, sets template flag orr r0,r0,#0x40 [r4,#0x4] @0x13f004; SET form2 default W,H=16.0 vldr.32 s16/s17 @0x13ef18 attr default mov r8,#1 @0x13ef20, bad argcount mvn r1 mov r0,#0x4 bl 0x1fffdc @0x13ef50; empty-arg keeps current ldrsh [r4,#0x40]/[r4,#0x42] @0x13f03c/0x13f088; state ptr [0x13f218]=0x315d60, sprite-base [0x13f21c]." }
  - { type: community, ref: "osb/SMILEBASIC/sprite.d SpriteData/SpriteAttr char definition + SPDEF template (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: SPCHR used ~8,651x. Confirms skip-middle-args attribute form `SPCHR M0,,,,,AV` and `SPCHR SPADNO,,,,,#SPREVH` (~37x e.g. 43Y5BEH3/TXT/ENEMY50, 227YK34J/TXT/JINTRI102), OUT DEFNO single-value `SPCHR 0 OUT NAC` (~125x e.g. 43XP43Q3/TXT/MG_AQUASP), OUT 2-value `SPCHR 24+I OUT U,V` (~43x e.g. 4K2KNDZS/TXT/ARCS), and OUT 5-value `SPCHR FN OUT U,V,CX,CY,AV` (~55x e.g. 43XP43Q3/TXT/MG_AQUASP) — proving the skip-args set form and the 1/2/5-return get forms are LEGAL. Output values oracle-pending." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8b): SPSET 0,0:SPCHR 512,0 -> errnum 10, errline 1 (mgmt out of range); SPSET 0,0:SPCHR 0,4096 -> errnum 10 (defn out of range); SPCLR:SPCHR 5,0 -> errnum 4 (used before SPSET). Round-trips: SPSET 0,0:SPCHR 0,64,64,16,16,1:SPCHR 0 OUT U,V -> U,V = 64,64; SPSET 0,0:SPCHR 0,64,64,32,32,1:SPCHR 0 OUT U,V,W,H,A -> 64,64,32,32,1." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2, harness/harvest/out/spchr_rt*.tsv): COMPLETE value contract. GET DEFNO: template `SPCHR 0,42`->42, `SPCHR 0,100` (custom SPDEF)->100, `SPSET 0,7`->7, direct `SPCHR 0,64,64,16,16,1`->0 (even after SPSET 0,7). Template form copies origin->home (SPDEF 100,40,48,24,32,7,9,1 -> SPHOME 7,9) + source rect (OUT U,V,W,H=40,48,24,32) + template attr bits1-5 (&H21 -> OUT A=33) and PRESERVES position (SPOFS 50,60 survives). 3-return form is U,V,ATTRIBUTE: `SPCHR 0,64,64,32,32,1 : OUT U,V,X`->64,64,1. 4-return: ...->64,64,32,32. Attr SET preserves display b00: from a shown sprite `...,&H08`->A=9, `...,0`->A=1, `...,&H3F`->A=63; skip-attr-only `...,&H20` then `,,,,,&H08`->A=9. W,H round-trip verbatim through rotation: W=32,H=8 with attr &H02/&H04/&H06 (rot90/180/270) all OUT W,H=32,8. Skip-keep: `SPCHR 0,64,64,32,32,1 : SPCHR 0,,,8,8 : OUT U,V,W,H`->64,64,8,8. Defaults: `SPCHR 0,10,20 : OUT U,V,W,H,A`->10,20,16,16,1. Errors: U+W=520 (`SPCHR 0,500,0,20,16,1`) / V+H=520 -> errnum 10 errline 1; 6-OUT `SPCHR 0 OUT A,B,C,D,E,F` -> errnum 4 errline 1." }

confidence: hw_verified

tests:
  # All values hw_verified (sb-oracle 2026-06-22 s_t8b + 2026-06-24 M7-T2).
  - { name: set_from_template_ok, code: "SPSET 0,0\nSPCHR 0,0", expect: { stdout: "" } }
  - { name: set_direct_ok, code: "SPSET 0,0\nSPCHR 0,64,64,16,16,1", expect: { stdout: "" } }
  - { name: set_skip_uv_ok, code: "SPSET 0,0\nSPCHR 0,,,32,32,1", expect: { stdout: "" } }
  - { name: get_uv_round_trip, code: "SPSET 0,0\nSPCHR 0,64,64,16,16,1\nSPCHR 0 OUT U,V\nPRINT U;\",\";V", expect: { stdout: "64,64" } }
  - { name: get_full_round_trip, code: "SPSET 0,0\nSPCHR 0,64,64,32,32,1\nSPCHR 0 OUT U,V,W,H,A\nPRINT U;\",\";V;\",\";W;\",\";H;\",\";A", expect: { stdout: "64,64,32,32,1" } }
  - { name: get_uvwh_round_trip, code: "SPSET 0,0\nSPCHR 0,64,64,32,32,1\nSPCHR 0 OUT U,V,W,H\nPRINT U;\",\";V;\",\";W;\",\";H", expect: { stdout: "64,64,32,32" } }
  # The 3-return form's THIRD value is the ATTRIBUTE, not the width.
  - { name: get_3return_is_attr, code: "SPSET 0,0\nSPCHR 0,64,64,32,32,1\nSPCHR 0 OUT U,V,X\nPRINT U;\",\";V;\",\";X", expect: { stdout: "64,64,1" } }
  # GET DEFNO: template number / SPSET defn / 0 after a direct-image SPCHR.
  - { name: defno_from_template, code: "SPSET 0,0\nSPCHR 0,42\nSPCHR 0 OUT D\nPRINT D", expect: { stdout: "42" } }
  - { name: defno_spset_only, code: "SPSET 0,7\nSPCHR 0 OUT D\nPRINT D", expect: { stdout: "7" } }
  - { name: defno_direct_clears, code: "SPSET 0,7\nSPCHR 0,64,64,16,16,1\nSPCHR 0 OUT D\nPRINT D", expect: { stdout: "0" } }
  # Template form copies origin->home, source rect, attr (bits1-5), defno; preserves position.
  - { name: template_full_round_trip, code: "SPDEF 100,40,48,24,32,7,9,&H21\nSPSET 0,0\nSPCHR 0,100\nSPCHR 0 OUT U,V,W,H,A\nPRINT U;\",\";V;\",\";W;\",\";H;\",\";A", expect: { stdout: "40,48,24,32,33" } }
  - { name: template_copies_home, code: "SPDEF 100,40,48,24,32,7,9,1\nSPSET 0,0\nSPCHR 0,100\nSPHOME 0 OUT HX,HY\nPRINT HX;\",\";HY", expect: { stdout: "7,9" } }
  - { name: template_preserves_pos, code: "SPSET 0,0\nSPOFS 0,50,60\nSPCHR 0,5\nSPOFS 0 OUT X,Y\nPRINT X;\",\";Y", expect: { stdout: "50,60" } }
  # Attribute SET applies bits 1-5 only; the display bit b00 is preserved (sprite stays shown).
  - { name: attr_preserves_display, code: "SPSET 0,0\nSPCHR 0,64,64,16,16,0\nSPCHR 0 OUT U,V,W,H,A\nPRINT A", expect: { stdout: "1" } }
  - { name: attr_skip_only_keeps_display, code: "SPSET 0,0\nSPCHR 0,64,64,16,16,&H20\nSPCHR 0,,,,,&H08\nSPCHR 0 OUT U,V,W,H,A\nPRINT A", expect: { stdout: "9" } }
  - { name: attr_all_bits, code: "SPSET 0,0\nSPCHR 0,64,64,16,16,&H3F\nSPCHR 0 OUT U,V,W,H,A\nPRINT A", expect: { stdout: "63" } }
  # W,H round-trip the source rectangle verbatim regardless of rotation attribute.
  - { name: wh_round_trip_under_rot90, code: "SPSET 0,0\nSPCHR 0,0,0,32,8,&H02\nSPCHR 0 OUT U,V,W,H\nPRINT U;\",\";V;\",\";W;\",\";H", expect: { stdout: "0,0,32,8" } }
  # Skip-empty keeps current U,V; absent W,H default to 16.
  - { name: skip_keeps_uv, code: "SPSET 0,0\nSPCHR 0,64,64,32,32,1\nSPCHR 0,,,8,8\nSPCHR 0 OUT U,V,W,H\nPRINT U;\",\";V;\",\";W;\",\";H", expect: { stdout: "64,64,8,8" } }
  - { name: default_wh_attr, code: "SPSET 0,0\nSPCHR 0,10,20\nSPCHR 0 OUT U,V,W,H,A\nPRINT U;\",\";V;\",\";W;\",\";H;\",\";A", expect: { stdout: "10,20,16,16,1" } }
  - { name: mgmt_out_of_range, code: "SPSET 0,0\nSPCHR 512,0", expect: { error: { errnum: 10 } } }
  - { name: defn_out_of_range, code: "SPSET 0,0\nSPCHR 0,4096", expect: { error: { errnum: 10 } } }
  - { name: before_spset, code: "SPCLR\nSPCHR 5,0", expect: { error: { errnum: 4 } } }
  - { name: u_plus_w_over_512, code: "SPSET 0,0\nSPCHR 0,500,0,20,16,1", expect: { error: { errnum: 10 } } }
  - { name: v_plus_h_over_512, code: "SPSET 0,0\nSPCHR 0,0,500,16,20,1", expect: { error: { errnum: 10 } } }
  - { name: get_too_many_returns, code: "SPSET 0,0\nSPCHR 0 OUT A,B,C,D,E,F", expect: { error: { errnum: 4 } } }
