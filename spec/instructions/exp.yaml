id: EXP
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args: []
    returns: { type: double, desc: "Euler's number e (2.718281828459045) when called with no argument" }
    note: "Zero-argument form: returns the constant e."
  - args:
      - { name: value, type: number, range: "any", desc: "Exponent" }
    returns: { type: double, desc: "e raised to the power value" }

summary: "Returns e raised to the power value (e ** value). With no argument, returns e itself."

semantics:
  - "EXP(0)=1. EXP() with no argument returns e = 2.718281828459045 (embedded constant 0x4005BF0A8B145769)."
  - "The argument is coerced to Double; the result is always a Double."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "more than 1 argument" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/exp.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst EXP handler @0x147e38; 0 args -> e const @0x147ee8 (0x4005BF0A8B145769); 1 arg -> to-double (+0x44) then exp @0x1ebc90; non-number -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: EXP(0)=1, EXP()=2.71828, EXP(1)=2.71828, EXP(2)=7.38906 (SB prints doubles to 6 significant figures)" }
  - { type: hw_verified, ref: "sb-oracle PRINT read-back 2026-06-23: PRINT renders doubles via %.8f (M7-T4) — PRINT EXP()=2.71828183, EXP(1)=2.71828183, EXP(2)=7.3890561; distinct from STR$ %g shown above" }

confidence: hw_verified

tests:
  # numeric expects below are hw_verified (sb-oracle 2026-06-22); error case is disassembled.
  - { name: zero,        code: "PRINT EXP(0)", expect: { stdout: "1" } }
  - { name: no_arg_is_e, code: "PRINT EXP()",  expect: { stdout: "2.71828183" } }
  - { name: e_to_one,    code: "PRINT EXP(1)", expect: { stdout: "2.71828183" } }
  - { name: e_to_two,    code: "PRINT EXP(2)", expect: { stdout: "7.3890561" } }
  - { name: string_type_mismatch, code: 'A=EXP("x")', expect: { error: { errnum: 8 } } }
