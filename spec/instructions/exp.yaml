# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: EXP
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", optional: true, desc: "Exponent (if omitted, e is returned)" }
    returns: { type: double, desc: "e raised to the power value" }

summary: "Returns e (the base of natural logarithms) raised to the power value. With no argument, returns e itself."

semantics:
  - "EXP(value) = e^value; result is always Double."
  - "If the argument is omitted, returns e (= EXP(1) = 2.71828)."
  - "EXP(0)=1, EXP(1)=2.71828, EXP(2)=7.38906."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/exp.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: EXP(0)=1, EXP(1)=2.71828, EXP(2)=7.38906, EXP()=2.71828", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: zero,  code: "PRINT EXP(0)", expect: { stdout: "1" } }
  - { name: one_is_e, code: "PRINT EXP(1)", expect: { stdout: "2.71828" } }
  - { name: two,   code: "PRINT EXP(2)", expect: { stdout: "7.38906" } }
  - { name: omitted_is_e, code: "PRINT EXP()", expect: { stdout: "2.71828" } }
  - { name: string_type_mismatch, code: 'A=EXP("x")', expect: { error: { errnum: 8 } } }
