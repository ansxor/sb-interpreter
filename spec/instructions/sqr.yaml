# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: SQR
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: ">=0", desc: "Numerical value" }
    returns: { type: double, desc: "Positive square root of value" }

summary: "Returns the positive square root of value."

semantics:
  - "Result is always Double (even for perfect squares): SQR(4)=2, SQR(144)=12, SQR(2)=1.41421."
  - "Domain is value >= 0."

errors:
  - { errnum: 10, name: OutOfRange, when: "value is negative" }
  - { errnum: 8,  name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sqr.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: SQR(4)=2, SQR(144)=12, SQR(2)=1.41421", confidence: hw_verified }
  # Negative-arg errnum is documented/osb (OutOfRange) — confirm via O-T5 (error capture).

confidence: hw_verified

tests:
  - { name: perfect_square,    code: "PRINT SQR(4)",   expect: { stdout: "2" } }
  - { name: larger_square,     code: "PRINT SQR(144)", expect: { stdout: "12" } }
  - { name: non_perfect,       code: "PRINT SQR(2)",   expect: { stdout: "1.41421" } }
  - { name: negative_out_of_range, code: "A=SQR(-1)",  expect: { error: { errnum: 10 } } }
