id: BEEP
kind: statement
category: Sound
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # 0..4 trailing-optional arguments; any leading argument may be skipped with an empty comma.
  - args:
      - { name: sound, type: integer, range: "0..133 | 224..255 | 256..383", optional: true, default: 0, desc: "Preset sound-effect number. 0-133 are the documented presets (SMILE button lists them); 224-255 and 256-383 are additional engine sound banks. Omitted = 0." }
      - { name: frequency, type: integer, range: "-32768..32767", optional: true, default: 0, desc: "Pitch shift in 1/100 of a halftone per unit (one halftone per 100). Omitted = 0 (no shift)." }
      - { name: volume, type: integer, range: "0..127", optional: true, default: -1, desc: "Playback volume. Omitted = -1 (use the sound's preset/default volume)." }
      - { name: pan, type: integer, range: "0..127", optional: true, default: 64, desc: "Stereo pan pot: 0 = left, 64 = center, 127 = right. Omitted = center." }
    note: "BEEP [sound][,freq][,vol][,pan] — play a preset sound effect. All four arguments are optional and any may be skipped with an empty comma (e.g. BEEP 9,,80)."

summary: "Generates a simple alarm sound or sound effect from the preset bank. All four arguments are optional and trailing-or-skippable: sound-effect number (documented 0-133, plus engine banks 224-255 and 256-383), frequency shift (-32768..32767, one halftone per 100), volume (0-127), and pan pot (0 left / 64 center / 127 right). With no arguments it plays preset sound 0. Returns nothing (statement)."

semantics:
  - "Return gate: the result count [r4,#0xc] must be 0 (ldr r0,[r4,#0xc] / cmp r0,#0x0 / beq @0x1a3a68); a return context raises errnum 4 (Illegal function call) errline -1 (mov r2,#0x0 / mvn r1,#0x0 / mov r0,#0x4 @0x1a3a50)."
  - "Argument-count gate: argcount r5=[r4,#0x4] must be <= 4 (cmp r5,#0x4 / ble @0x1a3a8c); 5+ arguments raise errnum 4 errline -1 (@0x1a3a74). Each argument slot is independently optional: an omitted slot (type byte [slot,#0x4]==0, the empty-comma form e.g. `BEEP 9,,80`) takes that argument's default instead of being evaluated."
  - "Arg index 0 = sound-effect number (default sound 0, encoded 0x0100002B when omitted @0x1a3a8c-0x1a3aa0). When present the raw value is range-mapped to an internal id (@0x1a3ae0-0x1a3b30): 0..133 (cmp #0x85 / bls) -> n+0x2B; 224..255 (sub #0xe0 / cmp #0x1f / bls) -> n+0xD1; 256..383 (sub #0x100 / cmp #0x7f / bls) -> n+[0x1a3c50]=0x00FFFFB1; any other value (the 134..223 gap or >383) raises errnum 10 (Out of range) (mov r0,#0xa / b @0x1a3a80 at @0x1a3b28)."
  - "Arg index 1 = frequency (default 0). Evaluated through FUN_001eec7c with min r3 = ~0x7FFF = -32768 and max [sp,#0x0]=[0x1a3c54]=0x00007FFF = 32767 (@0x1a3b58-0x1a3b70); out of range raises errnum 10. Frequency is a pitch shift of one halftone per 100 units."
  - "Arg index 2 = volume (default -1, meaning use the preset's own volume @0x1a3ba0). Evaluated through FUN_001eec7c with min r3=0 and max [sp,#0x0]=r8=#0x7f = 127 (@0x1a3ba8-0x1a3bb8); out of range raises errnum 10."
  - "Arg index 3 = pan pot (default center @0x1a3be8). Evaluated through FUN_001eec7c with min r3=0 and max [sp,#0x0]=#0x7f = 127 (@0x1a3bf4-0x1a3c04), then remapped to a signed offset pan*2 - 128 (mov r0,r0,lsl #0x1 / sub r0,r0,#0x80 @0x1a3c1c-0x1a3c20): 0 -> -128 (full left), 64 -> 0 (center), 127 -> +126 (right). Out of range raises errnum 10."
  - "The four resolved values {sound, freq, vol, pan} are loaded (ldmia r4,{r1,r2,r3} @0x1a3c2c) and the sound is triggered via bl 0x1a5004 (@0x1a3c38) against audio state [0x1a3c58]=0x01D08280; returns 0. The preset sound is fixed-bank PCM, not MML, so it is unrelated to [[bgmplay]] tunes. Audio output has no deterministic emulator golden (O-T7)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "more than 4 arguments are given, or BEEP is used in a return context" }
  - { errnum: 10, name: "Out of range", when: "the sound number is not in 0..133 / 224..255 / 256..383, the frequency is not in -32768..32767, the volume is not in 0..127, or the pan pot is not in 0..127" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/beep.md (`BEEP [Sound effect number][,Frequency][,Volume][,Pan pot]` — preset sound 0-133 (SMILE button lists them); frequency -32768..32767, one halftone per 100; volume 0-127; pan pot 0 left / 64 center / 127 right; example `BEEP 20`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BEEP handler @0x1a3a38: result-count [r4,#0xc] cmp #0x0 beq @0x1a3a68 else errnum 4 errline -1 (mov r0,#0x4 @0x1a3a50); argcount r5=[r4,#0x4] cmp #0x4 ble @0x1a3a8c else errnum 4 (@0x1a3a74); sound default 0x0100002B (@0x1a3a8c), range map n<=0x85 -> +0x2B / n in 224..255 (sub #0xe0 cmp #0x1f) -> +0xD1 / n in 256..383 (sub #0x100 cmp #0x7f) -> +[0x1a3c50]=0x00FFFFB1 / else errnum 10 mov r0,#0xa @0x1a3b28; freq via bl 0x1eec7c min ~0x7FFF max [0x1a3c54]=0x00007FFF @0x1a3b58-0x1a3b70; volume min 0 max #0x7f @0x1a3ba8-0x1a3bb8; pan min 0 max #0x7f then remap mov r0,r0,lsl #0x1 / sub r0,r0,#0x80 @0x1a3c1c; play bl 0x1a5004 @0x1a3c38 against [0x1a3c58]=0x01D08280. Literals [0x1a3c48]=0x0100002B (default sound), [0x1a3c4c]=0x00305628, [0x1a3c50]=0x00FFFFB1, [0x1a3c54]=0x00007FFF" }
  - { type: disassembled, ref: "cia_3.6.0.lst shared integer-arg range helper FUN_001eec7c @0x1eec7c: evaluates the arg (blx [r2,#0x40]), bounds-checks value against min r3 and max [sp,#0x18], raising errnum 10 (mov r2,#0x0 / mov r0,#0xa / b 0x1fffdc @0x1eeccc) — enforces the frequency, volume and pan bounds" }
  - { type: community, ref: "osb/SMILEBASIC/sound.d BEEP (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg): 1071 files — proves multiple legal forms: bare `BEEP` (217), 1-arg `BEEP 9` / `BEEP 51` / `BEEP 20`, negative frequency `BEEP 9,-500`, 2-arg `BEEP 95,1000`, and the empty-comma skip `BEEP 9,,` and `BEEP 9,0,` (freq skipped, later args set). The extended sound banks the docs omit are heavily used: `BEEP 224`/`BEEP 243` (224..255 band) and `BEEP 258`/`BEEP 293`/`BEEP 303`/`BEEP 354`/`BEEP 382` (256..383 band), matching the disassembly's two extra ranges. Proves the syntax + sound-number ranges are legal; runtime audio output unproven (no oracle, O-T7)." }

confidence: disassembled

tests:
  # Call shape, argument ranges and error conditions read from the disassembly handler body.
  # Audio output is not deterministically harvestable (O-T7); these pin the statement contract.
  - { name: no_args, code: "BEEP", expect: { stdout: "" } }
  - { name: sound_only, code: "BEEP 20", expect: { stdout: "" } }
  - { name: neg_freq, code: "BEEP 9,-500", expect: { stdout: "" } }
  - { name: skip_freq, code: "BEEP 9,,80", expect: { stdout: "" } }
  - { name: all_args, code: "BEEP 9,0,80,64", expect: { stdout: "" } }
  - { name: sound_max_doc, code: "BEEP 133", expect: { stdout: "" } }
  - { name: sound_band2, code: "BEEP 224", expect: { stdout: "" } }
  - { name: sound_band3, code: "BEEP 293", expect: { stdout: "" } }
  - { name: sound_gap, code: "BEEP 134", expect: { error: { errnum: 10 } } }
  - { name: sound_gap_high, code: "BEEP 200", expect: { error: { errnum: 10 } } }
  - { name: sound_above, code: "BEEP 384", expect: { error: { errnum: 10 } } }
  - { name: volume_out_of_range, code: "BEEP 0,0,200", expect: { error: { errnum: 10 } } }
  - { name: pan_out_of_range, code: "BEEP 0,0,0,200", expect: { error: { errnum: 10 } } }
  - { name: too_many_args, code: "BEEP 0,0,0,0,0", expect: { error: { errnum: 4 } } }
