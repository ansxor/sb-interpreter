id: SPLINK
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Child (link source) sprite management number" }
      - { name: parent, type: integer, range: "0..511", desc: "Parent (link destination) sprite — must be a LOWER management number than the child" }
    note: "SPLINK id, parent — make sprite id a child of parent (coordinates only)."

summary: "Links a child sprite to a parent so the child's display coordinates are relative to the parent. Only position is linked (not rotation or scale). The parent must have a lower management number. Both sprites must be SPSET first."

semantics:
  - "SPLINK id,parent attaches the child to the parent: the child's display position becomes relative to the parent's coordinate system (the screen top-left is no longer the child's origin)."
  - "Only COORDINATES are linked — the parent's rotation angle and magnification do NOT propagate to the child."
  - "The parent (link destination) MUST be a lower management number than the child; a parent number >= the child raises errnum 4 (Illegal function call)."
  - "Link hierarchies may be chained (a child can itself be a parent of a higher-numbered sprite); there is no depth restriction. Undo with [[spunlink]]."
  - "Using SPLINK on a sprite that was not SPSET raises errnum 4."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "the parent number is not lower than the child, or a sprite was not SPSET" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/splink.md (SPLINK id,parent; coordinates only; parent must be a lower management number; nested links allowed; error before SPSET)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPLINK handler FUN_00142770/@0x1428f4: records the child->parent link for relative coordinates" }
  - { type: community, ref: "sbsave corpus: SPLINK used for jointed/compound sprites (e.g. a body with linked parts)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8c): with SPSET 4 and SPSET 15, SPLINK 15,4 (parent 4 < child 15) runs; SPLINK 4,15 (parent 15 > child 4) -> errnum 4 (Illegal function call)" }

confidence: hw_verified

tests:
  - { name: splink_lower_parent_ok, code: "ACLS\nSPSET 4,0,0,16,16,1\nSPSET 15,0,0,16,16,1\nSPLINK 15,4\nPRINT 1", expect: { stdout: "1" } }
  - { name: splink_higher_parent_errors, code: "ACLS\nSPSET 4,0,0,16,16,1\nSPSET 15,0,0,16,16,1\nSPLINK 4,15", expect: { error: { errnum: 4 } } }
