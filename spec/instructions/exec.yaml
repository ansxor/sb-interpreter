id: EXEC
kind: statement
category: Files
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — load and execute a program from a file into a slot.
  - args:
      - { name: name, type: string, range: '"[Resource:]Filename" — Resource = PRG0-PRG3 (program SLOT to load into); omitted = a default slot. Filename is any string expression.' }
    returns: { type: void }
    note: "EXEC \"[Resource:]Filename\" — load a program file and execute it. Cannot return to the previous program."
  # Form 2 — execute a program already in a different slot.
  - args:
      - { name: slot, type: integer, range: "0-3: SLOT number of the program to execute" }
    returns: { type: void }
    note: "EXEC Program-SLOT — execute the program already loaded in slot 0-3. Cannot return to the previous program."

summary: "Loads and executes a program. Form 1 takes a `\"[Resource:]Filename\"` string (resource `PRG0`-`PRG3` selects the slot to load into) and loads then runs that file; form 2 takes a slot number 0-3 and executes the program already in that slot. In both cases it is impossible to return to the previous program (a program EXEC'd into another slot can return via END). EXEC cannot be used to run a program in DIRECT mode."

semantics:
  - "EXEC is a special-form keyword (keyword id 0x14b=331 in the keyword table @0x30689c; name string @0x2ed6c0), parsed/handled by the slot/loader machinery rather than dispatched through the builtin handler table — so there is no standalone handler body to read; its exact validation is parser/VM-internal."
  - "Form 1 (string): `EXEC \"[Resource:]Filename\"` loads a program file (resource PRG0-PRG3 picks the destination slot) and begins executing it. The filename is any string expression (corpus: bare variable `EXEC EXE$`, concatenation `EXEC \"PRG2:SYS/SBSMILE\"`, computed slot `EXEC \"PRG\"+STR$(SLOT())+\":...\"`). Path-style filenames containing `/` occur. A `PRGn:` resource naming the RUNNING slot (`EXEC \"PRG0:file\"` while slot 0 runs — the corpus loader idiom where a small slot-0 loader EXECs the real program) loads the file INTO the running slot and runs it from the top; sb-core replaces the running program with the loaded one and (like a restart) discards all execution state and starts its globals at declared-type zeros. The bare-name (no `PRGn:`) default-slot destination is oracle-pending (the deferred loader)."
  - "Form 2 (integer): `EXEC Program-SLOT` executes the program already loaded in slot 0-3 (corpus: `EXEC 1`, `EXEC 0`). The slot may be any integer expression."
  - "Form 2, the RUNNING slot (`EXEC 0` from the running program): restarts the current program from the top — a fresh re-run (`DIM`/variable init re-executes), the documented 'Loads and executes a program' applied to the running slot. The corpus uses it as the 'restart the game' idiom (`IF DIALOG(\"RETRY?\",1)<0 THEN END ELSE EXEC 0`, 1DVK34J/TXT/HNZBUS). sb-core re-initialises the running slot's globals to their declared-type zeros and discards all execution state (DEF/GOSUB/operand stacks, DATA cursor); per-slot I/O state (graphics/sprites/console) is untouched. Whether real SB clears variables on `EXEC 0` (sb-core's model, the only coherent restart — otherwise the re-run's `DIM` would redim) vs preserves them is oracle-pending: the single-program oracle harness cannot drive a self-restart without a hang."
  - "Control transfer (documented): it is impossible to return from a program started with EXEC to the previous program EXCEPT that a program EXEC'd into a DIFFERENT slot returns to its launcher when it reaches END (or runs off the end of its code) — the two documented bullets together ('impossible to return … to the previous program' + 'possible to return by using END … in another SLOT'). sb-core implements this: a cross-slot EXEC captures the launcher's full resume state (active slot, the pc right after the EXEC statement, operand stack, DEF frames, GOSUB stack, DATA cursor) before handing control to the target slot, and the target's END restores it, resuming the launcher right after the EXEC. This nests (A EXECs B EXECs C → C's END returns to B, B's to A — LIFO). A SAME-slot EXEC (the running-slot restart `EXEC 0`, or `EXEC \"PRG0:…\"` into the running slot) replaces the running program and does NOT return — it is the 'impossible to return to the previous program' case. STOP does not trigger a cross-slot return (only END / end-of-code). EXEC cannot run a program in DIRECT mode."
  - "Using EXEC in DIRECT mode is expected to raise errnum 43 (Can't use from DIRECT mode); a missing program file is expected to raise errnum 46 (Load failed). Both error mappings are hypotheses (not body-pinned) and oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "the NUMERIC slot operand (form 2) is outside 0-3 (`EXEC -1`, `EXEC 4`) — hw_verified" }
  - { errnum: 3, name: "Syntax error", when: "the NUMERIC slot operand names a valid non-running slot that holds NO program (`EXEC 1` on an empty slot) — hw_verified" }
  - { errnum: 4, name: "Illegal function call", when: "the resource STRING (form 1) has an unknown resource type (`EXEC \"FOO:X\"`) — hw_verified; a PRG index past the family is expected to match (oracle-pending)" }
  - { errnum: 46, name: "Load failed", when: "the resource STRING (form 1) names a program file that does not exist (`EXEC \"NOEXISTPROG\"`) — hw_verified" }
  - { errnum: 43, name: "Can't use from DIRECT mode", when: "EXEC is used in DIRECT mode (documented as not usable in DIRECT mode) — hypothesis, oracle-pending" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/exec.md (2 forms: `EXEC \"[Resource name:]File name\"` Resource=PRG0-PRG3 'Loads and executes a program'; `EXEC Program SLOT` 0-3 'Executes a program in a different SLOT'. Notes: 'It is impossible to return from a program started with EXEC to the previous program'; 'It is possible to return by using END in a program started with EXEC in another SLOT'; 'This cannot be used to run a program in DIRECT mode'. Examples `EXEC \"SAMPLE\"`, `EXEC \"PRG0:SBGED\"`, `EXEC 2`)" }
  - { type: hypothesis, ref: "cia_3.6.0.lst EXEC is a special-form keyword, NOT in the builtin dispatch table (disasm.py dispatch EXEC: 'not in dispatch table'); keyword-table entry @0x30689c -> name @0x2ed6c0 (UTF-16 'EXEC'), keyword id 0x14b (331). No standalone handler body was located (parser/VM-internal), so the load/transfer algorithm and errnums are NOT body-pinned." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bEXEC\\b', excludes EXECUTE): both forms are widespread. Form 2 numeric: `EXEC 1` (2D7X32KV/TXT/-GAME-), `EXEC 0` (1DVK34J/TXT/HNZBUS). Form 1 string is any expression: bare variable `EXEC EXE$` (4RYEAXLD/TXT/LOADER), `EXEC FAV$[SELFAV]` (7S3EW3H4/TXT/EDSMILE), concatenation `EXEC \"PRG2:SYS/SBSMILE\"` (1BWX7ENV/TXT/AND-OS), `EXEC \"PRG1:\"+S$` (43SXXEJ3/TXT/-ALPHA_OS-), and computed-slot `EXEC \"PRG\"+STR$(SLOT())+\":MAZENTOMORI\"` (9KX8XDJ6/TXT/MAZENTOMORI). Syntax legal (shipped programs); runtime effect oracle-pending." }
  - { type: community, ref: "osb/SMILEBASIC/VM.d Exec.execute (3.5.0 structural cross-check): for a cross-slot EXEC (`slot != currentSlotNumber`) it saves `execReturnAddress=(currentSlot, pc)` + the launcher's sp/bp/currentFunction/currentData/backtrace into the TARGET slot, then `VM.end()` restores them when the EXEC'd program ends — the structural model sb-core follows for the documented END-returns-across-slots rule. A same-slot EXEC saves no return. Also: a bare-name (no `PRGn:`) file defaults `resourceNumber = currentSlotNumber` (the running slot) — sb-core leaves the bare-name default-slot load deferred/oracle-pending." }
  - { type: hw_verified, ref: "sb-oracle real SB 3.6.0 (2026-06-23): EXEC error model — `EXEC -1`→errnum 10, `EXEC 4`→10 (numeric slot out of range), `EXEC 1`→3 (Syntax error, slot 1 empty on a fresh boot). String form: `EXEC \"FOO:X\"`→4 (unknown resource), `EXEC \"NOEXISTPROG\"`→46 (Load failed, file absent). Captured via run_case.py batch `|err`. The error/validation model is hw_verified; the control transfer itself (load + run) is NOT body-readable in the disassembly. The cross-slot END-returns rule is DOCUMENTED (both forms' notes) and now implemented (cross-slot EXEC saves the launcher's resume state, the target's END restores it, nesting LIFO); the exact resume-state granularity preserved across the return (full operand stack / DEF frames vs only the pc — sb-core preserves all, matching osb's structural model) and per-slot vs shared variable scoping are oracle-pending." }

# Top-level documented: EXEC is a parser-handled special form (keyword id 331) with no
# body-readable handler; both documented forms are syntax-verified in the corpus but the
# load/transfer semantics, DIRECT-mode/load-failed errnums, and runtime effect are oracle-pending.
confidence: documented

tests:
  - { name: slot_negative, code: "EXEC -1", expect: { error: { errnum: 10 } } }
  - { name: slot_too_high, code: "EXEC 4", expect: { error: { errnum: 10 } } }
  - { name: empty_slot, code: "EXEC 1", expect: { error: { errnum: 3 } } }
  - { name: str_unknown_family, code: 'EXEC "FOO:X"', expect: { error: { errnum: 4 } } }
  - { name: str_missing_file, code: 'EXEC "NOEXISTPROG"', expect: { error: { errnum: 46 } } }
