id: PRINT
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: item, type: any, optional: true, desc: "Value/expression to display (number or string)" }
      - { name: more, type: any, optional: true, desc: "Further items separated by ; (no gap) or , (next TABSTEP zone)" }
    note: "PRINT [item [; or , item ...]] — display items on the console. ? is an alias for PRINT."

summary: "Displays values on the text console at the cursor, advancing the cursor. Items are separated by ; (adjacent) or , (tab to the next TABSTEP zone); a trailing separator suppresses the newline."

semantics:
  - "PRINT writes each item to the console at the current cursor position and then moves to the next line, unless the statement ends with a trailing ; or , (which suppresses the newline)."
  - "An empty PRINT (no items) just outputs a newline."
  - "? is an accepted shorthand for PRINT."
  - "Items separated by ; are placed adjacently with no gap; items separated by , advance to the next tab zone (a multiple of the system variable TABSTEP, default 4 — e.g. PRINT \"A\",\"B\" puts B at column 4)."
  - "Numbers print with NO leading sign-space for positives (PRINT 5 puts '5' at the cursor) but DO emit a TRAILING space after the number (PRINT 5 leaves '5' then a space); negatives print a leading '-' (PRINT -5 -> '-5' then a trailing space). Strings print verbatim with no added spaces."
  - "Expressions (arithmetic, function calls) are evaluated and their result printed, e.g. PRINT DX*4+1."
  - "Printing advances CSRX/CSRY; reaching the right edge wraps to the next line; the console scrolls when output passes the bottom row."
  - "Output respects the current text COLOR and LOCATE position."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/print.md (PRINT [expr[;or, expr...]]; ; = adjacent, , = TABSTEP zone; empty = newline; ? alias; expressions allowed)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: PRINT keyword name @0x2ed614 (token-name table region); a parser special form (not in the builtin dispatch table) compiled to console-write VM ops; separators ;/, control inter-item spacing via the TABSTEP system variable" }
  - { type: community, ref: "sbsave corpus: the ? shorthand for PRINT is widely used (~2,020 line-start ? lines); ;/, separators and PRINT of mixed expression lists are pervasive" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5a, console read back via CHKCHR/CSRX): PRINT \"AB\" -> cells (0,0)=A,(1,0)=B; PRINT \"A\";\"B\" -> AB adjacent; PRINT 5 -> '5' at col0 then a SPACE at col1 (trailing space, no leading space); PRINT -5 -> '-5'; PRINT \"A\",\"B\" puts B at column 4 (TABSTEP=4, CSRX=5 after); PRINT \"A\" advances to (0,1); PRINT \"A\"; keeps (1,0); empty PRINT -> (0,1)" }

confidence: hw_verified

tests:
  - { name: print_string, code: "CLS\nPRINT \"AB\"\nPRINT CHR$(CHKCHR(0,0));CHR$(CHKCHR(1,0))", expect: { stdout: "AB" } }
  - { name: print_semicolon_adjacent, code: "CLS\nPRINT \"A\";\"B\"\nPRINT CHR$(CHKCHR(0,0));CHR$(CHKCHR(1,0))", expect: { stdout: "AB" } }
  - { name: print_number_trailing_space, code: "CLS\nPRINT 5\nPRINT CHR$(CHKCHR(0,0));CHR$(CHKCHR(1,0))", expect: { stdout: "5 " } }
  - { name: print_comma_zone, code: "CLS\nPRINT \"A\",\"B\";\nPRINT CSRX", expect: { stdout: "5" } }
  - { name: print_advances_line, code: "CLS\nPRINT \"A\"\nPRINT CSRX;\",\";CSRY", expect: { stdout: "0,1" } }
  - { name: print_trailing_semicolon_no_newline, code: "CLS\nPRINT \"A\";\nPRINT CSRX;\",\";CSRY", expect: { stdout: "1,0" } }
  - { name: print_empty_newline, code: "CLS\nPRINT\nPRINT CSRX;\",\";CSRY", expect: { stdout: "0,1" } }
