id: GBOX
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x1, type: integer, desc: "Start (corner) X" }
      - { name: y1, type: integer, desc: "Start (corner) Y" }
      - { name: x2, type: integer, desc: "End (opposite corner) X" }
      - { name: y2, type: integer, desc: "End (opposite corner) Y" }
      - { name: color, type: integer, optional: true, desc: "32-bit ARGB color; if omitted, the current GCOLOR is used" }
    note: "GBOX x1,y1, x2,y2 [, color] — draw a rectangle OUTLINE."

summary: "Draws the OUTLINE of a rectangle with opposite corners (x1,y1) and (x2,y2). The interior is NOT filled (use GFILL for a filled box)."

semantics:
  - "GBOX draws the four edges of the axis-aligned rectangle between the two corner points; the interior is left untouched (outline only)."
  - "An optional color argument overrides the current GCOLOR for this call."
  - "Pixels are stored as RGBA5551 (GSPOIT read-back is rounded); drawing respects the write clip ([[gclip]])."
  - "Contrast [[gfill]], which fills the rectangle's interior."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gbox.md (GBOX SX,SY,EX,EY[,ColorCode]; draws a quadrangle; color per GCOLOR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GBOX handler FUN_00154ed0/@0x155110: draws the rectangle edges (outline) into the manipulation page" }
  - { type: community, ref: "sbsave corpus: GBOX common (~2,318 lines) for rectangle outlines (UI frames)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7b): GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GBOX 0,0,10,10 -> the corners and edges are set (GSPOIT(0,0)!=0, GSPOIT(5,0)!=0, GSPOIT(0,5)!=0) but the INTERIOR is empty (GSPOIT(5,5)=0) — confirming outline, not fill" }

confidence: hw_verified

tests:
  - { name: gbox_corner_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGBOX 0,0,10,10\nPRINT GSPOIT(0,0)!=0", expect: { stdout: "1" } }
  - { name: gbox_edge_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGBOX 0,0,10,10\nPRINT (GSPOIT(5,0)!=0)*(GSPOIT(0,5)!=0)", expect: { stdout: "1" } }
  - { name: gbox_interior_empty, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGBOX 0,0,10,10\nPRINT GSPOIT(5,5)", expect: { stdout: "0" } }
