id: RND
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: max, type: integer, range: "0..", desc: "Exclusive upper bound" }
    returns: { type: integer, desc: "Random integer in 0 .. max-1" }
    note: "Single-arg form uses random series 0."
  - args:
      - { name: seed_id, type: integer, range: "0-7", desc: "Random series index" }
      - { name: max, type: integer, range: "0..", desc: "Exclusive upper bound" }
    returns: { type: integer, desc: "Random integer in 0 .. max-1 drawn from series seed_id" }

summary: "Returns a random Integer in the range 0 to max-1, drawn from one of 8 TinyMT random series."

semantics:
  - "Each of the 8 series (0-7) is an independent TinyMT128 generator (16-byte state, table @0x1d08000); series default to entropy-seeded at startup, so RND output is non-deterministic unless the series was first set with RANDOMIZE seed_id, seed_value."
  - "Arguments are coerced to Integer; max is the exclusive upper bound, so the result lies in 0 .. max-1."
  - "RND(1) is therefore always 0 (the only value in range 0..0)."
  - "The single-argument form draws from series 0; the two-argument form selects the series."
  - "Reduction to range is an unbiased modulo via the helper @0x1fd4e8 on the raw 32-bit TinyMT output (@0x1ef958)."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1 or 2" }
  - { errnum: 10, name: OutOfRange, when: "seed_id is outside 0-7, or max is negative" }
  - { errnum: 8, name: TypeMismatch, when: "an argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/rnd.md (RND([Seed ID,] Maximum value); Seed ID 0-7)" }
  - { type: disassembled, ref: "cia_3.6.0.lst RND handler @0x148a18; argcount!=1,2 -> errnum 4 (@0x148a60); args coerced to int (vtable +0x40); max<0 -> errnum 10 (@0x148a9c); seed_id>=8 -> errnum 10 (@0x148b08); core @0x1eb598 indexes 16-byte/series state table @0x1d08000, draws via TinyMT next @0x1ef958, reduces with @0x1fd4e8" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22 (errors + degenerate range only): RND(1)=0; RND(-1) -> errnum 10; RND(8,5) -> errnum 10; RND(\"x\") -> errnum 8. The TinyMT random SEQUENCE itself is non-deterministic without prior RANDOMIZE and is NOT frozen here (queued: seeded-sequence harvest)." }

# Range/error behavior is hw_verified, but the random-sequence algorithm (the heart of RND)
# is only disassembled — it cannot be frozen as a deterministic golden. Keep at disassembled.
confidence: disassembled

tests:
  - { name: rnd_one_is_zero, code: "PRINT RND(1)", expect: { stdout: "0" } }
  - { name: negative_out_of_range, code: "A=RND(-1)", expect: { error: { errnum: 10 } } }
  - { name: seed_id_out_of_range, code: "A=RND(8,5)", expect: { error: { errnum: 10 } } }
  - { name: string_type_mismatch, code: 'A=RND("x")', expect: { error: { errnum: 8 } } }
