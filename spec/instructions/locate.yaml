id: LOCATE
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, range: "0..49", optional: true, desc: "Console column (0-49); if omitted, keeps the previous X" }
      - { name: y, type: integer, range: "0..29", optional: true, desc: "Console row (0-29); if omitted, keeps the previous Y" }
      - { name: z, type: integer, range: "-256..1024", optional: true, desc: "Depth (rear 1024 < surface 0 < front -256); if omitted, keeps the previous Z" }
    note: "LOCATE [x],[y][,z] — set the console text cursor position."

summary: "Sets the console character cursor to (x,y) with optional depth z. Subsequent PRINT output starts there. Omitted coordinates keep their previous value."

semantics:
  - "LOCATE x,y moves the text cursor to column x (0-49) and row y (0-29); the next PRINT begins at that cell."
  - "Either coordinate may be omitted (LOCATE ,y or LOCATE x) to keep the previous value for that axis."
  - "The optional z sets the text depth: rear=1024, screen surface=0, front=-256; omitted keeps the previous z."
  - "The current cursor position is readable via the system variables CSRX, CSRY, CSRZ."
  - "Coordinates outside the console range raise errnum 10 (Out of range) — oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "a coordinate is outside its valid range (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/locate.md (LOCATE [X],[Y][,Z]; X 0-49, Y 0-29; Z rear 1024..front -256; omitted keeps previous)" }
  - { type: disassembled, ref: "cia_3.6.0.lst LOCATE handler FUN_0014baf0 @0x14baf0: sets the console cursor X/Y/(Z) state read back through CSRX/CSRY/CSRZ" }
  - { type: community, ref: "sbsave corpus: LOCATE is ubiquitous for console UI; LOCATE x,y the common form, with expression coordinates and the LOCATE ,y / depth-z variants in use" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5a): LOCATE 20,15 -> CSRX=20,CSRY=15; CLS:LOCATE 3,2:PRINT \"X\" places 'X' at console cell (3,2) (CHKCHR(3,2)='X')" }

confidence: hw_verified

tests:
  - { name: locate_sets_cursor, code: "LOCATE 20,15\nPRINT CSRX;\",\";CSRY", expect: { stdout: "20,15" } }
  - { name: locate_positions_print, code: "CLS\nLOCATE 3,2\nPRINT \"X\"\nPRINT CHR$(CHKCHR(3,2))", expect: { stdout: "X" } }
