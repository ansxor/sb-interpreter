id: "SPANIM"
kind: statement
category: "Sprites"
system: "SmileBASIC 3"
summary: "Displays animation with a sprite (using animation data specified with an array) If used before SPSET, an error will occur"
semantics:
  - "Animation waits for a specified time, according to the value input"
  - "Animation starts from the frame following SPANIM execution"
  - "Up to 32 pieces of data will be accepted for each target element"
  - "If a negative value is specified for time, linear interpolation from the previous value will occur"
forms:
  - format: "SPANIM Management number,\"Animation target\",Data array [,Loop]"
    description: "Displays animation with a sprite (using animation data specified with an array) If used before SPSET, an error will occur"
    args:
      - { name: "Management number", desc: "Management number of the sprite for which to set the animation: 0-511" }
