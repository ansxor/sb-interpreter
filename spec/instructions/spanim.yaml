id: SPANIM
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — animation data supplied in a numeric array.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: target, type: any, desc: "Animation target: a number 0..7 or the matching string. 0/\"XY\" XY-coords, 1/\"Z\" Z-coord, 2/\"UV\" source UV, 3/\"I\" definition number, 4/\"R\" rotation, 5/\"S\" scale XY, 6/\"C\" display color, 7/\"V\" internal variable 7. Add 8 to the number (or suffix the string with \"+\") to make the values RELATIVE to the runtime value." }
      - { name: data, type: num_array, desc: "1-D numeric array holding the keyframes in the order Time1,Item1[,Item2],Time2,Item1[,Item2],... (XY/UV/S take 2 items per keyframe; Z/I/R/C/V take 1). Up to 32 keyframes." }
      - { name: loop, type: integer, optional: true, default: 1, desc: "Loop count (1+). 0 means loop endlessly." }
    note: "SPANIM mgmt, target, data_array [,loop] — animate from an array."
  # Form 2 — animation data read from DATA statements via an @label string.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: target, type: any, desc: "Animation target (see form 1)." }
      - { name: label, type: string, desc: "\"@Label\" string naming the first DATA line of the animation. The first DATA value is the keyframe count, then Time,Item[,Item] per keyframe." }
      - { name: loop, type: integer, optional: true, default: 1, desc: "Loop count (1+). 0 means endless." }
    note: "SPANIM mgmt, target, \"@LABEL\" [,loop] — animate from DATA."
  # Form 3 — animation data given inline as a variable-length argument list.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: target, type: any, desc: "Animation target (see form 1)." }
      - { name: keyframes, type: varargs, desc: "Inline keyframes: Time1,Item1[,Item2][,Time2,Item1[,Item2]]... Up to 32 keyframes." }
      - { name: loop, type: integer, optional: true, default: 1, desc: "Loop count (1+). 0 means endless. (Disambiguated by the items-per-keyframe count of the target.)" }
    note: "SPANIM mgmt, target, Time,Item[,Item],... [,loop] — animate inline."

summary: "Defines and starts a sprite animation: a sequence of up to 32 keyframes that vary one target channel (XY position, Z, UV, definition I, rotation R, scale S, color C, or internal variable V) over time. Each keyframe is a Time followed by 1 or 2 Items; a POSITIVE time holds for that many frames, a NEGATIVE time linearly interpolates over that many frames (smooth). Adding 8 to the numeric target (or suffixing the string target with \"+\") makes the items RELATIVE to the sprite's current runtime value. Data can come from a numeric array, an \"@label\" pointing at DATA lines, or an inline argument list. The animation begins on the frame after SPANIM. Requires at least 3 arguments and returns nothing; using it on a sprite that has not been SPSET raises an error."

semantics:
  - "Argument-count / return-count gate: r6=argcount [r0,#0x4], the return count is [r0,#0xc]. The handler requires argcount>=3 AND return-count==0 (cmp r6,#0x3 / cmpge r0,#0x0 / beq @0x141fc0); anything else raises errnum 4 (Illegal function call) with errline -1 (mvn r1,#0x0 / mov r0,#0x4 / bl 0x1fffdc @0x141fac-0x141fb4)."
  - "Management number is resolved by the shared sprite-index getter FUN_001eece0 (bl 0x1eece0 @0x141fd0); a value outside 0..511 raises errnum 10 (Out of range). The slot address is base[0x1423b8] + (mgmt + page_base[0x44]) * 0x48 (rsb r1,r0,r0,lsl#5 / add r0,r1,r0,lsl#8 / add r4,r1,r0,lsl#3 @0x141ff8-0x142004)."
  - "Sprite must exist: tst r0,#0x80000000 on the slot flags [r4,#0x4] @0x14200c; if the active bit is clear the handler raises errnum 4 (used before SPSET) — mov r0,#0x4 / bl 0x1fffdc @0x142054-0x142060."
  - "Target may be a number OR a string. A string target ('XY','Z','UV','I','R','S','C','V', optionally with a trailing '+') is parsed to a number via FUN_001836cc (@0x1420a8); a non-string/non-numeric target raises errnum 8 (Type mismatch) (mov r0,#0x8 / bl 0x1fffdc @0x1420d8). The resolved target is validated: ldr r0,[sp,#0xc] / cmp r0,#0 / bge @0x1420ec, a negative result raises errnum 4 with errline 1 (mov r1,#1 / mov r0,#0x4 @0x1420bc-0x1420c4)."
  - "Relative flag and channel: mov r1,r0,lsl#0x1c then r8=r1,lsr#0x1f extracts bit 3 (the +8 / '+' relative flag); and r0,r0,#0x7 masks the target to the channel 0..7 (@0x1420ec-0x1420f4). A switch over the 8 channels (switchD @0x142118, jump table @0x142120) builds the per-channel keyframe list and sets the channel's anim-active flag bit in [r4,#0x4] (e.g. orr #0x20000 for XY @0x142188, orr #0x40000 for Z @0x1421dc)."
  - "Keyframe list is built from the variadic data by helpers FUN_001ee360 / FUN_001ee1a8 (the number of data arguments is r6-2, sub r1,r6,#0x2 @0x142178); each channel reads the sprite's current value (e.g. vldr.32 s0,[r4,#0x30]/[r4,#0x34] for XY, vcvt.s32.f32) as the base for relative animation. Up to 32 keyframes are accepted per target (documented cap). Time is the per-keyframe duration: positive = hold that many frames, negative = linear interpolation over |time| frames."
  - "The animation starts on the frame FOLLOWING the SPANIM call (documented), and runs once unless a Loop count is given; Loop 0 means loop endlessly. SPSTOP pauses it and SPSTART resumes it (they toggle the 0x2000000 stop bit, see [[spstop]]/[[spstart]])."
  - "SPCHK readback (hw_verified 2026-06-24, spanim.tsv): the per-channel anim-active orr bits are CONTIGUOUS — XY 0x20000 (bit 17), Z 0x40000, UV 0x80000, I 0x100000, R 0x200000, S 0x400000, C 0x800000, V 0x1000000 (bit 24) — and [[spchk]] returns (flags>>17)&0xFF, so SPCHK = `1<<channel` = the documented #CHK* bits (XY 1, Z 2, UV 4, I 8, R 16, S 32, C 64, V 128). The flag is set AT the SPANIM call (before the first advancing frame), so SPCHK reads the bit immediately with no VSYNC. Multiple channels OR together (Z+R → SPCHK 18, XY+V → 129, UV+I → 12). Unlike BG (whose layout is compacted, no UV/I channel — run 53), the sprite layout has all 8 channels and matches the docs exactly. Numeric and string targets, and the relative '+8'/trailing-'+' forms, all set the same channel bit (the +8 bit is masked off by `and r0,r0,#0x7`). Animations are per-sprite-slot independent."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the sprite has not been SPSET, fewer than 3 arguments are given, fewer than one keyframe's worth of data is supplied for the channel, the call is used in a return context, the resolved target number is negative, an unknown target string is given, or the target argument is a non-number/non-string value such as an array. hw_verified (spanim.tsv): a whole-array target gives errnum 4 here — UNLIKE BGANIM, which gives errnum 8 for the same array-target shape (a genuine handler difference; SPANIM's array target never reaches the keyframe-data type check)." }
  - { errnum: 8, name: "Type mismatch", when: "a keyframe DATA value (an Item) is not numeric, OR the trailing inline LOOP count is not numeric, OR (form-1 array) a keyframe TIME is not numeric. hw_verified (sbo2d.tsv / sb64u_arr.tsv / sb64u_loop.tsv): `SPANIM 0,\"XY\",10,\"S\",5` → errnum 8, `SPANIM 0,\"Z\",10,\"S\"` → errnum 8, inline `SPANIM 0,1,10,\"NOPE\"` → errnum 8 (item, all errline 1); `DIM A[4]:A[0]=\"S\":...:SPANIM 0,\"XY\",A` → errnum 8 (form-1 array TIME — NOT 34, the array path uses the numeric getter); `SPANIM 0,\"XY\",10,5,5,\"NOPE\"` → errnum 8 (inline loop count). NOTE: a non-number/non-string TARGET argument is errnum 4 (see above), NOT errnum 8; and an INLINE (form-3) TIME is errnum 34, not 8 (see below)." }
  - { errnum: 10, name: "Out of range", when: "the management number is not in 0..511, or a keyframe time/item is outside the ±32768 fixed-point range" }
  - { errnum: 34, name: "Illegal symbol string", when: "an INLINE (form-3) keyframe TIME is a non-numeric value. hw_verified (sb64u.tsv 2026-06-26): `SPANIM 0,\"XY\",\"S\",5,5` and `SPANIM 0,1,\"S\",5` → errnum 34 errline 1 — the inline TIME slot is parsed through the same symbol/label-string getter as GOTO/GOSUB, distinct from the keyframe-ITEM value getter (errnum 8). ONLY the inline form raises 34: the form-1 ARRAY path raises errnum 8 for the same non-numeric time (sb64u_arr.tsv), because array data is read through the numeric value getter, not the label-string one. The trailing inline LOOP count is also errnum 8, not 34 (sb64u_loop.tsv)." }
  - { errnum: 39, name: "Animation is too long", when: "more than 32 keyframes are supplied for the target" }
  - { errnum: 40, name: "Illegal animation data", when: "a keyframe has a zero duration (time == 0)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spanim.md (3 forms: array / \"@label\" DATA / inline; mgmt 0-511; target 0|XY,1|Z,2|UV,3|I,4|R,5|S,6|C,7|V; '+8' or trailing '+' = relative; data order Time,Item[,Item]; up to 32 keyframes; negative time = linear interpolation; Loop 1- with 0 = endless; 'animation starts from the frame following SPANIM'; 'If used before SPSET, an error will occur')" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPANIM handler @0x141f80: gate argcount>=3 && ret==0 cmp r6,#0x3 cmpge r0,#0x0 beq @0x141fc0 else mov r0,#0x4 bl 0x1fffdc errline -1 @0x141fb0; mgmt via FUN_001eece0 bl 0x1eece0 @0x141fd0 (errnum 10); slot base[0x1423b8]+(mgmt+[0x44])*0x48 @0x141ff8; active-bit guard tst r0,#0x80000000 [r4,#0x4] @0x14200c beq -> mov r0,#0x4 bl 0x1fffdc errnum 4 @0x142054 (used before SPSET); string target parse bl 0x1836cc @0x1420a8, bad type mov r0,#0x8 bl 0x1fffdc errnum 8 @0x1420d8; negative target mov r1,#1 mov r0,#0x4 errnum 4 @0x1420bc; relative bit mov r1,r0,lsl#0x1c lsr#0x1f and r0,r0,#0x7 @0x1420ec; channel switch switchD @0x142118 table @0x142120 sets anim-active flags orr #0x20000/#0x40000 [r4,#0x4]; keyframe build bl 0x1ee360 / bl 0x1ee1a8, data count r6-2 sub r1,r6,#0x2 @0x142178; state ptr 0x315d60 [0x1423b4], sprite-base [0x1423b8]." }
  - { type: disassembled, ref: "cia_3.6.0.lst SPANIM keyframe builders (M3-T2): inline/array builder FUN @0x163a00 — fewer than one keyframe's data cmp r6,#0x3 / bge @0x163a20 else mov r0,#0x4 @0x163a34 (errnum 4); keyframe count r4=data/stride cmp r4,#0x20 / ble else mov r0,#0x27 @0x163a68 (errnum 39 too long); the per-keyframe store loop @0x1638e0-0x1639d0 sxth-truncates each time/item to 16 bits and range-checks ±32768 -> mov r0,#0xa @0x163960 (errnum 10), and a zero time cmp r1,#0 / beq @0x1639d4 -> mov r0,#0x28 @0x1639e4 (errnum 40 illegal animation data); the relative add (add r0,r0,parent_xy @0x1639a8) confirms the +8 base. DATA-form builder FUN @0x163cf0 — count must be a whole number of keyframes cmn r1,r0 / beq else mov r0,#0x4 @0x163d38, >32 mov r0,#0x27 @0x163d54, bad item type mov r0,#0x8 @0x163d98." }
  - { type: community, ref: "osb/SMILEBASIC/sprite.d SpriteAnimState/SpriteAnimData, SpriteAnimTarget enum (XY..V, .relative flag), setAnimation(loop) (3.5.0 structural cross-check only)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8c): SPCLR:SPANIM 5,\"XY\",10,0,0 -> errnum 4 (used before SPSET); SPSET 0,0:SPANIM 0,\"XY\" -> errnum 4 (fewer than 3 args); SPSET 0,0:SPANIM 512,\"XY\",10,0,0 -> errnum 10 (mgmt out of range)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (spanim.tsv, M7-T2): channel-activation contract read back through [[spchk]] = (flags>>17)&0xFF. Each numeric target 0..7 sets SPCHK exactly 1/2/4/8/16/32/64/128 (the docs' #CHK* bits — sprite layout is the full contiguous 8 channels, NOT BG's compacted layout); string targets XY/UV/I/V → same 1/4/8/128; relative forms (\"XY+\"/\"V+\"/8/12) keep the same channel (1/128/1/16); multiple SPANIMs OR (Z+R=18, XY+V=129, UV+I=12); per-sprite independence (SPANIM on sprite 1 leaves SPCHK(0)=0). Guards: before-SPSET / too-few-args / unknown-target-string \"ZZ\" / negative-target / return-context → errnum 4 errline 1; mgmt 512 / -1 → errnum 10; zero-time keyframe → errnum 40; a NON-NUMERIC KEYFRAME value (`SPANIM 0,\"XY\",10,\"S\",5`) → errnum 8 errline 1. KEY DISCOVERY: a whole-array TARGET (`DIM AR[2]:SPANIM 0,AR,10,0,0`) → errnum 4 (NOT errnum 8 — BGANIM gives 8 for the identical shape; caught a sb-core bug where the shared parse_target returned errnum 8 for both)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-26 (sbo2d, harness/harvest/out/sbo2d.tsv): SPANIM non-numeric data errnum, builder @0x163d98. A non-numeric keyframe ITEM value → errnum 8 (Type mismatch) errline 1 in ALL forms — `SPANIM 0,\"XY\",10,\"S\",5` (XY, 2-item) errnum 8; `SPANIM 0,\"Z\",10,\"S\"` (Z, 1-item) errnum 8; inline `SPANIM 0,1,10,\"NOPE\"` (numeric target 1=Z) errnum 8. NEW FINDING: a non-numeric keyframe TIME (not item) → errnum 34 (Illegal symbol string), NOT errnum 8 — `SPANIM 0,\"XY\",\"S\",5,5` errnum 34 errline 1 (the time slot is parsed as a symbol/label-string context, so a bad string there is errnum 34, the same error GOTO/GOSUB raise for a malformed label). Confirms the assumption 'VM values_to_f64 raises errnum 8' holds for ITEMS, with the TIME path being a distinct errnum-34 site." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-26 (sb64u / sb64u_arr / sb64u_loop, harness/harvest/out/): the errnum-34 path is ONLY the inline form-3 TIME slot. Inline TIME non-numeric → errnum 34 errline 1 for BOTH string and numeric targets (`SPANIM 0,\"XY\",\"S\",5,5` and `SPANIM 0,1,\"S\",5`); inline ITEM non-numeric → errnum 8 (`SPANIM 0,1,10,\"NOPE\"`, `SPANIM 0,\"XY\",10,\"S\",5`). Form-1 ARRAY: a non-numeric array TIME → errnum 8 (NOT 34) — `DIM A[4]:A[0]=\"S\":A[1]=5:A[2]=10:A[3]=5:SPANIM 0,\"XY\",A` errnum 8; same for `\"Z\"` 1-item — so array data goes through the numeric getter, not the label-string one. The trailing inline LOOP count (leftover after whole keyframes) is a plain integer → non-numeric raises errnum 8, not 34 (`SPANIM 0,\"XY\",10,5,\"NOPE\"` errnum 8; numeric `...,2` and string-coercible `...,\"3\"` NOERR). Matches disasm: inline builder FUN_00163a00 reads time/items via getters @0x163a78-0x163ab8; the errnum-34 site is the time getter itself (the label-string parser), distinct from the item value getter @0x163d98." }
  - { type: community, ref: "sbsave corpus: SPANIM used heavily. Confirms numeric targets `SPANIM 254,6,-10,0` (e.g. ______LAUNCHER), string targets `SPANIM 0,\"UV\",8,...`, RELATIVE string target `SPANIM SPN%,\"XY+\"` and `SPANIM 250,\"I+\",\"@_WALK10\"`, the DATA-label form `SPANIM 115,3,\"@ANIM_M1\"`, inline-vararg form `SPANIM 0,\"XY\",-60,200,100,-30,50,20`, negative time (smooth) `SPANIM 0,\"UV\",-1,0+UGH,72`, fractional items `SPANIM 0,5,-15,.8,.8`, and array-element values `SPANIM 10,6,30,0,-10,CYMA_THMSCH%[12]` — proving these forms are LEGAL syntax. The management number is any integer EXPRESSION: function calls `SPANIM SPVAR(N,3),\"C\",...` / `SPANIM SPHITSP(CALLIDX),5,...` / `SPANIM RND(6)+50,\"XY\",...` and arithmetic array indices `SPANIM MONMN[NUMMON-1],\"I\",...` (verified word-boundary rg, ~28 fn-call + 314 arith-index uses). Exact interpolation output is oracle-pending." }

confidence: hw_verified

tests:
  # --- SPCHK channel-bit readback (hw_verified 2026-06-24, spanim.tsv): sprite has all 8
  # contiguous channels, so each SPANIM target sets SPCHK = 1<<channel = the documented #CHK* bit.
  - { name: chk_num_xy, code: "SPSET 0,0\nSPANIM 0,0,60,100,100,0\nPRINT SPCHK(0)", expect: { stdout: "1" } }
  - { name: chk_num_z, code: "SPSET 0,0\nSPANIM 0,1,60,100,0\nPRINT SPCHK(0)", expect: { stdout: "2" } }
  - { name: chk_num_uv, code: "SPSET 0,0\nSPANIM 0,2,60,50,50,0\nPRINT SPCHK(0)", expect: { stdout: "4" } }
  - { name: chk_num_i, code: "SPSET 0,0\nSPANIM 0,3,60,1,0\nPRINT SPCHK(0)", expect: { stdout: "8" } }
  - { name: chk_num_r, code: "SPSET 0,0\nSPANIM 0,4,60,90,0\nPRINT SPCHK(0)", expect: { stdout: "16" } }
  - { name: chk_num_s, code: "SPSET 0,0\nSPANIM 0,5,60,2,2,0\nPRINT SPCHK(0)", expect: { stdout: "32" } }
  - { name: chk_num_c, code: "SPSET 0,0\nSPANIM 0,6,60,15,0\nPRINT SPCHK(0)", expect: { stdout: "64" } }
  - { name: chk_num_v, code: "SPSET 0,0\nSPANIM 0,7,60,5,0\nPRINT SPCHK(0)", expect: { stdout: "128" } }
  # string targets resolve to the same channel bit
  - { name: chk_str_xy, code: "SPSET 0,0\nSPANIM 0,\"XY\",60,100,100,0\nPRINT SPCHK(0)", expect: { stdout: "1" } }
  - { name: chk_str_uv, code: "SPSET 0,0\nSPANIM 0,\"UV\",60,50,50,0\nPRINT SPCHK(0)", expect: { stdout: "4" } }
  - { name: chk_str_i, code: "SPSET 0,0\nSPANIM 0,\"I\",60,1,0\nPRINT SPCHK(0)", expect: { stdout: "8" } }
  - { name: chk_str_v, code: "SPSET 0,0\nSPANIM 0,\"V\",60,5,0\nPRINT SPCHK(0)", expect: { stdout: "128" } }
  # relative forms ('+8' / trailing '+') keep the SAME channel (the +8 bit is masked off)
  - { name: chk_rel_str_xy, code: "SPSET 0,0\nSPANIM 0,\"XY+\",60,100,100,0\nPRINT SPCHK(0)", expect: { stdout: "1" } }
  - { name: chk_rel_str_v, code: "SPSET 0,0\nSPANIM 0,\"V+\",60,5,0\nPRINT SPCHK(0)", expect: { stdout: "128" } }
  - { name: chk_rel_num_xy, code: "SPSET 0,0\nSPANIM 0,8,60,100,100,0\nPRINT SPCHK(0)", expect: { stdout: "1" } }
  - { name: chk_rel_num_r, code: "SPSET 0,0\nSPANIM 0,12,60,90,0\nPRINT SPCHK(0)", expect: { stdout: "16" } }
  # multiple channels OR together in the running-bit mask
  - { name: chk_multi_zr, code: "SPSET 0,0\nSPANIM 0,1,60,100,0\nSPANIM 0,4,60,90,0\nPRINT SPCHK(0)", expect: { stdout: "18" } }
  - { name: chk_multi_xyv, code: "SPSET 0,0\nSPANIM 0,\"XY\",60,100,100,0\nSPANIM 0,\"V\",60,5,0\nPRINT SPCHK(0)", expect: { stdout: "129" } }
  - { name: chk_multi_uvi, code: "SPSET 0,0\nSPANIM 0,2,60,50,50,0\nSPANIM 0,3,60,1,0\nPRINT SPCHK(0)", expect: { stdout: "12" } }
  # per-sprite independence
  - { name: chk_sp1_self, code: "SPSET 1,0\nSPANIM 1,0,60,100,100,0\nPRINT SPCHK(1)", expect: { stdout: "1" } }
  - { name: chk_sp1_iso, code: "SPSET 0,0\nSPSET 1,0\nSPANIM 1,0,60,100,100,0\nPRINT SPCHK(0)", expect: { stdout: "0" } }
  # --- shape / range / type / data guards (hw_verified 2026-06-24, spanim.tsv) ---
  - { name: before_spset, code: "SPCLR\nSPANIM 5,\"XY\",10,0,0", expect: { error: { errnum: 4 } } }
  - { name: too_few_args, code: "SPSET 0,0\nSPANIM 0,\"XY\"", expect: { error: { errnum: 4 } } }
  - { name: mgmt_out_of_range, code: "SPSET 0,0\nSPANIM 512,\"XY\",10,0,0", expect: { error: { errnum: 10 } } }
  - { name: mgmt_negative, code: "SPSET 0,0\nSPANIM -1,\"XY\",10,0,0", expect: { error: { errnum: 10 } } }
  - { name: neg_target, code: "SPSET 0,0\nSPANIM 0,-1,10,5", expect: { error: { errnum: 4 } } }
  - { name: bad_target_string, code: "SPSET 0,0\nSPANIM 0,\"ZZ\",10,5", expect: { error: { errnum: 4 } } }
  # Zero-time keyframe → errnum 40 (keyframe builder @0x1639e4).
  - { name: zero_time_illegal, code: "SPSET 0,0\nSPANIM 0,\"XY\",0,100,50", expect: { error: { errnum: 40 } } }
  # A whole-array target → errnum 4 (NOT errnum 8 — distinct from BGANIM); caught a sb-core bug.
  - { name: array_target_illegal, code: "SPSET 0,0\nDIM AR[2]\nSPANIM 0,AR,10,0,0", expect: { error: { errnum: 4 } } }
  # A non-numeric keyframe DATA value → errnum 8 (the only errnum-8 path).
  - { name: nonnumeric_keyframe, code: "SPSET 0,0\nSPANIM 0,\"XY\",10,\"S\",5", expect: { error: { errnum: 8 } } }
  - { name: nonnumeric_keyframe_z, code: "SPSET 0,0\nSPANIM 0,\"Z\",10,\"S\"", expect: { error: { errnum: 8 } } }
  - { name: nonnumeric_keyframe_inline, code: "SPSET 0,0\nSPANIM 0,1,10,\"NOPE\"", expect: { error: { errnum: 8 } } }
  # A non-numeric keyframe TIME → errnum 34 (Illegal symbol string), NOT errnum 8. The inline
  # TIME slot is parsed as a symbol/label-string context (same getter as GOTO/GOSUB), distinct
  # from the ITEM value getter (errnum 8). hw_verified 2026-06-26 (sb64u.tsv): both string and
  # numeric targets raise 34 — `SPANIM 0,"XY","S",5,5` and `SPANIM 0,1,"S",5` (errline 1).
  - { name: nonnumeric_time, code: "SPSET 0,0\nSPANIM 0,\"XY\",\"S\",5,5", expect: { error: { errnum: 34 } } }
  - { name: nonnumeric_time_numtgt, code: "SPSET 0,0\nSPANIM 0,1,\"S\",5", expect: { error: { errnum: 34 } } }
  # The inline LOOP count (trailing leftover) is a plain integer — a non-numeric value raises
  # errnum 8, NOT 34 (it is not a symbol-string context). hw_verified 2026-06-26 (sb64u_loop.tsv).
  - { name: nonnumeric_loop, code: "SPSET 0,0\nSPANIM 0,\"XY\",10,5,\"NOPE\"", expect: { error: { errnum: 8 } } }
  # Form-1 (array) TIME is NOT a symbol-string context: a non-numeric array TIME raises errnum 8,
  # not 34 — only the INLINE form-3 path routes time through the label-string getter.
  # hw_verified 2026-06-26 (sb64u_arr.tsv).
  - { name: nonnumeric_array_time, code: "SPSET 0,0\nDIM A[4]\nA[0]=\"S\"\nA[1]=5\nA[2]=10\nA[3]=5\nSPANIM 0,\"XY\",A", expect: { error: { errnum: 8 } } }
  # Form dispatch on a STRING args[2]: a leading `@` is form-2 (label lookup → errnum 14 if
