# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: SINH
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Real number" }
    returns: { type: double, desc: "Hyperbolic sine of value" }

summary: "Returns the hyperbolic sine of value."

semantics:
  - "sinh(value) = (e^value - e^-value) / 2; result is always Double."
  - "SINH(0)=0, SINH(1)=1.1752."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sinh.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: SINH(0)=0, SINH(1)=1.1752", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: zero, code: "PRINT SINH(0)", expect: { stdout: "0" } }
  - { name: one,  code: "PRINT SINH(1)", expect: { stdout: "1.1752" } }
  - { name: string_type_mismatch, code: 'A=SINH("x")', expect: { error: { errnum: 8 } } }
