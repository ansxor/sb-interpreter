id: GCOPY
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: src_page, type: integer, range: "-1..5", optional: true, desc: "Source GRP page (0-5, or -1 for GRPF/font); if omitted, the current drawing page" }
      - { name: sx, type: integer, desc: "Source rectangle start X" }
      - { name: sy, type: integer, desc: "Source rectangle start Y" }
      - { name: ex, type: integer, desc: "Source rectangle end X" }
      - { name: ey, type: integer, desc: "Source rectangle end Y" }
      - { name: dx, type: integer, desc: "Destination start X (on the current manipulation page)" }
      - { name: dy, type: integer, desc: "Destination start Y" }
      - { name: copy_mode, type: integer, desc: "TRUE: copy the transparent color too; FALSE: skip transparent pixels" }
    note: "GCOPY [src_page,] sx,sy, ex,ey, dx,dy, copy_mode — copy a rectangular region between/within GRP pages."

summary: "Copies a rectangular image region (from another GRP page or the current one) to a destination on the current manipulation page. copy_mode controls whether transparent pixels overwrite the destination."

semantics:
  - "GCOPY copies the source rectangle (sx,sy)-(ex,ey) to the destination starting at (dx,dy) on the current manipulation page."
  - "The optional leading source page (0-5, or -1 for the font page GRPF) selects where to copy FROM; if omitted, the current drawing page is the source."
  - "copy_mode TRUE copies transparent pixels as-is (overwriting the destination with transparency); FALSE leaves the destination unchanged where the source is transparent (a masked blit)."
  - "Pixels are RGBA5551 (GSPOIT read-back rounded); the copy respects the write clip ([[gclip]])."
  - "The source region is left intact; only the destination is written."

errors:
  - { errnum: 10, name: "Out of range", when: "the source page is outside -1..5 (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gcopy.md (GCOPY [SrcPage,]SX,SY,EX,EY,DX,DY,CopyMode; src page 0-5/-1; CopyMode TRUE copies transparent)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GCOPY handler FUN_00152e9c @0x152e9c: blits the source rectangle to the destination on the manipulation page, honoring the transparent-copy mode" }
  - { type: community, ref: "sbsave corpus: GCOPY common for blitting between GRP pages (incl. src page -1/font, masked vs transparent copy modes)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7d): GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GPSET 5,5:GCOPY 0,0,10,10,100,100,1 -> the destination pixel (105,105) is set (GSPOIT!=0, the source (5,5) was copied with the same offset) and the source pixel (5,5) is preserved (GSPOIT!=0)" }

confidence: hw_verified

tests:
  - { name: gcopy_dest_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPSET 5,5\nGCOPY 0,0,10,10,100,100,1\nPRINT GSPOIT(105,105)!=0", expect: { stdout: "1" } }
  - { name: gcopy_source_preserved, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPSET 5,5\nGCOPY 0,0,10,10,100,100,1\nPRINT GSPOIT(5,5)!=0", expect: { stdout: "1" } }
