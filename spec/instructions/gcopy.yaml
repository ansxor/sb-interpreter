id: GCOPY
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x1, type: integer, range: "graphic-page coordinate (visible 0-399 x, 0-239 y)", desc: "Copy-source rectangle start X (one corner)" }
      - { name: y1, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle start Y" }
      - { name: x2, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle end X (opposite corner)" }
      - { name: y2, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle end Y" }
      - { name: dx, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start X (top-left of the pasted rect)" }
      - { name: dy, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start Y" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GCOPY x1,y1,x2,y2,dx,dy,mode — copies from the CURRENT drawing page to itself (source page omitted; 7 args, no return value)."
  - args:
      - { name: src_page, type: integer, range: "0-5 (GRP0-GRP5) or -1 (GRPF)", desc: "Transfer source graphic page; omitted = current drawing page" }
      - { name: x1, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle start X" }
      - { name: y1, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle start Y" }
      - { name: x2, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle end X" }
      - { name: y2, type: integer, range: "graphic-page coordinate", desc: "Copy-source rectangle end Y" }
      - { name: dx, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start X" }
      - { name: dy, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start Y" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GCOPY src,x1,y1,x2,y2,dx,dy,mode — copies the source rectangle from src_page onto the current drawing page at (dx,dy) (8 args, no return value)."

summary: "Copies a rectangular image region from a graphic page (or the current page) to the current drawing page, optionally skipping the transparent color."

semantics:
  - "Takes exactly 7 args (x1,y1,x2,y2,dx,dy,mode — source = current drawing page) or 8 args (src_page first). Any other argument count, or requesting a return value, raises errnum 4 (Illegal function call): return-count [r4,#0xc] cmp #0 bne -> errnum 4 @0x152eb4; argcount [r4,#0x4] cmp #7 beq @0x152f38, cmp #8 beq @0x152f08, else mov r0,#0x4 @0x152f00."
  - "The source rectangle is the axis-aligned box spanned by the two corners (x1,y1)-(x2,y2); corners may be given in any order. The destination is the rectangle of the same size with its top-left at (dx,dy)."
  - "With 7 args the source page defaults to the current drawing page (loaded from the graphics-context page field +0x34 into sp+0x28 @0x152edc). With 8 args the first popped value is the source page and is range-checked: it must be -1 (GRPF) through 5 (GRP5) — cmn r0,#0x1 blt / cmp #5 ble @0x152f60-0x152f6c — otherwise errnum 10 (Out of range), mov r0,#0xa with the offending arg index in r1 @0x152f78."
  - "copy_mode is the LAST arg. It is normalized to a boolean: any non-zero value becomes 1 (cmp r2,#0 / movne r2,#1 @0x1530b4). TRUE copies the transparent color (transparent pixels overwrite the destination); FALSE skips transparent pixels (destination shows through)."
  - "Coordinates are integer-coerced from the popped args via the numeric arg-fetch vtable slot [r2,#0x40]; the array/page operand uses the same slot. Coordinates are clipped by the copy helper rather than rejected, so off-screen / reversed rectangles do not raise a range error."
  - "The handler checks a per-page guard byte [page+0x60] on both the source and (if set) the destination plane (@0x153084 ldrb [r1,#0x60]; @0x153098 ldrb [ctx+0x1c]->0x60); if either is set, errnum 49 (Protected resource, mov r0,#0x31 @0x1530f0) is raised. This guard is a DRM/copy-protection flag set only on protected resources — it is NOT set on any user-accessible page, so user SB code CANNOT trigger errnum 49 from GCOPY (hw_verified sb-oracle 2026-06-26 s_t7d_49: a sweep copying from every legal source page -1..5 over a drawn-on destination never raises — every page is usable, pixels copy through). The actual copy is performed by the blit helper bl 0x193020 @0x1530d8, reading the graphics context via the global at [0x153100]=0x315d60."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument count is not 7 or 8, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "an explicit source page is outside -1..5 (GRPF..GRP5)" }
  - { errnum: 49, name: "Protected resource", when: "the resolved source or destination graphic plane has its DRM guard byte [page+0x60] set (mov r0,#0x31 @0x1530f0). This guard is set only on protected/copy-guarded resources and is NOT set on any user-accessible page (GRPF, GRP0-GRP5), so it is NOT triggerable by user SB code (hw_verified s_t7d_49 sweep, 2026-06-26)." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gcopy.md (GCOPY [Transfer source page,] Start point X,Y, End point X,Y, Transfer destination X,Y, Copy mode — copies an image from another graphic page; src page 0-5 / -1 GRPF / omitted=current; coords X:0-399 Y:0-239; Copy mode TRUE copies the transparent color, FALSE does not; e.g. GCOPY 0,0,0,100,100,200,100,1)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GCOPY handler @0x152e9c (FUN_00152e9c): graphics-context global ldr [0x153100]->0x315d60; return-count r0=[r4,#0xc] cmp #0 beq 0x152ecc else mov r2,#0/mvn r1/mov r0,#0x4 bl 0x1fffdc @0x152eb4 (errnum 4); default src page = [[..]+0x0]+0x34 -> sp+0x28 @0x152edc; argcount r0=[r4,#0x4] cmp #7 beq 0x152f38 (7-arg, default page), cmp #8 beq 0x152f08 (8-arg), else mov r0,#0x4 b 0x1530f4 @0x152ef8; 8-arg page range cmn r0,#0x1 blt 0x152f70 / cmp #5 ble 0x152f34, else mov r0,#0xa (errnum 10, r1=arg idx) bl 0x1fffdc @0x152f78; coords/page fetched via vtable [r2,#0x40] (blx); copy_mode normalize cmp r2,#0 movne r2,#1 @0x1530b4; page-availability guard ldrb [page+0x60] -> mov r0,#0x31 (errnum 49) @0x1530f0; blit helper bl 0x193020 @0x1530d8." }
  - { type: community, ref: "osb/SMILEBASIC/graphic.d Graphic2 GCOPY: page-to-page rectangular blit with a transparent-color copy flag (3.5.0 structural cross-check only)." }
  - { type: community, ref: "sbsave corpus: GCOPY appears ~3100x — only the documented 8-arg (with source page) and 7-arg (no source page) forms occur; no other arg count. Confirms both signatures are legal; runtime output unproven (framebuffer oracle pending, O-T6)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7d): GCOPY 0,0,100,100,200,100 (6 args) -> errnum 4, errline 1; GCOPY 0,0,0,100,100,200,100,1,2 (9 args) -> errnum 4; GCOPY 6,0,0,100,100,200,100,1 (source page 6, out of -1..5) -> errnum 10; A=GCOPY(0,0,100,100,200,100,1) (used as a function) -> errnum 4." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-23 (s_t7d_bitmap): a 7-arg same-page GCOPY moves pixels (red GPSET 10,10 -> GCOPY 0,0,32,32,100,100,1 -> GSPOIT 110,110 = -524288 red). copy_mode governs transparent SOURCE pixels: over a blue destination, GCOPY of a transparent source region with mode 0 KEEPS the destination (GSPOIT = -16776968 blue), mode 1 OVERWRITES it with transparent black (GSPOIT = 0)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2 run 48, harness/harvest/out/gcopy.tsv): 7/7 GSPOIT read-back cases confirmed, 0 mismatch. (1) 7-arg same-page copy maps source rect top-left (0,0) -> dest (100,100): src(10,10) red -> dest(110,110)=-524288, source(10,10) PRESERVED=-524288 (copy not move), dest corner(100,100) gets transparent src(0,0)=0 under mode 1. (2) copy_mode 0 SKIPS transparent source (blue dest at (120,120) survives=-16776968); mode 1 COPIES transparent source (overwrites with 0). (3) 8-arg cross-page copy (GPAGE 0,1:GPSET 20,20,red:GPAGE 0,0:GCOPY 1,...): page0 dest(120,120)=-524288, page0 src spot(20,20)=0. (4) source rect INCLUSIVE on both corners: 1x1 rect (5,5)-(5,5) copies exactly one pixel ((100,100)=-524288, (101,100)/(101,101)=0). (5) corners NORMALIZED (min/max): reversed (32,32)-(0,0) copies same region (110,110)=-524288. (6) only INSIDE-rect pixels copied: src rect (0,0)-(20,20) carries (10,10) red -> (110,110)=-524288 but excludes (40,40) blue -> (140,140)=0." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-26 (s_t7d_49, ON ERROR sweep + per-page read-back): errnum 49 is NOT triggerable from user code — every legal source page is usable. Sweeping GCOPY src=-1..5 (draw red on the page, GPAGE 0,0, GCOPY src,0,0,32,32,100,100,1, read GSPOIT(110,110)) yields -524288 (red) for each of GRP0/1/2/3/5 and a valid (non-error) read for GRPF(-1)/GRP4; an ON ERROR GOTO @E harness over all src pages -1..5 traps NO error (ERRNUM stays 0). The [page+0x60] guard is a DRM flag not set on user-accessible pages. Error name 'Protected resource' per spec/reference/errors.yaml #49 (in_docs:false)." }

confidence: hw_verified

tests:
  # error/arg-count expects are hw_verified (sb-oracle 2026-06-22 s_t7d); pixel side-effects hw_verified via GSPOIT read-back (M7-T2 run 48).
  - { name: copy_same_page_ok, code: "GCOPY 0,0,100,100,200,100,1", expect: { stdout: "" } }
  - { name: copy_with_src_page_ok, code: "GCOPY 0,0,0,100,100,200,100,1", expect: { stdout: "" } }
  - { name: copy_grpf_src_ok, code: "GCOPY -1,0,0,100,100,0,0,0", expect: { stdout: "" } }
  - { name: six_args_errors, code: "GCOPY 0,0,100,100,200,100", expect: { error: { errnum: 4 } } }
  - { name: nine_args_errors, code: "GCOPY 0,0,0,100,100,200,100,1,2", expect: { error: { errnum: 4 } } }
  - { name: bad_src_page_errors, code: "GCOPY 6,0,0,100,100,200,100,1", expect: { error: { errnum: 10 } } }
  - { name: as_function_errors, code: "A=GCOPY(0,0,100,100,200,100,1)", expect: { error: { errnum: 4 } } }
  # --- pixel side-effects hw_verified via GSPOIT read-back (M7-T2 run 48, harness/harvest/out/gcopy.tsv).
  # red=RGB(255,0,0)=-524288  blue=RGB(0,0,255)=-16776968 (RGBA5551 8->5, same family as GPSET/GFILL/GSPOIT); 0 = transparent/untouched.
  # GSPOIT reads the current MANIPULATION page (default 0 after ACLS). Each case ACLS-clears first. ---
  # 7-arg same-page copy maps source rect top-left (0,0) -> dest top-left (100,100): src(10,10)->dest(110,110).
  - { name: copy_7arg_dest_gets_pixel, code: "ACLS:GPSET 10,10,RGB(255,0,0):GCOPY 0,0,32,32,100,100,1:PRINT GSPOIT(110,110)", expect: { stdout: "-524288" } }
  # the SOURCE pixel is preserved (copy, not move).
  - { name: copy_7arg_source_preserved, code: "ACLS:GPSET 10,10,RGB(255,0,0):GCOPY 0,0,32,32,100,100,1:PRINT GSPOIT(10,10)", expect: { stdout: "-524288" } }
  # dest corner (100,100) receives transparent src(0,0) under mode 1 -> stays 0.
  - { name: copy_7arg_dest_corner_transparent, code: "ACLS:GPSET 10,10,RGB(255,0,0):GCOPY 0,0,32,32,100,100,1:PRINT GSPOIT(100,100)", expect: { stdout: "0" } }
  # copy_mode 0 = SKIP transparent source: a transparent source over a blue dest leaves the dest blue.
  - { name: copy_mode0_keeps_dest, code: "ACLS:GFILL 100,100,150,150,RGB(0,0,255):GCOPY 0,0,50,50,100,100,0:PRINT GSPOIT(120,120)", expect: { stdout: "-16776968" } }
  # copy_mode 1 = COPY transparent source: the same transparent source OVERWRITES the blue dest with transparent (0).
  - { name: copy_mode1_overwrites_dest, code: "ACLS:GFILL 100,100,150,150,RGB(0,0,255):GCOPY 0,0,50,50,100,100,1:PRINT GSPOIT(120,120)", expect: { stdout: "0" } }
  # 8-arg cross-page copy: draw red on page 1, copy page1 src rect to page0 dest; src(20,20)->dest(120,120).
  - { name: copy_8arg_cross_page_dest, code: "ACLS:GPAGE 0,1:GCLS:GPSET 20,20,RGB(255,0,0):GPAGE 0,0:GCOPY 1,0,0,32,32,100,100,1:PRINT GSPOIT(120,120)", expect: { stdout: "-524288" } }
  # the page-0 source spot (20,20) is untouched (the red lived on page 1).
  - { name: copy_8arg_page0_source_untouched, code: "ACLS:GPAGE 0,1:GCLS:GPSET 20,20,RGB(255,0,0):GPAGE 0,0:GCOPY 1,0,0,32,32,100,100,1:PRINT GSPOIT(20,20)", expect: { stdout: "0" } }
  # source rect is INCLUSIVE on both corners: a 1x1 rect (5,5)-(5,5) copies exactly one pixel.
  - { name: copy_1x1_copies_pixel, code: "ACLS:GPSET 5,5,RGB(255,0,0):GCOPY 5,5,5,5,100,100,1:PRINT GSPOIT(100,100)", expect: { stdout: "-524288" } }
  - { name: copy_1x1_right_neighbor_clear, code: "ACLS:GPSET 5,5,RGB(255,0,0):GCOPY 5,5,5,5,100,100,1:PRINT GSPOIT(101,100)", expect: { stdout: "0" } }
  - { name: copy_1x1_diag_neighbor_clear, code: "ACLS:GPSET 5,5,RGB(255,0,0):GCOPY 5,5,5,5,100,100,1:PRINT GSPOIT(101,101)", expect: { stdout: "0" } }
  # source corners NORMALIZED (min/max): reversed (32,32)-(0,0) spans the same rect; src(10,10)->dest(110,110).
  - { name: copy_normalize_reversed_corners, code: "ACLS:GPSET 10,10,RGB(255,0,0):GCOPY 32,32,0,0,100,100,1:PRINT GSPOIT(110,110)", expect: { stdout: "-524288" } }
  # only pixels INSIDE the source rect are copied: rect (0,0)-(20,20) carries (10,10) red but excludes (40,40) blue.
  - { name: copy_inside_rect_copied, code: "ACLS:GPSET 10,10,RGB(255,0,0):GPSET 40,40,RGB(0,0,255):GCOPY 0,0,20,20,100,100,1:PRINT GSPOIT(110,110)", expect: { stdout: "-524288" } }
  - { name: copy_outside_rect_excluded, code: "ACLS:GPSET 10,10,RGB(255,0,0):GPSET 40,40,RGB(0,0,255):GCOPY 0,0,20,20,100,100,1:PRINT GSPOIT(140,140)", expect: { stdout: "0" } }
  # --- errnum 49 page-availability guard is NOT user-triggerable (s_t7d_49, 2026-06-26):
  # every legal source page -1..5 is usable; copying from any of them does not raise. ---
  - { name: copy_src_page5_usable, code: "ACLS:GPAGE 0,5:GCLS:GPSET 10,10,RGB(255,0,0):GPAGE 0,0:GCOPY 5,0,0,32,32,100,100,1:PRINT GSPOIT(110,110)", expect: { stdout: "-524288" } }
  - { name: copy_src_page3_usable, code: "ACLS:GPAGE 0,3:GCLS:GPSET 10,10,RGB(255,0,0):GPAGE 0,0:GCOPY 3,0,0,32,32,100,100,1:PRINT GSPOIT(110,110)", expect: { stdout: "-524288" } }
