id: BGFUNC
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — assign a callback to a BG layer (label literal or string).
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
      - { name: label, type: string, desc: "Name of the process to call: an @Label, or a process defined with DEF. Written as `@Label`, a `\"string literal\"`, or a string variable/expression — all resolve to the same label-name lookup." }
    note: "BGFUNC layer, @Label — bind a callback process to the BG layer (invoked by CALL BG; inside it, CALLIDX = the layer number)."

summary: "Binds a user callback process (an @Label or a DEF-defined process, by name) to a BG layer. The bound processes are invoked together by `CALL BG`; inside the callback the system variable CALLIDX holds the layer number, letting one process drive several layers. The label operand is resolved by name, so it accepts an @Label token, a string literal, or a string variable. An advanced instruction used when callback processing is required."

semantics:
  - "Argument gate: the handler requires argcount == 2 with return-count == 0 — cmp r0,#0x2 / ldreq r0,[r5,#0xc] / cmpeq r0,#0x0 / bne 0x1656a0 (error). A wrong argument count (or a return context) raises errnum 4 (Illegal function call) with errline -1 via the shared error path (mov r2,#0x0 / mvn r1,#0x0 / mov r0,#0x4 / bl 0x1fffdc @0x1656a0)."
  - "Layer is evaluated and range-checked by the shared BG-layer getter FUN_001e2504 (bl 0x1e2504 @0x165598); a value < 0 or >= 4 raises errnum 10 (Out of range). The resolved slot index is layer + [[0x315d60]+0x5c] (ldr r0,[r0,#0x5c] / add r0,r0,r1 @0x1655b4-0x1655b8)."
  - "The label argument is fetched and inspected by type (ldr r12,[r0,#0x10] / ldrb r0,[r12,#0x2] @0x1655cc-0x1655d0). When it is a string-type operand (the non-zero branch) the name string is read (blx [r12,#0x50] @0x1655e4) and looked up: bl 0x1ede08 @0x165604 finds an @Label, falling back to bl 0x28e4fc @0x165674 for a DEF-defined process. A non-string operand takes the @0x165634 branch and raises errnum 8 (Type mismatch) with errline 1 (mov r1,#0x1 / mov r0,#0x8 / bl 0x1fffdc @0x165638-0x16563c) — i.e. the label must be a string/label, not a number."
  - "On a successful lookup the resolved target is recorded for the layer: the callback-kind byte is written strb r2,[r5,r1] (=2 for @Label @0x16565c, =1 for a DEF process @0x16568c) and the target pointer str r0,[r6,r1,lsl#2] (@0x165660/@0x165690), indexed by the layer number — so each layer has its own bound process. If the named label/DEF cannot be resolved (cmn r0,#0x1 / beq 0x1656a0 @0x165678) it raises errnum 4."
  - "The bound process is NOT called by BGFUNC itself; it runs only when the program later executes CALL BG. Inside the process the layer number is read from CALLIDX (documented). The same process name may be bound to several layers. There is NO BGSCREEN/setup guard at bind time (every layer 0..3 exists). Literals: state [0x1656b8]=0x00315D60, @Label table [0x1656bc]=0x00305614, callback-kind table [0x1656c0]=0x00306A88, callback-target table [0x1656c4]=0x019A5BB0."
  - "BGFUNC mirrors the sprite SPFUNC handler exactly (same @Label lookup FUN_001ede08, same DEF lookup FUN_0028e4fc, same kind/target table layout) but is indexed by BG layer 0..3 instead of a sprite management number. See [[spfunc]]."
  - "Name namespace by leading `@` (hw_verified sb-oracle 2026-06-27, t1n — mirrors SPFUNC): a name WITHOUT a leading `@` is resolved label-first-then-DEF — `BGFUNC 0,\"CB\"` binds a `DEF CB` process and `CALL BG` dispatches it WITHOUT error. A name WITH a leading `@` selects the @label namespace ONLY and does NOT fall back to a DEF — `BGFUNC 0,@CB` with a `DEF CB` (and no `@CB` label) raises errnum 4 (Illegal function call) at bind time (the unresolved `cmn r0,#0x1` path). An `@Label` token used as an operand is the string `\"@NAME\"` (leading-`@` preserved), so to bind a DEF process you must give its bare name as a string."
  - "CALL BG dispatch (M6-T6, hw_verified sb-oracle 2026-06-27, t1n): `CALL BG` sweeps layers 0..3 in ascending order and invokes each bound process, setting CALLIDX to that layer number for the call (an @Label runs GOSUB-style via RETURN, a DEF process like a 0-arg CALL); unbound layers are skipped. One shared CALLIDX counter is incremented per layer, so after the sweep CALLIDX RESTS AT 4 (= BG_LAYER_COUNT, one past layer 3): `BGFUNC 0,@CB` + single layer → CALLIDX 0; layers 0 and 2 bound → callbacks run ascending with CALLIDX 0 then 2 (accumulates `\"02\"`); resting CALLIDX after the sweep = 4. See [[spfunc]] for the shared sprite/BG dispatch model."
  - "No BGSCREEN requirement at bind OR dispatch time (hw_verified sb-oracle 2026-06-27, g2o — mirrors the SPFUNC un-SPSET result): a layer needs no prior BGSCREEN for either binding or running its callback. `BGFUNC 1,@CB` with NO BGSCREEN runs without error (bind alone), and `BGFUNC 1,@CB:CALL BG` (dispatching the un-BGSCREEN'd layer-1 callback) also runs without error — neither the bind nor the dispatch raises. A `CALL BG` with nothing bound is a NOERR no-op. This confirms the disassembly (the handler has no BGSCREEN/setup guard at bind, and dispatch likewise does not gate on layer setup)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the argument count is not 2 (or a return context); or the name cannot be resolved — a non-`@` name not matching any @label OR DEF process, OR a leading-`@` name (`@Label` token, or a `\"@...\"` string) not matching any @label (a leading `@` never falls back to a DEF). hw_verified at bind time." }
  - { errnum: 8, name: "Type mismatch", when: "the label operand is not a string/label — a numeric literal (`BGFUNC 0,5`) or numeric variable (`BGFUNC 0,N`); hw_verified at runtime, the operand still parses" }
  - { errnum: 10, name: "Out of range", when: "the layer is not in 0..3" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgfunc.md (`BGFUNC Layer, @Label` — 'Assigns a callback process to a BG layer'; Layer 0-3; 'All BG layer processes are executed with CALL BG'; 'Instead of @Label, a user process defined using DEF can also be specified'; 'a management number can be obtained using a CALLIDX system variable'; example `BGFUNC 0,@LAYERSUB0`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGFUNC handler @0x165568: arg gate cmp r0,#0x2 ldreq r0,[r5,#0xc] cmpeq r0,#0x0 bne 0x1656a0 @0x165578 (errnum 4 errline -1 mov r2,#0x0 mvn r1,#0x0 mov r0,#0x4 @0x1656a0); layer via FUN_001e2504 bl 0x1e2504 @0x165598 (errnum 10); slot index layer+[[0x315d60]+0x5c] add r0,r0,r1 @0x1655b8; label type probe ldrb r0,[r12,#0x2] @0x1655d0 -> non-string branch errnum 8 mov r1,#0x1 mov r0,#0x8 bl 0x1fffdc @0x165638; @Label lookup bl 0x1ede08 @0x165604, DEF lookup bl 0x28e4fc @0x165674, unresolved cmn r0,#0x1 beq 0x1656a0 @0x165678 (errnum 4); record kind strb r2,[r5,r1]=2/1 @0x16565c/@0x16568c and target ptr str r0,[r6,r1,lsl#0x2] @0x165660/@0x165690. Literals state [0x1656b8]=0x00315D60, @Label table [0x1656bc]=0x00305614, kind table [0x1656c0]=0x00306A88, target table [0x1656c4]=0x019A5BB0." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG layer callback binding (3.5.0 structural cross-check only); shares the sprite callback table layout (see osb sprite.d). osb VM.d CallBG drives the CALL BG dispatch (callidx++ per layer, isValidLayer bound, invoke bound callback) used for M6-T6 — runtime confirmation oracle-pending." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bBGFUNC '): 16 files, 20 lines — string-label form `BGFUNC 2,\"BGSCROLL\"` (2XVV233J/TXT/GAME.PRG), `BGFUNC 0,\"UPDATEBG\"` (B2B43VHE/TXT/BGTEST); @Label form `BGFUNC 0,@BGMOVE` (YK28XX8X/TXT/MAIN); string-variable/expression label `BGFUNC BN,\"BG\"` (SRK35K8V/TXT/PRG). Confirms the label is resolved by name from any string and the layer arg is any integer expression." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9d): BGFUNC 4,@P -> errnum 10 errline 1 (layer out of range)." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-27 (t1n, harness/harvest/out/t1n_bgfunc{,2}.tsv): CALL BG dispatch + CALLIDX + label namespace + error guards. CALLIDX: single bound layer 0 -> callback reads CALLIDX=0; layers 0 and 2 both bound -> callbacks run ascending, CALLIDX 0 then 2 (G$ accumulates `02`); RESTING CALLIDX after the sweep = 4 (= BG_LAYER_COUNT, one past layer 3 — upgrades the prior osb-structural claim to hw_verified). NAMESPACE: bare-string `BGFUNC 0,\"CB\"` + `DEF CB` + `CALL BG` runs WITHOUT raising (DEF dispatched); leading-`@` `BGFUNC 0,@CB` with a `DEF CB` and no `@CB` label HALTS at the bind line (errnum 4 by the unresolved `cmn r0,#0x1` path) — the `@`-prefix does NOT fall back to a DEF. ERRORS: non-string label `BGFUNC 0,5` -> errnum 8, `N=5:BGFUNC 0,N` -> errnum 8; unresolvable string `BGFUNC 0,\"@NOPE\"` -> errnum 4." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-27 (g2o, harness/harvest/out/g2o_bgfunc_unset.tsv): un-BGSCREEN'd-layer bind AND dispatch are both NOERR — `BGFUNC 1,@CB` with no prior BGSCREEN runs clean (bind_unset -> OK), and `BGFUNC 1,@CB:CALL BG` on the un-BGSCREEN'd layer also runs clean (dispatch_unset -> OK); empty sweep `BGSCREEN 0,32,32:CALL BG` with nothing bound is a NOERR no-op (empty_sweep -> OK). Each ran isolated as its own NOERR-expected progstr program (no halting case in-batch), resolving the t1n cascade-contamination gap. Confirms the disassembly's lack of a setup guard at both bind and dispatch." }

confidence: hw_verified

tests:
  # Bind-time contract from the disassembly gates (hw_verified); dispatch + CALLIDX hw_verified (t1n).
  - { name: bind_label, code: "BGSCREEN 0,32,32\nBGFUNC 0,@P\nEND\n@P", expect: { stdout: "" } }
  - { name: bind_string, code: "BGSCREEN 0,32,32\nBGFUNC 0,\"@P\"\nEND\n@P", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGFUNC 4,@P\nEND\n@P", expect: { error: { errnum: 10 } } }
  # CALL BG dispatch: the bound @label process runs with CALLIDX = the layer number (hw_verified).
  - { name: call_bg_label_callidx, code: "BGSCREEN 0,32,32\nBGFUNC 0,@CB\nCALL BG\nEND\n@CB\nPRINT CALLIDX\nRETURN", expect: { stdout: "0" } }
  # All bound layers run in ascending order, each with its own CALLIDX (hw_verified `02`).
  - { name: call_bg_ascending, code: "BGSCREEN 0,32,32\nBGFUNC 0,@CB\nBGFUNC 2,@CB\nCALL BG\nEND\n@CB\nPRINT CALLIDX;\nRETURN", expect: { stdout: "02" } }
  # After the sweep the shared CALLIDX counter rests at 4 = BG_LAYER_COUNT (hw_verified, was osb-structural).
  - { name: call_bg_final_callidx, code: "BGSCREEN 0,32,32\nCALL BG\nPRINT CALLIDX", expect: { stdout: "4" } }
  # A leading `@` is label-namespace ONLY — `@CB` does NOT fall back to a `DEF CB` (errnum 4 at bind).
  - { name: atlabel_no_def_fallback, code: "BGSCREEN 0,32,32\nBGFUNC 0,@CB\nEND\nDEF CB\nEND", expect: { error: { errnum: 4 } } }
  # A bare-string name resolves the DEF process and dispatches without raising.
  - { name: def_string_dispatch, code: "BGSCREEN 0,32,32\nBGFUNC 0,\"CB\"\nCALL BG\nEND\nDEF CB\nEND", expect: { stdout: "" } }
  # Un-BGSCREEN'd layer: binding AND dispatching a callback both run without error (hw_verified g2o).
  - { name: bind_unset_layer_noerr, code: "BGFUNC 1,@CB\nEND\n@CB\nRETURN", expect: { stdout: "" } }
  - { name: dispatch_unset_layer_noerr, code: "BGFUNC 1,@CB\nCALL BG\nEND\n@CB\nRETURN", expect: { stdout: "" } }
  # A leading-`@` string naming no @label is errnum 4 (unresolvable).
  - { name: unresolved_at_string, code: "BGSCREEN 0,32,32\nBGFUNC 0,\"@NOPE\"", expect: { error: { errnum: 4 } } }
  # A non-string label operand (numeric literal or variable) is errnum 8 (Type mismatch).
  - { name: nonstring_label_literal, code: "BGSCREEN 0,32,32\nBGFUNC 0,5", expect: { error: { errnum: 8 } } }
  - { name: nonstring_label_var, code: "BGSCREEN 0,32,32\nN=5\nBGFUNC 0,N", expect: { error: { errnum: 8 } } }
