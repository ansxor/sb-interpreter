id: GLOAD
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, optional: true, desc: "Destination start X (omit X/Y/W/H to load to the whole drawing area)" }
      - { name: y, type: integer, optional: true, desc: "Destination start Y" }
      - { name: width, type: integer, optional: true, desc: "Destination width (pixels)" }
      - { name: height, type: integer, optional: true, desc: "Destination height (pixels)" }
      - { name: image_array, type: array, desc: "Numeric array of image data (as produced by GSAVE)" }
      - { name: convert_flag, type: integer, range: "0..1", desc: "0: convert to 32-bit logical colors; 1: keep 16-bit physical codes" }
      - { name: copy_mode, type: integer, desc: "TRUE: copy the transparent color; FALSE: skip transparent pixels" }
    note: "GLOAD [x,y,w,h,] image_array, convert_flag, copy_mode — write image-array data onto the page (form 1)."
  - args:
      - { name: x, type: integer, optional: true, desc: "Destination start X" }
      - { name: y, type: integer, optional: true, desc: "Destination start Y" }
      - { name: width, type: integer, optional: true, desc: "Destination width" }
      - { name: height, type: integer, optional: true, desc: "Destination height" }
      - { name: image_array, type: array, desc: "Numeric array of (palette-indexed) image data" }
      - { name: palette_array, type: array, desc: "Palette array; image values are indices into it" }
      - { name: copy_mode, type: integer, desc: "TRUE: copy transparent; FALSE: skip transparent" }
    note: "GLOAD [x,y,w,h,] image_array, palette_array, copy_mode — palette-indexed load (form 2)."

summary: "Writes image data from a numeric array onto the graphics page (the inverse of GSAVE). Form 1 takes a color-conversion flag; form 2 treats the data as palette indices into a palette array."

semantics:
  - "GLOAD copies pixels from the image array onto the manipulation page; with X/Y/W/H omitted it targets the whole drawing area."
  - "Form 1's convert_flag matches GSAVE: 0 = the array holds 32-bit logical colors, 1 = raw 16-bit physical codes."
  - "Form 2 treats each image value as an index into the palette array (index-color images)."
  - "copy_mode TRUE writes transparent pixels too; FALSE skips them (masked load)."
  - "Round-trips with [[gsave]]: GSAVE a region to an array then GLOAD it back restores the pixels (oracle-verified)."
  - "Pixels are RGBA5551 (GSPOIT read-back rounded); the load respects the write clip ([[gclip]])."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gload.md (GLOAD [X,Y,W,H,]Array,ConvFlag,CopyMode; and palette form GLOAD [..]Array,Palette,CopyMode; conv 0=32-bit,1=16-bit)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GLOAD handler FUN_0015352c @0x15352c: writes the image-array pixels (converted, or palette-indexed) onto the manipulation page" }
  - { type: community, ref: "sbsave corpus: GLOAD used to restore GSAVE arrays and load image resources (conv-flag and palette forms)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7d): GSAVE->GLOAD round-trip preserves pixels — DIM W[0]:GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GPSET 5,5:GSAVE 0,0,16,16,W,1:GCLS:GLOAD 0,0,16,16,W,1,1 -> GSPOIT(5,5)!=0 (the pixel is restored) while a pixel that was never set (10,10)=0" }

confidence: hw_verified

tests:
  - { name: gload_roundtrip_restores, code: "DIM W[0]\nGPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPSET 5,5\nGSAVE 0,0,16,16,W,1\nGCLS\nGLOAD 0,0,16,16,W,1,1\nPRINT GSPOIT(5,5)!=0", expect: { stdout: "1" } }
  - { name: gload_roundtrip_empty_stays, code: "DIM W[0]\nGPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPSET 5,5\nGSAVE 0,0,16,16,W,1\nGCLS\nGLOAD 0,0,16,16,W,1,1\nPRINT GSPOIT(10,10)", expect: { stdout: "0" } }
