id: GLOAD
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: image_array, type: "integer array", desc: "Numeric array holding image data previously stored with GSAVE" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = convert stored colors to 32-bit logical colors, 1 = treat data as raw 16-bit physical codes" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GLOAD image_array,flag,mode — draws the array image at the top-left of the current drawing page, sized to the stored image (form 1, flag variant; 3 args, no return value)."
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start X" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start Y" }
      - { name: width, type: integer, range: ">= 1 (pixels)", desc: "Copy-destination width in pixels" }
      - { name: height, type: integer, range: ">= 1 (pixels)", desc: "Copy-destination height in pixels" }
      - { name: image_array, type: "integer array", desc: "Numeric array holding image data stored with GSAVE" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = convert to 32-bit logical colors, 1 = raw 16-bit physical codes" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GLOAD x,y,width,height,image_array,flag,mode — draws the array image into the given destination rectangle (form 1, flag variant; 7 args)."
  - args:
      - { name: image_array, type: "integer array", desc: "Numeric array holding image data stored with GSAVE (physical/index codes)" }
      - { name: palette_array, type: "integer array", desc: "Numeric array of palette entries; colors are taken as palette indices" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GLOAD image_array,palette_array,mode — like form 1 but the image data is interpreted as palette indices, recolored through palette_array (form 2, palette variant; 3 args)."
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start X" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Copy-destination start Y" }
      - { name: width, type: integer, range: ">= 1 (pixels)", desc: "Copy-destination width in pixels" }
      - { name: height, type: integer, range: ">= 1 (pixels)", desc: "Copy-destination height in pixels" }
      - { name: image_array, type: "integer array", desc: "Numeric array holding image data stored with GSAVE" }
      - { name: palette_array, type: "integer array", desc: "Numeric array of palette entries" }
      - { name: copy_mode, type: integer, range: "0/1 (any non-zero -> 1)", desc: "TRUE = copy the transparent color too, FALSE = skip transparent pixels" }
    note: "GLOAD x,y,width,height,image_array,palette_array,mode — palette variant into a destination rectangle (form 2; 7 args)."

summary: "Copies image data from a numeric array (as saved by GSAVE) onto the current drawing page, either converting/keeping its colors directly (form 1) or recoloring it through a palette array (form 2)."

semantics:
  - "Accepts exactly 3 args (image_array, flag-or-palette, copy_mode) or 7 args (X,Y,Width,Height first). Any other count, or requesting a return value, raises errnum 4 (Illegal function call): return-count [r4,#0xc] cmp #0 bne -> errnum 4 @0x153548; argcount r7=[r4,#0x4] cmp #3 beq @0x15358c, cmp #7 beq @0x153648, else mov r0,#0x4 b 0x153820 @0x153580."
  - "With 3 args the destination is the whole stored image placed at the current drawing area's origin (the drawable rectangle is computed via bl 0x18fec0 @0x1535c8 and width/height taken as x2-x1+1, y2-y1+1)."
  - "With 7 args the leading X,Y,Width,Height give the destination rectangle. Width and Height are validated against the destination position: an out-of-range (e.g. negative) width or height raises errnum 10 (Out of range) — guards cmp r8,r0 ble with mov r0,#0xa @0x153728 and @0x153750."
  - "image_array must be a numeric array; it must hold at least Width*Height elements or errnum 31 (Subscript out of range) is raised (element-count cmp r0,r1 bge / mov r0,#0x1f @0x15381c). If the array element type is wrong (not a numeric array) errnum 8 (Type mismatch) is raised (mov r0,#0x8 @0x1539a8)."
  - "The second-to-last operand selects the FORM: if it is a numeric SCALAR it is the convert_flag (form 1: 0 converts stored data to 32-bit logical colors, 1 keeps the raw 16-bit physical codes); if it is an ARRAY it is the palette and the image data is recolored as palette indices (form 2). The handler branches on the flag value cmp #0 / cmp #1 @0x153888 into two draw helpers — bl 0x191414 (convert path) and bl 0x190aa8 (raw/index path)."
  - "copy_mode is the LAST arg and is normalized to a boolean (any non-zero -> 1, cmp/movne @0x1538bc): TRUE copies the transparent color, FALSE skips transparent pixels. Numeric args use the vtable fetch [r2,#0x40]; the image/palette arrays use the array fetch [r2,#0x48]. Graphics context globals are read via [0x153b60]/[0x153b64]."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument count is not 3 or 7, or a return value is requested (used as a function)" }
  - { errnum: 8, name: "Type mismatch", when: "image_array is not a numeric array" }
  - { errnum: 10, name: "Out of range", when: "a given Width/Height is negative/out of range" }
  - { errnum: 31, name: "Subscript out of range", when: "image_array has fewer than width*height elements" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gload.md (GLOAD (1) [X,Y,Width,Height,] Image array, Color conversion flag, Copy mode — copies image data from an array to the graphic screen; flag 0 converts to 32-bit logical colors, 1 leaves the 16-bit physical codes; Copy mode TRUE copies the transparent color, FALSE does not; GLOAD (2) [X,Y,Width,Height,] Image array, Palette array, Copy mode — colors handled as index colors from palettes; e.g. GLOAD 0,0,512,512,WORK,1,0 / GLOAD 0,0,512,512,WORK,PALETTE,0)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GLOAD handler @0x15352c (FUN_0015352c): ctx globals ldr [0x153b60]/[0x153b64]; return-count r0=[r4,#0xc] cmp #0 beq 0x153560 else mov r0,#0x4 bl 0x1fffdc (errnum 4) @0x153548; argcount r7=[r4,#0x4] cmp #3 beq 0x15358c, cmp #7 beq 0x153648, else mov r0,#0x4 b 0x153820 @0x153580; default-area drawable rect bl 0x18fec0 @0x1535c8 (w=x2-x1+1,h=y2-y1+1); W/H guard cmp r8,r0 ble -> mov r0,#0xa (errnum 10) @0x153728/@0x153750; array element-count cmp r0,r1 bge else mov r0,#0x1f (errnum 31) @0x15381c; wrong array type -> mov r0,#0x8 (errnum 8) @0x1539a8; form branch on flag cmp #0/#1 @0x153888 -> convert helper bl 0x191414 @0x1538ec / raw-index helper bl 0x190aa8 @0x153950; copy_mode normalize cmp/movne @0x1538bc; numeric fetch [r2,#0x40], array fetch [r2,#0x48]." }
  - { type: community, ref: "osb/SMILEBASIC/graphic.d Graphic2 GLOAD: blits a GSAVE-format array back onto a graphic page with a color-conversion flag or palette (3.5.0 structural cross-check only)." }
  - { type: community, ref: "sbsave corpus: GLOAD appears ~670x — only the documented 3-arg (image_array,flag,mode, e.g. QRY34XVD/TXT/UNPACK 'GLOAD D,1,1') and 7-arg forms occur. Confirms the form-2 PALETTE variant is real in the wild — the 2nd-to-last operand is a palette array name (e.g. 53383XCF/TXT/CHIP8.PKG '...,CHIP8_PAL,TRUE'; '...,SFNPAL%,FALSE'). Legal syntax; runtime output unproven (framebuffer oracle pending, O-T6)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7d): GLOAD W,1 (2 args, W a DIM'd array) -> errnum 4, errline 1; GLOAD 0,0,8,8,W (5 args) -> errnum 4; A=GLOAD(W,1,0) (used as a function) -> errnum 4." }

confidence: disassembled

tests:
  # error/arg-count expects are hw_verified (sb-oracle 2026-06-22 s_t7d). Pixel side-effects need the framebuffer oracle (O-T6, queued).
  - { name: load_whole_flag_ok, code: "DIM WORK[0]\nGSAVE 0,0,8,8,WORK,1\nGLOAD WORK,1,0", expect: { stdout: "" } }
  - { name: load_rect_flag_ok, code: "DIM WORK[0]\nGSAVE 0,0,8,8,WORK,1\nGLOAD 0,0,8,8,WORK,1,0", expect: { stdout: "" } }
  - { name: two_args_errors, code: "DIM WORK[0]\nGLOAD WORK,1", expect: { error: { errnum: 4 } } }
  - { name: five_args_errors, code: "DIM WORK[0]\nGLOAD 0,0,8,8,WORK", expect: { error: { errnum: 4 } } }
  - { name: as_function_errors, code: "DIM WORK[0]\nA=GLOAD(WORK,1,0)", expect: { error: { errnum: 4 } } }
