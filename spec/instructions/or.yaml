id: OR
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value1, type: number, range: "any", desc: "Left numeric operand (bit string 1)" }
      - { name: value2, type: number, range: "any", desc: "Right numeric operand (bit string 2)" }
    returns: { type: integer, desc: "Bitwise OR of the two operands as 32-bit integers" }
    note: "Infix binary operator: value1 OR value2"

summary: "Bitwise OR of two numeric values (the bit-by-bit sum). Operands are converted to 32-bit integers; the result is always Integer."

semantics:
  - "Bitwise inclusive OR over 32-bit two's-complement integers: each result bit is 1 where either operand bit is 1. 128 OR &HA3 == 163."
  - "Each operand is converted to a 32-bit integer by truncation toward zero BEFORE the operation (the same coercion as AND/XOR — fractional parts are dropped, not rounded). The result type is always Integer (2.0 OR 1 == 3, an Integer)."
  - "Negative operands use the full 32-bit two's-complement pattern: -1 OR 0 == -1."
  - "Literals wider than 32 bits wrap to i32: &HFF000000 OR 0 == -16777216. Hex-mask color builds like &HFF000000 OR(C<<16)OR(C<<8)OR C are the dominant real-world use."
  - "Used as a bit-flag combiner / logical OR in conditionals: SmileBASIC has no separate boolean type, so OR is bitwise even in IF (TRUE is non-zero, FALSE is 0)."
  - "Precedence (getOPRank): OR binds looser than +/- and */DIV/MOD, and sits at the same level as XOR (a looser level than AND)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "either operand is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/or.md (Logical OR of Numerical value 1 and Numerical value 2 — Addition of bits; example A=128 OR &HA3)" }
  - { type: community, ref: "sbsave corpus: hex-mask color ORs `(&HFF000000 OR(C<<16)OR(C<<8)OR C)` very common (1DVK34J/TXT/HNZMBRT); chained bit combines and flag tests across ~hundreds of programs" }
  - { type: hypothesis, ref: "cia_3.6.0.lst: OR is not in the builtin dispatch table (parsed as an operator, compiled to a VM bytecode opcode); keyword name region @0x2ed6xx. Handler body not pinned — index-dispatched in the expression VM; behavior here is fixed by the oracle harvest" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 128 OR &HA3=163; -1 OR 0=-1; &HFF000000 OR 0=-16777216 (32-bit wrap); 2.0 OR 1=3 (Integer result, operand truncation)" }

confidence: hw_verified

tests:
  - { name: doc_example,    code: "PRINT 128 OR &HA3", expect: { stdout: "163" } }
  - { name: neg_identity,   code: "PRINT -1 OR 0",     expect: { stdout: "-1" } }
  - { name: wide_literal,   code: "PRINT &HFF000000 OR 0", expect: { stdout: "-16777216" } }
  - { name: double_to_int,  code: "PRINT 2.0 OR 1",    expect: { stdout: "3" } }
  - { name: string_mismatch, code: 'X=1 OR "A"',       expect: { error: { errnum: 8 } } }
