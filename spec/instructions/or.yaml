id: OR
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: a, type: integer, desc: "Left operand (bit string)" }
      - { name: b, type: integer, desc: "Right operand (bit string)" }
    returns: { type: integer, desc: "Bitwise OR of a and b" }
    note: "a OR b — infix bitwise-OR operator."

summary: "Bitwise OR of two integers (per-bit addition). Also serves as the logical-OR in conditions (nonzero = true)."

semantics:
  - "OR computes the bitwise OR of its two operands as 32-bit integers (Integer = i32)."
  - "Double operands are coerced to integer before the operation."
  - "Used both for setting bit flags (FLAGS OR #BIT) and as a logical OR in IF conditions (true if either operand is nonzero)."
  - "Negative operands use two's-complement i32 bit patterns."
  - "It is an infix operator (a parser special form), not a function."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an operand is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/or.md (Variable=Num1 OR Num2; logical OR / addition of bits)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: OR operator keyword name @0x2ecf9a (token-name table region); an infix operator handled in the expression compiler (not in the builtin dispatch table) — operands coerced to i32, bitwise-OR VM op; exact handler not pinned, name addr only" }
  - { type: community, ref: "sbsave corpus: OR is pervasive (~10,482 lines); used for flag-setting (a OR #BIT) and logical conditions" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 5 OR 2 -> 7; 128 OR &HA3 -> 163; 0 OR 42 -> 42" }

confidence: hw_verified

tests:
  - { name: or_basic, code: "PRINT 5 OR 2", expect: { stdout: "7" } }
  - { name: or_mask, code: "PRINT 128 OR &HA3", expect: { stdout: "163" } }
  - { name: or_zero, code: "PRINT 0 OR 42", expect: { stdout: "42" } }
