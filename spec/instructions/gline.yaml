id: GLINE
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x1, type: integer, desc: "Start X" }
      - { name: y1, type: integer, desc: "Start Y" }
      - { name: x2, type: integer, desc: "End X" }
      - { name: y2, type: integer, desc: "End Y" }
      - { name: color, type: integer, optional: true, desc: "32-bit ARGB color; if omitted, the current GCOLOR is used" }
    note: "GLINE x1,y1, x2,y2 [, color] — draw a straight line."

summary: "Draws a straight line from (x1,y1) to (x2,y2) on the manipulation GRP page, in the given color or the current GCOLOR."

semantics:
  - "GLINE draws a 1-pixel-wide line between the two endpoints (inclusive of both endpoints)."
  - "An optional color argument overrides the current GCOLOR for this call."
  - "Pixels are stored as RGBA5551 (GSPOIT read-back is the rounded color); drawing respects the write clip ([[gclip]])."
  - "Screen coordinate range is X:0-399, Y:0-239 (the GRP page itself is 512x512)."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gline.md (GLINE SX,SY,EX,EY[,ColorCode]; straight line; color per GCOLOR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GLINE handler FUN_00152e9c/@0x1532d4: rasterizes a line between the endpoints into the manipulation page" }
  - { type: community, ref: "sbsave corpus: GLINE pervasive (~5,295 lines); 4-coord form, often with an inline RGB() color" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7b): GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GLINE 0,0,10,0 -> both endpoints and a midpoint set (GSPOIT(0,0)!=0, GSPOIT(10,0)!=0, GSPOIT(5,0)!=0) while an off-line pixel GSPOIT(5,5)=0" }

confidence: hw_verified

tests:
  - { name: gline_endpoints_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGLINE 0,0,10,0\nPRINT (GSPOIT(0,0)!=0)*(GSPOIT(10,0)!=0)", expect: { stdout: "1" } }
  - { name: gline_midpoint_set, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGLINE 0,0,10,0\nPRINT GSPOIT(5,0)!=0", expect: { stdout: "1" } }
  - { name: gline_off_line_unset, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGLINE 0,0,10,0\nPRINT GSPOIT(5,5)", expect: { stdout: "0" } }
