id: REPEAT
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args: []
    note: "REPEAT ... UNTIL condition — repeats the body until the condition becomes true."

summary: "Begins a REPEAT loop whose body runs at least once, repeating until the UNTIL condition is true."

semantics:
  - "The body executes BEFORE the condition is tested (bottom-tested loop), so it always runs at least once — even when the UNTIL condition is true from the start."
  - "The loop repeats while the UNTIL condition is false and exits when it becomes true, or immediately on BREAK."
  - "CONTINUE jumps forward to the UNTIL condition test."

errors:
  - { errnum: 22, name: "REPEAT without UNTIL", when: "a REPEAT has no matching UNTIL — the body runs once then control reaches EOF with no UNTIL, raising 22 at the EOF line (a bare REPEAT with no body raises 22 at the EOF line too). A COMPLETE REPEAT...UNTIL with a false exit condition loops forever (does not raise)." }
  - { errnum: 3, name: SyntaxError, when: "the program's first non-newline token is a `:` separator (an empty preceding statement) — `:REPEAT` collapses to Syntax error 3. This is the general leading-`:` rule, not REPEAT-specific (see [[endif]]). A `:` AFTER a real statement is a normal separator and does not raise." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/repeat.md, until.md (executes the process before determining the condition; exits when the condition is satisfied)" }
  - { type: disassembled, ref: "cia_3.6.0.lst REPEAT/UNTIL are parser keywords (tokens REPEAT @0x2ed588, UNTIL @0x2ed574), not in the builtin dispatch table; compiled to body + bottom-of-loop test + back-jump" }
  - { type: hw_verified, ref: "sb-oracle loop probe 2026-06-22: REPEAT ... UNTIL 1 runs the body once (bottom-tested); REPEAT ... UNTIL C>=3 (incrementing C) runs exactly 3x. See [[until]]." }
  - { type: hw_verified, ref: "sb-oracle structural-error probe 2026-06-23 (|err): an unterminated REPEAT (REPEAT with no UNTIL) raises errnum 22 (REPEAT without UNTIL) — not generic Syntax error 3. See [[until]]." }
  - { type: hw_verified, ref: "sb-oracle audit 49r isolated re-probe 2026-06-26 (run_case.py errcase): bare `REPEAT` (no body, no UNTIL) → errnum 22 errline 4 (EOF); `REPEAT\\nPRINT 1` (body but no UNTIL) → 22 errline 5 (EOF — the body runs once then EOF with no UNTIL fires 22; it does NOT loop, unlike a COMPLETE `REPEAT...UNTIL <false>` which loops forever). Leading-`:` exception: `:REPEAT` → errnum 3 (empty preceding statement) — the leading-`:` rule is general (any statement, not just closers; audit 49r 2026-06-26). Confirms the 2026-06-23 batch |err claim was NOT a mis-harvest (unlike the IF/ENDIF family fixed in 0e165f3)." }

confidence: hw_verified

tests:
  - { name: runs_once_even_if_true, code: "REPEAT\nPRINT \"X\"\nUNTIL 1", expect: { stdout: "X" } }
  - { name: counts, code: "C=0\nREPEAT\nC=C+1\nUNTIL C>=3\nPRINT C", expect: { stdout: "3" } }
  - { name: repeat_without_until, code: "REPEAT\nPRINT 1", expect: { error: { errnum: 22 } } }
  - { name: repeat_without_until_bare, code: "REPEAT", expect: { error: { errnum: 22 } } }
  - { name: repeat_without_until_leading_colon, code: ":REPEAT", expect: { error: { errnum: 3 } } }
