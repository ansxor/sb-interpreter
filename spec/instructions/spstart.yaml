id: SPSTART
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", optional: true, desc: "Sprite to start; if omitted, start ALL sprites' animations" }
    note: "SPSTART [id] — (re)start sprite animation."

summary: "Starts (or resumes) the animation of a sprite previously set up with SPANIM. With no argument, all sprites' animations start. The sprite must be SPSET first."

semantics:
  - "SPSTART id resumes the animation channels armed by SPANIM on that sprite; SPCHK(id) becomes nonzero again."
  - "With the management number omitted, SPSTART starts every sprite's animation."
  - "Pairs with [[spstop]] to pause/resume; SPANIM itself already starts the animation."
  - "Using SPSTART id on a sprite that was not SPSET raises errnum 4 (Illegal function call)."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "the sprite was not SPSET" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spstart.md (SPSTART [id]; starts animation; omitted = all sprites; error before SPSET)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPSTART handler FUN_00143d34 @0x143d34: resumes the sprite animation channels (all if no id)" }
  - { type: community, ref: "sbsave corpus: SPSTART common after SPANIM setup, often bare (start all) at the top of a game loop" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8c): after SPANIM 0,\"XY\",... then SPSTOP 0 (SPCHK 0), SPSTART 0 resumes the animation -> SPCHK(0)=1 again" }

confidence: hw_verified

tests:
  - { name: spstart_resumes, code: "ACLS\nSPSET 0,0,0,16,16,1\nSPANIM 0,\"XY\",-60,200,100,-30,50,20\nSPSTOP 0\nSPSTART 0\nPRINT SPCHK(0)", expect: { stdout: "1" } }
