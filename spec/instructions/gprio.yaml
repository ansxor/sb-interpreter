id: GPRIO
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: z, type: integer, range: "-256..1024", desc: "Depth of the graphics layer (rear 1024 < screen surface 0 < front -256)" }
    note: "GPRIO z — set the display priority (Z depth) of the whole graphics layer."

summary: "Sets the display priority (depth) of the entire graphics screen relative to the other layers (console, sprites, BG). Smaller/negative z is nearer the front; larger z is further back."

semantics:
  - "GPRIO z places the whole graphics (GRP) layer at depth z in the compositor: rear = 1024, screen surface = 0, front = -256 (the same Z convention as LOCATE's Z and sprites)."
  - "It affects the whole graphics screen at once (and the whole screen when 3D mode is in use)."
  - "Both positive (further back) and negative (nearer front) Z values are accepted; GPRIO 0, GPRIO 100, and GPRIO -100 all run without error."
  - "GPRIO sets a compositor depth (a visual ordering); the resulting layer order is a visual effect verified via the screenshot/composite oracle, not the value oracle (queued)."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gprio.md (GPRIO Z; rear 1024 < surface 0 < front -256; affects the whole graphic screen; 3D affects whole screen)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GPRIO handler FUN_00153cd0 @0x153cd0: sets the graphics-layer Z/priority used by the compositor" }
  - { type: community, ref: "sbsave corpus: GPRIO used (~1,024 lines) to order the graphics layer (often for 3D/depth setups)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7a): GPRIO 0 and GPRIO 100 run and the program continues (PRINT after -> 7); GPRIO -100 does not raise an error. NOTE: the actual layer-ordering result is visual (queued for the composite oracle), so the top-level confidence stays disassembled." }

confidence: disassembled

tests:
  - { name: gprio_runs, code: "GPRIO 0\nPRINT 7", expect: { stdout: "7" } }
  - { name: gprio_front_runs, code: "GPRIO 100\nPRINT 7", expect: { stdout: "7" } }
