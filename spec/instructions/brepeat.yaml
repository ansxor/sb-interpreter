id: BREPEAT
kind: statement
category: Various kinds of input
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — button ID only: turns key-repeat OFF for that button.
  - args:
      - { name: button_id, type: integer, range: "0..12", desc: "Key-repeat management ID (NOT the BUTTON bit weight): 0 up, 1 down, 2 left, 3 right, 4 A, 5 B, 6 X, 7 Y, 8 L, 9 R, 11 ZR, 12 ZL. 10 is unused." }
    note: "BREPEAT button_id — turn key-repeat OFF for this button (equivalent to start=0, interval=0)."
  # Form 2 — button ID + timing.
  - args:
      - { name: button_id, type: integer, range: "0..12", desc: "Key-repeat management ID (0..12, 10 unused)." }
      - { name: start, type: integer, range: "0..", desc: "Frames (1/60 s) held before repeat begins." }
      - { name: interval, type: integer, range: "0..", desc: "Repeat interval in frames (1/60 s). 0 = repeat OFF." }
    note: "BREPEAT button_id, start, interval — set the key-repeat timing for this button."

summary: "Configures the key-repeat behaviour reported by BUTTON feature ID 1 (moment-pressed-with-repeat). Button is identified by a management ID (0-12, where 10 is unused) which is NOT the same numbering as the BUTTON return bits — these are sequential indices. Start is the hold time (in 1/60 s frames) before repeat kicks in, and Interval is the repeat period (also in frames); an Interval of 0, or omitting both timing arguments, turns repeat off for that button. See [[button]]."

semantics:
  - "BREPEAT is a statement and takes either 1 argument (button ID only -> repeat off) or 3 arguments (button ID, start, interval): the handler requires (argcount==1 OR argcount==3) AND a result count of 0 (cmp r5,#0x1 / cmpne r5,#0x3 / ldreq r0,[r4,#0xc] / cmpeq r0,#0x0 / beq @0x15bd2c @0x15bd00-0x15bd10); any other shape raises errnum 4 (Illegal function call: mov r0,#0x4 @0x15bd1c / bl 0x1fffdc)."
  - "Button ID is bounds-checked < 14: the evaluated id [sp,#0xc] is unsigned-compared cmp #0xe / bcc @0x15bd7c (@0x15bd64), and a value >= 14 (which includes any negative integer read unsigned) raises errnum 10 (Out of range: mov r0,#0xa @0x15bd74 / b 0x15be08)."
  - "Button IDs 10 and 13 are explicitly rejected even though they pass the <14 guard: cmp r0,#0xa / cmpne r0,#0xd / beq @0x15bdfc (@0x15bd7c-0x15bd84) -> mov r0,#0x4 errnum 4 (@0x15be04 / bl 0x1fffdc). So the legal IDs are 0-9, 11 and 12 (ID 10 is the documented 'not used' slot; 13 is likewise reserved)."
  - "For the 3-argument form, start time must be >= 0 (cmp r5(=0),start / ble @0x15bdc0 @0x15be14-0x15be18, else mov r0,#0xa errnum 10 @0x15be28) and interval must be >= 0 (cmp r5(=0),interval / ble @0x15be44 @0x15be5c-0x15be60, else mov r0,#0xa errnum 10 @0x15be70). Both are integers in 1/60-second frame units."
  - "The 1-argument form initialises start and interval to 0 ([sp,#0x0] and [sp,#0x4] zeroed @0x15bd34-0x15bd38) and commits via the same path as the 3-arg form (bl 0x1a48b8 @0x15be4c with button id [sp,#0xc] and {start,interval}). An interval of 0 (explicit or from the 1-arg form) disables repeat for that button; thereafter BUTTON feature 1 behaves like feature 2 for it."
  - "BREPEAT affects only the key-repeat edge surfaced by [[button]] feature ID 1; it does not change held (feature 0), raw-pressed (feature 2) or released (feature 3) reporting, and produces no return value."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the argument count is not 1 or 3, BREPEAT is used in a result context, or the button ID is 10 or 13" }
  - { errnum: 10, name: "Out of range", when: "button ID is >= 14 (or negative), or start time / interval is negative" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/brepeat.md (`BREPEAT ButtonID, StartTime, Interval` — 'Sets the key repeat feature'; 'Omitting Start time and Interval will turn off repeat'; 'Management numbers differ from the bit values that correspond to each button in BUTTON'; ButtonID 0 up..9 R, 10 not used, 11 ZR, 12 ZL; StartTime in 1/60 s; Interval in 1/60 s, 0 = repeat OFF; ZR/ZL only with Circle Pad Pro; example `BREPEAT 0,15,4`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BREPEAT handler @0x15bcf0: arg/result gate (argcount [r4,#0x4]==1 or ==3) AND resultcount [r4,#0xc]==0 (cmp r5,#0x1 / cmpne r5,#0x3 / cmpeq [r4,#0xc],#0x0 @0x15bd00-0x15bd10) else mov r0,#0x4 errnum 4 (@0x15bd1c); button id <14 (cmp #0xe / bcc @0x15bd64) else mov r0,#0xa errnum 10 (@0x15bd74); ids 10/13 rejected (cmp #0xa / cmpne #0xd / beq @0x15bdfc) -> mov r0,#0x4 errnum 4 (@0x15be04); start>=0 (cmp 0,start / ble @0x15bdc0 @0x15be14) else mov r0,#0xa errnum 10 (@0x15be28); interval>=0 (cmp 0,interval / ble @0x15be44 @0x15be60) else mov r0,#0xa errnum 10 (@0x15be70); 1-arg form zeros start/interval ([sp,#0x0]/[sp,#0x4] @0x15bd34-0x15bd38); commit bl 0x1a48b8 (@0x15be4c)" }
  - { type: community, ref: "osb/SMILEBASIC/builtinfunctions.d BREPEAT(btnid, startTime, interval) (3.5.0 structural cross-check only; NOTIMPL there)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bBREPEAT'): the 3-arg form dominates (~77%), e.g. `BREPEAT 0,15,4` / `BREPEAT 5,16,3`. The 1-arg turn-off form is real: `BREPEAT 4` / `BREPEAT 5` (23DX324V/TXT/PMODEM130.PRG). Button IDs 11 (ZR) and 12 (ZL) are actively used: `BREPEAT 11,30,8 'ZR` / `BREPEAT 12,30,8 'ZL` (NK4PX4AD/TXT/ZEROTANK), `BREPEAT 11,12*ANMSPD,1` (51VVV3NJ/TXT/MANUAL). ID 10 only appears in commented-out / explicitly-skipped library code (`IF B!=10 THEN BREPEAT B,0,0`, NRQ4B33D/TXT/-MKIILIB), consistent with 10 being illegal. Button ID and timings are frequently variables/expressions. Confirms the 1-arg form and IDs 11/12; the 10/13 rejection is from disasm." }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar) batch 2026-06-22 (s_t11a): BREPEAT 10,15,4 and BREPEAT 13,15,4 both raise errnum 4 (Illegal function call) — confirming IDs 10 and 13 are rejected despite passing the <14 guard; BREPEAT 14,15,4 raises errnum 10 (Out of range) — confirming the >=14 bound; BREPEAT 0,-1,4 (negative start) raises errnum 10; BREPEAT 0,15 (2 args) raises errnum 4 — confirming the 1-or-3 arg-count gate. All errline 1." }

confidence: disassembled

tests:
  # Setting repeat has no stdout; the timing-driven effect is observed through BUTTON feature 1
  # (needs live input, not headless-harvestable). These pin the call shape + error guards.
  - { name: set_repeat_3args, code: "BREPEAT 0,15,4", expect: { stdout: "" } }
  - { name: turn_off_1arg, code: "BREPEAT 4", expect: { stdout: "" } }
  - { name: zr_id_ok, code: "BREPEAT 11,30,8", expect: { stdout: "" } }
  - { name: id_10_illegal, code: "BREPEAT 10,15,4", expect: { error: { errnum: 4 } } }
  - { name: id_13_illegal, code: "BREPEAT 13,15,4", expect: { error: { errnum: 4 } } }
  - { name: id_out_of_range, code: "BREPEAT 14,15,4", expect: { error: { errnum: 10 } } }
  - { name: negative_start, code: "BREPEAT 0,-1,4", expect: { error: { errnum: 10 } } }
  - { name: bad_arg_count_2, code: "BREPEAT 0,15", expect: { error: { errnum: 4 } } }
