id: CLASSIFY
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "2026-06-23" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Real number to check" }
    returns: { type: integer, desc: "0 = ordinary value, 1 = infinity, 2 = NaN" }

summary: "Classifies value as an ordinary number (0), infinity (1), or not-a-number / NaN (2)."

semantics:
  - "Returns 0 for an ordinary value (including 0, subnormals, and any Integer), 1 for +/-infinity, 2 for NaN. Always an Integer result."
  - "An Integer argument always classifies as 0 (ordinary) without inspecting bits. A Double argument is passed through a float-classification helper @0x20c3e0: helper code 3 -> 1 (infinity), code 7 -> 2 (NaN), anything else -> 0."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/classify.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst CLASSIFY handler @0x146680; Integer arg -> 0; Double arg -> helper @0x20c3e0 (returns 3=inf, 7=NaN); result pushed via Integer return path; non-number arg -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: ordinary cases — CLASSIFY(0.5)=0, CLASSIFY(5)=0, CLASSIFY(-2.5)=0, CLASSIFY(0)=0." }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-23 (M7-T2): the headline inf->1 / NaN->2 paths, produced via overflow — CLASSIFY(EXP(1000))=1, CLASSIFY(-EXP(1000))=1, CLASSIFY(EXP(1000)-EXP(1000))=2. Confirms the @0x20c3e0 helper mapping (code 3 -> 1 infinity, code 7 -> 2 NaN)." }

# hw_verified: ordinary->0, the inf->1 / NaN->2 headline (via EXP overflow), and the
# string->errnum-8 guard are all oracle-confirmed on real SB 3.6.0.
confidence: hw_verified

tests:
  - { name: doc_ordinary,        code: "PRINT CLASSIFY(0.5)", expect: { stdout: "0" } }
  - { name: integer_ordinary,    code: "PRINT CLASSIFY(5)",   expect: { stdout: "0" } }
  - { name: negative_ordinary,   code: "PRINT CLASSIFY(-2.5)", expect: { stdout: "0" } }
  - { name: zero_ordinary,       code: "PRINT CLASSIFY(0)",   expect: { stdout: "0" } }
  # inf/NaN headline — hw_verified 2026-06-23 (EXP(1000) overflows the double to +inf;
  # inf-inf is NaN). These are the point of the function.
  - { name: infinity,            code: "PRINT CLASSIFY(EXP(1000))",  expect: { stdout: "1" } }
  - { name: negative_infinity,   code: "PRINT CLASSIFY(-EXP(1000))", expect: { stdout: "1" } }
  - { name: nan,                 code: "PRINT CLASSIFY(EXP(1000)-EXP(1000))", expect: { stdout: "2" } }
  - { name: string_type_mismatch, code: 'A=CLASSIFY("x")',    expect: { error: { errnum: 8 } } }
