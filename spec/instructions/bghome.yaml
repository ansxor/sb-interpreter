id: BGHOME
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
      - { name: x, type: integer, desc: "Origin (reference point) X in pixels." }
      - { name: y, type: integer, desc: "Origin (reference point) Y in pixels." }
    note: "BGHOME layer, x, y — set a layer's display origin (3 args, no return value)."
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
    out:
      - { name: hx, type: integer, desc: "Receives the layer's origin X (pixels)." }
      - { name: hy, type: integer, desc: "Receives the layer's origin Y (pixels)." }
    note: "BGHOME layer OUT hx, hy — read a layer's display origin (1 arg + 2 OUT variables)."

summary: "Sets or reads the display origin (reference point) of one BG layer, in pixels. The origin is the pivot used for the layer's rotation (BGROT) and scaling (BGSCALE), and is the anchor for the layer's display offset (BGOFS)."

semantics:
  - "Two forms, selected by the requested return count [r4,#0xc]. Return count 0 selects the SET form, which requires exactly 3 arguments (Layer,X,Y) — cmp argcount,#3 @0x165790. A return count of 2 with exactly 1 argument selects the OUT/get form (HX,HY) — cmp [r4,#0xc],#2 / cmpeq argcount,#1 @0x165780-0x165784 (beq @0x16586c). Any other shape raises errnum 4 (Illegal function call, mov r0,#0x4 / bl 0x1fffdc @0x165798-0x1657a4)."
  - "LAYER must be in 0..3 in both forms: evaluated and range-checked by the shared BG-layer getter FUN_001e2504 (bl @0x1657c0 set / @0x16587c get). A value < 0 or >= the BG-layer count [[0x315d60]+0x60] (= 4) raises errnum 10 (Out of range) — mov r0,#0xa @0x1e2560."
  - "X and Y are pixel coordinates evaluated as integers (integer getter method, blx [obj,#0x40] @0x1657e4/@0x165808) and converted to float internally (vcvt.f32.s32 @0x165838/@0x165840). The stored origin is offset by the layer's reference geometry before being applied via the set-origin helper (bl 0x00139cc4 @0x16585c)."
  - "The origin defines the pivot for rotation and scaling: BGROT rotates the layer about (HX,HY) and BGSCALE scales about it. Changing the origin moves that pivot without changing the scroll, rotation angle or scale themselves."
  - "The OUT form reads the stored origin back from the layer record ([r0,#0x28]/[r0,#0x24], widened vcvt.f64.f32 @0x1658b4) and returns HX,HY."
  - "BGHOME changes only the origin; it does not change scroll (BGOFS), rotation (BGROT), scale (BGSCALE) or visibility."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the SET form is not called with exactly 3 arguments, or the OUT form is not called with exactly 1 argument and two OUT variables" }
  - { errnum: 10, name: "Out of range", when: "layer is negative or > 3 (not in 0..3)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bghome.md (BGHOME Layer,X,Y — 'Sets the display origin of a layer'; 'Origin for rotation and scaling of the BG screen'; Layer 0-3; Position X,Y in pixel units; form 2 BGHOME Layer OUT HX,HY — 'Gets the display origin'; e.g. BGHOME 0,200,120 and BGHOME 0 OUT HX,HY)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGHOME handler @0x16575c: form select via return-count [r4,#0xc] — SET requires argcount==3 (cmp r0,#3 @0x165790), OUT requires retcount==2 && argcount==1 (cmp r1,#2 / cmpeq r0,#1 @0x165780); else mov r0,#0x4 errnum 4 via bl 0x1fffdc @0x165798-0x1657a4; layer eval+range bl 0x1e2504 @0x1657c0 (errnum 10 @0x1e2560); X,Y evaluated as integers via blx [r2,#0x40] @0x1657e4/@0x165808, converted vcvt.f32.s32 @0x165838 then set-origin bl 0x00139cc4 @0x16585c; OUT reads [r0,#0x28]/[r0,#0x24] vcvt.f64.f32 @0x1658b4; per-layer stride mov r1,#0xe3 @0x165844; state ptr 0x315d60." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG layer origin/home (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: ~188 calls — set 'BGHOME 0,200,120' with literals (~177x, e.g. D3E8N4AF/TXT/LUNAR_SAVIORS), arithmetic/negative expressions 'BGHOME 0,GX+BX*BGSIZE,GY-(BGHH-1)-BY*BGSIZE' (KDNNS384/TXT/MNT_TOWERCLIMB), whole-number float 'BGHOME 0,-8*16,-2.5*16' (5DLXNN3V/TXT/BF5), variable layer 'BGHOME BGN,BGW*16/2,BGH*16/2' (L1NV3344/TXT/EX8TECHDEMO). OUT form 'BGHOME L OUT HX,HY' (EKA3X4H1/TXT/F). (oracle-pending: integer coercion of non-integral X/Y + exact stored origin, queued)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9c): BGHOME 4,0,0 -> errnum 10; BGHOME -1,0,0 -> errnum 10; BGHOME 0,5 (2 args) -> errnum 4; BGSCREEN 0,32,32:BGHOME 0,200,120 raises nothing. All errline 1." }

confidence: disassembled

tests:
  # Origin side effects need the BG framebuffer oracle (O-T6, queued); errors derive from
  # the disassembly arg-count/layer guards.
  - { name: set_ok, code: "BGSCREEN 0,32,32\nBGHOME 0,200,120", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGHOME 4,0,0", expect: { error: { errnum: 10 } } }
  - { name: layer_negative, code: "BGHOME -1,0,0", expect: { error: { errnum: 10 } } }
  - { name: too_few_args, code: "BGHOME 0,5", expect: { error: { errnum: 4 } } }
