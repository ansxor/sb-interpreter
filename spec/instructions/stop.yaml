id: STOP
kind: statement
category: Control
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args: []
    note: "STOP — suspends the running program (breakpoint-like); resumable with CONT."

summary: "Suspends a running program, displaying the slot:line where it paused; CONT resumes it."

semantics:
  - "Pauses execution and reports the program SLOT and line number of the STOP."
  - "Unlike END (which terminates), a STOPped program can be resumed with CONT — though resuming is not available in certain situations."
  - "Primarily a debugging aid."

errors: []

sources:
