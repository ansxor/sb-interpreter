  - { type: disassembled, ref: "cia_3.6.0.lst STOP is a parser keyword (token @0x2ed598), not in the builtin dispatch table; suspends the VM (resumable) rather than halting" }

confidence: disassembled

tests:
  - { name: suspends_before_next, code: "PRINT \"A\"\nSTOP\nPRINT \"B\"", expect: { stdout: "A" } }
