id: POP
kind: function
category: Variables and Arrays
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: array, type: array, desc: "1D array to remove the last element from (numeric or string), OR a string variable (treated as a character array)" }
    returns: { type: any, desc: "Value of the removed last element (type matches the array; for a string operand, a 1-character string)" }
    note: "value = POP(array) — removes and returns the last element; the array (or string) shrinks by one."

summary: "Removes the last element of a 1D array and returns it. The number of elements decreases by 1. Also works on a string variable, removing and returning its last character."

semantics:
  - "POP(array) removes the final element, returns its value, and decreases LEN(array) by 1."
  - "Stack semantics: with PUSH, POP returns elements in LIFO order (PUSH 1, PUSH 2 -> POP=2 then POP=1)."
  - "The return value's type matches the array element type (Integer, Double, or String)."
  - "String operand (character-array form): POP(S$) removes and returns the LAST character of the string (e.g. S$=\"ABC\":POP(S$) returns \"C\" and leaves S$=\"AB\", LEN 2)."
  - "A numeric scalar operand raises errnum 8 (Type mismatch) — only arrays and strings are valid operands."
  - "POP must be used as a single-valued function; the handler checks the return-value count."
  - "Wrong argument count (not exactly one operand) raises errnum 4 (Illegal function call)."
  - "POP on an empty (length-0) array raises errnum 31 (Subscript out of range)."

errors:
  - { errnum: 31, name: "Subscript out of range", when: "POP on an empty (length-0) array" }
  - { errnum: 8, name: TypeMismatch, when: "the operand is a numeric scalar (not an array or string)" }
  - { errnum: 4, name: IllegalFunctionCall, when: "wrong number of arguments" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/pop.md (Variable=POP(Array); removes an element from the end; element count -1; returns the removed value)" }
  - { type: disassembled, ref: "cia_3.6.0.lst POP handler FUN_00148718 @0x148718: argc==1 + return-count==1 check else errnum 4 (mov r0,#4 @0x148740 -> 0x1fffdc); element-type dispatch on array/string tag 4/5/6 @0x14875c-0x148774, any other tag -> errnum 8 (mov r0,#8 @0x148780); removes the tail via the array helpers @0x1ed6f4/0x17f1e4" }
  - { type: community, ref: "sbsave corpus: POP on string variables/arrays (A$=POP(R$), POP(SBS$[K,2])) common (~339 string POPs), e.g. 24CVA3L4/TXT/PRG; POP result used inline in expressions (RETURN POP(PBS$)), e.g. 45WEV83E/TXT/DIST" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4b): DIM A[3]:A[2]=42:POP(A) -> 42; DIM A[3]:X=POP(A) -> LEN 2; PUSH A,1:PUSH A,2:POP:POP (sequential) -> 2,1 (LIFO); string POP S$=\"ABC\":POP(S$) -> \"C\", S$ left \"AB\" (LEN 2); DIM S$[0]:PUSH S$,\"hi\":POP(S$) -> hi; DIM A[0]:X=POP(A) -> errnum 31; X=5(scalar):POP(X) -> errnum 8" }

confidence: hw_verified

tests:
  - { name: pop_returns_last, code: "DIM A[3]\nA[2]=42\nPRINT POP(A)", expect: { stdout: "42" } }
  - { name: pop_shrinks_len, code: "DIM A[3]\nX=POP(A)\nPRINT LEN(A)", expect: { stdout: "2" } }
  - { name: push_pop_lifo, code: "DIM A[0]\nPUSH A,1\nPUSH A,2\nX=POP(A)\nY=POP(A)\nPRINT X;Y", expect: { stdout: "21" } }
  - { name: pop_string_array, code: "DIM S$[0]\nPUSH S$,\"hi\"\nPRINT POP(S$)", expect: { stdout: "hi" } }
  - { name: pop_string_char, code: "S$=\"ABC\"\nX$=POP(S$)\nPRINT X$;\",\";S$", expect: { stdout: "C,AB" } }
  - { name: pop_empty_error, code: "DIM A[0]\nX=POP(A)", expect: { error: { errnum: 31 } } }
  - { name: pop_scalar_mismatch, code: "X=5\nY=POP(X)", expect: { error: { errnum: 8 } } }
