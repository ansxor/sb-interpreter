id: BGHIDE
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer to hide." }
    note: "BGHIDE layer — make a BG layer invisible (exactly 1 arg, no return value)."

summary: "Hides (makes invisible) one BG layer. Takes exactly one layer argument; there is no all-layers form."

semantics:
  - "Requires exactly 1 argument and no return value. Argcount r1=[r0,#0x4] != 1, or a return requested (return-count [r0,#0xc] != 0), raises errnum 4 (Illegal function call) — cmp #1 / cmpeq [r0,#0xc],#0 / else mov r0,#0x4 @0x1656e4-0x1656ec."
  - "LAYER must be in 0..3. The layer is evaluated and range-checked by the shared layer getter FUN_001e2504 (bl @0x165708): a value < 0, or >= the BG-layer count [[0x315d60]+0x60] (= 4), raises errnum 10 (Out of range) — mov r0,#0xa @0x1e2560."
  - "Sets the layer's visibility flag to 0 (hidden): the handler indexes the layer record and stores 0 into its visibility byte — mov r1,#0 / strb r1,[r0,#0x0] @0x16573c-0x165744 (r0 = [layerRecord+0x4]). Idempotent: hiding an already-hidden layer leaves it hidden."
  - "Affects only visibility; it does not change the layer's tilemap (BGCLR/BGPUT), size (BGSCREEN) or scroll (BGOFS). BGSHOW is the inverse."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the argument count is not exactly 1, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "the layer is negative or > 3 (not in 0..3)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bghide.md (BGHIDE Layer — 'Hides the BG screen'; 'Layer 0-3'; e.g. BGHIDE 0)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGHIDE handler @0x1656c8: argcount [r0,#0x4] cmp #1 / cmpeq return-count [r0,#0xc],#0 beq 0x1656fc else mov r0,#0x4 errnum 4 @0x1656ec; layer eval+range via bl 0x1e2504 (errnum 10 @0x1e2560 when layer<0 or layer>=[[0x315d60]+0x60]); clear visibility mov r1,#0 / strb r1,[r0,#0x0] @0x16573c-0x165744; state ptr 0x315d60 [0x165754], layer base 0x19a2f50 [0x165758]." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG layer visibility flag (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: always the documented 1-arg form — 'BGHIDE 0' (~200x), 'BGHIDE 1', and variable 'BGHIDE BGMESG%' (~33x, e.g. B3E4324E/TXT/FNEKO121.PRG); no bare/0-arg and no multi-arg form observed. (oracle-pending: visibility side effect, queued)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9a): BGHIDE 4 -> errnum 10 (out of range); BGHIDE -1 -> errnum 10; bare 'BGHIDE' (no arg) -> errnum 4. All errline 1." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2; harness/harvest/out/bghide.tsv): BGHIDE's WHOLE headless-observable surface — call shape + layer range — confirmed against real SB 3.6.0 (7/7, 0 mismatch). ACCEPTED (NOERR): BGHIDE 0 and BGHIDE 3 (both layer endpoints of 0..3; no BGSCREEN/init required — a bare BGHIDE on a layer does not raise). REJECTED errnum 10 errline 1 (Out of range): BGHIDE 4 (layer > 3), BGHIDE -1 (layer < 0) — pins the FUN_001e2504 layer-count bound. REJECTED errnum 4 errline 1 (Illegal function call): BGHIDE (0 args), BGHIDE 0,1 (2 args), A=BGHIDE(0) (return-value context) — confirms the argcount==1 & return-count==0 shape gate. The visibility side effect itself stays O-T6 (no deterministic framebuffer golden), but — per the BGSHOW/BGMSTOP precedent for a pure state-setter with no readable value — the call-shape + layer-range contract IS the whole headless-observable surface, so it is hw_verified." }

confidence: hw_verified

tests:
  # The visibility side effect needs the BG framebuffer oracle (O-T6, queued); the call-shape +
  # layer-range contract below is hw_verified (sb-oracle 2026-06-22 s_t9a + 2026-06-24 batch,
  # harness/harvest/out/bghide.tsv) and IS the whole headless-observable surface of this setter.
  - { name: hide_ok, code: "BGSCREEN 0,32,32\nBGHIDE 0", expect: { stdout: "" } }
  # A bare BGHIDE (no BGSCREEN/init) on either layer endpoint is accepted (NOERR).
  - { name: hide_layer0_bare, code: "BGHIDE 0", expect: { stdout: "" } }
  - { name: hide_layer3, code: "BGHIDE 3", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGHIDE 4", expect: { error: { errnum: 10 } } }
  - { name: layer_negative, code: "BGHIDE -1", expect: { error: { errnum: 10 } } }
  - { name: missing_arg, code: "BGHIDE", expect: { error: { errnum: 4 } } }
  - { name: two_args_error, code: "BGHIDE 0,1", expect: { error: { errnum: 4 } } }
  - { name: return_context_error, code: "A=BGHIDE(0)", expect: { error: { errnum: 4 } } }
