id: INKEY$
kind: function
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args: []
    returns: { type: string, desc: "One character (UTF-16) from the keyboard buffer, or \"\" (empty) if no key is pending" }
    note: "result$ = INKEY$() — non-blocking read of one buffered keyboard character."

summary: "Reads a single character from the keyboard WITHOUT waiting. Returns the character (UTF-16) if one is pending, or an empty string if there is no input."

semantics:
  - "INKEY$() returns immediately: it does not block waiting for input (unlike INPUT/LINPUT)."
  - "If a key is in the input buffer, it returns that one character (UTF-16); otherwise it returns the empty string \"\"."
  - "Typically polled each frame in a loop to read keyboard input non-blockingly."
  - "Each call consumes at most one buffered character."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/inkey.md (String=INKEY$(); one UTF-16 char from the keyboard without waiting; \"\" if no input)" }
  - { type: disassembled, ref: "cia_3.6.0.lst INKEY$ handler FUN_0014b1dc @0x14b1dc: pops one character from the keyboard input buffer and returns it as a string, or returns an empty string when the buffer is empty" }
  - { type: community, ref: "sbsave corpus: ~178 INKEY$, ALWAYS called with empty parens INKEY$() (no bare form); common polling idioms (REPEAT:K$=INKEY$():UNTIL K$!=\"\" in 2KE3384V/TXT/CAT; WHILE INKEY$()==\"\"); char compares (==\"Q\", ==CHR$(13)); ASC(INKEY$())" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5b): with no key pending INKEY$() returns the empty string (LEN(INKEY$())=0; INKEY$()==\"\" -> 1; CLS:PRINT \"[\";INKEY$();\"]\" -> console shows [])" }

confidence: hw_verified

tests:
  - { name: inkey_empty_when_no_input, code: "PRINT \"[\";INKEY$();\"]\"", expect: { stdout: "[]" } }
  - { name: inkey_len_zero_no_input, code: "PRINT LEN(INKEY$())", expect: { stdout: "0" } }
