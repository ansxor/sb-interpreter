id: INPUT
kind: statement
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: prompt, type: string, optional: true, desc: "Guiding text; followed by ; (shows a '?') or , (no '?'). A string variable prompt is allowed only with ;" }
      - { name: var, type: any, desc: "Variable to receive the input (numeric or string)" }
      - { name: more, type: any, optional: true, desc: "Additional comma-separated variables, filled in order" }
    note: "INPUT [prompt(; or ,)] var [, var2, ...] — read keyboard input into the variable(s)."

summary: "Reads numeric or string values from the keyboard into one or more variables, waiting for ENTER. Interactive — not value-harvestable."

semantics:
  - "INPUT blocks until the user types a line and presses ENTER, then parses it into the listed variables."
  - "An optional guiding prompt may precede the variables: with ';' a '?' prompt marker is shown; with ',' the '?' is suppressed. A string-variable prompt is allowed only with the ';' form."
  - "Multiple comma-separated variables are filled from the typed line (the user separates values with commas)."
  - "If too few values are entered for the variable list, SmileBASIC shows \"?Redo from start\" and re-prompts."
  - "A value typed into a numeric variable is parsed as a number; into a string variable, taken as text. Commas in input terminate a field (use [[linput]] to read commas literally)."
  - "The prompt is fully optional: a bare INPUT var (no prompt text) is common and just waits for input."
  - "INPUT is interactive (waits for the keyboard); its result cannot be captured by the deterministic value oracle (queued)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "a non-numeric entry is given for a numeric variable (after the Redo retry path)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/input.md (INPUT [\"text\";]var[,var2...]; waits for ENTER; ';' shows '?', ',' suppresses it; string-var prompt only with ';'; '?Redo from start' if insufficient)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: INPUT keyword name @0x2ed640 (token-name table region shared with LINPUT/PRINT); a parser special form (not in the builtin dispatch table) compiled to a console-read + parse-into-variables routine with the Redo retry loop" }
  - { type: community, ref: "sbsave corpus: ~1,646 INPUT; both ;-prompt (~631) and ,-prompt (~557) common; bare INPUT var with no prompt frequent (~128, e.g. 432334QP/TXT/CONTEST: INPUT ANSWER); string-variable prompt with ; real (INPUT TMP$;TXTNO in 43Y5BEH3/TXT/LIBRARY); multi-variable INPUT essentially unused in the corpus" }

confidence: disassembled

tests:
  - { name: input_parses_ok, code: "INPUT \"NAME\";N$", expect: { stdout: "" } }
  - { name: input_no_question_comma, code: "INPUT \"X\",A", expect: { stdout: "" } }
