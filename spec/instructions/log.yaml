id: LOG
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: value, type: number, range: "> 0", desc: "Antilogarithm" }
    returns: { type: double, desc: "Natural logarithm ln(value)" }
    note: "One-argument form: natural logarithm (base e)."
  - args:
      - { name: value, type: number, range: "> 0", desc: "Antilogarithm" }
      - { name: base, type: number, range: "> 0, != 1", desc: "Logarithm base" }
    returns: { type: double, desc: "Logarithm of value in the given base, ln(value)/ln(base)" }

summary: "Returns the logarithm of value. With one argument the natural log; with two, the logarithm in the given base."

semantics:
  - "One argument: LOG(value) = ln(value). LOG(1)=0."
  - "Two arguments: LOG(value, base) = ln(value) / ln(base). LOG(2,2)=1, LOG(8,2)=3, LOG(100,10)=2."
  - "Both args coerced to Double; result is a Double. Unlike osb (3.5.0, which rejects base<=1), 3.6.0 ALLOWS a base in (0,1) — e.g. LOG(8,0.5)=-3 — and only rejects base==1 (ln(base)=0 -> division by zero)."

errors:
  - { errnum: 10, name: OutOfRange, when: "value <= 0, or base <= 0" }
  - { errnum: 4, name: IllegalFunctionCall, when: "base == 1 (ln(base) is 0); or argument count is not 1 or 2" }
  - { errnum: 8, name: TypeMismatch, when: "any argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/log.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst LOG handler @0x148030; 1 arg: value<=0 -> errnum 10 else ln @0x1eb6c8; 2 args: value<=0 or base<=0 -> errnum 10, then ln(value)/ln(base), base==1 (ln=0) -> `mov r0,#0x4` errnum 4; non-number -> errnum 8" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: LOG(1)=0, LOG(2,2)=1, LOG(8,2)=3, LOG(100,10)=2, LOG(10)=2.30259, LOG(8,0.5)=-3 (base in (0,1) allowed)" }
  - { type: hw_verified, ref: "sb-oracle PRINT read-back 2026-06-23: PRINT renders doubles via %.8f (M7-T4) — PRINT LOG(10)=2.30258509; distinct from STR$ %g shown above" }

confidence: hw_verified

tests:
  # numeric expects below are hw_verified (sb-oracle 2026-06-22); error cases are disassembled.
  - { name: natural_log_one,  code: "PRINT LOG(1)",     expect: { stdout: "0" } }
  - { name: natural_log_ten,  code: "PRINT LOG(10)",    expect: { stdout: "2.30258509" } }
  - { name: base2_doc,        code: "PRINT LOG(2,2)",   expect: { stdout: "1" } }
  - { name: base2_eight,      code: "PRINT LOG(8,2)",   expect: { stdout: "3" } }
  - { name: base10_hundred,   code: "PRINT LOG(100,10)", expect: { stdout: "2" } }
  - { name: base_half_allowed, code: "PRINT LOG(8,0.5)", expect: { stdout: "-3" } }
  - { name: zero_out_of_range, code: "A=LOG(0)",        expect: { error: { errnum: 10 } } }
  - { name: base_one_illegal,  code: "A=LOG(2,1)",      expect: { error: { errnum: 4 } } }
  - { name: base_zero_out_of_range, code: "A=LOG(2,0)", expect: { error: { errnum: 10 } } }
  - { name: string_type_mismatch,   code: 'A=LOG("x")', expect: { error: { errnum: 8 } } }
