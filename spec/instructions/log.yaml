# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: LOG
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: ">0", desc: "Antilogarithm" }
    returns: { type: double, desc: "Natural logarithm (base e) of value" }
    note: "One-arg form: natural log."
  - args:
      - { name: value, type: number, range: ">0", desc: "Antilogarithm" }
      - { name: base,  type: number, range: ">0", desc: "Logarithm base" }
    returns: { type: double, desc: "Logarithm of value in the given base" }
    note: "Two-arg form: log(value)/log(base)."

summary: "Returns the logarithm of value. With one argument, the natural log (base e); with two, the log in the given base."

semantics:
  - "One arg: LOG(value) = ln(value). Two args: LOG(value, base) = ln(value)/ln(base)."
  - "Result is always Double. LOG(1)=0, LOG(2,2)=1, LOG(100,10)=2."

errors:
  - { errnum: 10, name: OutOfRange, when: "value <= 0 (or base outside its valid domain)" }
  - { errnum: 8,  name: TypeMismatch, when: "an argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/log.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: LOG(1)=0, LOG(2,2)=1, LOG(100,10)=2", confidence: hw_verified }
  # Exact value<=0 / base domain errnum is documented/osb — confirm via O-T5 (error capture).

confidence: hw_verified

tests:
  - { name: ln_one,      code: "PRINT LOG(1)",      expect: { stdout: "0" } }
  - { name: base2,       code: "PRINT LOG(2,2)",    expect: { stdout: "1" } }
  - { name: base10,      code: "PRINT LOG(100,10)", expect: { stdout: "2" } }
  - { name: non_positive, code: "A=LOG(0)",         expect: { error: { errnum: 10 } } }
