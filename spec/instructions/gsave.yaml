id: GSAVE
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: dest_array, type: "integer array", desc: "1-D numeric array variable to receive the image data (auto-expanded if too short)" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = store 32-bit logical (converted) colors, 1 = store raw 16-bit physical codes" }
    note: "GSAVE dest_array,flag — saves the WHOLE current drawing area from the current drawing page (2 args, no return value)."
  - args:
      - { name: src_page, type: integer, range: "0-5 (GRP0-GRP5) or -1 (GRPF)", desc: "Transfer source graphic page; omitted = current drawing page" }
      - { name: dest_array, type: "integer array", desc: "1-D numeric array variable to receive the image data" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = 32-bit logical colors, 1 = raw 16-bit physical codes" }
    note: "GSAVE src_page,dest_array,flag — saves the whole drawing area from src_page (3 args)."
  - args:
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "Copy-source start X" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Copy-source start Y" }
      - { name: width, type: integer, range: ">= 1 (pixels)", desc: "Copy-source width in pixels" }
      - { name: height, type: integer, range: ">= 1 (pixels)", desc: "Copy-source height in pixels" }
      - { name: dest_array, type: "integer array", desc: "1-D numeric array variable to receive the image data" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = 32-bit logical colors, 1 = raw 16-bit physical codes" }
    note: "GSAVE x,y,width,height,dest_array,flag — saves a sub-rectangle of the current drawing page (6 args)."
  - args:
      - { name: src_page, type: integer, range: "0-5 (GRP0-GRP5) or -1 (GRPF)", desc: "Transfer source graphic page; omitted = current drawing page" }
      - { name: x, type: integer, range: "graphic-page coordinate", desc: "Copy-source start X" }
      - { name: y, type: integer, range: "graphic-page coordinate", desc: "Copy-source start Y" }
      - { name: width, type: integer, range: ">= 1 (pixels)", desc: "Copy-source width in pixels" }
      - { name: height, type: integer, range: ">= 1 (pixels)", desc: "Copy-source height in pixels" }
      - { name: dest_array, type: "integer array", desc: "1-D numeric array variable to receive the image data" }
      - { name: convert_flag, type: integer, range: "0 or 1", desc: "0 = 32-bit logical colors, 1 = raw 16-bit physical codes" }
    note: "GSAVE src_page,x,y,width,height,dest_array,flag — saves a sub-rectangle from src_page (7 args)."

summary: "Copies an image (the whole drawing area, or a given sub-rectangle, of a graphic page) into a numeric array, in either converted 32-bit logical colors or raw 16-bit physical codes."

semantics:
  - "Accepts exactly 2, 3, 6, or 7 args. The optional leading src_page and the optional X,Y,Width,Height block are independent: 2 = array,flag; 3 = page,array,flag; 6 = x,y,w,h,array,flag; 7 = page,x,y,w,h,array,flag. Any other count, or requesting a return value, raises errnum 4 (Illegal function call): return-count [r5,#0xc] cmp #0 bne -> errnum 4 @0x153f0c; the count is matched at cmp #3/cmpne #7 @0x153edc then cmp #2 @0x153ef8 / cmp #6 @0x153f04, else mov r0,#0x4 @0x153f14."
  - "When a leading src_page is present (count 3 or 7) it is fetched and range-checked: -1 (GRPF) through 5 (GRP5) — cmn r0,#0x1 blt / cmp #5 ble @0x153f60-0x153f68 — otherwise errnum 10 (Out of range), mov r0,#0xa @0x153f78. When omitted, the source defaults to the current drawing page (page field +0x34 -> sp+0x24 @0x153eec)."
  - "When X,Y,Width,Height are omitted (count 2 or 3), the whole current drawing area is saved: the drawable rectangle is computed via bl 0x18fec0 and its width/height derived as (x2-x1+1), (y2-y1+1) @0x153fd8-0x154020."
  - "When X,Y,Width,Height are given (count 6 or 7), Width and Height must be valid: a negative / out-of-range width or height raises errnum 10 (cmp #0 blt / cmn #0x80000001 ble guards at @0x1540ec and @0x15411c, each mov r0,#0xa)."
  - "dest_array must be a numeric array; if it is one-dimensional and too small it is AUTO-EXPANDED to hold width*height elements (resize helper bl 0x1ef4d0 @0x154238). If the array is multi-dimensional (or otherwise cannot grow) and too small, errnum 31 (Subscript out of range) is raised — dim-count cmp #1 / mov r0,#0x1f @0x154218."
  - "convert_flag selects the element format: 0 converts each pixel to a 32-bit logical (ARGB) color; 1 stores the raw 16-bit physical color code unchanged. The save is performed by the helper at bl 0x1ef... reached after the array is sized; the handler checks the per-page guard byte [page+0x60] and, if set, raises errnum 49 (Protected resource, mov r0,#0x31 @0x154294). This guard is a DRM/copy-protection flag set only on protected resources — it is NOT set on any user-accessible page (GRPF, GRP0-GRP5), so user SB code CANNOT trigger errnum 49 from GSAVE (hw_verified sb-oracle 2026-06-26 s_t7d_49: sweeping GSAVE src=-1..5 over a drawn-on page yields valid pixel reads with no raise; an ON ERROR sweep over all src pages traps NO error). The graphics context is read via globals [0x15435c]/[0x154360]."

errors:
  - { errnum: 4, name: "Illegal function call", when: "argument count is not 2, 3, 6, or 7, or a return value is requested (used as a function)" }
  - { errnum: 10, name: "Out of range", when: "an explicit source page is outside -1..5, or a given Width/Height is negative/out of range" }
  - { errnum: 31, name: "Subscript out of range", when: "dest_array is multi-dimensional (cannot auto-grow) and has fewer than width*height elements" }
  - { errnum: 49, name: "Protected resource", when: "the resolved source graphic plane has its DRM guard byte [page+0x60] set (mov r0,#0x31 @0x154294). This guard is set only on protected/copy-guarded resources and is NOT set on any user-accessible page (GRPF, GRP0-GRP5), so it is NOT triggerable by user SB code (hw_verified s_t7d_49 sweep, 2026-06-26)." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gsave.md (GSAVE [Transfer source page,] [X,Y,Width,Height,] Transfer destination array, Color conversion flag — copies an image (whole screen) to an array; src page 0-5 / -1 GRPF / omitted=current; coords omitted=current drawing area; if the 1-D array is too short the needed elements are added automatically; flag 0 converts to 32-bit logical colors, 1 leaves the 16-bit physical codes; e.g. DIM WORK[0] : GSAVE 0,0,0,512,512,WORK,1)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GSAVE handler @0x153eb8 (FUN_00153eb8): ctx globals ldr [0x15435c]/[0x154360]; return-count r0=[r5,#0xc] cmp #0 bne 0x153f0c -> mov r0,#0x4 bl 0x1fffdc (errnum 4); argcount r6=[r5,#0x4] cmp #3/cmpne #7 beq 0x153f24 (page present), then cmp #2 beq 0x153f8c (whole area) / cmp #6 beq 0x154024 (sub-rect), else mov r0,#0x4 @0x153f14; default page [[..]+0x34]->sp+0x24 @0x153eec; page range cmn r0,#0x1 blt 0x153f70 / cmp #5 ble 0x153f54 else mov r0,#0xa (errnum 10) @0x153f78; whole-area rect via bl 0x18fec0 @0x153ff4 (w=x2-x1+1,h=y2-y1+1); W/H guard cmp #0 blt / cmn #0x80000001 ble -> mov r0,#0xa @0x154108/@0x154138; array dim cmp #1 else mov r0,#0x1f (errnum 31) @0x154218; array auto-expand bl 0x1ef4d0 @0x154238; page guard ldrb [page+0x60] -> mov r0,#0x31 (errnum 49) @0x154294; values fetched via vtable numeric [r2,#0x40] / array [r2,#0x48]." }
  - { type: community, ref: "osb/SMILEBASIC/graphic.d Graphic2 GSAVE: dumps a graphic-page rectangle into a numeric array with a color-conversion flag (3.5.0 structural cross-check only)." }
  - { type: community, ref: "sbsave corpus: GSAVE appears ~520x — all four documented arg counts occur: 3-arg page,array,flag (e.g. 4K24P3MD/TXT/VFONT.LIB 'GSAVE 3,GRPF%,1'), 7-arg page,x,y,w,h,array,flag ('GSAVE 5,SX,SY,16,16,T%,1'), and GRPF -1 source ('GSAVE -1,0,0,512,512,T%,0'). convert_flag is commonly written as TRUE/FALSE/#TRUE (= 1/0). Confirms the signatures are legal; runtime output unproven (framebuffer oracle pending, O-T6)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7d): GSAVE 0,0,W,1 (4 args, W a DIM'd array) -> errnum 4, errline 1; GSAVE 6,W,1 (source page 6, out of -1..5) -> errnum 10; A=GSAVE(W,1) (used as a function) -> errnum 4." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-23 (s_t7d_bitmap): a 2-arg whole-area GSAVE auto-expands the 1-D array to 512x512 = 262144 elements (DIM W[0]:GSAVE W,1:LEN(W) -> 262144); a 6-arg 8x8 sub-rect -> 64 elements. convert_flag 1 stores the raw RGBA5551 physical code (red GPSET 0,0 -> W[0] = 63489 = 0xF801), flag 0 stores the 32-bit logical color (red -> W%[0] = -524288 = 0xFFF80000 signed, = 4294443008 unsigned in a Double array). A string dest array -> errnum 8 (Type mismatch)." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-24 (M7-T2 run 51, harness/harvest/out/gsave.tsv, case file harness/harvest/gsave_cases.txt): the saved array contents pinned by direct read-back. (1) FILL ORDER is ROW-MAJOR — a 2x2 sub-rect painted (10,10)=red (11,10)=green (10,11)=blue (11,11)=white saved raw gives W=[63489,1985,63,65535] (element 1 is x+1 same row, element 2 is the next row), confirming W[j*w+i]=pixel(x+i,y+j). (2) RGBA5551 raw codes (flag 1, layout R[15:11] G[10:6] B[5:1] A[0]): red=63489 (0xF801), green=1985 (0x07C1), blue=63 (0x003F), white=65535 (0xFFFF). (3) 32-bit logical (flag 0, into Int array, signed; 5-bit channel left-shift-expand so 255->0xF8): red=-524288 (0xFFF80000), green=-16713728 (0xFF00F800), blue=-16776968 (0xFF0000F8), white=-460552 (0xFFF8F8F8). (4) An untouched pixel reads 0 under both flags. (5) The explicit src_page arg selects the source page, NOT the current manip page: with red on page 0 and the manip page switched to a blank page 1 (GPAGE 0,1:GCLS), GSAVE 0,... -> 63489 (page 0 red) while GSAVE 1,... -> 0 (page 1 blank); and a no-page-arg GSAVE reads the current manip page (page 1) -> 0. (6) The 2-arg whole-area form is row-major from pixel(0,0): W[0]=pixel(0,0), W[1]=pixel(1,0), LEN=262144. sb-core matches every value exactly (no code change)." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-26 (s_t7d_49): errnum 49 is NOT triggerable from user code — every legal source page is usable. Sweeping GSAVE src=0..5 (draw red on the page, GSAVE src,0,0,1,1,W,1) yields 63489 (red raw) for each of GRP0/1/2/3/4/5; GSAVE -1 (GRPF) reads a valid pixel with no raise; an ON ERROR GOTO @E harness over all src pages -1..5 traps NO error (ERRNUM stays 0). The [page+0x60] guard is a DRM flag not set on user-accessible pages. Error name 'Protected resource' per spec/reference/errors.yaml #49 (in_docs:false)." }

confidence: hw_verified

tests:
  # error/arg-count expects are hw_verified (sb-oracle 2026-06-22 s_t7d); array-content +
  # fill-order + cross-page expects hw_verified via direct array read-back (M7-T2 run 51,
  # harness/harvest/out/gsave.tsv). raw (flag 1) = RGBA5551 code; logical (flag 0, Int array)
  # = signed 32-bit ARGB. red=63489/-524288, green=1985/-16713728, blue=63/-16776968,
  # white=65535/-460552, transparent=0/0.
  - { name: save_whole_default_ok, code: "DIM WORK[0]\nGSAVE WORK,1", expect: { stdout: "" } }
  - { name: save_page_whole_ok, code: "DIM WORK[0]\nGSAVE 0,WORK,1", expect: { stdout: "" } }
  - { name: save_subrect_ok, code: "DIM WORK[0]\nGSAVE 0,0,64,64,WORK,1", expect: { stdout: "" } }
  - { name: save_page_subrect_ok, code: "DIM WORK[0]\nGSAVE 0,0,0,64,64,WORK,1", expect: { stdout: "" } }
  - { name: four_args_errors, code: "DIM WORK[0]\nGSAVE 0,0,WORK,1", expect: { error: { errnum: 4 } } }
  - { name: bad_src_page_errors, code: "DIM WORK[0]\nGSAVE 6,WORK,1", expect: { error: { errnum: 10 } } }
  - { name: string_array_type_mismatch, code: "DIM WORK$[64]\nGSAVE 0,0,8,8,WORK$,1", expect: { error: { errnum: 8 } } }
  - { name: as_function_errors, code: "DIM WORK[0]\nA=GSAVE(WORK,1)", expect: { error: { errnum: 4 } } }
  # --- fill order is ROW-MAJOR: 2x2 sub-rect (10,10)=red (11,10)=green (10,11)=blue (11,11)=white ---
  - { name: roworder_raw, code: "GCLS:GPSET 10,10,RGB(255,0,0):GPSET 11,10,RGB(0,255,0):GPSET 10,11,RGB(0,0,255):GPSET 11,11,RGB(255,255,255):DIM W[0]:GSAVE 10,10,2,2,W,1:PRINT STR$(W[0])+\" \"+STR$(W[1])+\" \"+STR$(W[2])+\" \"+STR$(W[3])", expect: { stdout: "63489 1985 63 65535" } }
  - { name: roworder_logical, code: "GCLS:GPSET 10,10,RGB(255,0,0):GPSET 11,10,RGB(0,255,0):GPSET 10,11,RGB(0,0,255):GPSET 11,11,RGB(255,255,255):DIM W%[0]:GSAVE 10,10,2,2,W%,0:PRINT STR$(W%[0])+\" \"+STR$(W%[1])+\" \"+STR$(W%[2])+\" \"+STR$(W%[3])", expect: { stdout: "-524288 -16713728 -16776968 -460552" } }
  # --- raw (flag 1) RGBA5551 codes per color ---
  - { name: raw_red, code: "GCLS:GPSET 0,0,RGB(255,0,0):DIM W[0]:GSAVE 0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "63489" } }
  - { name: raw_green, code: "GCLS:GPSET 0,0,RGB(0,255,0):DIM W[0]:GSAVE 0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "1985" } }
  - { name: raw_blue, code: "GCLS:GPSET 0,0,RGB(0,0,255):DIM W[0]:GSAVE 0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "63" } }
  - { name: raw_white, code: "GCLS:GPSET 0,0,RGB(255,255,255):DIM W[0]:GSAVE 0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "65535" } }
  # --- logical (flag 0, Int array) signed 32-bit ARGB per color ---
  - { name: log_red, code: "GCLS:GPSET 0,0,RGB(255,0,0):DIM W%[0]:GSAVE 0,0,1,1,W%,0:PRINT W%[0]", expect: { stdout: "-524288" } }
  - { name: log_green, code: "GCLS:GPSET 0,0,RGB(0,255,0):DIM W%[0]:GSAVE 0,0,1,1,W%,0:PRINT W%[0]", expect: { stdout: "-16713728" } }
  - { name: log_blue, code: "GCLS:GPSET 0,0,RGB(0,0,255):DIM W%[0]:GSAVE 0,0,1,1,W%,0:PRINT W%[0]", expect: { stdout: "-16776968" } }
  - { name: log_white, code: "GCLS:GPSET 0,0,RGB(255,255,255):DIM W%[0]:GSAVE 0,0,1,1,W%,0:PRINT W%[0]", expect: { stdout: "-460552" } }
  # --- untouched pixel reads 0 under both flags ---
  - { name: raw_transparent, code: "GCLS:DIM W[0]:GSAVE 5,5,1,1,W,1:PRINT W[0]", expect: { stdout: "0" } }
  - { name: log_transparent, code: "GCLS:DIM W%[0]:GSAVE 5,5,1,1,W%,0:PRINT W%[0]", expect: { stdout: "0" } }
  # --- explicit src_page selects that page; no-page-arg reads the current manip page ---
  - { name: xpage_src0, code: "GCLS:GPSET 0,0,RGB(255,0,0):GPAGE 0,1:GCLS:DIM W[0]:GSAVE 0,0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "63489" } }
  - { name: xpage_src1, code: "GCLS:GPSET 0,0,RGB(255,0,0):GPAGE 0,1:GCLS:DIM W[0]:GSAVE 1,0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "0" } }
  - { name: default_page_is_manip, code: "GCLS:GPSET 0,0,RGB(255,0,0):GPAGE 0,1:GCLS:DIM W[0]:GSAVE 0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "0" } }
  # --- 2-arg whole-area save is row-major from (0,0); LEN = 512x512 ---
  - { name: whole_order, code: "GCLS:GPSET 0,0,RGB(255,0,0):GPSET 1,0,RGB(0,255,0):DIM W[0]:GSAVE W,1:PRINT STR$(W[0])+\" \"+STR$(W[1])+\" \"+STR$(LEN(W))", expect: { stdout: "63489 1985 262144" } }
  # --- errnum 49 page-availability guard is NOT user-triggerable (s_t7d_49, 2026-06-26):
  # every legal source page -1..5 is usable; GSAVE from any of them does not raise. ---
  - { name: save_src_page5_usable, code: "GCLS:GPAGE 0,5:GCLS:GPSET 0,0,RGB(255,0,0):GPAGE 0,0:DIM W[0]:GSAVE 5,0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "63489" } }
  - { name: save_src_page4_usable, code: "GCLS:GPAGE 0,4:GCLS:GPSET 0,0,RGB(255,0,0):GPAGE 0,0:DIM W[0]:GSAVE 4,0,0,1,1,W,1:PRINT W[0]", expect: { stdout: "63489" } }
