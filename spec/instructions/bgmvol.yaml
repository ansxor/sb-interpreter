id: BGMVOL
kind: statement
category: Sound
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — set the volume of track 0.
  - args:
      - { name: volume, type: integer, range: "0..127", desc: "Volume level to set on track 0." }
    note: "BGMVOL volume — set the volume of track 0 (1 arg)."
  # Form 2 — set the volume of an explicit track.
  - args:
      - { name: track, type: integer, range: "0..7", desc: "Target track number." }
      - { name: volume, type: integer, range: "0..127", desc: "Volume level to set." }
    note: "BGMVOL track, volume — set the volume of a chosen track (2 args)."

summary: "Sets the playback volume (0-127) for a BGM track. With one argument the volume applies to track 0; with two arguments the first selects the track (0-7) and the second is the volume. Returns nothing (statement)."

semantics:
  - "Shape gate: the result count [r0,#0xc] must be 0 (cmp r0,#0 / bne @0x1a26f4 -> errnum 4); BGMVOL is a statement. The argument count [r4,#0x4] minus 1 must be < 2 unsigned (sub r1,r0,#0x1 / cmp r1,#0x2 / bcc @0x1a270c), i.e. exactly 1 or 2 arguments. Any other count raises errnum 4 (Illegal function call) errline -1 (mov r2,#0x0 / mvn r1,#0x0 / mov r0,#0x4 / bl 0x1fffdc @0x1a26f4-0x1a2700)."
  - "One-argument form (cmp r0,#0x1 / beq @0x1a2780): the track is the constant 0 and arg index 0 is the VOLUME, evaluated and range-checked via the shared integer-arg helper FUN_001eec7c with max sp[0]=#0x7f (=127) -> volume must be 0..127 else errnum 10 (Out of range)."
  - "Two-argument form (@0x1a2718): arg index 0 is the TRACK, evaluated via FUN_001eec7c with max sp[0]=#0x7 -> 0..7 else errnum 10; arg index 1 is the VOLUME, evaluated via FUN_001eec7c with max sp[0]=#0x7f -> 0..127 else errnum 10. The handler then applies the volume (bl 0x1dfb60) and returns 0."
  - "BGMVOL adjusts the mix level of a track started by [[bgmplay]]; the audible result has no deterministic emulator golden (O-T7). The call shape, track range (0..7) and volume range (0..127) are pinned here. See also the per-note V command inside MML."

errors:
  - { errnum: 4, name: "Illegal function call", when: "used in a return context, or the argument count is not 1 or 2" }
  - { errnum: 10, name: "Out of range", when: "the track is not in 0..7, or the volume is not in 0..127" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgmvol.md (`BGMVOL [Track number,] Volume` — track 0-7 (default 0); volume 0-127; example BGMVOL 0,64)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGMVOL handler @0x1a26cc: result-count [r0,#0xc] cmp r0,#0 bne @0x1a26f4 (statement) else errnum 4 errline -1 mov r2,#0x0 mvn r1,#0x0 mov r0,#0x4 bl 0x1fffdc @0x1a26f4; argcount [r4,#0x4] sub r1,r0,#0x1 cmp r1,#0x2 bcc @0x1a270c (1..2); 1-arg @0x1a2780 volume only, track=0, vol via bl 0x1eec7c max sp[0]=#0x7f (mov r5,#0x7f); 2-arg @0x1a2718 track via bl 0x1eec7c max sp[0]=#0x7, volume via bl 0x1eec7c max sp[0]=#0x7f, apply bl 0x1dfb60 @0x1a2770. Audio-state literal [0x1a27b4]=0x01D08280" }
  - { type: disassembled, ref: "cia_3.6.0.lst shared integer-arg range helper FUN_001eec7c @0x1eec7c: bounds-checks the evaluated value [r4,#0x0] against min r3 (=0) and max stack-arg [sp,#0x18] (cmp r1,r6 / cmpge r7,r1 / bge ok), raising errnum 10 on out-of-range (mov r2,#0x0 / mov r0,#0xa / b 0x1fffdc @0x1eeccc) — enforces the track (max 7) and volume (max 127) bounds" }
  - { type: community, ref: "osb/SMILEBASIC/sound.d BGM volume (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bBGMVOL\\b'): 159 files — both the 1-arg volume-only form and the 2-arg track,volume form, often called repeatedly to ramp volume (e.g. 41x in 4K33NPAX/TXT/STGHOLIC, 30x in DSJB3DD/TXT/SSKMQ) — proving both forms are LEGAL syntax. Audible level unproven (no oracle, O-T7)." }

confidence: disassembled

tests:
  # Call shape + error conditions from the disassembly. Audible volume is oracle-pending (O-T7).
  - { name: set_volume_track0, code: "BGMVOL 64", expect: { stdout: "" } }
  - { name: set_volume_track, code: "BGMVOL 0,64", expect: { stdout: "" } }
  - { name: volume_out_of_range, code: "BGMVOL 128", expect: { error: { errnum: 10 } } }
  - { name: track_out_of_range, code: "BGMVOL 8,64", expect: { error: { errnum: 10 } } }
  - { name: used_as_function, code: "A=BGMVOL(64)", expect: { error: { errnum: 4 } } }
