id: BGSTOP
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — stop all layers' animations.
  - args: []
    note: "BGSTOP — pause animation of ALL BG layers (0 args)."
  # Form 2 — stop one layer's animation.
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
    note: "BGSTOP layer — pause animation of one BG layer (1 arg)."

summary: "Stops (pauses) BG animation. With no argument it pauses animation for ALL layers; with a layer number it pauses just that one layer. BGSTOP sets the per-layer 'animation stopped' flag (bit 0x40); BGSTART clears it to resume. While stopped, BGCHK returns 0 for that layer. Returns nothing."

semantics:
  - "Return-count gate: the return count [r0,#0xc] must be 0 (cmp r1,#0 / bne @0x166244 -> errnum 4); BGSTOP is a statement, never a function."
  - "Form is chosen by argcount r1=[r0,#0x4]: 0 -> stop-all (beq @0x16625c), 1 -> stop-one (cmp r1,#1 / beq @0x1662ac), any other count raises errnum 4 (Illegal function call) with errline -1 (mov r2,#0x0 / mvn r1,#0x0 / mov r0,#0x4 / bl 0x1fffdc @0x166244-0x166250)."
  - "Stop-all (no arg) iterates every BG layer: it loads the BG state [r5,#0x0] and the layer count [r1,#0x60] (= 4), and for each layer SETS the stop flag bit 0x40 in the layer record's first word (orr r3,r3,#0x40 / str @0x16628c-0x166290). It raises NO error — no range checks. The per-layer record base is [r1,#0x5c] with stride 0xe3*8 (mov r2,#0xe3 / mul / add r2,r4,r2,lsl#0x3 @0x166274-0x166284)."
  - "Stop-one resolves the layer via the shared BG-layer getter FUN_001e2504 (bl 0x1e2504 @0x1662b8); a layer < 0 or >= 4 raises errnum 10 (Out of range). It then SETS the stop bit 0x40 in that layer's record word (orr r1,r1,#0x40 / str @0x1662e8-0x1662ec). There is NO active-bit / BGSCREEN guard — every layer 0..3 exists."
  - "BGSTOP only PAUSES the running animation (it sets bit 0x40); it does not clear the keyframe list, so BGSTART resumes from where it left off. State pointer literal [0x1662fc]=0x00315D60, layer-record base [0x166300]=0x019A2F50. See [[bgstart]] (resume) and [[bgchk]] (status reads 0 while stopped)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "more than one argument is given, or the call is used in a return context" }
  - { errnum: 10, name: "Out of range", when: "the single-layer form's layer is not in 0..3" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgstop.md (`BGSTOP [Layer]` — 'Stops BG animation'; Layer 0-3; 'If the layer is omitted, animation of all layers will be stopped')" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGSTOP handler @0x166214: ret-count [r0,#0xc] must be 0 cmp r1,#0 bne @0x166244; argcount [r0,#0x4] 0->all @0x16625c, 1->one @0x1662ac, else errln -1 mov r2,#0x0 mvn r1,#0x0 mov r0,#0x4 bl 0x1fffdc errnum 4 @0x166244; all-form layer count ldr r2,[r1,#0x60], per-layer orr r3,r3,#0x40 [layer+0x0] @0x16628c (SET stop bit, no error), stride mov r2,#0xe3 mul lsl#3 base [r1,#0x5c] @0x166274; one-form layer via bl 0x1e2504 @0x1662b8 (errnum 10 @0x1e2560), orr r1,r1,#0x40 @0x1662e8; NO active-bit guard. State ptr [0x1662fc]=0x00315D60, layer base [0x166300]=0x019A2F50." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG layer animation run/stop flag (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bBGSTOP\\b'): 34 files, 58 lines — both the bare all-layers form `BGSTOP` and the per-layer form `BGSTOP 0` / `BGSTOP 2` (43KNQEA6/TXT/3DENGINE, DK384E4S/TXT/GAME), often paired `BGSTOP:SPSTOP` (2XVV233J/TXT/GAME.PRG) — proving both forms are LEGAL syntax." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9d): BGSTOP 4 -> errnum 10 errline 1 (single-layer form, layer out of range). The pause is observable via BGCHK reading 0 after BGSTOP (see [[bgchk]] stopped path). Framebuffer effect oracle-pending (O-T6)." }

confidence: disassembled

tests:
  # Error / no-error cases derived from the disassembly gates; runtime animation output is oracle-pending (no BG framebuffer harvest, O-T6).
  - { name: stop_all_no_arg, code: "BGSCREEN 0,32,32\nBGSTOP", expect: { stdout: "" } }
  - { name: stop_one, code: "BGSCREEN 0,32,32\nBGSTOP 0", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGSTOP 4", expect: { error: { errnum: 10 } } }
  - { name: layer_negative, code: "BGSTOP -1", expect: { error: { errnum: 10 } } }
