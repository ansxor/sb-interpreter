id: IF
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: condition, type: number, range: "any", desc: "Condition expression; nonzero is true, zero is false" }
    note: "IF condition THEN process [ELSE process] [ENDIF] — runs the THEN process when the condition is true, else the ELSE process."
  - args:
      - { name: condition, type: number, range: "any", desc: "Condition expression" }
    note: "IF condition GOTO @label [ELSE process] — branches to @label when true."

summary: "Conditionally executes code: runs the THEN branch when the condition is true (nonzero), otherwise the ELSE branch."

semantics:
  - "The condition is true when its numeric value is nonzero and false when it is exactly zero; comparison operators yield 1 (true) / 0 (false)."
  - "Negative and fractional nonzero values are true (IF -1, IF 0.5 take the THEN branch); 0 and 0.0 are false."
  - "Single-line form: IF cond THEN stmt [ELSE stmt] — multiple statements may follow with ':' separators on the same line."
  - "GOTO may be omitted after THEN or ELSE: a bare @label means GOTO @label (IF cond THEN @label). hw_verified sb-oracle 2026-06-26 (S-T3a, harness/harvest/out/s_t3a_if.tsv): `IF 1 THEN @L` branches to @L (sets T); `IF 0 THEN @L` does NOT branch and falls through. The explicit `IF cond GOTO @L` form behaves identically (`IF 1 GOTO @L` → branches; `IF 0 GOTO @L` → falls through)."
  - "Multi-line form: IF cond THEN <newline> ... [ELSE ...] ENDIF — ENDIF closes the block when it spans lines."
  - "A single-line IF may also be explicitly closed with ENDIF on the same line: IF cond THEN stmt [ELSE stmt] ENDIF — common in real programs. See [[endif]]."
  - "ELSEIF cond THEN adds further conditions evaluated only when earlier conditions were false. hw_verified sb-oracle 2026-06-26 (S-T3a): a multi-line ELSEIF chain selects the first true branch — `IF 0 / ELSEIF 0 / ELSEIF 1 / ELSE` → C; all false → falls to ELSE → D. (Single-line ELSEIF branch selection was already hw_verified 2026-06-22.)"
  - "Logical operators AND/&&, OR/|| combine conditions; comparison operators are == != > < >= <=."

errors:
  - { errnum: 26, name: "THEN without ENDIF", when: "a multi-line IF block (newline after THEN) — or an ELSEIF clause — has no matching ENDIF before the block ends / EOF. Real SB 3.6.0 surfaces the dedicated 26 (hw_verified sb-oracle 2026-06-26: `IF 1 THEN<nl>PRINT 1` → 26; `IF 1 THEN<nl>A=1<nl>ELSEIF 0 THEN<nl>B=2` → 26). The 2026-06-23 batch's '→ 3' claim was a mis-harvest, superseded." }
  - { errnum: 27, name: "ELSE without ENDIF", when: "a multi-line IF whose ELSE clause has no matching ENDIF. Real SB 3.6.0 surfaces the dedicated 27 (hw_verified sb-oracle 2026-06-26: `IF 1 THEN<nl>A=1<nl>ELSE<nl>B=2` → 27)." }
  - { errnum: 3, name: SyntaxError, when: "the IF construct is otherwise malformed — a label string used where a bare label is required, or THEN/GOTO missing after the condition." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/if.md (forms: 2 — THEN/ELSE/ENDIF and GOTO @label; truthiness, comparison/logical operators)" }
  - { type: disassembled, ref: "cia_3.6.0.lst IF/THEN/ELSE/ELSEIF/ENDIF are parser keywords (not in builtin dispatch table); keyword tokens in the compiler keyword table @0x2ed5c8 (ENDIF) / 0x2ed5f8 (ELSEIF) / 0x2ed678 (THEN); branch selection is compiled to conditional jumps, condition truthiness = nonzero" }
  - { type: disassembled, ref: "cia_3.6.0.lst errnum→string table @0x3054f8 (`ldrcc r0,[0x1e9584]`→0x3054f8, `ldrcc r9,[r0,r5,lsl #0x2]` indexes table[errnum], out-of-range `adrcs r9,0x1e9588`; see errors.yaml) reserves block-structure errnums 26 'THEN without ENDIF' / 27 'ELSE without ENDIF' / 28 'ENDIF without IF', which the IF parser DOES emit for unterminated blocks (see the hw_verified note)." }
  - { type: hw_verified, ref: "sb-oracle structural-error |err probe 2026-06-26 (re-probe; the 2026-06-23 batch's 'unterminated IF → 3' claim was a mis-harvest, superseded): an unterminated multi-line IF raises 26 'THEN without ENDIF' — `IF 1 THEN<nl>PRINT 1` → 26; with an ELSEIF — `IF 1 THEN<nl>A=1<nl>ELSEIF 0 THEN<nl>B=2` → 26. An ELSE clause with no ENDIF raises 27 'ELSE without ENDIF' — `IF 1 THEN<nl>A=1<nl>ELSE<nl>B=2` → 27. A single-line IF needs no ENDIF — `IF 1 THEN PRINT 1` → no error." }
  - { type: hw_verified, ref: "sb-oracle branch-selection probe 2026-06-22 (error-as-signal: 'IF cond THEN A=ASC(\"\")' raises errnum 4 iff the THEN branch executes): IF 1 / IF -1 / IF 0.5 / IF 2>1 take THEN (errnum 4); IF 0 / IF 0.0 / IF 1>2 skip it (no error). ELSE runs only when the condition is false; ELSEIF runs only when earlier conditions were false and its own is true. Single-line THEN/ELSE/ELSEIF confirmed." }
  - { type: community, ref: "sbsave corpus: single-line 'IF cond THEN stmt [ELSE stmt] ENDIF' attested in 86 programs (e.g. 1DVK34J/TXT/HNZBUS) — the on-one-line ENDIF-terminated form. Queued for oracle." }
  - { type: hw_verified, ref: "sb-oracle progstr probe 2026-06-26 (S-T3a, harness/harvest/out/s_t3a_if.tsv): GOTO-omission + explicit-GOTO branch selection, multi-line ELSEIF chain, and ENDIF rejoin. `IF 1 THEN @L`→@L (T), `IF 0 THEN @L`→fall-through (no branch); `IF 1 GOTO @L`→@L (G), `IF 0 GOTO @L`→fall-through. ELSEIF chain `IF 0/ELSEIF 0/ELSEIF 1/ELSE`→C, all-false→D. ENDIF rejoin: `IF 1 THEN / A$=\"T\" / ENDIF / A$=A$+\"R\"`→TR; `IF 0 THEN / A$=\"T\" / ELSE / A$=\"F\" / ENDIF / A$=A$+\"R\"`→FR (control rejoins after whichever branch ran)." }

confidence: hw_verified

tests:
  - { name: then_true,   code: 'IF 1 THEN PRINT "T"',          expect: { stdout: "T" } }
  - { name: then_false_noout, code: 'IF 0 THEN PRINT "T"',     expect: { stdout: "" } }
  - { name: else_taken,  code: 'IF 0 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "F" } }
  - { name: then_taken,  code: 'IF 1 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "T" } }
  - { name: negative_true, code: 'IF -1 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "T" } }
  - { name: comparison,  code: 'IF 2>1 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "T" } }
  - { name: multiline,   code: "IF 1 THEN\nPRINT \"A\"\nELSE\nPRINT \"B\"\nENDIF", expect: { stdout: "A" } }
  - { name: multiline_no_endif,      code: "IF 1 THEN\nPRINT \"A\"",            expect: { error: { errnum: 26 } } } # unterminated multi-line IF → 26 THEN without ENDIF (hw_verified 2026-06-26)
  - { name: multiline_elseif_no_endif, code: "IF 1 THEN\nA=1\nELSEIF 0 THEN\nB=2", expect: { error: { errnum: 26 } } } # unterminated ELSEIF → 26 (hw_verified 2026-06-26)
  - { name: multiline_else_no_endif, code: "IF 1 THEN\nA=1\nELSE\nB=2",         expect: { error: { errnum: 27 } } } # dangling ELSE, no ENDIF → 27 ELSE without ENDIF (hw_verified 2026-06-26)
  # GOTO-omission + explicit-GOTO branch selection (hw_verified sb-oracle 2026-06-26, S-T3a).
  # `IF cond THEN @L` / `IF cond GOTO @L`: true → branch to @L; false → fall through past END.
  - { name: goto_omitted_then_true,  code: "A$=\"\"\nIF 1 THEN @L\nA$=\"F\"\nPRINT A$\nEND\n@L\nA$=\"T\"\nPRINT A$", expect: { stdout: "T" } }
  - { name: goto_omitted_then_false, code: "A$=\"\"\nIF 0 THEN @L\nA$=\"F\"\nPRINT A$\nEND\n@L\nA$=\"T\"\nPRINT A$", expect: { stdout: "F" } } # cond false → fall through, does not branch
  - { name: goto_keyword_true,       code: "A$=\"\"\nIF 1 GOTO @L\nA$=\"X\"\nPRINT A$\nEND\n@L\nA$=\"G\"\nPRINT A$", expect: { stdout: "G" } }
  - { name: goto_keyword_false,      code: "A$=\"\"\nIF 0 GOTO @L\nA$=\"G\"\nPRINT A$\nEND\n@L\nA$=\"X\"\nPRINT A$", expect: { stdout: "G" } } # cond false → fall through, does not branch
  # ENDIF rejoin: control rejoins after whichever branch ran (hw_verified 2026-06-26, S-T3a).
  - { name: endif_rejoin_after_then, code: "A$=\"\"\nIF 1 THEN\nA$=\"T\"\nENDIF\nA$=A$+\"R\"\nPRINT A$", expect: { stdout: "TR" } }
  - { name: endif_rejoin_after_else, code: "A$=\"\"\nIF 0 THEN\nA$=\"T\"\nELSE\nA$=\"F\"\nENDIF\nA$=A$+\"R\"\nPRINT A$", expect: { stdout: "FR" } }
