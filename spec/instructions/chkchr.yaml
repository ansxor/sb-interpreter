id: CHKCHR
kind: function
category: Console input/output
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, range: "0..49", desc: "Console column (0-49)" }
      - { name: y, type: integer, range: "0..29", desc: "Console row (0-29)" }
    returns: { type: integer, desc: "UTF-16 character code at that console cell (0 if the cell is empty)" }
    note: "code = CHKCHR(x, y) — read the character code at a console cell."

summary: "Returns the UTF-16 character code of the character currently shown at console position (x,y). Empty cells return 0."

semantics:
  - "CHKCHR(x,y) reads the console (text-layer) character at column x (0-49), row y (0-29) and returns its UTF-16 code."
  - "A cleared/empty cell returns 0 (e.g. right after CLS, or a cell never written)."
  - "Reads the same console plane that PRINT/LOCATE write and CLS clears, so it is the standard way to inspect console output programmatically (used throughout the S-T5 conformance harvest)."
  - "Coordinates outside the console range raise errnum 10 (Out of range) — oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "x or y is outside the console range (oracle-pending)" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/chkchr.md (Variable=CHKCHR(X,Y); X 0-49, Y 0-29; returns the UTF-16 character code)" }
  - { type: disassembled, ref: "cia_3.6.0.lst CHKCHR handler FUN_0014b464/@0x14b868: reads the console character plane at (x,y) and returns the code" }
  - { type: community, ref: "sbsave corpus: ~554 CHKCHR over 123 files; pixel->cell math common (CHKCHR(I MOD W,I DIV W), CHKCHR(FLOOR(X/8),FLOOR(Y/8)) in 4DVX5E23/TXT/TGRP) for text-collision; CHR$(CHKCHR(x,y)) read-back; compared to raw UTF-16 codes (e.g. 57999) and digit-decoded (CHKCHR-48); always 2 args" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t5a/s_t5c): CLS:PRINT \"A\" -> CHKCHR(0,0)=65 (ASC 'A'); an empty cell (after CLS, or untouched) -> 0; used to read back PRINT/LOCATE output across the console specs" }

confidence: hw_verified

tests:
  - { name: chkchr_reads_char, code: "CLS\nPRINT \"A\"\nPRINT CHKCHR(0,0)", expect: { stdout: "65" } }
  - { name: chkchr_empty_zero, code: "CLS\nPRINT CHKCHR(5,5)", expect: { stdout: "0" } }
  - { name: chkchr_to_char, code: "CLS\nPRINT \"Z\"\nPRINT CHR$(CHKCHR(0,0))", expect: { stdout: "Z" } }
