id: SPCOL
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # --- Setter forms (no OUT) ---
  # Form 1 â€” enable collision, optionally sync detection area to SPSCALE.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: scale_adjustment, type: integer, optional: true, default: 0, desc: "FALSE(0) = ignore (default); TRUE(non-0) = synchronize the detection area with SPSCALE. Only affects SPSCALE calls made AFTER this SPCOL." }
    note: "SPCOL mgmt [,scale_adjust] â€” enable collision (detection area defaults to the sprite's full U,V,W,H)."
  # Form 2 â€” as form 1, plus a collision mask (scale_adjustment may be omitted with a leading comma).
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: scale_adjustment, type: integer, desc: "FALSE(0) = ignore; TRUE(non-0) = sync detection area to SPSCALE. May be omitted (write `SPCOL m,,mask`) to keep the default FALSE." }
      - { name: mask, type: integer, range: "0..&HFFFFFFFF", default: "&HFFFFFFFF", desc: "32-bit collision mask. Two sprites collide only if (maskA AND maskB) != 0. Default all bits set." }
    note: "SPCOL mgmt, [scale_adjust], mask â€” enable collision with a mask."
  # Form 3 â€” explicit detection rectangle (relative to SPHOME) + scale + mask.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
      - { name: start_x, type: integer, range: "-32768..32767", desc: "Detection-area start X, relative to SPHOME (origin 0,0)." }
      - { name: start_y, type: integer, range: "-32768..32767", desc: "Detection-area start Y, relative to SPHOME." }
      - { name: width, type: integer, range: "0..65535", desc: "Detection-area width." }
      - { name: height, type: integer, range: "0..65535", desc: "Detection-area height." }
      - { name: scale_adjustment, type: integer, optional: true, default: 0, desc: "FALSE(0)/TRUE(non-0); may be omitted with a leading comma (`...,,mask`)." }
      - { name: mask, type: integer, range: "0..&HFFFFFFFF", optional: true, default: "&HFFFFFFFF", desc: "32-bit collision mask (default all bits set)." }
    note: "SPCOL mgmt, sx,sy,w,h, [scale_adjust], mask â€” enable collision with an explicit detection rectangle."
  # --- Getter forms (OUT) ---
  # Form 4 â€” read scale adjustment (+ optional mask).
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
    out:
      - { name: scale_adjustment, type: integer, desc: "Receives the scale-adjustment flag (0/1)." }
      - { name: mask, type: integer, optional: true, desc: "Receives the 32-bit collision mask." }
    note: "SPCOL mgmt OUT scale_adjust [,mask] â€” read scale flag (+ mask)."
  # Form 5 â€” read detection range.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
    out:
      - { name: start_x, type: integer, desc: "Receives detection-area start X." }
      - { name: start_y, type: integer, desc: "Receives detection-area start Y." }
      - { name: width, type: integer, desc: "Receives detection-area width." }
      - { name: height, type: integer, desc: "Receives detection-area height." }
    note: "SPCOL mgmt OUT sx,sy,w,h â€” read detection range."
  # Form 6 â€” read range + scale adjustment.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
    out:
      - { name: start_x, type: integer, desc: "Receives detection-area start X." }
      - { name: start_y, type: integer, desc: "Receives detection-area start Y." }
      - { name: width, type: integer, desc: "Receives detection-area width." }
      - { name: height, type: integer, desc: "Receives detection-area height." }
      - { name: scale_adjustment, type: integer, desc: "Receives the scale-adjustment flag." }
    note: "SPCOL mgmt OUT sx,sy,w,h,scale_adjust â€” read range + scale flag."
  # Form 7 â€” read all collision info.
  - args:
      - { name: management_number, type: integer, range: "0..511", desc: "Management number of the target sprite. Must already be SPSET." }
    out:
      - { name: start_x, type: integer, desc: "Receives detection-area start X." }
      - { name: start_y, type: integer, desc: "Receives detection-area start Y." }
      - { name: width, type: integer, desc: "Receives detection-area width." }
      - { name: height, type: integer, desc: "Receives detection-area height." }
      - { name: scale_adjustment, type: integer, desc: "Receives the scale-adjustment flag." }
      - { name: mask, type: integer, desc: "Receives the 32-bit collision mask." }
    note: "SPCOL mgmt OUT sx,sy,w,h,scale_adjust,mask â€” read everything."

summary: "Configures (or, with OUT, reads back) a sprite's collision-detection parameters: the detection rectangle (start X,Y relative to SPHOME plus width,height â€” default the sprite's full size), an optional SPSCALE-synchronization flag, and a 32-bit collision mask used for AND-based filtering (two sprites collide only when maskA AND maskB is non-zero). SPCOL must be called before any SPHIT* instruction, and SPCOLVEC should be set alongside it. Using SPCOL on a sprite that has not been SPSET raises an error. There are 7 forms: three setters (basic, +mask, +explicit range) and four OUT getters (scale, range, range+scale, all)."

semantics:
  - "Argument-count gate: argcount = [r0,#0x4] (r7) must be >= 1; cmp r7,#0x1 / blt 0x13fe28 â€” a bare SPCOL with no management number raises errnum 4 (Illegal function call) via the shared error path (mov r0,#0x4 / bl 0x1fffdc @0x13f9b0-0x13f9bc)."
  - "Management number is resolved by the shared sprite-index getter FUN_001eece0 (bl 0x1eece0 @0x13f938); a value outside 0..511 raises errnum 10 (Out of range) from inside the getter (cmp r0,#0x0 / bne -> clean return @0x13f93c-0x13f940). The slot address is base[0x13fe44] + (mgmt + page_base[0x44]) * 0x48 (rsb r1,r0,r0,lsl#5 / add r0,r1,r0,lsl#8 / add r6,r1,r0,lsl#3 @0x13f958-0x13f964)."
  - "Sprite must exist: tst r0,#0x80000000 on slot flags [r6,#0x4] @0x13f96c; if the active bit is clear the handler raises errnum 4 (used before SPSET) â€” mov r0,#0x4 / bl 0x1fffdc @0x13f9b0-0x13f9bc."
  - "Setter-vs-getter and form selection is driven by the return (OUT) count [r4,#0xc] (ldr r12,[r4,#0xc] @0x13f974): with 0 OUT variables the call is a setter (forms 1-3, distinguished by argcount), with OUT variables it is a getter (forms 4-7). cmp r12,#0x7 / switchD @0x13f980-0x13f98c dispatches the (up to 7) getter shapes via jump table @0x13f994 (caseD_0..caseD_6 @0x13f9c8/0x13fbc4/0x13fbec/0x13fc24/0x13fcb4/0x13fd60)."
  - "Detection area defaults to the sprite's full definition size: with no explicit range the area is (sx=0, sy=0, w=sprite W, h=sprite H), measured relative to SPHOME (the SPHOME point is the area origin 0,0). The explicit-range setter (form 3) overrides this with start_x,start_y (-32768..32767) and width,height (0..65535)."
  - "Collision mask is a 32-bit value (0..&HFFFFFFFF, default &HFFFFFFFF = all bits). Collision is filtered by bitwise AND: two sprites are considered to collide only when (maskA AND maskB) != 0 (per the docs; cross-checked against osb SpriteCollision.detection: `if(sp.define && sp.col.mask & mask)`)."
  - "Scale adjustment is a boolean: TRUE synchronizes the detection rectangle with the sprite's SPSCALE, but ONLY for SPSCALE instructions issued AFTER this SPCOL (documented). FALSE (the default when omitted) leaves the detection area at its set size regardless of SPSCALE."
  - "The OUT getters read back the stored collision state into the supplied variables; the form (4-7) is chosen by how many OUT variables are listed (1-2 -> scale[,mask]; 4 -> range; 5 -> range+scale; 6 -> all). An OUT slot may be skipped with a leading/empty comma to read only later values, e.g. `SPCOL id OUT ,mask` reads just the mask (verified in the corpus)."
  - "Read-back value contract (hw_verified sb-oracle 2026-06-24): the scale flag is stored NORMALIZED to a boolean â€” `SPCOL m,TRUE` and `SPCOL m,5` both read back 1, `SPCOL m,FALSE` reads 0. The mask is a 32-bit value read back as a signed i32 when received into an integer variable (default &HFFFFFFFF -> -1, &H80000000 -> -2147483648, &H12345678 -> 305419896); reading the mask into a Real variable shows STR$'s %g formatting for large values (305419896 -> '3.0542e+08'). A bare `SPCOL m` (no rect) reports the detection area as the sprite's full size with origin (0,0) (SPDEF #0 -> 0,0,16,16). The skipped-scale setter `SPCOL m,,mask` leaves scale 0. Negative start coords are stored verbatim."
  - "Scale-adjustment vs OUT read-back (hw_verified sb-oracle 2026-06-27, harness/harvest/out/spcol_scaleadj4.tsv): the OUT getter ALWAYS returns the CONFIGURED base detection rectangle â€” never the live SPSCALE-adjusted geometry. In a clean session (`ACLS` first), `SPCOL m OUT sx,sy,w,h` on the default (no-rect) form reads the sprite's UNSCALED definition size (16,16 for SPDEF #0) regardless of (a) the SPSCALE magnification factor (2,2 / 3,3 / 0.5,0.5 / asymmetric 2,3 ALL read 16,16), (b) whether SPSCALE was issued BEFORE or AFTER the SPCOL, and (c) the scale-adjustment flag TRUE/FALSE/omitted â€” all eight combinations read 16,16. The scale-adjust flag affects the LIVE collision-detection geometry (the detection AABB is multiplied by |SPSCALE| at hit-test time), which is NOT visible through the OUT read-back; confirming the documented 'only affects SPSCALE issued AFTER this SPCOL' timing needs a collision-test (SPHIT*) harvest, not a VALUE read-back (oracle-pending â€” queued in beads)."
  - "Read-back state model (hw_verified sb-oracle 2026-06-27, harness/harvest/out/spcol_repro.tsv + spcol_scalereset.tsv): a NON-clean session CAN read a scaled rect (e.g. `SPSET 0,0:SPCOL 0:SPCOL 0 OUT` â†’ 32,32 after a prior 2Ă— SPSCALE leaked in) â€” the firmware retains a cached scaled detection size that SPSET and SPCLR do NOT clear, only `ACLS` does. (The SPSCALE GETTER itself IS reset to 1,1 by a fresh-or-repeat SPSET / SPCLR / ACLS â€” spcol_scalereset.tsv r2/r3/r4 â†’ 1,1.) This cached value is a stale-state artifact, not the configured read-back, so the conformance cases prefix `ACLS` for determinism. sb-core stores the base rect and applies |SPSCALE| only in `col_aabb` at hit-test time (sb-render/src/sprite.rs), so its OUT read-back is already the configured base size â€” this harvest confirms the existing implementation."
  - "SPSET-interaction (hw_verified sb-oracle 2026-06-24 â€” collision state lives in a SEPARATE array, slot stride 0x48, indexed by mgmt, distinct from the 2296-byte sprite slot): a SECOND `SPSET` on the same management number PRESERVES the stored detection rectangle and mask but RESETS the scale-adjustment flag to 0. Confirmed: `SPSET 0,0:SPCOL 0,7,8,40,48,TRUE,99:SPSET 0,0:SPCOL 0 OUT sx,sy,w,h,sc,mk` -> 7,8,40,48,0,99 (rect+mask survive, scale flag cleared). sb-core currently full-resets the whole slot (incl. collision rect/mask) on SPSET â€” a known gap, queued (NOT frozen as a conformance case here)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the sprite has not been SPSET, or no management number is supplied" }
  - { errnum: 10, name: "Out of range", when: "the management number is not in 0..511" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spcol.md (7 forms: setters `SPCOL m [,scale]`, `SPCOL m,[scale],mask`, `SPCOL m,sx,sy,w,h,[scale],mask`; getters `SPCOL m OUT scale[,mask]`, `OUT sx,sy,w,h`, `OUT ...,scale`, `OUT ...,scale,mask`. mgmt 0-511; scale FALSE/TRUE (default FALSE), effective only for SPSCALE set after SPCOL; mask 0-&HFFFFFFFF default &HFFFFFFFF, AND==0 means no collision; range sx,sy -32768..32767 relative to SPHOME, w,h 0-65535; 'Must be called before any SPHIT instruction'; 'SPCOLVEC should also be called'; 'If used before SPSET, an error will occur')" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPCOL handler @0x13f914: argcount gate cmp r7,#0x1 blt 0x13fe28 (r7=[r0,#0x4]); error path mov r0,#0x4 bl 0x1fffdc @0x13f9b0 (errnum 4); mgmt via FUN_001eece0 bl 0x1eece0 @0x13f938 (errnum 10); slot base[0x13fe44]+(mgmt+[0x44])*0x48 rsb r1,r0,r0,lsl#5 @0x13f958; active-bit guard tst r0,#0x80000000 [r6,#0x4] @0x13f96c beq 0x13f9b0 (used before SPSET, errnum 4); form select on OUT-count ldr r12,[r4,#0xc] cmp r12,#0x7 switchD @0x13f980 table @0x13f994; state ptr [0x13fe40], sprite-base [0x13fe44], extra const [0x13fe48]." }
  - { type: community, ref: "osb/SMILEBASIC/sprite.d (3.5.0 structural cross-check only) struct SpriteCollision { SpriteData* data; bool scale=true; int mask=-1; short sx,sy; ushort w,h; double vx,vy; } and overloads spcol(id)/spcol(id,scale)/spcol(id,scale,mask)/spcol(id,sx,sy,w,h,scale,mask) defaulting sx=sy=0,w=sprite.w,h=sprite.h,mask=-1; detection() gates on `sp.col.mask & mask`. Confirms detection rect defaults to full sprite size and mask AND filtering." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-22 (s_t8d): SPCLR:SPCOL 5,TRUE -> errnum 4 (used before SPSET); SPSET 0,0:SPCOL 512,TRUE -> errnum 10 (mgmt out of range)." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-24 (M7-T2, harness/harvest/out/spcol_rt.tsv + spcol_rt2.tsv): OUT-getter set-then-read VALUE contract across all forms. SPSET 0,0:SPCOL 0 OUT sx,sy,w,h,sc,mk -> 0,0,16,16,0,-1 (bare SPCOL = full-sprite rect, scale 0, mask all-bits); SPCOL 0,3,5,20,24 -> 3,5,20,24,0,-1; SPCOL 0,1,2,16,16,TRUE,255 -> 1,2,16,16,1,255; scale normalizes (SPCOL 0,TRUE->1, SPCOL 0,5->1, SPCOL 0,FALSE->0); SPCOL 0,,31 -> scale 0/mask 31; SPCOL 0,-8,-12,15,15 -> rect -8,-12,15,15; mask into integer var exact+signed (&H12345678->305419896, &H80000000->-2147483648, default->-1); leading-comma OUT skip SPCOL 0 OUT ,mk reads only the mask (99). SECOND SPSET preserves rect+mask, resets scale flag (SPSET 0,0:SPCOL 0,7,8,40,48,TRUE,99:SPSET 0,0:SPCOL 0 OUT ... -> 7,8,40,48,0,99)." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-27 (s_t8d, harness/harvest/out/spcol_scaleadj4.tsv + spcol_repro.tsv + spcol_scalereset.tsv): SPCOL OUT default-rect read-back is the CONFIGURED base size, invariant to SPSCALE. Clean (ACLS) session, default (no-rect) SPCOL on SPDEF #0: `OUT sx,sy,w,h` W,H = 16,16 across all eight combos â€” scale 2/3/0.5/asym-2,3, scale set before OR after SPCOL, scale-adjust flag TRUE/FALSE/omitted. Explicit rect is read verbatim (SPSCALE 0,2,2:SPCOL 0,5,5,10,10,TRUE â†’ W,H 10,10). The OUT read-back never reflects |SPSCALE| (that scaling is applied only to the live hit-test AABB; its 'SPSCALE-after-SPCOL' timing is collision-test, oracle-pending). State model: SPSET/SPCLR do NOT clear a leaked scaled detection cache (non-ACLS `SPSET 0,0:SPCOL 0:SPCOL 0 OUT` â†’ 32,32 after a leaked 2Ă—), only ACLS does; the SPSCALE getter itself IS reset to 1,1 by SPSET/SPCLR/ACLS." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg): all 7 forms appear in real programs â€” setters `SPCOL id` (e.g. 1BWX7ENV/TXT/AND-OS), `SPCOL id,scale` (numeric OR TRUE/FALSE, e.g. 12C3NWQE/TXT/3DSCLOSEGAME `SPCOL 1,TRUE`), `SPCOL id,scale,mask`, `SPCOL id,sx,sy,w,h` (e.g. 13D4DV3V/TXT/MAIN_PRG_V2 `SPCOL SPID,-8,-12,15,15`), `SPCOL id,sx,sy,w,h,scale[,mask]` (e.g. 1DVK34J/TXT/HNZTL `SPCOL N,0,0,16,16,FALSE,&H1`), and the omitted-middle-arg comma form `SPCOL id,sx,sy,w,h,,mask` (e.g. 13D4DV3V/TXT/MAIN_PRG_V2 `SPCOL ID,-4,-4,9,9,,&B0001`); getters `SPCOL id OUT sc,mk` (e.g. REVVY3RJ/TXT/HNZBI), `SPCOL id OUT ,mask` (leading-comma skips the scale slot, e.g. 13D4DV3V/TXT/MAIN_PRG_V2 `SPCOL C OUT ,MASK`), `SPCOL id OUT sx,sy,w,h` (e.g. Q3KPEEN3/TXT/GAME_ENG `SPCOL S% OUT CX,CY,W,H`), and the all-info `SPCOL id OUT sx,sy,w,h,scale,mask` (e.g. 2XVV233J/TXT/GAME.PRG `SPCOL S% OUT SX%,SY%,W%,H%,A%,B%`). Proves the syntax is legal; exact read-back values are oracle-pending." }

confidence: hw_verified

tests:
  # Error cases hw_verified (sb-oracle 2026-06-22 s_t8d).
  - { name: enable_basic, code: "SPSET 0,0\nSPCOL 0,TRUE", expect: { stdout: "" } }
  - { name: enable_mask_skip_scale, code: "SPSET 0,0\nSPCOL 0,,31", expect: { stdout: "" } }
  - { name: enable_explicit_range, code: "SPSET 0,0\nSPCOL 0,0,0,32,32,TRUE,255", expect: { stdout: "" } }
  - { name: before_spset, code: "SPCLR\nSPCOL 5,TRUE", expect: { error: { errnum: 4 } } }
  - { name: mgmt_out_of_range, code: "SPSET 0,0\nSPCOL 512,TRUE", expect: { error: { errnum: 10 } } }
  # Set-then-read VALUE contract (sb-oracle 2026-06-24; harness/harvest/out/spcol_rt*.tsv).
  # A bare SPCOL (no rect) defaults the detection area to the sprite's full size (16x16 for
  # SPDEF #0), scale flag 0, mask all-bits (read into a Real var -> -1).
  - { name: out_default_all, code: "SPSET 0,0\nSPCOL 0\nSPCOL 0 OUT SX,SY,W,H,SC,MK\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)+\",\"+STR$(SC)+\",\"+STR$(MK)", expect: { stdout: "0,0,16,16,0,-1" } }
  # Explicit rect, scale/mask defaulted.
  - { name: out_explicit_rect, code: "SPSET 0,0\nSPCOL 0,3,5,20,24\nSPCOL 0 OUT SX,SY,W,H,SC,MK\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)+\",\"+STR$(SC)+\",\"+STR$(MK)", expect: { stdout: "3,5,20,24,0,-1" } }
  # Full form: rect + scale TRUE + mask 255.
  - { name: out_full, code: "SPSET 0,0\nSPCOL 0,1,2,16,16,TRUE,255\nSPCOL 0 OUT SX,SY,W,H,SC,MK\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)+\",\"+STR$(SC)+\",\"+STR$(MK)", expect: { stdout: "1,2,16,16,1,255" } }
  # Scale flag stores a normalized boolean: TRUE -> 1, any non-zero (5) -> 1, FALSE -> 0.
  - { name: out_scale_true, code: "SPSET 0,0\nSPCOL 0,TRUE\nSPCOL 0 OUT SC\nPRINT SC", expect: { stdout: "1" } }
  - { name: out_scale_nonzero_normalizes, code: "SPSET 0,0\nSPCOL 0,5\nSPCOL 0 OUT SC\nPRINT SC", expect: { stdout: "1" } }
  - { name: out_scale_false, code: "SPSET 0,0\nSPCOL 0,FALSE\nSPCOL 0 OUT SC\nPRINT SC", expect: { stdout: "0" } }
  # Skipped-scale setter form `SPCOL m,,mask` keeps scale 0, sets the mask.
  - { name: out_mask_skip_scale, code: "SPSET 0,0\nSPCOL 0,,31\nSPCOL 0 OUT SC,MK\nPRINT STR$(SC)+\",\"+STR$(MK)", expect: { stdout: "0,31" } }
  # Negative start coords stored verbatim.
  - { name: out_neg_rect, code: "SPSET 0,0\nSPCOL 0,-8,-12,15,15\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)", expect: { stdout: "-8,-12,15,15" } }
  # 32-bit mask read into an INTEGER var is exact; bit-31 set -> signed; default all-bits -> -1.
  - { name: out_mask_exact_int, code: "SPSET 0,0\nSPCOL 0,,&H12345678\nSPCOL 0 OUT SC%,MK%\nPRINT MK%", expect: { stdout: "305419896" } }
  - { name: out_mask_bit31, code: "SPSET 0,0\nSPCOL 0,,&H80000000\nSPCOL 0 OUT SC%,MK%\nPRINT MK%", expect: { stdout: "-2147483648" } }
  - { name: out_mask_default_int, code: "SPSET 0,0\nSPCOL 0\nSPCOL 0 OUT SC%,MK%\nPRINT MK%", expect: { stdout: "-1" } }
  # Leading-comma OUT skips the scale slot, reading only the mask.
  - { name: out_skip_scale_slot, code: "SPSET 0,0\nSPCOL 0,,99\nSPCOL 0 OUT ,MK\nPRINT MK", expect: { stdout: "99" } }
  # 4-OUT (range only) and 5-OUT (range + scale) getter shapes.
  - { name: out_range_only, code: "SPSET 0,0\nSPCOL 0,7,8,40,48\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)", expect: { stdout: "7,8,40,48" } }
  - { name: out_range_scale, code: "SPSET 0,0\nSPCOL 0,7,8,40,48,TRUE\nSPCOL 0 OUT SX,SY,W,H,SC\nPRINT STR$(SX)+\",\"+STR$(SY)+\",\"+STR$(W)+\",\"+STR$(H)+\",\"+STR$(SC)", expect: { stdout: "7,8,40,48,1" } }
  # Scale-adjustment does NOT bake into the OUT read-back: the default (no-rect) detection
  # rectangle always reads back the UNSCALED definition size (16,16 for SPDEF #0), regardless
  # of SPSCALE factor, timing (before/after SPCOL), or the scale-adjust flag. ACLS prefix
  # neutralizes any leaked scaled-detection cache (SPSET/SPCLR do not clear it; ACLS does).
  # (hw_verified sb-oracle 2026-06-27, harness/harvest/out/spcol_scaleadj4.tsv.)
  - { name: out_default_scale_before_on, code: "ACLS\nSPSET 0,0\nSPSCALE 0,2,2\nSPCOL 0,TRUE\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "16,16" } }
  - { name: out_default_scale_after_on, code: "ACLS\nSPSET 0,0\nSPCOL 0,TRUE\nSPSCALE 0,2,2\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "16,16" } }
  - { name: out_default_scale_off, code: "ACLS\nSPSET 0,0\nSPSCALE 0,2,2\nSPCOL 0,FALSE\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "16,16" } }
  - { name: out_default_scale_3x, code: "ACLS\nSPSET 0,0\nSPSCALE 0,3,3\nSPCOL 0,TRUE\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "16,16" } }
  - { name: out_default_scale_asym, code: "ACLS\nSPSET 0,0\nSPSCALE 0,2,3\nSPCOL 0,TRUE\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "16,16" } }
  # Explicit rect is read verbatim even with scale-adjust on + SPSCALE active.
  - { name: out_explicit_scale_noop, code: "ACLS\nSPSET 0,0\nSPSCALE 0,2,2\nSPCOL 0,5,5,10,10,TRUE\nSPCOL 0 OUT SX,SY,W,H\nPRINT STR$(W)+\",\"+STR$(H)", expect: { stdout: "10,10" } }
