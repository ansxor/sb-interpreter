id: ENDIF
kind: statement
category: Control
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args: []
    note: "Closes a multi-line IF block: IF cond THEN <newline> ... ENDIF."

summary: "Ends a multi-line IF block."

semantics:
  - "Required when an IF construct spans multiple lines."
  - "ENDIF may also close an IF written entirely on one line (IF cond THEN stmt ENDIF, or IF cond THEN stmt ELSE stmt ENDIF); this single-line-with-ENDIF form is common in real programs."
  - "Marks where control rejoins after whichever branch ran."
  - "Each multi-line IF (including those opened by ELSE IF) needs its own matching ENDIF."
  - "See [[if]] for full conditional semantics."

errors:
  - { errnum: 28, name: "ENDIF without IF", when: "ANY stray ENDIF with no open IF block to close â€” leading OR after other statements â€” raises 28, with errline = the ENDIF's own line. Real SB 3.6.0 surfaces 28 for every stray ENDIF: `ENDIF`, `ENDIF<nl>PRINT 1`, `ENDIF:PRINT 1`, `PRINT 1<nl>ENDIF`, `A=1<nl>ENDIF`, `A=1<nl>B=2<nl>ENDIF`, `PRINT 1:ENDIF`, `A=1:ENDIF`, `IF 1 THEN<nl>ENDIF<nl>ENDIF`, `FOR I=0 TO 1<nl>NEXT<nl>ENDIF` (hw_verified sb-oracle 2026-06-26). A leading newline / blank line / comment line does NOT change this (`\\nENDIF`, `REM X<nl>ENDIF`, `'X<nl>ENDIF`, `REM<nl>ENDIF` â†’ 28, errline = the ENDIF's own line). The 2026-06-23 batch's 'non-leading stray ENDIF â†’ 3' claim was a mis-harvest, superseded." }
  - { errnum: 3, name: SyntaxError, when: "a `:` that is the FIRST token on its physical line â€” at the program top OR after a newline, in any block â€” is a line-starting empty statement, which real SB 3.6.0 rejects as Syntax error 3 (errline = the `:`'s line). This applies to ANY keyword that follows, not just ENDIF: `:ENDIF`, `:NEXT`, `:WEND`, `:UNTIL`, `:REPEAT`, `:FOR`, `:WHILE`, `:DEF`, `:IF`, even `:PRINT 1` / `:A=1` / a bare `:` all â†’ 3, and `A=1<nl>:B=2` or `FOR I=0 TO 1<nl>:NEXT` â†’ 3 inside a block body too. A `:` AFTER a real statement on the same line is a normal separator and does NOT raise (`A=1:ENDIF` â†’ 28, `A=1:B=2` ok, `A=1:` trailing ok). hw_verified sb-oracle 2026-06-26 (audit 49r + dbk generalized the ENDIF-only leading-`:` rule to every line of every block)." }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/endif.md (ends multi-line IF processing)" }
  - { type: disassembled, ref: "cia_3.6.0.lst ENDIF is a parser keyword (token @0x2ed5c8), not in the builtin dispatch table; handled by the IF compiler" }
  - { type: disassembled, ref: "cia_3.6.0.lst errnumâ†’string table @0x3054f8 (`ldrcc r0,[0x1e9584]`â†’0x3054f8, `ldrcc r9,[r0,r5,lsl #0x2]` indexes table[errnum]; see errors.yaml) entry 28 = 'ENDIF without IF'." }
  - { type: hw_verified, ref: "sb-oracle structural-error |err probe 2026-06-26 (full re-probe; the 2026-06-23 batch mis-harvested the non-leading ENDIF and unterminated-IF cases and is superseded): EVERY stray ENDIF raises 28 â€” `ENDIF` / `ENDIF<nl>PRINT 1` / `ENDIF:PRINT 1` / `\\nENDIF` / `REM X<nl>ENDIF` / `'X<nl>ENDIF` / `REM<nl>ENDIF` / `PRINT 1<nl>ENDIF` / `A=1<nl>ENDIF` / `A=1<nl>B=2<nl>ENDIF` / `PRINT 1:ENDIF` / `A=1:ENDIF` / `IF 1 THEN<nl>ENDIF<nl>ENDIF` / `FOR I=0 TO 1<nl>NEXT<nl>ENDIF` â€” errline = the ENDIF's own line. The ONE exception is a leading `:` separator: `:ENDIF` / `::ENDIF` / `\\n:ENDIF` â†’ errnum 3 (the `:` is an empty preceding statement)." }
  - { type: community, ref: "sbsave corpus: single-line IF...THEN...ENDIF attested in 86 programs (e.g. 1DVK34J/TXT/HNZBUS; 'IF BUTTON(0) AND #B THEN SPEED=2 ELSE SPEED=1 ENDIF'), contradicting the prior 'single-line form does not use ENDIF' claim." }
  - { type: observed, ref: "sb-core conformance: the single_line_endif case IF 1 THEN PRINT \"A\" ENDIF â†’ stdout A replays green, and parser.rs unit tests lock the same-line ELSE...ENDIF form." }

confidence: hw_verified

tests:
  - { name: closes_block, code: "IF 1 THEN\nPRINT \"IN\"\nENDIF\nPRINT \"OUT\"", expect: { stdout: "IN\nOUT" } }
  - { name: skipped_block_rejoins, code: "IF 0 THEN\nPRINT \"IN\"\nENDIF\nPRINT \"OUT\"", expect: { stdout: "OUT" } }
  - { name: single_line_endif, code: 'IF 1 THEN PRINT "A" ENDIF', expect: { stdout: "A" } } # corpus-attested; replay-green in sb-core conformance
  - { name: stray_endif_leading,    code: 'ENDIF',                  expect: { error: { errnum: 28 } } } # stray ENDIF â†’ 28 (hw_verified 2026-06-26)
  - { name: stray_endif_then_stmt,  code: "ENDIF\nPRINT 1",        expect: { error: { errnum: 28 } } } # stray ENDIF â†’ 28
  - { name: stray_endif_leading_newline, code: "\nENDIF",          expect: { error: { errnum: 28 } } } # leading blank line â†’ 28 errline 2 (hw_verified 2026-06-26)
  - { name: stray_endif_leading_rem, code: "REM X\nENDIF",         expect: { error: { errnum: 28 } } } # leading comment â†’ 28 errline 2 (NOT suppressed; hw_verified 2026-06-26)
  - { name: stray_endif_leading_quote, code: "'X\nENDIF",          expect: { error: { errnum: 28 } } } # leading 'comment â†’ 28 errline 2 (hw_verified 2026-06-26)
  - { name: stray_endif_leading_colon, code: ":ENDIF",             expect: { error: { errnum: 3 } } }  # leading : â†’ 3 (empty stmt precedes ENDIF; hw_verified 2026-06-26)
  - { name: stray_endif_after_stmt, code: "PRINT 1\nENDIF",        expect: { error: { errnum: 28 } } }  # non-leading stray ENDIF â†’ 28 (hw_verified 2026-06-26; was wrongly 3 in 2026-06-23 batch)
  - { name: stray_endif_after_assign, code: "A=1\nENDIF",          expect: { error: { errnum: 28 } } }  # non-leading â†’ 28 (hw_verified 2026-06-26)
  - { name: stray_endif_after_two_stmts, code: "A=1\nB=2\nENDIF", expect: { error: { errnum: 28 } } }  # non-leading â†’ 28 (hw_verified 2026-06-26)
  - { name: stray_endif_colon_after_stmt, code: "PRINT 1:ENDIF",  expect: { error: { errnum: 28 } } }  # : after a real stmt â†’ 28 (hw_verified 2026-06-26)
  - { name: stray_endif_after_block, code: "IF 1 THEN\nENDIF\nENDIF", expect: { error: { errnum: 28 } } } # second ENDIF â†’ 28 (hw_verified 2026-06-26; was wrongly 3)
  - { name: stray_endif_after_for, code: "FOR I=0 TO 1\nNEXT\nENDIF", expect: { error: { errnum: 28 } } } # stray ENDIF after a closed FOR â†’ 28 (hw_verified 2026-06-26)
