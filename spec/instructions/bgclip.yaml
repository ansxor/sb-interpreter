id: BGCLIP
kind: statement
category: BG
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
    note: "BGCLIP layer — reset the layer's display (clip) area to the whole layer (1 arg, no return value)."
  - args:
      - { name: layer, type: integer, range: "0..3", desc: "Target BG layer number." }
      - { name: start_x, type: integer, desc: "Display-area start X, in pixels." }
      - { name: start_y, type: integer, desc: "Display-area start Y, in pixels." }
      - { name: end_x, type: integer, desc: "Display-area end X, in pixels." }
      - { name: end_y, type: integer, desc: "Display-area end Y, in pixels." }
    note: "BGCLIP layer, startX, startY, endX, endY — set the layer's display (clip) area to the pixel rectangle (5 args, no return value)."

summary: "Sets the display (clip) area of one BG layer, in pixel units. With only the layer argument it resets the clip area to the whole layer; with four pixel coordinates it restricts drawing to that rectangle. The start/end corners are normalized (min/max) so either ordering works."

semantics:
  - "Statement only with exactly 1 OR 5 arguments: if a return value is requested (used as a function), or the argument count is neither 1 (reset form) nor 5 (rectangle form), the handler raises errnum 4 (Illegal function call) — return-count [r4,#0xc] cmp #0 @0x164ffc; argcount [r4,#0x4] cmp #1 (beq @0x165030) / cmp #5 (beq @0x165068), else mov r0,#0x4 @0x165020."
  - "LAYER must be in 0..3 (both forms): range-checked by the shared layer getter FUN_001e2504 (bl @0x165040 / @0x165078); a value < 0 or >= the live BG-layer count [[0x315d60]+0x60] (= 4) raises errnum 10 (Out of range) — mov r0,#0xa @0x1e2560."
  - "ONE-ARGUMENT form (BGCLIP layer): resets the layer's display area to the entire layer — bl 0x1ee0bc @0x165058 with the internal layer id (= layer + 2, add r0,#0x2 @0x165054)."
  - "FIVE-ARGUMENT form (BGCLIP layer, startX, startY, endX, endY): the four coordinates are pixel-unit screen coordinates, evaluated as Integers (getters @0x165088-0x165104). The handler normalizes the rectangle so the smaller value of each axis becomes the start and the larger becomes the end (cmp/strgt swaps @0x165158 and @0x16516c), then sets the clip region — bl 0x1edeac @0x165190 with internal layer id (layer + 2)."
  - "BGCLIP changes only what part of the layer is displayed; it does not modify the tilemap contents, layer size, scroll or graphic page."

errors:
  - { errnum: 4, name: "Illegal function call", when: "used as a function (return requested), or the argument count is neither 1 nor 5" }
  - { errnum: 10, name: "Out of range", when: "the layer is not in 0..3" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/bgclip.md (BGCLIP Layer [,StartX,StartY,EndX,EndY] — 'Specifies the display area of the BG screen'; Layer 0-3; start/end coords in pixels; 'If the start and end points are omitted, the whole layer will be the display area'; e.g. BGCLIP 0,20,20,379,219)" }
  - { type: disassembled, ref: "cia_3.6.0.lst BGCLIP handler @0x164fec (FUN_00164fec): return-count [r4,#0xc] cmp #0 @0x164ffc; argcount [r4,#0x4] cmp #1 beq 0x165030 / cmp #5 beq 0x165068, else mov r0,#0x4 errnum 4 @0x165020; layer range-check via bl 0x1e2504 (errnum 10 @0x1e2560); 1-arg reset bl 0x1ee0bc @0x165058 (layer id = layer+2 @0x165054); 5-arg four pixel-coord getters @0x165088-0x165104, min/max normalization strgt @0x165158/@0x16516c, set clip bl 0x1edeac @0x165190 (layer id = layer+2 @0x16518c)." }
  - { type: community, ref: "osb/SMILEBASIC/bg.d BG clip/display-area handling (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus: ~160 calls split between the 1-arg reset form ('BGCLIP 0', ~39x, e.g. 4K2KNDZS/TXT/ARCS) and the 5-arg pixel-rect form ('BGCLIP 0,80,0,319,239', ~89x, e.g. EN3F394/TXT/GAMW). No other argument count in live code." }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t9b): BGCLIP 4 -> errnum 10 (layer out of range); BGCLIP 0,1,2 (3 args) -> errnum 4 (Illegal function call). Valid BGCLIP 0 and BGCLIP 0,20,20,379,219 raise nothing. All errline 1." }

confidence: disassembled

tests:
  # Clip side effects (visible area) need the BG framebuffer oracle (O-T6, queued); error expects
  # below are hw_verified (sb-oracle 2026-06-22 s_t9b).
  - { name: clip_reset_ok, code: "BGCLIP 0", expect: { stdout: "" } }
  - { name: clip_rect_ok, code: "BGCLIP 0,20,20,379,219", expect: { stdout: "" } }
  - { name: layer_out_of_range, code: "BGCLIP 4", expect: { error: { errnum: 10 } } }
  - { name: wrong_argcount_errors, code: "BGCLIP 0,1,2", expect: { error: { errnum: 4 } } }
