id: DELETE
kind: statement
category: Files
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: name, type: string, range: '"[Filetype:]Filename" — Filetype optional: "TXT:" texts & programs, "DAT:" binary data (incl. graphics)' }
    returns: { type: void }
    note: "DELETE \"[Filetype:]Filename\" — delete a file. A confirmation dialog is shown."

summary: "Deletes a file. The single operand is a `\"[Filetype:]Filename\"` string; the filetype prefix is optional — `\"TXT:\"` for texts and programs, `\"DAT:\"` for binary data (including graphics). A confirmation dialog is displayed when run. The filename may be any string expression (literal, variable, or concatenation)."

semantics:
  - "Handler @0x18cb10. Requires exactly 1 argument AND result count 0: ldr r0,[r0,#0x4] (arg count); cmp r0,#0x1; ldreq r0,[r4,#0xc] (result count); cmpeq r0,#0x0; beq 0x18cb40; otherwise (wrong arg count, or read for a value) it falls to @0x18cb30 which raises errnum 3 (Syntax error: mov r0,#0x3 @0x18cb38 -> b 0x18cc00 -> bl 0x1fffdc). DELETE has no function form."
  - "The operand must be a string: read via the arg vtable (ldr r2,[r2,#0x50]; blx r2 @0x18cb74) only after a string-type check (ldrb r12,[r2,#0x2]; cmp r12,#0x0; beq 0x18cc0c); the non-string branch @0x18cc0c raises errnum 8 (Type mismatch: mov r0,#0x8 @0x18cc14 -> bl 0x1fffdc). The name is parsed into a filetype + filename by FUN_001d6d6c (bl 0x1d6d6c @0x18cba8)."
  - "Filetype prefix (documented, optional): \"TXT:\" texts and programs; \"DAT:\" binary data (including graphics). With no prefix the current default type is used (documented example `DELETE \"SAMPLE\"`)."
  - "A confirmation dialog is displayed when DELETE runs (documented)."

errors:
  - { errnum: 3, name: "Syntax error", when: "DELETE is given other than exactly 1 argument, or is read for a value (used as a function)" }
  - { errnum: 8, name: "Type mismatch", when: "the filename operand is not a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/delete.md (1 form: `DELETE \"[File type:]File name\"`. 'Deletes a file. When run, a confirmation dialog will be displayed.' File type (optional): \"TXT:\" texts and programs, \"DAT:\" binary data (incl. graphics). Example `DELETE \"SAMPLE\"`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst DELETE handler @0x18cb10: ldr r0,[r0,#0x4] (arg count); cmp r0,#0x1; ldreq r0,[r4,#0xc] (result count); cmpeq r0,#0x0; beq 0x18cb40, else errnum 3 (mov r0,#0x3 @0x18cb38 -> b 0x18cc00 -> bl 0x1fffdc); first arg string-type check ldrb r12,[r2,#0x2]/cmp r12,#0x0/beq 0x18cc0c (non-string -> errnum 8: mov r0,#0x8 @0x18cc14 -> bl 0x1fffdc); name parsed by bl 0x1d6d6c (@0x18cba8)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bDELETE\\b'): confirms the filename is any string expression — concatenation with a filetype prefix (`DELETE \"TXT:\"+DELETE$` 4DAXEXWD/TXT/---ATOMIC---; `DELETE \"DAT:\"+P$[0]` 43H5SXXD/TXT/UNPACK; `DELETE \"GRP1:\"+FILE_GRP$[...]` 1DVENVAE/TXT/PICS_R1_1V) and a bare string variable filename (`DELETE FIL$` 43LEDEAE/TXT/EXPLORER.EXE). The optional-prefix form (`DELETE \"SAMPLE\"`) is common. Syntax legal (shipped programs); deletion effect oracle-pending." }
  - { type: community, ref: "osb/SMILEBASIC/petitcomputer.d DELETE (3.5.0 structural cross-check only)" }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar) batch 2026-06-22 (s_t12a): `DELETE 5` (non-string name) raises errnum 8 errline 1 (Type mismatch); `A=DELETE(\"SAMPLE\")` (read for a value) raises errnum 3 errline 1 (Syntax error). Confirms the string-type guard and the arg-count/result-count guard. The actual file deletion is filesystem/dialog state with no scalar golden (queued)." }

# Top-level hw_verified: the error model (errnum 3 arg/result-count, errnum 8 type) is fully
# oracle-confirmed; the deletion effect itself is filesystem state with no scalar golden (queued).
confidence: hw_verified

tests:
  - { name: nonstring_name_type_mismatch, code: "DELETE 5", expect: { error: { errnum: 8 } } }
  - { name: read_as_value_syntax_error, code: 'A=DELETE("SAMPLE")', expect: { error: { errnum: 3 } } }
