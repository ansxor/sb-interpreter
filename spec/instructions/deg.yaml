id: DEG
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Angle in radians" }
    returns: { type: double, desc: "Angle in degrees" }

summary: "Converts a radian value to degrees, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double."
  - "Computes value * 180/PI exactly as (value * 180.0) * (1/PI), with the two factors held as the doubles 180.0 (0x4066800000000000) and 0.3183098861837907 (0x3FD45F306DC9C883 = 1/PI)."
  - "Combined scale factor is 57.29577951308232; DEG(0.5*PI())=90, DEG(PI())=180."
  - "No range restriction — any finite radian value is valid (negative and >2*PI allowed)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/deg.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst DEG handler @0x147d88; argcount!=1 -> errnum 4; arg coerced via to-double method (vtable +0x44, non-number -> errnum 8); two vmul.f64 by consts @0x147e28=180.0 and @0x147e30=1/PI; result returned as Double" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: DEG(0)=0, DEG(0.5*PI())=90, DEG(PI())=180; DEG(\"x\") -> errnum 8" }

confidence: hw_verified

tests:
  - { name: zero,          code: "PRINT DEG(0)",        expect: { stdout: "0" } }
  - { name: half_pi,       code: "PRINT DEG(0.5*PI())", expect: { stdout: "90" } }
  - { name: pi_is_180,     code: "PRINT DEG(PI())",     expect: { stdout: "180" } }
  - { name: string_type_mismatch, code: 'A=DEG("x")',   expect: { error: { errnum: 8 } } }
