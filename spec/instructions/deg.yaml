# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: DEG
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "any", desc: "Radian value" }
    returns: { type: double, desc: "Equivalent degree value" }

summary: "Converts a radian value to degrees (value * 180 / PI)."

semantics:
  - "DEG(value) = value * 180 / PI. Result is always Double."
  - "DEG(PI())=180, DEG(0.5*PI())=90."

errors:
  - { errnum: 8, name: TypeMismatch, when: "value is a string" }

see_also: "RAD (degrees to radians)"

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/deg.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: DEG(PI())=180, DEG(0.5*PI())=90", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: pi_is_180,    code: "PRINT DEG(PI())",     expect: { stdout: "180" } }
  - { name: halfpi_is_90, code: "PRINT DEG(0.5*PI())", expect: { stdout: "90" } }
  - { name: string_type_mismatch, code: 'A=DEG("x")',  expect: { error: { errnum: 8 } } }
