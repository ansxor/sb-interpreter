id: OPTION
kind: statement
category: Data operations and others
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: feature, type: identifier, desc: "Mode keyword: STRICT or DEFINT" }
    note: "OPTION feature — set a program compile/runtime mode. STRICT and DEFINT may both be given (on separate OPTION lines)."

summary: "Sets the operating mode of the program. STRICT requires variables to be declared before use; DEFINT makes the default (untyped) variable type Integer."

semantics:
  - "OPTION STRICT: every variable must be declared (VAR/DIM) before use; referencing an undeclared variable raises errnum 15 (Undefined variable)."
  - "OPTION DEFINT: the default type for untyped variable names becomes Integer (instead of the usual Double), so values assigned to them are truncated to integers."
  - "OPTION is a compile-directive special form (parsed, not dispatched); it is conventionally placed at the top of the program and applies to that program slot."
  - "Type-suffixed names (X#, X%, X$) keep their explicit type regardless of DEFINT; DEFINT only changes the default for un-suffixed names."
  - "Both options may be active together (e.g. OPTION STRICT on one line and OPTION DEFINT on another, or chained OPTION DEFINT:OPTION STRICT)."
  - "An explicit type suffix overrides DEFINT: under OPTION DEFINT, A#=3.5 still stores 3.5 (the # forces Double); only un-suffixed names default to Integer."
  - "OPTION TOOL is an additional (undocumented in the manual) feature keyword used to mark editor/tool programs; its precise runtime effect is oracle-pending."

errors:
  - { errnum: 15, name: "Undefined variable", when: "OPTION STRICT is active and an undeclared variable is referenced" }
  - { errnum: 3, name: SyntaxError, when: "the feature keyword is not a recognized OPTION mode" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/option.md (OPTION Feature; STRICT: declaration required; DEFINT: default variable type Integer)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: OPTION keyword name @0x2ef5d8; a parser/compiler special form (not in the builtin dispatch table) — sets compile flags (strict-declaration / default-integer) that affect name resolution and the default type of un-suffixed variables" }
  - { type: community, ref: "sbsave corpus: STRICT (~798) and DEFINT (~238) dominant; an undocumented OPTION TOOL keyword appears (~12, e.g. QRY34XVD/TXT/-SCR_EDIT-, 5KSKXX8X/TXT/GED — editor/tool programs); STRICT+DEFINT chained on one line (OPTION DEFINT:OPTION STRICT in TB53F344/TXT/AY-3-EM.PRG)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t4f): OPTION DEFINT then A=3.5 -> 3 (truncated to Integer); A=10/4 -> 2 (integer result); A#=3.5 -> 3.5 (explicit suffix keeps Double); OPTION STRICT then referencing undeclared A -> errnum 15 (Undefined variable)" }

confidence: hw_verified

tests:
  - { name: option_defint_truncates, code: "OPTION DEFINT\nA=3.5\nPRINT A", expect: { stdout: "3" } }
  - { name: option_defint_intdiv, code: "OPTION DEFINT\nA=10/4\nPRINT A", expect: { stdout: "2" } }
  - { name: option_defint_suffix_keeps_double, code: "OPTION DEFINT\nA#=3.5\nPRINT A#", expect: { stdout: "3.5" } }
  - { name: option_strict_undeclared, code: "OPTION STRICT\nPRINT A", expect: { error: { errnum: 15 } } }
