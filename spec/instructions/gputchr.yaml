id: GPUTCHR
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: x, type: integer, desc: "Display X (top-left of the text)" }
      - { name: y, type: integer, desc: "Display Y" }
      - { name: text, type: string, desc: "String to draw" }
      - { name: scale_x, type: number, optional: true, default: 1.0, desc: "Horizontal magnification (1.0 = no scaling)" }
      - { name: scale_y, type: number, optional: true, default: 1.0, desc: "Vertical magnification" }
      - { name: color, type: integer, optional: true, desc: "32-bit ARGB color; if omitted, the current GCOLOR is used" }
    note: "GPUTCHR x, y, \"string\" [, scale_x, scale_y] [, color] — draw a string onto the graphics page (form 1)."
  - args:
      - { name: x, type: integer, desc: "Display X" }
      - { name: y, type: integer, desc: "Display Y" }
      - { name: char_code, type: integer, desc: "Character code (UTF-16) to draw" }
      - { name: scale_x, type: number, optional: true, default: 1.0, desc: "Horizontal magnification" }
      - { name: scale_y, type: number, optional: true, default: 1.0, desc: "Vertical magnification" }
      - { name: color, type: integer, optional: true, desc: "32-bit ARGB color" }
    note: "GPUTCHR x, y, char_code [, scale_x, scale_y] [, color] — draw a single character by code (form 2)."

summary: "Draws text (a string, or a single character by code) onto the graphics page at (x,y), in the font glyphs, with optional scaling and color."

semantics:
  - "GPUTCHR rasterizes the given string (form 1) or single character code (form 2) into the manipulation GRP page using the console font glyphs, starting at (x,y)."
  - "Optional scale_x/scale_y magnify the glyph (1.0 = native 8x8 per character); non-integer scales are allowed."
  - "An optional trailing color overrides the current GCOLOR for this call."
  - "Glyphs honor a redefined font ([[fontdef]]); pixels are stored as RGBA5551 (GSPOIT read-back rounded) and drawing respects the write clip ([[gclip]])."
  - "Each character occupies an 8x8 cell (times the scale); only the glyph's set pixels are written (the cell background is not filled)."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/gputchr.md (GPUTCHR X,Y,\"str\"[,SX,SY][,Color]; and GPUTCHR X,Y,charcode[,SX,SY][,Color]; magnification; color per GCOLOR)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GPUTCHR handler FUN_00154b10 @0x154b10: rasterizes the string/char glyph (scaled) into the manipulation page" }
  - { type: community, ref: "sbsave corpus: GPUTCHR pervasive (~12,781 lines) for drawing text/chars onto GRP (string and char-code forms, with scale + color)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7c): GPAGE 0,0:GCLS:GCOLOR RGB(255,255,255):GPUTCHR 0,0,ASC(\"A\"),4,4 (a 4x-scaled 'A') sets glyph pixels in the cell (GSPOIT(16,4)!=0 near the top) while a point well outside the cell (60,60)=0" }

confidence: hw_verified

tests:
  - { name: gputchr_draws_glyph, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPUTCHR 0,0,ASC(\"A\"),4,4\nPRINT GSPOIT(16,4)!=0", expect: { stdout: "1" } }
  - { name: gputchr_outside_empty, code: "GPAGE 0,0\nGCLS\nGCOLOR RGB(255,255,255)\nGPUTCHR 0,0,ASC(\"A\"),4,4\nPRINT GSPOIT(60,60)", expect: { stdout: "0" } }
