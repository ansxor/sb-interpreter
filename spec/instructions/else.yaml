id: ELSE
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args: []
    note: "Keyword introducing the branch run when the IF condition is false: IF cond THEN ... ELSE process."

summary: "Marks the start of the branch executed when an IF condition is false."

semantics:
  - "Always part of an IF construct; the ELSE process runs only when the condition (and any ELSEIF conditions) were false."
  - "GOTO may be omitted after ELSE: a bare @label means GOTO @label."
  - "In the multi-line form, ELSE separates the true block from the false block, and ENDIF closes the construct."
  - "See [[if]] for full conditional semantics and truthiness."

errors:
  - { errnum: 3, name: SyntaxError, when: "ELSE appears outside a well-formed IF construct" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/else.md (control destination when the IF condition is not satisfied)" }
  - { type: disassembled, ref: "cia_3.6.0.lst ELSE is a parser keyword, not in the builtin dispatch table; handled by the IF compiler (keyword table region @0x2ed5c8..0x2ed678)" }
  - { type: hw_verified, ref: "sb-oracle branch-selection probe 2026-06-22: the ELSE process runs when the condition is false (IF 0 THEN A=1 ELSE A=ASC(\"\") -> errnum 4) and is skipped when true (IF 1 THEN A=1 ELSE A=ASC(\"\") -> no error). See [[if]]." }

confidence: hw_verified

tests:
  - { name: else_runs_when_false, code: 'IF 0 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "F" } }
  - { name: else_skipped_when_true, code: 'IF 1 THEN PRINT "T" ELSE PRINT "F"', expect: { stdout: "T" } }
