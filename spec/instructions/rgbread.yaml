id: RGBREAD
kind: statement
category: Graphics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: color, type: integer, desc: "32-bit ARGB color code to decompose" }
      - { name: r, type: integer, desc: "OUT: red component (0-255)" }
      - { name: g, type: integer, desc: "OUT: green component (0-255)" }
      - { name: b, type: integer, desc: "OUT: blue component (0-255)" }
    note: "RGBREAD color OUT r, g, b — split a color into R,G,B (form 1)."
  - args:
      - { name: color, type: integer, desc: "32-bit ARGB color code to decompose" }
      - { name: a, type: integer, desc: "OUT: alpha/transparency (0-255)" }
      - { name: r, type: integer, desc: "OUT: red component (0-255)" }
      - { name: g, type: integer, desc: "OUT: green component (0-255)" }
      - { name: b, type: integer, desc: "OUT: blue component (0-255)" }
    note: "RGBREAD color OUT a, r, g, b — split a color into A,R,G,B (form 2; alpha FIRST)."

summary: "Decomposes a 32-bit ARGB color code into its 8-bit components via OUT. The 3-variable form yields R,G,B; the 4-variable form yields A,R,G,B (alpha first). It is the inverse of RGB()."

semantics:
  - "RGBREAD color OUT r,g,b writes the red, green and blue components (0-255 each) of the color to the OUT variables."
  - "The 4-variable form RGBREAD color OUT a,r,g,b also yields the alpha/transparency first (matching RGB()'s alpha-first 4-arg order)."
  - "It is the exact inverse of [[rgb]] for an in-range color: RGBREAD RGB(10,20,30) OUT r,g,b gives r=10, g=20, b=30."
  - "Uses the multi-return OUT form; the OUT targets are lvalues (scalars or array elements)."
  - "Reading the components of a GSPOIT-sampled pixel yields the RGBA5551-rounded channel values (since the pixel itself was rounded)."

errors: []

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/rgbread.md (RGBREAD ColorCode OUT [A,]R,G,B; gets each RGB element; A opaque 255..0 transparent; R,G,B 0-255)" }
  - { type: disassembled, ref: "cia_3.6.0.lst RGBREAD handler FUN_00154dc0 @0x154dc0: unpacks the 32-bit color into A/R/G/B and writes them to the OUT slots" }
  - { type: community, ref: "sbsave corpus: RGBREAD used to split colors for tinting/blending (R,G,B and A,R,G,B OUT forms)" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t7e): RGBREAD RGB(10,20,30) OUT R,G,B -> R=10,G=20,B=30 (exact inverse of RGB); the 4-var form RGBREAD RGB(128,10,20,30) OUT A,R,G,B -> A=128,R=10,G=20,B=30 (alpha first)" }

confidence: hw_verified

tests:
  - { name: rgbread_components, code: "RGBREAD RGB(10,20,30) OUT R,G,B\nPRINT R;\",\";G;\",\";B", expect: { stdout: "10,20,30" } }
  - { name: rgbread_with_alpha, code: "RGBREAD RGB(128,10,20,30) OUT A,R,G,B\nPRINT A;\",\";R;\",\";G;\",\";B", expect: { stdout: "128,10,20,30" } }
