  - { type: disassembled, ref: "cia_3.6.0.lst END is a parser keyword (token @0x2ed5a4), not in the builtin dispatch table; halts the VM cleanly" }

confidence: disassembled

tests:
  - { name: halts, code: "PRINT \"A\"\nEND\nPRINT \"B\"", expect: { stdout: "A" } }
