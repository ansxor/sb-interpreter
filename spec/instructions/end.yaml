id: END
kind: statement
category: Control
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args: []
    note: "END — terminates the running program."

summary: "Ends the program, stopping execution."

semantics:
  - "Halts the program immediately; statements after END (textually or by fall-through) are not executed."
  - "Used to stop before subroutine/label definitions that follow the main code."
  - "Unlike STOP, END is a clean termination and is not resumable with CONT."

errors: []

sources:
