id: ACOS
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: value, type: number, range: "-1.0 to 1.0", desc: "Cosine value to invert" }
    returns: { type: double, desc: "Arc cosine (radians) of value, in [0, pi]" }

summary: "Returns the arc cosine (inverse cosine) of value, in radians, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double (e.g. ACOS(1)=0)."
  - "Result is an angle in radians within [0, pi] (ACOS(0)=pi/2)."
  - "Domain is [-1.0, 1.0]; values outside raise Out of range."

errors:
  - { errnum: 10, name: OutOfRange, when: "value < -1.0 or value > 1.0" }
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/acos.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst ACOS handler @0x149258; argcount!=1 -> errnum 4; arg coerced via to-double (non-number -> errnum 8); range guard vcmpe against -1.0 (0xBFF0000000000000 @0x149348) / 1.0 (0x3FF0000000000000 @0x149350) -> errnum 10 (Out of range) when outside [-1,1]; acos computed @0x2988d8; result returned as Double" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: ACOS(1)=0, ACOS(0)=1.5708 (pi/2, 6 sig figs); ACOS(2) and ACOS(-2) both raise errnum=10 errline=1" }

confidence: hw_verified

tests:
  - { name: one_is_zero,     code: "PRINT ACOS(1)",  expect: { stdout: "0" } }
  - { name: zero_half_pi,    code: "PRINT ACOS(0)",  expect: { stdout: "1.5708" } }
  - { name: above_one_out_of_range, code: "A=ACOS(2)",   expect: { error: { errnum: 10 } } }
  - { name: below_neg_one_out_of_range, code: "A=ACOS(-2)", expect: { error: { errnum: 10 } } }
  - { name: string_type_mismatch,  code: 'A=ACOS("x")',   expect: { error: { errnum: 8 } } }
