# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: ACOS
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value, type: number, range: "-1.0 to 1.0", desc: "Cosine value" }
    returns: { type: double, desc: "Arc cosine in radians, 0 to PI" }

summary: "Returns the arc cosine (in radians) of value."

semantics:
  - "Domain is -1.0 to 1.0; result ranges 0 to PI radians."
  - "Result is always Double. PRINT/STR$ shows ~6 significant figures: ACOS(0)=1.5708 (PI/2), ACOS(-1)=3.14159 (PI)."
  - "ACOS(1)=0."

errors:
  - { errnum: 10, name: OutOfRange, when: "value is outside -1.0 to 1.0" }
  - { errnum: 8,  name: TypeMismatch, when: "value is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/acos.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: ACOS(1)=0, ACOS(0)=1.5708, ACOS(-1)=3.14159", confidence: hw_verified }
  # Out-of-range errnum is documented/osb (OutOfRange) — confirm via O-T5 (error capture).

confidence: hw_verified

tests:
  - { name: one_is_zero,  code: "PRINT ACOS(1)",  expect: { stdout: "0" } }
  - { name: zero_is_halfpi, code: "PRINT ACOS(0)", expect: { stdout: "1.5708" } }
  - { name: neg_one_is_pi, code: "PRINT ACOS(-1)", expect: { stdout: "3.14159" } }
  - { name: out_of_range,  code: "A=ACOS(2)",      expect: { error: { errnum: 10 } } }
