id: USE
kind: statement
category: Files
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 ŌĆö documented: mark a program slot executable by slot number.
  - args:
      - { name: slot, type: integer, range: "0-3: program SLOT to make executable" }
    returns: { type: void }
    note: "USE Program-SLOT ŌĆö make the program in the given slot (0-3) executable."
  # Form 2 ŌĆö UNDOCUMENTED: mark a slot executable via a "PRGn:Filename" resource string (corpus-verified).
  - args:
      - { name: name, type: string, range: '"PRGn:Filename" ŌĆö program slot (PRG0-PRG3) plus a file name' }
    returns: { type: void }
    note: "USE \"PRGn:Filename\" ŌĆö undocumented string form; corpus-verified, runtime effect oracle-pending."

summary: "Makes a program in the specified program SLOT executable so it can be referenced (e.g. by CALL/cross-slot GOTO/GOSUB) without being the running program. The documented form takes a slot number 0-3 (which may be any integer expression). Real programs also use an undocumented string form `USE \"PRGn:Filename\"`."

semantics:
  - "USE is a special-form keyword (keyword id 0x14c=332 in the keyword table @0x306724; name string @0x2ed580), parsed/handled by the slot machinery rather than dispatched through the builtin handler table ŌĆö so there is no standalone handler body to read; its exact validation is parser/VM-internal."
  - "Documented form: `USE Program-SLOT` marks the program in slot 0-3 as executable. The slot operand may be any integer expression (corpus: `USE 1`, `USE 3`, and a variable `USE C` / `USE I`)."
  - "Undocumented string form (corpus-verified): `USE \"PRGn:Filename\"` (and concatenated forms like `USE \"PRG1:\"+NAME$`) selects a program slot via a resource string. sb-core loads the named file's program into that slot and marks it executable, so a `COMMON DEF` in the file resolves cross-slot via `CALL \"name\"`. This is uniform across slots 0..3 ŌĆö the running-slot guard (`USE \"PRG0:ŌĆ”\"` while slot 0 runs ŌåÆ errnum 4) means slot 0 reaches the load path only when it is *non-running* (osb keeps all program SLOTs in one `slots[]` array ŌĆö slot 0 is not special). Runtime effect of the executable flag is the documented cross-slot `COMMON DEF` resolution; per-slot vs shared variable scoping is oracle-pending."
  - "An out-of-range slot is expected to raise errnum 4 (Illegal function call); a string with a non-PRG resource is expected to error similarly. Both error mappings are hypotheses (not body-pinned) and oracle-pending."

errors:
  - { errnum: 10, name: "Out of range", when: "the NUMERIC slot operand is outside 0-3 (`USE -1`, `USE 4`) ŌĆö hw_verified" }
  - { errnum: 4, name: "Illegal function call", when: "the slot is the *running* slot (`USE 0` / `USE \"PRG0:ŌĆ”\"` ŌĆö you cannot USE the slot you are executing), OR the resource STRING has an unknown type / a PRG index past the family (`USE \"FOO:X\"`, `USE \"PRG4:X\"`, `USE \"PRG5:X\"`) / an empty name (`USE \"PRG1:\"`) ŌĆö hw_verified. Note the index-past-family case is errnum 4 here, NOT the errnum 10 the SAVE resolver gives." }
  - { errnum: 46, name: "Load failed", when: "the resource STRING names a valid non-running slot but the program file does not exist (`USE \"PRG1:NOPE\"`) ŌĆö hw_verified" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/use.md (1 form: `USE Program SLOT`. 'Makes a program in the specified program SLOT executable.' Argument: Program SLOT 0-3. Example `USE 2`)" }
  - { type: hypothesis, ref: "cia_3.6.0.lst USE is a special-form keyword, NOT in the builtin dispatch table (disasm.py dispatch USE: 'not in dispatch table'); keyword-table entry @0x306724 -> name @0x2ed580 (UTF-16 'USE'), keyword id 0x14c (332). No standalone handler body was located (parser/VM-internal), so the slot-validation algorithm and errnum are NOT body-pinned." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bUSE\\b', excludes MOUSE/PAUSE/BECAUSE/REUSE/USED/USER): the documented numeric form is common (`USE 1` 13D4DV3V/TXT/MAIN_PRG_V2; `USE 3` 2383C3HE/TXT/LOWERDASH_C) and accepts a variable slot (`USE C` 2BC4738V/TXT/MOH_JUHSY237D; `USE I` 43AE1XG3/TXT/MMLIBRARY.LIB). The UNDOCUMENTED string form `USE \"PRGn:Filename\"` is real (~26 occurrences): `USE \"PRG1:OS_SAVE\"`, `USE \"PRG2:CL_SAVE\"` (1BWX7ENV/TXT/AND-OS), `USE \"PRG1:THWFNT\"` (81NY839J/TXT/__GAME), and concatenation `USE \"PRG1:\"+NAME$` (Z3VV3JJ/TXT/GAME). Syntax legal (shipped programs); runtime effect oracle-pending." }
  - { type: community, ref: "osb/SMILEBASIC/petitcomputer.d USE (3.5.0 structural cross-check only)" }
  - { type: hw_verified, ref: "sb-oracle real SB 3.6.0 (2026-06-23): USE error model ŌĆö `USE -1`ŌåÆerrnum 10, `USE 4`ŌåÆ10, `USE 0`ŌåÆ4 (running slot), `USE 1`ŌåÆNOERR (marks slot executable). String form: `USE \"PRG0:X\"`ŌåÆ4 (running slot), `USE \"PRG1:X\"`ŌåÆ46 (Load failed, file absent), `USE \"PRG4:X\"`ŌåÆ4, `USE \"PRG5:X\"`ŌåÆ4, `USE \"FOO:X\"`ŌåÆ4, `USE \"PRG1:\"`ŌåÆ4 (empty name). Captured via run_case.py batch `|err`. The error/validation model is hw_verified; the slot-executable runtime effect (cross-slot DEF/label resolution) + the string-form program LOAD are the deferred multi-program model." }

# Top-level documented: USE is a parser-handled special form (keyword id 332) with no
# body-readable handler; the documented numeric form and the corpus-only string form are both
# syntax-verified but their slot validation / errnum / runtime effect are oracle-pending.
confidence: documented

tests:
  - { name: slot_negative, code: "USE -1", expect: { error: { errnum: 10 } } }
  - { name: slot_too_high, code: "USE 4", expect: { error: { errnum: 10 } } }
  - { name: running_slot, code: "USE 0", expect: { error: { errnum: 4 } } }
  - { name: str_running_slot, code: 'USE "PRG0:X"', expect: { error: { errnum: 4 } } }
  - { name: str_unknown_family, code: 'USE "FOO:X"', expect: { error: { errnum: 4 } } }
  - { name: str_index_past_family, code: 'USE "PRG4:X"', expect: { error: { errnum: 4 } } }
  - { name: str_empty_name, code: 'USE "PRG1:"', expect: { error: { errnum: 4 } } }
  - { name: str_missing_file, code: 'USE "PRG1:NOPE"', expect: { error: { errnum: 46 } } }
