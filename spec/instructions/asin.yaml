id: ASIN
kind: function
category: Mathematics
version: { introduced: "3.0.0" } # verified_on: set when oracle-harvested

signatures:
  - args:
      - { name: value, type: number, range: "-1.0 to 1.0", desc: "Sine value to invert" }
    returns: { type: double, desc: "Arc sine (radians) of value, in [-pi/2, pi/2]" }

summary: "Returns the arc sine (inverse sine) of value, in radians, as a Double."

semantics:
  - "The argument is coerced to Double and the result is always a Double (e.g. ASIN(0)=0)."
  - "Result is an angle in radians within [-pi/2, pi/2] (ASIN(1)=pi/2)."
  - "Domain is [-1.0, 1.0]; values outside raise Out of range."

errors:
  - { errnum: 10, name: OutOfRange, when: "value < -1.0 or value > 1.0" }
  - { errnum: 8, name: TypeMismatch, when: "argument is a string" }
  - { errnum: 4, name: IllegalFunctionCall, when: "argument count is not 1" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/asin.md" }
  - { type: disassembled, ref: "cia_3.6.0.lst ASIN handler @0x149358; argcount!=1 -> errnum 4; arg coerced via to-double (non-number -> errnum 8); range guard vcmpe against -1.0/1.0 constants -> errnum 10 (Out of range) when outside [-1,1]; asin computed in-range; result returned as Double" }
  - { type: hw_verified, ref: "sb-oracle batch run 2026-06-22: ASIN(0)=0, ASIN(1)=1.5708 (pi/2, 6 sig figs); ASIN(2) and ASIN(-2) both raise errnum=10 errline=1" }
  - { type: hw_verified, ref: "sb-oracle PRINT read-back 2026-06-23: PRINT renders doubles via %.8f (M7-T4) — PRINT ASIN(1)=1.57079633; distinct from STR$ %g shown above" }

confidence: hw_verified

tests:
  - { name: zero,            code: "PRINT ASIN(0)",  expect: { stdout: "0" } }
  - { name: one_half_pi,     code: "PRINT ASIN(1)",  expect: { stdout: "1.57079633" } }
  - { name: above_one_out_of_range, code: "A=ASIN(2)",   expect: { error: { errnum: 10 } } }
  - { name: below_neg_one_out_of_range, code: "A=ASIN(-2)", expect: { error: { errnum: 10 } } }
  - { name: string_type_mismatch,  code: 'A=ASIN("x")',   expect: { error: { errnum: 8 } } }
