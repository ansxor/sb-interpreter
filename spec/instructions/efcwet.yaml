id: EFCWET
kind: statement
category: Sound
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: beep_wet, type: integer, range: "0..127", desc: "Effect amount applied to BEEP sounds." }
      - { name: bgm_wet, type: integer, range: "0..127", desc: "Effect amount applied to BGM." }
      - { name: talk_wet, type: integer, range: "0..127", desc: "Effect setting for TALK: less than 64 = OFF, 64 or greater = ON. For TALK only ON/OFF matters; the amount does not vary." }
    note: "EFCWET beep_wet, bgm_wet, talk_wet — set the per-source effect amounts (exactly 3 args)."

summary: "Sets the effect (wet) amount for each of the three audio sources: BEEP (0-127), BGM (0-127), and TALK. For BEEP and BGM the value is the effect amount; for TALK it is treated as ON/OFF only — less than 64 = OFF, 64 or greater = ON, with no variable amount. Requires exactly three arguments (each 0-127) and returns nothing (statement). The effect itself is selected with EFCSET and enabled with EFCON."

semantics:
  - "Shape gate: the argument count [r4,#0x4] must be exactly 3 AND the result count [r4,#0xc] must be 0 (ldr r0,[r0,#0x4] / cmp r0,#0x3 / ldreq r0,[r4,#0xc] / cmpeq r0,#0x0 / beq @0x1a2b44). Any other argument count, or use in a result context, raises errnum 3 (Syntax error) with errline -1 (mov r2,#0x0 / mvn r1,#0xffffffff(-1) / mov r0,#0x3 / bl 0x1fffdc @0x1a2b2c-0x1a2b38)."
  - "All three arguments are integers, each range-checked through the shared arg helper FUN_001eec7c with min r3=0 and max [sp,#0x0]=r5=#0x7f=127 (arg0 beep_wet slot sp+0x4 @0x1a2b44-0x1a2b5c; arg1 bgm_wet slot sp+0x8 @0x1a2b6c-0x1a2b80; arg2 talk_wet slot sp+0xc @0x1a2b90-0x1a2ba4). A value outside 0..127 raises errnum 10 (Out of range) with errline -1 inside the helper."
  - "On success the three values are loaded (ldmia r3,{r0,r1,r2} from sp+0x4) and applied via bl 0x1a4f54, then 0 is returned (@0x1a2bb4-0x1a2bc8). BEEP and BGM use the value as the effect amount; TALK uses it as a threshold (< 64 OFF / >= 64 ON), per the docs. EFCWET only sets amounts — the effect type is chosen by [[efcset]] and the effector is turned on/off with [[efcon]]/[[efcoff]]. Audio output has no deterministic emulator golden (O-T7)."

errors:
  - { errnum: 3, name: "Syntax error", when: "the argument count is not exactly 3, or EFCWET is used in a result context" }
  - { errnum: 10, name: "Out of range", when: "any of beep_wet, bgm_wet or talk_wet is not in 0..127" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/efcwet.md (`EFCWET BEEP effect value, BGM effect value, TALK effect value` — BEEP 0-127, BGM 0-127, TALK: less than 64 OFF / 64 or greater ON (ON/OFF only, amount does not change); example `EFCWET 0,100,64`)" }
  - { type: disassembled, ref: "cia_3.6.0.lst EFCWET handler @0x1a2b0c: shape gate ldr r0,[r0,#0x4] / cmp r0,#0x3 / ldreq r0,[r4,#0xc] / cmpeq r0,#0x0 / beq @0x1a2b44, else errnum 3 errline -1 (mvn r1,#-1 / mov r0,#0x3 / bl 0x1fffdc @0x1a2b2c-0x1a2b38); three int args via bl 0x1eec7c each min r3=0 max [sp,#0x0]=r5=#0x7f=127 (@0x1a2b44, @0x1a2b6c, @0x1a2b90); apply ldmia r3,{r0,r1,r2} from sp+0x4 / bl 0x1a4f54 / mov r0,#0x0 / ldmia sp!,{r4,r5,pc} @0x1a2bb4-0x1a2bc8" }
  - { type: disassembled, ref: "cia_3.6.0.lst shared integer-arg range helper FUN_001eec7c @0x1eec7c: evaluates the arg (blx [r2,#0x40]), bounds-checks value against min r3 and max [sp,#0x0], raising errnum 10 (mov r2,#0x0 / mov r0,#0xa / b 0x1fffdc @0x1eeccc) — enforces the 0..127 bounds on all three EFCWET arguments (same helper used by [[beep]])" }
  - { type: community, ref: "osb/SMILEBASIC/sound.d EFCWET (3.5.0 structural cross-check only)" }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg '\\bEFCWET\\b'): ~62 files, always the 3-arg form. Literal triples e.g. EFCWET 0,0,0 (2XVV233J/TXT/GAME.PRG), EFCWET 0,127,0, EFCWET 75,75,0, and variable operands EFCWET EW,EW,EW / EFCWET 0,SONGWET,0 (1K237KNV/TXT/FREEBGM_RWI2). Proves the 3-arg syntax + 0..127 value range are legal; runtime audio effect unproven (no oracle, O-T7)." }
  - { type: hw_verified, ref: "sb-oracle SB 3.6.0 (Azahar): error conditions confirmed — `EFCWET 128,0,0`, `EFCWET 0,-1,0` and `EFCWET 0,0,200` each raise errnum 10 (Out of range, value not 0..127); `EFCWET 0,0` (2 args) and `EFCWET 0,0,0,0` (4 args) raise errnum 3 (Syntax error). Audio output itself is not deterministically harvestable (O-T7)." }

confidence: disassembled

tests:
  # Argument count and 0..127 range error conditions read from the handler body.
  # Audio output is not deterministically harvestable (O-T7); these pin the statement contract.
  - { name: doc_example, code: "EFCWET 0,100,64", expect: { stdout: "" } }
  - { name: all_zero, code: "EFCWET 0,0,0", expect: { stdout: "" } }
  - { name: all_max, code: "EFCWET 127,127,127", expect: { stdout: "" } }
  - { name: beep_out_of_range, code: "EFCWET 128,0,0", expect: { error: { errnum: 10 } } }
  - { name: bgm_negative, code: "EFCWET 0,-1,0", expect: { error: { errnum: 10 } } }
  - { name: talk_out_of_range, code: "EFCWET 0,0,200", expect: { error: { errnum: 10 } } }
  - { name: too_few_args, code: "EFCWET 0,0", expect: { error: { errnum: 3 } } }
  - { name: too_many_args, code: "EFCWET 0,0,0,0", expect: { error: { errnum: 3 } } }
