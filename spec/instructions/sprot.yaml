id: SPROT
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: angle, type: number, range: "0..360", desc: "Rotation angle in degrees (clockwise)" }
    note: "SPROT id, angle — set a sprite's rotation (form 1)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
      - { name: dr, type: number, desc: "OUT: current angle" }
    note: "SPROT id OUT dr — read a sprite's rotation (form 2)."
  - args:
      - { name: id, type: integer, range: "0..511", desc: "Sprite management number" }
    returns: { type: number, desc: "Current rotation angle (0-360)" }
    note: "angle = SPROT(id) — read a sprite's rotation (function form, 3)."

summary: "Sets or reads a sprite's rotation angle in degrees (clockwise, 0-360). The sprite rotates about its SPHOME reference point. The sprite must be SPSET first."

semantics:
  - "SPROT id,angle sets the clockwise rotation in degrees (0-360); rotation is about the sprite's home/reference point (see [[sphome]])."
  - "Read it back with the OUT form (SPROT id OUT dr) or the function form (SPROT(id))."
  - "Using SPROT on a sprite that was not SPSET raises errnum 4 (Illegal function call)."

errors:
  - { errnum: 4, name: IllegalFunctionCall, when: "the sprite was not SPSET" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/sprot.md (SPROT id,Angle; SPROT id OUT DR; Variable=SPROT(id); 0-360 clockwise; error before SPSET)" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPROT handler FUN_00141460 @0x141460: sets/returns the sprite rotation angle" }
  - { type: community, ref: "sbsave corpus: SPROT common for spinning sprites; both OUT and function read forms used" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t8b): ACLS:SPSET 0,0,0,16,16,1:SPROT 0,45 then SPROT(0)=45; SPROT 0,90 then SPROT 0 OUT R -> R=90" }

confidence: hw_verified

tests:
  - { name: sprot_set_read_fn, code: "ACLS\nSPSET 0,0,0,16,16,1\nSPROT 0,45\nPRINT SPROT(0)", expect: { stdout: "45" } }
  - { name: sprot_set_read_out, code: "ACLS\nSPSET 0,0,0,16,16,1\nSPROT 0,90\nSPROT 0 OUT R\nPRINT R", expect: { stdout: "90" } }
