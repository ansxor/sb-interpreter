id: ON
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: index, type: integer, range: "any", desc: "0-based selector for the branch list" }
    note: "ON index GOTO @L0,@L1,... or ON index GOSUB @L0,@L1,... — branches to the index-th label."

summary: "Branches to one of several labels chosen by a 0-based index (computed GOTO/GOSUB)."

semantics:
  - "The index is 0-based (unlike conventional BASIC): index 0 selects the first label, 1 the second, and so on."
  - "Works with GOTO (jump) or GOSUB (call) followed by a comma-separated label list."
  - "If the index is out of range (negative, or >= the number of labels), no branch is taken and execution falls through to the next statement."
  - "Label strings are NOT allowed in the ON branch list (only bare @labels)."

errors:
  - { errnum: 14, name: "Undefined label", when: "a label in the list does not exist" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/on.md (ON ctrl GOTO @L0,@L1...; branch number begins at 0; label strings not allowed)" }
  - { type: disassembled, ref: "cia_3.6.0.lst ON is a parser keyword (token @0x2ed12c), not in the builtin dispatch table; compiled to an index bounds-check + jump-table; out-of-range index falls through" }
  - { type: hw_verified, ref: "sb-oracle branch probe 2026-06-22: ON 0 GOTO @A,@B branches to @A (index 0 = first label, confirming 0-based) which errors; ON 5 (out of range for a 1-label list) takes no branch and falls through to the next statement (errnum 4)." }

confidence: hw_verified

tests:
  - { name: index_zero, code: "ON 0 GOTO @A,@B\n@A\nPRINT \"A\"\nEND\n@B\nPRINT \"B\"", expect: { stdout: "A" } }
  - { name: index_one,  code: "ON 1 GOTO @A,@B\n@A\nPRINT \"A\"\nEND\n@B\nPRINT \"B\"", expect: { stdout: "B" } }
  - { name: out_of_range_falls_through, code: "ON 5 GOTO @A\nPRINT \"FALL\"\nEND\n@A\nPRINT \"A\"", expect: { stdout: "FALL" } }
