# v2 spec contract — authored from docs + osb cross-check + oracle (prd/specs.md).
id: POW
kind: function
category: Mathematics
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: value,      type: number, range: "any", desc: "Base value to exponentiate" }
      - { name: multiplier, type: number, range: "any", desc: "Exponent" }
    returns: { type: double, desc: "value raised to the power multiplier" }

summary: "Returns value raised to the power multiplier (value ^ multiplier)."

semantics:
  - "POW(value, multiplier) = value ** multiplier; result is always Double."
  - "POW(2,10)=1024, POW(1,4)=1, POW(2,0.5)=1.41421 (square root of 2)."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an argument is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/pow.md" }
  - { type: hw_verified, ref: "sb-oracle run 2026-06-21: POW(2,10)=1024, POW(1,4)=1, POW(2,0.5)=1.41421", confidence: hw_verified }

confidence: hw_verified

tests:
  - { name: integer_power, code: "PRINT POW(2,10)",  expect: { stdout: "1024" } }
  - { name: one_base,      code: "PRINT POW(1,4)",   expect: { stdout: "1" } }
  - { name: fractional,    code: "PRINT POW(2,0.5)", expect: { stdout: "1.41421" } }
  - { name: string_type_mismatch, code: 'A=POW("x",2)', expect: { error: { errnum: 8 } } }
