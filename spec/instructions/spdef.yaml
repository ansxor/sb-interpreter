id: SPDEF
kind: statement
category: Sprites
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  # Form 1 — reset the definition-template table to its initial state.
  - args: []
    note: "SPDEF — reset the sprite character-definition template table to its built-in default."
  # Form 2 — define a single template.
  - args:
      - { name: definition_number, type: integer, range: "0..4095", desc: "Template (definition) number to set." }
      - { name: u, type: integer, range: "0..511", desc: "Source-image X on the sprite sheet." }
      - { name: v, type: integer, range: "0..511", desc: "Source-image Y on the sprite sheet." }
      - { name: w, type: integer, range: "0..512 (U+W must be <= 512)", optional: true, default: 16, desc: "Source-image width. Default 16." }
      - { name: h, type: integer, range: "0..512 (V+H must be <= 512)", optional: true, default: 16, desc: "Source-image height. Default 16." }
      - { name: origin_x, type: integer, range: "-32768..32767", optional: true, default: 0, desc: "Reference (home) point X for the sprite's coordinates. Default 0." }
      - { name: origin_y, type: integer, range: "-32768..32767", optional: true, default: 0, desc: "Reference (home) point Y. Default 0." }
      - { name: attribute, type: integer, range: "0..&H3F", optional: true, default: 1, desc: "Display/rotation/flip/blend attribute bits (see below). Default &H01 (display ON)." }
    note: "SPDEF defnum, U,V [,W,H [,OX,OY]] [,attr] — define one template (W,H default 16,16; origin 0,0; attr &H01)."
  # Form 3 — bulk define from a numeric array (7 elements per template).
  - args:
      - { name: data_array, type: number_array, desc: "Array of template data, 7 elements per template (U,V,W,H,OriginX,OriginY,Attribute). Element count must be a multiple of 7; defines templates 0,1,2,... in order." }
    note: "SPDEF array — bulk-define templates 0.. from a numeric array (7 elements each)."
  # Form 4 — bulk define from a DATA list referenced by label.
  - args:
      - { name: label, type: string, desc: "Name of a DATA label (`\"@LABEL\"` literal or string variable). First datum is the template count; then 7 data per template (U,V,W,H,OX,OY,Attr)." }
    note: "SPDEF \"@LABEL\" — bulk-define templates from a DATA sequence (first value = count, then 7 per template)."
  # Form 5 — read a template's data into OUT variables.
  - args:
      - { name: definition_number, type: integer, range: "0..4095", desc: "Template number to read." }
    out:
      - { name: u, type: integer, desc: "Receives source-image X." }
      - { name: v, type: integer, desc: "Receives source-image Y." }
      - { name: w, type: integer, optional: true, desc: "Receives width." }
      - { name: h, type: integer, optional: true, desc: "Receives height." }
      - { name: origin_x, type: integer, optional: true, desc: "Receives reference X." }
      - { name: origin_y, type: integer, optional: true, desc: "Receives reference Y." }
      - { name: attribute, type: integer, optional: true, desc: "Receives the attribute bits." }
    note: "SPDEF defnum OUT U,V [,W,H [,HX,HY]] [,A] — read a template's data (trailing OUT slots optional; intermediate slots may be skipped with a comma)."
  # Form 6 — copy/adjust a template from a source template.
  - args:
      - { name: definition_number, type: integer, range: "0..4095", desc: "Destination template number." }
      - { name: source_definition_number, type: integer, range: "0..4095", desc: "Source template number to copy from." }
      - { name: u, type: integer, range: "0..511", optional: true, desc: "Override source-image X (omit with a comma to keep source)." }
      - { name: v, type: integer, range: "0..511", optional: true, desc: "Override source-image Y." }
      - { name: w, type: integer, range: "0..512 (U+W <= 512)", optional: true, desc: "Override width." }
      - { name: h, type: integer, range: "0..512 (V+H <= 512)", optional: true, desc: "Override height." }
      - { name: origin_x, type: integer, range: "-32768..32767", optional: true, desc: "Override reference X." }
      - { name: origin_y, type: integer, range: "-32768..32767", optional: true, desc: "Override reference Y." }
      - { name: attribute, type: integer, range: "0..&H3F", optional: true, desc: "Override attribute." }
    note: "SPDEF defnum, srcnum, [U],[V],[W],[H],[OX],[OY],[attr] — copy a template, optionally adjusting fields (omitted fields keep the source's; separating commas required)."

summary: "Manages the sprite character-definition TEMPLATE table — the pre-set definitions (image rectangle, home/origin point, and attribute flags) that SPSET copies from when creating a sprite. The template table is shared by the upper and lower (touch) screens and is seeded from spdef.csv. Six forms: reset the whole table (no args), define one template, bulk-define from a numeric array (7 elements per template) or from a DATA label, read a template back via OUT, and copy/adjust a template from another. The attribute is a bitfield: b00 display (#SPSHOW), b01-b02 90-degree rotation (#SPROT0/90/180/270), b03 horizontal flip (#SPREVH), b04 vertical flip (#SPREVV), b05 additive blend (#SPADD)."

semantics:
  - "Top-level dispatch is on OUT/result count [r0,#0xc] (r6) and argcount [r0,#0x4] (r1) — prologue push {r4-r8,sb,sl,fp,lr} / vpush {d8-d15} / sub sp,#0x84 @0x13fe58: (a) result-count != 0 AND argcount == 1 -> getter form 5 @0x140d40; (b) result-count != 0 AND argcount != 1 -> errnum 4 @0x140650; (c) result-count == 0 AND argcount == 0 -> reset form 1 (bl 0x2095e0 @0x13ff08, returns 0); (d) result-count == 0 AND argcount >= 1 -> a setter, sub-dispatched on the first argument's type (ldrb r3,[r2,#0x1] @0x13fea4)."
  - "Setter sub-dispatch by first-arg type: a numeric scalar first arg (type byte 0) jumps to the single-template / copy path @0x1402e0 (forms 2 and 6, distinguished by argcount); a non-scalar first arg is bulk data — an array (form 3) or a string DATA label (form 4)."
  - "Array bulk form (3): the element count must be a multiple of 7 (the handler computes count/7 via the magic-multiply smlal r2,r1,r8,r0 / asr / sub sequence @0x13fed8, then cmn r1,r0 / bne -> errnum 31 mov r0,#0x1f @0x13fefc). The defined-template count is clamped to 0x1000 = 4096 (cmp r8,#0x1000 / movgt r8,#0x1000 @0x13ff48), matching the 0..4095 definition-number range."
  - "Per-element range validation (errnum 10, Out of range) for the array form @0x140084-0x1400ec: U>=0 and V>=0; U<=0x200 and V<=0x200 (512); W,H (origin sizes) within -0x8000..0x7fff; attribute 0..0x3f; origin X,Y >= 0; AND U+W <= 0x200 and V+H <= 0x200 — i.e. the documented 'U+W and/or V+H values greater than 512 will give an error.' Any violation: mov r0,#0xa / b error @0x1400ec."
  - "Array storage / resize: the destination array is grown to hold the templates; a resize-type failure on the target raises errnum 8 (Type mismatch) (after the resize helper returns nonzero/1: mov r0,#0x8 @0x140040). Each template is packed into the internal table as 7 halfword/word fields (strh sequence @0x1400f4-0x140148)."
  - "Reset form (1): SPDEF with no arguments calls bl 0x2095e0 @0x13ff08 to restore the template table to its initial (spdef.csv-seeded) state and returns. The template table is common to both screens (documented)."
  - "Getter form (5): SPDEF defnum OUT ... reads the stored template fields back into the supplied variables; the count of OUT variables selects how many fields are returned (U,V minimum; then W,H; then HX,HY; then A). It dispatches the field set via a jump table sub r0,r6,#0x2 / cmp r0,#0x6 / ldrlo pc,[pc,r0,lsl#2] @0x140d6c. Intermediate OUT slots may be skipped with empty commas (e.g. `SPDEF 0 OUT ,,,_H`) to read only selected fields (verified in the corpus)."
  - "Defaults (forms 2/6, documented): omitted W,H default to 16,16; omitted origin X,Y default to 0,0; omitted attribute defaults to &H01 (display ON only). In the copy form (6) an omitted field keeps the source template's value (the separating commas are still required)."

errors:
  - { errnum: 4, name: "Illegal function call", when: "the argument/result-count shape matches no form (e.g. OUT used with argcount != 1)" }
  - { errnum: 8, name: "Type mismatch", when: "the destination array for a bulk define cannot be resized / has the wrong type" }
  - { errnum: 10, name: "Out of range", when: "a template field is out of range: U or V outside 0..512, U+W > 512 or V+H > 512, attribute outside 0..&H3F, or W/H/origin out of range" }
  - { errnum: 31, name: "Subscript out of range", when: "the numeric array (form 3) has an element count that is not a multiple of 7" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/spdef.md (6 forms: `SPDEF` reset; `SPDEF defnum,U,V[,W,H[,OX,OY]][,attr]` define; `SPDEF array` from numeric array (7 elements per template, count must be a multiple of 7); `SPDEF \"@label\"` from DATA (first datum = count, then 7 per template); `SPDEF defnum OUT U,V[,W,H[,HX,HY]][,A]` read; `SPDEF defnum,srcnum,[U],[V],[W],[H],[OX],[OY],[attr]` copy. defnum 0-4095; U,V 0-511; W,H default 16,16 with 'U+W and/or V+H values greater than 512 will give an error'; origin default 0,0; attribute bits b00 display(#SPSHOW) / b01-b02 rotation(#SPROT0/90/180/270) / b03 #SPREVH / b04 #SPREVV / b05 #SPADD, default 0x01; 'the template is common for both the upper screen and the Touch Screen')" }
  - { type: disassembled, ref: "cia_3.6.0.lst SPDEF handler @0x13fe58 (Ghidra left it as raw bytes; decoded with capstone ARM-LE): prologue push {r4-r8,sb,sl,fp,lr} vpush {d8-d15} sub sp,#0x84; dispatch on result-count r6=[r0,#0xc] + argcount r1=[r0,#0x4] -> getter @0x140d40, reset (argcount 0) bl 0x2095e0 @0x13ff08, setter sub-dispatch on first-arg type ldrb r3,[r2,#0x1] @0x13fea4; array form /7 check smlal/cmn -> errnum 31 mov r0,#0x1f @0x13fefc; template-count clamp cmp r8,#0x1000 movgt @0x13ff48 (0..4095); per-element range guards @0x140084-0x1400e0 (U,V 0..0x200; U+W,V+H <= 0x200; attr 0..0x3f) -> errnum 10 mov r0,#0xa @0x1400ec; array resize fail -> errnum 8 mov r0,#0x8 @0x140040; generic shape error mov r0,#0x4 @0x140658; getter field-set jump table sub r0,r6,#0x2 cmp #0x6 ldrlo pc,[pc,r0,lsl#2] @0x140d6c. Error tail bl 0x1fffdc @0x14065c." }
  - { type: community, ref: "sbsave corpus (verified, word-boundary rg): real programs use form 2 with attribute built from constants `SPDEF 35,97,9,6,5,2,3,1 OR #SPROT90` (379 lines, e.g. 1DVK34J/TXT/HNZTL); array-element / expression destination-and-source operands `SPDEF SPCH[I]+J,U,V,W,H,W/2,H/2,ATR` (JDNE7W3E/TXT/NSW201609) and `SPDEF SPDEF%[I],U%,V%,W%,H%,NEW_HX%,NEW_HY%,A%` (JEEF3L4/TXT/JUMPSCARE_DEFS); the OUT getter with skipped intermediate slots `SPDEF 0 OUT ,,,_H` and `SPDEF 2 OUT ,,_W,` (93X3QDAX/TXT/GAME line 177/260) and `SPDEF TKC[NC] OUT U,V,W,H` (534NX3L6/TXT/DANMAKU3); the DATA-label form `SPDEF \"@label\"`. All match the 6 documented forms (operands are just expressions/array elements). Proves the syntax is legal; read-back values are oracle-pending." }
  - { type: hw_verified, ref: "sb-oracle 2026-06-22 (s_t8e): define-then-read defaults `SPDEF 0,0,0:SPDEF 0 OUT U,V,W,H,OX,OY,A` -> W=16, H=16, A=1 (confirms omitted W,H default to 16,16 and attribute defaults to &H01 display-ON); range violation `SPDEF 0,500,0,100,16` (U+W=600 > 512) -> errnum 10 (Out of range). Full template field read-back for non-default values remains oracle-pending." }

confidence: hw_verified

tests:
  # Defaults (W=H=16, attr=1) + range error hw_verified (sb-oracle 2026-06-22 s_t8e). Non-default field read-back oracle-pending.
  - { name: define_minimal, code: "SPDEF 0,0,0", expect: { stdout: "" } }
  - { name: define_full, code: "SPDEF 0,192,352,32,32,16,16,1", expect: { stdout: "" } }
  - { name: define_defaults_then_read, code: "SPDEF 0,0,0\nSPDEF 0 OUT U,V,W,H\nPRINT W;\",\";H", expect: { stdout: "16,16" } }
  - { name: default_attr, code: "SPDEF 0,0,0\nSPDEF 0 OUT U,V,W,H,OX,OY,A\nPRINT A", expect: { stdout: "1" } }
  - { name: reset, code: "SPDEF", expect: { stdout: "" } }
  - { name: copy, code: "SPDEF 0,0,0,32,32\nSPDEF 1,0,,,16,16", expect: { stdout: "" } }
  - { name: range_uw_over_512, code: "SPDEF 0,500,0,100,16", expect: { error: { errnum: 10 } } }
