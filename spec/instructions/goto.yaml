id: GOTO
kind: statement
category: Control
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: label, type: label, desc: "Target @label, or a label string (e.g. \"@LABEL\" / \"1:@LABEL\" for another slot)" }
    note: "GOTO @label — unconditionally transfers control to the label."

summary: "Unconditionally branches execution to a label."

semantics:
  - "Transfers control to the named @label; statements between the GOTO and the label are skipped."
  - "The target may be written as a bare @label or as a label string (\"@LABEL\", or \"SLOT:@LABEL\" with the slot enabled via USE)."
  - "The label string need not be a literal: it may be a string variable (GOTO L$) or a runtime concatenation (GOTO \"@LOCK_\"+K$, GOTO \"0:@TAB\"+S$), resolved when the GOTO executes."
  - "An undefined label is an error."

errors:
  - { errnum: 14, name: "Undefined label", when: "the target label does not exist" }
  - { errnum: 34, name: "Illegal symbol string", when: "a label string is malformed" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/goto.md (GOTO @Label; label string / SLOT:@Label forms)" }
  - { type: disassembled, ref: "cia_3.6.0.lst GOTO is a parser keyword (token @0x2ed694), not in the builtin dispatch table; compiled to an unconditional jump to the resolved label address; undefined label -> errnum 14" }
  - { type: hw_verified, ref: "sb-oracle branch probe 2026-06-22 (error-as-signal): GOTO @SK skips an intervening A=ASC(\"\") (no error raised), confirming the unconditional jump; GOTO @NOPE (undefined) raises errnum 14." }
  - { type: hw_verified, ref: "sb-oracle bd:sb-interpreter-lvl 2026-06-26 (harness/harvest/out/lvl.tsv + lvl_err.tsv): a string-expression target is resolved at run time and branches to the intended label — GOTO L$ (L$=\"@X\"), GOTO \"@L\"+\"K\", and the literal-string GOTO \"@X\" all reach @X/@LK (sentinel R=1). An undefined label in a string-expr target raises errnum 14 at the GOTO's own line: GOTO L$ (L$=\"@NOPE\"), GOTO \"@NOPE\", GOTO \"@NO\"+\"PE\" all → errnum 14 (errline 1). Confirms the corpus-discovered forms." }
  - { type: community, ref: "sbsave corpus: string-expression targets attested in 82+ programs — string variable (GOTO L$ ~33x, GOTO K$ ~31x) and concatenation (e.g. 1BWX7ENV/TXT/AND-OS: GOTO ANS1$, GOTO \"@LOCK_\"+LOCK$). Syntax legality proven by the corpus; runtime output now hw_verified above." }

confidence: hw_verified

tests:
  - { name: skips_code, code: "GOTO @SK\nPRINT \"NO\"\n@SK\nPRINT \"YES\"", expect: { stdout: "YES" } }
  - { name: undefined_label, code: "GOTO @NOPE", expect: { error: { errnum: 14 } } }
