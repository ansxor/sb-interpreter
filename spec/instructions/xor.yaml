id: XOR
kind: operator
category: Bit Operations
version: { introduced: "3.0.0", verified_on: "3.6.0" }

signatures:
  - args:
      - { name: a, type: integer, desc: "Left operand (bit string)" }
      - { name: b, type: integer, desc: "Right operand (bit string)" }
    returns: { type: integer, desc: "Bitwise exclusive-OR of a and b" }
    note: "a XOR b — infix bitwise-XOR operator."

summary: "Bitwise exclusive OR of two integers (per bit: 0 if equal, 1 if different)."

semantics:
  - "XOR computes the bitwise exclusive-OR of its two operands as 32-bit integers (Integer = i32): each result bit is 1 where the operand bits differ, 0 where they match."
  - "Double operands are coerced to integer before the operation."
  - "Commonly used for bit toggling (FLAGS XOR #BIT) and as a logical exclusive-or."
  - "Negative operands use two's-complement i32 bit patterns (e.g. -1 XOR 0 = -1)."
  - "It is an infix operator (a parser special form), not a function."

errors:
  - { errnum: 8, name: TypeMismatch, when: "an operand is a string" }

sources:
  - { type: documented, ref: "sb-docs/smilebasic-3/xor.md (Variable=Num1 XOR Num2; exclusive OR; 0 if same, inverted if different)" }
  - { type: disassembled, ref: "cia_3.6.0.lst: XOR operator keyword name @0x2ed6a8 (token-name table region); an infix operator handled in the expression compiler (not in the builtin dispatch table) — operands coerced to i32, bitwise-XOR VM op; exact handler not pinned, name addr only" }
  - { type: community, ref: "sbsave corpus: XOR used for bit toggling and parity; less common than AND/OR but widespread" }
  - { type: hw_verified, ref: "sb-oracle batch 2026-06-22 (s_t6a): 5 XOR 3 -> 6; 100 XOR &H4C -> 40; 42 XOR 42 -> 0" }

confidence: hw_verified

tests:
  - { name: xor_basic, code: "PRINT 5 XOR 3", expect: { stdout: "6" } }
  - { name: xor_mask, code: "PRINT 100 XOR &H4C", expect: { stdout: "40" } }
  - { name: xor_self_zero, code: "PRINT 42 XOR 42", expect: { stdout: "0" } }
