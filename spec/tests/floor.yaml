# Test overlay for FLOOR (spec/instructions/floor.yaml holds the documented layer).
# This file is hand-authored and/or oracle-harvested; it is NOT regenerated from docs.
# Showcase of the test shape. `expect` values become hw_verified after an oracle run.
tests:
  - name: positive_fraction
    code: 'PRINT FLOOR(3.7)'
    expect: { stdout: "3" }
  - name: negative_rounds_down
    code: 'PRINT FLOOR(-2.1)'
    expect: { stdout: "-3" }
  - name: integer_passthrough
    code: 'PRINT FLOOR(5)'
    expect: { stdout: "5" }
  - name: string_errors
    # Type mismatch == errnum 8 per the official error table (NOT 20).
    code: 'A=FLOOR("x")'
    expect: { error: { errnum: 8 } }
