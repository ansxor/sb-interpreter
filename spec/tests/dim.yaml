# Oracle-harvested fixtures for DIM (hw_verified) — real SmileBASIC 3.6.0 (Azahar),
# s_t4a secondary error-edge probe 2026-06-26 (run_case.py errcase, isolated probes).
#
# `()` instead of `[]` for the array-size form is a Syntax error (errnum 3), uniform across
# DIM 1D/2D/3D, and even when a following `:`-separated statement tries to use the array
# (the `(` is rejected at parse time on line 1). sb-core agrees: its parser (parse_dim)
# only accepts `[` after the name for the array form, leaving a stray `(` → Syntax error 3.
#
# An over-large numeric array raises Out of memory (errnum 11), errline 1 — hw_verified for
# DIM A[10000,10000] (1e8 elements). The exact per-type element-count cap was probed but is
# NOT pinned here as a conformance case: sb-core's SbArray::new only raises errnum 11 on
# usize overflow (checked_mul), not on a real-memory cap, so a DIM A[10000,10000] case would
# attempt a 400MB allocation and OOM the host rather than cleanly raise 11. The errnum itself
# is hw_verified (see dim.yaml sources); # the cap is queued for a disassembly read + sb-core
# memory-limit bead (sb-interpreter-4vd, blocked on sb-interpreter-zvj).
tests:
  - name: "paren_instead_of_bracket_1d"
    code: "DIM A(3)"
    expect: { error: { errnum: 3 } }
  - name: "paren_instead_of_bracket_2d"
    code: "DIM A(3,2)"
    expect: { error: { errnum: 3 } }
  - name: "paren_instead_of_bracket_3d"
    code: "DIM A(3,2,1)"
    expect: { error: { errnum: 3 } }
  - name: "paren_instead_of_bracket_then_use"
    code: "DIM A(3):A[0]=1"
    expect: { error: { errnum: 3 } }
