# Error table — errnum → message, verified against the SmileBASIC 3.6.0 binary.
#
# Source of truth is the binary, NOT the docs: the errnum→string pointer array lives
# at @0x3054f8 in .data (56 word-pointers, errnum 0..55), each pointing into the ASCII
# error-string pool @0x2e965c..0x2e9ac0 in .rodata. Read out of
# SmileBASIC_3.6.0_CIA.bin (runtime addr = file offset + 0x100000).
#
# The error-message formatter FUN_001e94a8 indexes this table: it does
# `sub r0,r0,#0x1; cmp r0,#0x37` (range-guard errnum against 55), `ldrcc r0,[0x1e9584]`
# (load table base 0x3054f8), `ldrcc r9,[r0,r5,lsl #0x2]` (table[errnum]); out-of-range
# falls back to `adrcs r9,0x1e9588` = "Internal Error".
#
# The official docs (sb-docs/.../reference/error-table.md) list only the user-facing
# errnum 3..47. The binary additionally defines 0,1,2 (internal) and 48..55, and uses
# slightly different wording for two entries (see `docs_name`). Where the binary and the
# docs disagree, `name` carries the BINARY string (what SB actually displays / ERR$ would
# return); `docs_name` records the docs wording for traceability.
#
# `desc` for the doc-listed errnums (3..47, plus 11/12) is the docs text. For the
# binary-only errnums (0,1,2,48..55) `desc` is an inferred summary — name is
# disassembled, description is community/inferred and queued for oracle confirmation.
confidence: disassembled
sources:
  - type: disassembled
    reference: >-
      errnum→string ptr table @0x3054f8 (.data, 56 ptrs, errnum 0..55) → ASCII pool
      @0x2e965c..0x2e9ac0 (.rodata): e.g. errnum 3 → @0x2e9a00 "Syntax error",
      errnum 10 → @0x2e97e4 "Out of range", errnum 55 → @0x2e9a10 "Too many arguments".
      Lookup in FUN_001e94a8: `sub r0,r0,#0x1; cmp r0,#0x37` range-guards errnum≤55,
      `ldrcc r0,[0x1e9584]`→0x3054f8, `ldrcc r9,[r0,r5,lsl #0x2]` indexes table[errnum],
      out-of-range `adrcs r9,0x1e9588`="Internal Error". word @0x3054f8+56*4 is 0 (table end).
  - type: documented
    reference: sb-docs/smilebasic-3/reference/error-table.md (errnum 3..47)

# ERRNUM/ERRLINE confirmed to persist into DIRECT mode post-halt (oracle, O-T5).
# hw_verified errnums (sb-oracle, S-T14a), each matching the disassembled table:
#   X=ABS()    → ERRNUM=4  (Illegal function call)
#   A=1/0      → ERRNUM=7  (Divide by zero)
#   S$=5       → ERRNUM=8  (Type mismatch)
#   X=SQR(-1)  → ERRNUM=10 (Out of range)
errors:
  - { num: 0,  name: "No Error",                          desc: "no error has occurred (ERRNUM cleared)", in_docs: false }
  - { num: 1,  name: "Internal Error",                    desc: "an internal interpreter error occurred; also the formatter's out-of-range fallback message", in_docs: false }
  - { num: 2,  name: "Illegal Instruction",               desc: "an illegal or unknown instruction was encountered", in_docs: false }
  - { num: 3,  name: "Syntax error",                      desc: "syntax does not follow the grammar rules" }
  - { num: 4,  name: "Illegal function call",             desc: "the number of arguments specified in an instruction or function is wrong", verified: hw_verified }
  - { num: 5,  name: "Stack overflow",                    desc: "an overflow has occurred in the stack" }
  - { num: 6,  name: "Stack underflow",                   desc: "an underflow has occurred in the stack" }
  - { num: 7,  name: "Divide by zero",                    desc: "division by zero was attempted", verified: hw_verified }
  - { num: 8,  name: "Type mismatch",                     desc: "an inconsistent variable type is specified", verified: hw_verified }
  - { num: 9,  name: "Overflow",                          desc: "the calculation result exceeded the allowed range" }
  - { num: 10, name: "Out of range",                      desc: "a value outside the allowed range was specified", verified: hw_verified }
  - { num: 11, name: "Out of memory",                     desc: "sufficient memory area is not available" }
  - { num: 12, name: "Out of code memory",               desc: "sufficient code memory area is not available" }
