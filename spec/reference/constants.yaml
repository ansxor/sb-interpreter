# Built-in constants — name · value · group, verified against the SmileBASIC 3.6.0 binary
# AND real SmileBASIC 3.6.0 via the sb-oracle (every value harvested as a frozen golden).
#
# NAME SET (disassembled): each of the 79 constant names below was located as a
# NUL-terminated UTF-16LE string in the binary's .rodata keyword/name pool via the sb-disasm
# tool (`disasm.py find <#NAME>`); the address is in each row's `addr`. Names are stored WITH
# the leading '#' (e.g. "#WHITE\0" @0x2ef25c, "#A\0" @0x2eefd0). The sorted keyword table
# near 0x2c8e00 holds 12-byte records `(name_ptr, name_ptr, 0)` that xref back to these strings
# (e.g. #WHITE's name @0x2ef25c is referenced by the records @0x2c894c/@0x2c8950) — the SAME
# table format that holds the command and system-variable names (see sysvars.yaml). Reading the
# table out of SmileBASIC_3.6.0_CIA.bin uses runtime addr = file offset + 0x100000. Constant
# VALUES are substituted inline by the lexer (a constant is not a runtime variable), so the
# value is NOT stored in the 12-byte name record (its third field is 0, like sysvars) — values
# come from the oracle, not the binary's name table.
#
# VALUES (hw_verified): all 79 were harvested with `PRINT <#CONST>` on real SmileBASIC 3.6.0
# (sb-oracle, S-T14c). SmileBASIC Integer is i32, so a color word like &HFFF8F8F8 PRINTs as the
# signed -460552; the per-name signed result is frozen under `oracle.goldens` below. `bits` is
# the value as an UNSIGNED u32 (the ARGB word / flag); `bits` reinterpreted as i32 EQUALS the
# golden (the conformance test asserts this for every row).
#
# ⚠ THE ORACLE CORRECTED 7 DOCUMENTATION ERRORS (sb-docs values were wrong; real SB wins):
#   #BLUE   = &HFF0000F8 (docs said &HFF0000FF — the blue channel caps at F8 on SB's ramp)
#   #CYAN   = &HFF00F8F8 (docs said &HFF0000F8; real #CYAN equals #AQUA)
#   #ZL     = &H1000 / 4096   and  #ZR = &H0800 / 2048   (docs had the two swapped)
#   #BGROT90/#BGROT180/#BGROT270 = &H1000/&H2000/&H3000 (4096/8192/12288) — the BG rotation
#       field is bits 12-13 (rot<<12); docs listed it one bit too low (&H0800/&H1000/&H2000).
# Alias pairs that legitimately share a value: #ON=#YES=#TRUE=1, #OFF=#NO=#FALSE=0,
# #FUCHSIA=#MAGENTA=&HFFF800F8, and (post-correction) #AQUA=#CYAN=&HFF00F8F8.
confidence: hw_verified
sources:
  - type: disassembled
    reference: >-
      All 79 constant names are NUL-terminated UTF-16LE strings in the binary's .rodata
      keyword/name pool, located with `disasm.py find <#NAME>`: e.g. #WHITE @0x2ef25c,
      #A @0x2eefd0, #FUCHSIA @0x2eefd8, #CHKXY @0x2efabc, #BGROT270 @0x2eeef0 (full addr set
      in each row's `addr`; all 79 found, none missing). The sorted keyword table near
      @0x2c8e00 holds 12-byte records `(name_ptr, name_ptr, 0)`; #WHITE's name @0x2ef25c is
      xref'd by the records @0x2c894c/@0x2c8950 and #AQUA @0x2ef040 by @0x2c8550/@0x2c8554.
      This confirms the binary's constant NAME set + per-name address. The numeric VALUE is
      not in the record (third field is 0) — it is substituted inline by the lexer, so values
      are oracle-verified (below), not read from this table.
  - type: hw_verified
    reference: >-
      sb-oracle (S-T14c): `PRINT <#CONST>` on real SmileBASIC 3.6.0 for all 79 constants;
      results frozen under `oracle.goldens` (signed i32). This harvest CORRECTED 7 doc errors
      vs sb-docs/.../reference/constants.md: #BLUE=&HFF0000F8, #CYAN=&HFF00F8F8 (=#AQUA),
      #ZL=&H1000 & #ZR=&H0800 (docs swapped), and #BGROT90/180/270=&H1000/&H2000/&H3000
      (docs one bit low). The other 72 matched the docs (as i32). Captured on Azahar 3.6.0.
  - type: documented
    reference: >-
      sb-docs/smilebasic-3/reference/constants.md (all 79 constants, 8 groups) — accurate
      except the 7 values listed above, which the oracle overrode.

