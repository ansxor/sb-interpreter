# M7-T5 — integer overflow / precision corners, all hw_verified against real SB 3.6.0
# via the sb-oracle skill (batch harvests 2026-06-24). Three distinct behaviors:
#   1. `+`/`-`/`*` overflow PROMOTES Int→Double when an operand is statically Real/
#      Number-typed (suffix-less / `#` / Real literal / constant fold); a `%`-typed
#      (statically Integer) operand WRAPS mod 2^32.
#   2. Storing a Double outside [i32::MIN, i32::MAX] into a `%` target → Overflow (9).
#   3. `<<`/`>>` shift counts are NOT masked mod 32; `>>` is arithmetic.
# The oracle batch harvests value cases as STR$(expr) (%g / 6-sig, see M7-T4), so the
# promoted-Double cases below print via STR$ to match the harvested string EXACTLY; the
# PRINT (%.8f-trim) form of the same Double would be a plain integer ("2147483648") — a
# separate M7-T4 formatter, not re-tested here. Integer-result cases use bare PRINT
# (PRINT == STR$ for integers).
cases:
  # --- overflow promotion (constant fold; both operands literal) ---
  - name: add_overflow_promotes
    code: 'PRINT STR$(2147483647+1)'
    expect: { stdout: "2.14748e+09" }   # hw_verified add_overflow (Double 2147483648.0)
  - name: sub_overflow_promotes
    code: 'PRINT STR$(-2147483648-1)'
    expect: { stdout: "-2.14748e+09" }  # hw_verified sub_overflow (-2147483649.0)
  - name: mul_overflow_promotes
    code: 'PRINT STR$(2147483647*2)'
    expect: { stdout: "4.29497e+09" }   # hw_verified mul_overflow_neg2 (4294967294.0)
  - name: mul_pow30_promotes
    code: 'PRINT STR$(1073741824*2)'
    expect: { stdout: "2.14748e+09" }   # hw_verified mul_pow30x2 (2147483648.0)
  - name: in_range_stays_integer
    code: 'PRINT -1073741824*2'
    expect: { stdout: "-2147483648" }   # hw_verified mul_min_neg1 (fits i32 → Integer)
  # --- overflow promotion (runtime; suffix-less "Number" operand) ---
  - name: runtime_suffixless_promotes
    code: 'A=2147483647:A=A+1:PRINT STR$(A)'
    expect: { stdout: "2.14748e+09" }   # hw_verified sl_print
  # --- %-typed operand wraps mod 2^32 ---
  - name: runtime_pct_wraps
    code: 'A%=2000000000:A%=A%*2:PRINT A%'
    expect: { stdout: "-294967296" }    # hw_verified pct_wrap_print
  # --- DIV/MOD are integer ops and WRAP (no promotion); INT_MIN / -1 edge ---
  - name: div_min_by_neg1_wraps
    code: 'PRINT -1073741824*2 DIV -1'
    expect: { stdout: "-2147483648" }   # hw_verified div_min_neg1
  - name: mod_min_by_neg1
    code: 'PRINT -1073741824*2 MOD -1'
    expect: { stdout: "0" }             # hw_verified mod_min_neg1
  # --- double→int store overflow → errnum 9 (decimal-form huge literal) ---
  - name: store_huge_double_overflows
    code: 'A%=10000000000'
    expect: { error: { errnum: 9 } }    # hw_verified ovf_pos (1e10)
  - name: store_just_over_max_overflows
    code: 'A%=2147483648.0'
    expect: { error: { errnum: 9 } }    # hw_verified ovf_just
  - name: store_frac_past_max_overflows
    code: 'A%=2147483647.9'
    expect: { error: { errnum: 9 } }    # hw_verified ovf_negfrac
  - name: store_max_is_ok
    code: 'A%=2147483647.0:PRINT A%'
    expect: { stdout: "2147483647" }    # hw_verified exactly_max
  - name: store_frac_in_range_truncates
    code: 'A%=2147483646.9:PRINT A%'
    expect: { stdout: "2147483646" }    # hw_verified frac_lo
  - name: array_store_huge_overflows
    code: 'DIM A%[1]:A%[0]=10000000000'
    expect: { error: { errnum: 9 } }    # hw_verified arr_store_ovf
  # --- unsuffixed ARRAY element promotes like a suffix-less scalar (bd:sb-interpreter-3e3) ---
  #     DIM A[1] defaults to Real (the M1-T4 suffix-less default, bd:sb-interpreter-3a5), so
  #     an overflowing `A[0]*2` promotes Int->Double exactly like `A=A*2` above. STR$ form is
  #     the 6-sig harvested string; PRINT is the %.8f-trim integer display of the same Double.
  - name: array_element_overflow_promotes
    code: 'DIM A[1]:A[0]=2000000000:A[0]=A[0]*2:PRINT STR$(A[0])'
    expect: { stdout: "4e+09" }         # hw_verified arr_real_promote (Double 4000000000.0)
  - name: array_element_overflow_promotes_print
    code: 'DIM A[1]:A[0]=2000000000:A[0]=A[0]*2:PRINT A[0]'
    expect: { stdout: "4000000000" }    # hw_verified arr_real_promote (PRINT %.8f-trim of 4e9)
  # --- INC/DEC follow the scalar overflow rule (hw_verified 2026-06-24, prog batch) ---
  #     `INC X` is `X = X + delta`: a Real/Number-typed target (suffix-less / `#`) PROMOTES
  #     Int->Double on overflow, a `%`-typed target WRAPS mod 2^32.
  - name: inc_suffixless_promotes
    code: 'A=2147483647:INC A:PRINT STR$(A)'
    expect: { stdout: "2.14748e+09" }   # hw_verified inc_sl_promote (Double 2147483648.0)
  - name: inc_pct_wraps
    code: 'A%=2147483647:INC A%:PRINT A%'
    expect: { stdout: "-2147483648" }   # hw_verified inc_pct_wrap
  - name: dec_suffixless_promotes
    code: 'A=-2147483648:DEC A:PRINT STR$(A)'
    expect: { stdout: "-2.14748e+09" }  # hw_verified dec_sl_promote (-2147483649.0)
  - name: dec_pct_wraps
    code: 'A%=-2147483648:DEC A%:PRINT A%'
    expect: { stdout: "2147483647" }    # hw_verified dec_pct_wrap
  - name: inc_suffixless_by_delta_promotes
    code: 'A=2147483640:INC A,10:PRINT STR$(A)'
    expect: { stdout: "2.14748e+09" }   # hw_verified inc_sl_by_delta (2147483650.0)
  # --- MIXED operand typing: a `%` operand mixed with a suffix-less/Real one PROMOTES ---
  #     (confirms sb-core's "promote iff EITHER operand is_real_typed" rule, hw_verified).
  - name: mix_pct_plus_suffixless_promotes
    code: 'A%=2147483647:B=1:PRINT STR$(A%+B)'
    expect: { stdout: "2.14748e+09" }   # hw_verified mix_pct_plus_sl
  - name: mix_suffixless_plus_pct_promotes
    code: 'A=2147483647:B%=1:PRINT STR$(A+B%)'
    expect: { stdout: "2.14748e+09" }   # hw_verified mix_sl_plus_pct
  - name: mix_pct_plus_real_literal_promotes
    code: 'A%=2147483647:PRINT STR$(A%+1.0)'
    expect: { stdout: "2.14748e+09" }   # hw_verified mix_pct_plus_real
  - name: mix_pct_mul_suffixless_promotes
    code: 'A%=2000000000:B=2:PRINT STR$(A%*B)'
    expect: { stdout: "4e+09" }         # hw_verified mix_pct_mul_sl (4000000000.0)
  # --- builtin return type: there is NO static "Real-return" override (hw_verified
  #     2026-06-24, m7t5_builtin_rettype). A builtin's promote/wrap behavior is decided
  #     entirely by the RUNTIME type of its result, exactly like any other operand:
  #       * Type-preserving funcs (FLOOR/ABS/VAL/SGN/CEIL/ROUND: Integer in -> Integer
  #         out) return an Int at runtime for an int arg, so +1 WRAPS.
  #       * The same funcs given a Double arg return a Double, so +1 PROMOTES.
  #       * Genuinely Double-returning math (SIN/COS/SQR/...) always returns a Double, so
  #         a sum overflowing i32 PROMOTES via runtime-Double propagation.
  #     i.e. sb-core's "calls keep wrapping (is_real_typed Call arm = false), rely on the
  #     runtime Double" rule is correct — no per-builtin real-return-type table is needed.
  - name: floor_int_arg_is_integer_typed_wraps
    code: 'PRINT FLOOR(2147483647)+1'
    expect: { stdout: "-2147483648" }   # hw_verified floor_int_arg (Int in->Int out, wraps)
  - name: floor_dbl_arg_promotes
    code: 'PRINT STR$(FLOOR(2147483647.0)+1)'
    expect: { stdout: "2.14748e+09" }   # hw_verified floor_dbl_arg (Double in->Double out)
  - name: abs_result_is_integer_typed_wraps
    code: 'PRINT ABS(-2147483647)+1'
    expect: { stdout: "-2147483648" }   # hw_verified abs_int_arg (Integer-typed)
  - name: val_result_is_integer_typed_wraps
    code: 'PRINT VAL("2147483647")+1'
    expect: { stdout: "-2147483648" }   # hw_verified val_int_arg (Integer-typed)
  - name: sgn_result_is_integer_typed_wraps
    code: 'PRINT SGN(2147483647)*2147483647+1'
    expect: { stdout: "-2147483648" }   # hw_verified sgn_int (Integer-typed)
  - name: ceil_int_arg_is_integer_typed_wraps
    code: 'PRINT CEIL(2147483647)+1'
    expect: { stdout: "-2147483648" }   # hw_verified ceil_int (Integer-typed)
  - name: round_int_arg_is_integer_typed_wraps
    code: 'PRINT ROUND(2147483647)+1'
    expect: { stdout: "-2147483648" }   # hw_verified round_int (Integer-typed)
  - name: sin_double_result_promotes
    code: 'PRINT STR$(SIN(0)+2147483647+1)'
    expect: { stdout: "2.14748e+09" }   # hw_verified sin_zero_plus (Double-returning)
  - name: sqr_double_result_promotes
    code: 'PRINT STR$(SQR(2147483647)*0+2147483647+1)'
    expect: { stdout: "2.14748e+09" }   # hw_verified sqr_one_plus (Double-returning)
  # --- shift count is not masked; >> is arithmetic ---
  - name: shl_sign_bit
    code: 'PRINT 1<<31'
    expect: { stdout: "-2147483648" }   # hw_verified shl_1_31
  - name: shl_count_32_is_zero
    code: 'PRINT 1<<32'
    expect: { stdout: "0" }             # hw_verified shl_1_32 (not 1<<0)
  - name: shl_count_33_is_zero
    code: 'PRINT 1<<33'
    expect: { stdout: "0" }             # hw_verified shl_1_33 (not 1<<1)
  - name: shl_neg_count_is_zero
    code: 'PRINT 2<<-1'
    expect: { stdout: "0" }             # hw_verified shl_neg_count
  - name: shr_is_arithmetic
    code: 'PRINT -1>>1'
    expect: { stdout: "-1" }            # hw_verified shr_neg1_1 (sign-extending)
  - name: shr_count_32_saturates_sign
    code: 'PRINT -1>>32'
    expect: { stdout: "-1" }            # hw_verified shr_neg1_32
  - name: shr_count_32_nonneg_is_zero
    code: 'PRINT 5>>32'
    expect: { stdout: "0" }             # hw_verified shr_5_32
  - name: shr_neg_count_is_zero
    code: 'PRINT 256>>-1'
    expect: { stdout: "0" }             # hw_verified shr_neg_count
