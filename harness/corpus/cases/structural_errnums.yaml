# Block-structure mismatch errnums — hw_verified via the sb-oracle skill (real SB 3.6.0),
# structural-error |err probe 2026-06-23, then audit 49r isolated re-probe 2026-06-26
# (run_case.py errcase). Unmatched control-flow keywords raise their DEDICATED errnum from
# the error table (spec/reference/errors.yaml, @0x3054f8) — NOT the generic Syntax error 3.
# Two families:
#   stray CLOSER  (no matching opener) : NEXT->21, WEND->25, UNTIL->23
#   unterminated OPENER (no closer, EOF first) : FOR->20, WHILE->24, REPEAT->22, DEF->29
# The 2026-06-23 batch mis-harvested ONLY the IF/ENDIF family (26/27/28, fixed in 0e165f3);
# the loop family (20..25) + DEF (29) were re-verified by isolated probes in the 49r audit and
# are CORRECT. The stray closers are UNIFORM — leading or after statements, errline = the
# closer's own line — and share the ENDIF `:ENDIF`→3 leading-colon exception (an empty
# preceding statement): `:NEXT`/`:WEND`/`:UNTIL` all → errnum 3. All match sb-core's parser
# (Parser::structural_error). The earlier batch run reported errnum 0 for a lone NEXT as the
# batch's first case — a bisect artifact; a focused re-probe (NEXT, NEXT I, ?1:NEXT, NEXT:NEXT)
# all returned errnum 21 errline 1, confirming the spec.
cases:
  # stray closing keywords
  - { name: next_without_for,    code: "NEXT",              expect: { error: { errnum: 21 } } }
  - { name: wend_without_while,  code: "WEND",              expect: { error: { errnum: 25 } } }
  - { name: until_without_repeat, code: "UNTIL 1",          expect: { error: { errnum: 23 } } }
  # stray closers AFTER statements (audit 49r 2026-06-26: uniform — errline = closer's own line;
  # the IF family's "non-leading stray → 3" mis-harvest does NOT extend to the loop family)
  - { name: next_after_stmt,     code: "PRINT 1\nNEXT",     expect: { error: { errnum: 21 } } }
  - { name: wend_after_stmt,     code: "PRINT 1\nWEND",     expect: { error: { errnum: 25 } } }
  - { name: until_after_stmt,    code: "PRINT 1\nUNTIL 1",  expect: { error: { errnum: 23 } } }
  - { name: next_after_two_stmts, code: "A=1\nB=2\nNEXT",   expect: { error: { errnum: 21 } } }
  - { name: wend_after_two_stmts, code: "A=1\nB=2\nWEND",   expect: { error: { errnum: 25 } } }
  - { name: until_after_two_stmts, code: "A=1\nB=2\nUNTIL 1", expect: { error: { errnum: 23 } } }
  # line-start `:` rule (audit 49r 2026-06-26, generalized in dbk 2026-06-26): a `:` that is
  # the first token on its physical line — at the program top OR after a newline, in any
  # block — is a line-starting empty statement, which real SB 3.6.0 rejects as Syntax error 3
  # (errline = the `:`'s line). Applies to ANY keyword that follows (closers AND openers AND
  # plain statements), and inside FOR/WHILE/IF bodies too. A `:` AFTER a real statement on
  # the same line is a normal separator and does NOT raise. Generalizes the ENDIF `:ENDIF`→3
  # rule to every line of every block.
  - { name: next_leading_colon,  code: ":NEXT",             expect: { error: { errnum: 3 } } }
  - { name: wend_leading_colon,  code: ":WEND",             expect: { error: { errnum: 3 } } }
  - { name: until_leading_colon, code: ":UNTIL 1",          expect: { error: { errnum: 3 } } }
  - { name: next_leading_double_colon, code: "::NEXT",      expect: { error: { errnum: 3 } } }
  - { name: repeat_leading_colon, code: ":REPEAT",          expect: { error: { errnum: 3 } } }
  - { name: for_leading_colon,  code: ":FOR I=0 TO 1",      expect: { error: { errnum: 3 } } }
  - { name: while_leading_colon, code: ":WHILE 0",         expect: { error: { errnum: 3 } } }
  - { name: def_leading_colon,  code: ":DEF F",             expect: { error: { errnum: 3 } } }
  - { name: if_leading_colon,   code: ":IF 1 THEN PRINT 1", expect: { error: { errnum: 3 } } }
  - { name: print_leading_colon, code: ":PRINT 1",          expect: { error: { errnum: 3 } } }
  - { name: assign_leading_colon, code: ":A=1",             expect: { error: { errnum: 3 } } }
  - { name: bare_leading_colon, code: ":",                  expect: { error: { errnum: 3 } } }
  # line-start `:` AFTER a newline (mid-program, and inside a block body) → 3
  - { name: colon_line_start_after_stmt, code: "A=1\n:B=2", expect: { error: { errnum: 3 } } }
  - { name: colon_line_start_bare_after_stmt, code: "A=1\n:", expect: { error: { errnum: 3 } } }
  - { name: colon_line_start_after_blank, code: "A=1\n\n:B=2", expect: { error: { errnum: 3 } } }
  - { name: colon_line_start_in_for, code: "FOR I=0 TO 1\n:NEXT", expect: { error: { errnum: 3 } } }
  - { name: colon_line_start_in_while, code: "WHILE 0\n:WEND", expect: { error: { errnum: 3 } } }
  - { name: colon_line_start_in_if,  code: "IF 1 THEN\n:PRINT 1\nENDIF", expect: { error: { errnum: 3 } } }
  # same-line `:` AFTER a real statement is NOT the exception (PRINT 1:NEXT → 21)
  - { name: next_same_line_after_stmt, code: "PRINT 1:NEXT", expect: { error: { errnum: 21 } } }
  - { name: wend_same_line_after_stmt, code: "PRINT 1:WEND", expect: { error: { errnum: 25 } } }
  - { name: until_same_line_after_stmt, code: "PRINT 1:UNTIL 1", expect: { error: { errnum: 23 } } }
  # a TRAILING `:` at end of a line that has a real statement is fine (no empty statement)
  - { name: trailing_colon_after_stmt, code: "A=1:",          expect: { stdout: "" } }
  - { name: double_colon_between_stmts, code: "A=1::B=2",    expect: { stdout: "" } }
  # BREAK / CONTINUE outside any loop — hw_verified via sb-oracle isolated errcase probes
  # 2026-06-26 (run_case.py errcase). NOT a dedicated errnum in the error table (only 20-25
  # and 29 cover loop keywords); real SB 3.6.0 raises the generic Syntax error 3, with
  # errline = the keyword's own line (same line-rule as the stray closers: `BREAK`→3 line 1,
  # `PRINT 1\nBREAK`→3 line 2, `A=1\nB=2\nBREAK`→3 line 3; CONTINUE identical). Inside an IF
  # that is itself not inside a loop, BREAK/CONTINUE still see no enclosing loop → 3. Matches
  # sb-core's compiler (compile_stmt Break/Continue with no active loop → ERR_SYNTAX/3).
  - { name: break_outside,            code: "BREAK",                       expect: { error: { errnum: 3 } } } # errline 1
  - { name: break_after_stmt,        code: "PRINT 1\nBREAK",               expect: { error: { errnum: 3 } } } # errline 2
  - { name: break_after_two_stmts,   code: "A=1\nB=2\nBREAK",              expect: { error: { errnum: 3 } } } # errline 3
  - { name: continue_outside,        code: "CONTINUE",                    expect: { error: { errnum: 3 } } } # errline 1
  - { name: continue_after_stmt,    code: "PRINT 1\nCONTINUE",            expect: { error: { errnum: 3 } } } # errline 2
  - { name: continue_after_two_stmts, code: "A=1\nB=2\nCONTINUE",         expect: { error: { errnum: 3 } } } # errline 3
  - { name: break_in_if_no_loop,    code: "IF 1 THEN\nBREAK\nENDIF",      expect: { error: { errnum: 3 } } } # errline 2
  - { name: continue_in_if_no_loop, code: "IF 1 THEN\nCONTINUE\nENDIF",  expect: { error: { errnum: 3 } } } # errline 2
  # unterminated opening keywords (block ends / EOF before the closer)
  - { name: for_without_next,    code: "FOR I=0 TO 3\nPRINT I", expect: { error: { errnum: 20 } } }
  - { name: while_without_wend,  code: "WHILE 1\nPRINT 1",  expect: { error: { errnum: 24 } } }
  - { name: repeat_without_until, code: "REPEAT\nPRINT 1",  expect: { error: { errnum: 22 } } }
  - { name: def_without_end,     code: "DEF F\nA=1",        expect: { error: { errnum: 29 } } }
  # unterminated openers — bare (no body), audit 49r 2026-06-26: also raise at EOF
  - { name: repeat_bare,         code: "REPEAT",            expect: { error: { errnum: 22 } } }
  - { name: while_bare_false,    code: "WHILE 0",            expect: { error: { errnum: 24 } } }
  - { name: while_bare_true,     code: "WHILE 1",           expect: { error: { errnum: 24 } } }
  # IF-block family — hw_verified via the sb-oracle structural-error |err probe 2026-06-26
  # (full re-probe; the 2026-06-23 batch mis-harvested the non-leading ENDIF and unterminated-IF
  # cases and is superseded). The error table reserves 26 'THEN without ENDIF' / 27 'ELSE
  # without ENDIF' / 28 'ENDIF without IF', and real SB 3.6.0 surfaces ALL THREE:
  #   - 28 for ANY stray ENDIF (leading OR after statements), errline = the ENDIF's own line.
  #     A leading newline / blank line / comment does NOT change it (`\nENDIF`, `REM X\nENDIF`,
  #     `'X\nENDIF` → 28). The ONE exception is a leading `:` separator (`:ENDIF` → 3): the `:`
  #     is an empty preceding statement, so the ENDIF is not reached as a closer. A `:` AFTER a
  #     real statement does NOT trigger this (`PRINT 1:ENDIF` → 28).
  #   - 26 for an unterminated multi-line IF (or ELSEIF) with no ENDIF.
  #   - 27 for an ELSE clause with no ENDIF.
  #   - 3 for a stray ELSE (no IF at all).
  - { name: endif_leading,       code: "ENDIF",             expect: { error: { errnum: 28 } } } # stray ENDIF → 28
  - { name: endif_leading_then_stmt, code: "ENDIF\nPRINT 1", expect: { error: { errnum: 28 } } }
  - { name: endif_leading_newline, code: "\nENDIF",         expect: { error: { errnum: 28 } } } # leading blank line → 28 (errline 2)
  - { name: endif_leading_rem,  code: "REM X\nENDIF",       expect: { error: { errnum: 28 } } } # leading comment → 28 (errline 2; NOT suppressed)
  - { name: endif_leading_quote, code: "'X\nENDIF",         expect: { error: { errnum: 28 } } } # leading 'comment → 28 (errline 2)
  - { name: endif_leading_colon, code: ":ENDIF",           expect: { error: { errnum: 3 } } }  # leading : → 3 (empty stmt precedes ENDIF)
  - { name: endif_after_stmt,    code: "PRINT 1\nENDIF",    expect: { error: { errnum: 28 } } }  # non-leading stray ENDIF → 28 (was wrongly 3 in 2026-06-23)
  - { name: endif_after_assign,  code: "A=1\nENDIF",         expect: { error: { errnum: 28 } } } # non-leading → 28
  - { name: endif_colon_after_stmt, code: "PRINT 1:ENDIF",  expect: { error: { errnum: 28 } } }  # : after a real stmt → 28
  - { name: endif_after_closed,  code: "IF 1 THEN\nENDIF\nENDIF", expect: { error: { errnum: 28 } } } # second ENDIF → 28 (was wrongly 3)
  - { name: endif_after_for,     code: "FOR I=0 TO 1\nNEXT\nENDIF", expect: { error: { errnum: 28 } } } # stray ENDIF after a closed FOR → 28
  - { name: if_no_endif,         code: "IF 1 THEN\nPRINT 1", expect: { error: { errnum: 26 } } } # unterminated multi-line IF → 26 THEN without ENDIF (was wrongly 3)
  - { name: elseif_no_endif,     code: "IF 1 THEN\nA=1\nELSEIF 0 THEN\nB=2", expect: { error: { errnum: 26 } } } # unterminated ELSEIF → 26
  - { name: else_no_endif,       code: "IF 1 THEN\nA=1\nELSE\nB=2", expect: { error: { errnum: 27 } } } # dangling ELSE → 27 ELSE without ENDIF (was wrongly 3)
  - { name: stray_else,          code: "ELSE",              expect: { error: { errnum: 3 } } } # stray ELSE (no IF) → 3
