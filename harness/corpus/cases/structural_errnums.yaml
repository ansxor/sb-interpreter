# Block-structure mismatch errnums — hw_verified via the sb-oracle skill (real SB 3.6.0),
# structural-error |err probe 2026-06-23. Unmatched control-flow keywords raise their
# DEDICATED errnum from the error table (spec/reference/errors.yaml, @0x3054f8) — NOT the
# generic Syntax error 3. Two families:
#   stray CLOSER  (no matching opener) : NEXT->21, WEND->25, UNTIL->23
#   unterminated OPENER (no closer, EOF first) : FOR->20, WHILE->24, REPEAT->22, DEF->29
# All seven match sb-core's parser (Parser::structural_error). The earlier batch run reported
# errnum 0 for a lone NEXT as the batch's first case — a bisect artifact; a focused re-probe
# (NEXT, NEXT I, ?1:NEXT, NEXT:NEXT) all returned errnum 21 errline 1, confirming the spec.
cases:
  # stray closing keywords
  - { name: next_without_for,    code: "NEXT",              expect: { error: { errnum: 21 } } }
  - { name: wend_without_while,  code: "WEND",              expect: { error: { errnum: 25 } } }
  - { name: until_without_repeat, code: "UNTIL 1",          expect: { error: { errnum: 23 } } }
  # unterminated opening keywords (block ends / EOF before the closer)
  - { name: for_without_next,    code: "FOR I=0 TO 3\nPRINT I", expect: { error: { errnum: 20 } } }
  - { name: while_without_wend,  code: "WHILE 1\nPRINT 1",  expect: { error: { errnum: 24 } } }
  - { name: repeat_without_until, code: "REPEAT\nPRINT 1",  expect: { error: { errnum: 22 } } }
  - { name: def_without_end,     code: "DEF F\nA=1",        expect: { error: { errnum: 29 } } }
  # IF-block family — hw_verified via the sb-oracle structural-error |err probe 2026-06-23.
  # The error table reserves 26 'THEN without ENDIF' / 27 'ELSE without ENDIF' / 28 'ENDIF
  # without IF', but real SB 3.6.0 surfaces 28 ONLY for a LEADING stray ENDIF (the program's
  # first statement) and collapses every other IF-block mismatch — unterminated multi-line IF,
  # dangling ELSE, non-leading stray ENDIF, stray ELSE — to generic Syntax error 3. (Quirk not
  # modeled: `REM X<nl>ENDIF` → no error; queued in HARVEST_QUEUE.md.)
  - { name: endif_leading,       code: "ENDIF",             expect: { error: { errnum: 28 } } } # leading stray → 28
  - { name: endif_leading_then_stmt, code: "ENDIF\nPRINT 1", expect: { error: { errnum: 28 } } }
  - { name: endif_after_stmt,    code: "PRINT 1\nENDIF",    expect: { error: { errnum: 3 } } }  # non-leading → 3
  - { name: endif_after_closed,  code: "IF 1 THEN\nENDIF\nENDIF", expect: { error: { errnum: 3 } } } # second ENDIF → 3
  - { name: if_no_endif,         code: "IF 1 THEN\nPRINT 1", expect: { error: { errnum: 3 } } } # unterminated → 3
  - { name: else_no_endif,       code: "IF 1 THEN\nA=1\nELSE\nB=2", expect: { error: { errnum: 3 } } } # dangling ELSE → 3
  - { name: stray_else,          code: "ELSE",              expect: { error: { errnum: 3 } } } # stray ELSE → 3
