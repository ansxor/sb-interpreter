# Sprite lifecycle conformance cases (M3-T1) — full-pipeline (parse→compile→VM) checks of
# the SPSET/SPCLR/SPSHOW/SPHIDE/SPUSED management commands over the 512-slot sprite table.
# The query results (SPUSED TRUE=1/FALSE=0) and the explicit-form range/arg-count errnums
# are hw_verified (sb-oracle 2026-06-22 s_t8a/s_t8e). The auto-allocate behavior asserts only
# direction-INDEPENDENT properties (the chosen slot is in the search range and now in use; two
# allocations are distinct; a full range yields -1; with exactly one free slot the result is
# forced) so no case bakes in the unverified lowest-free-first scan tie-break (that exact slot
# selection is queued for the oracle — see HARVEST_QUEUE.md). Visible-render side-effects (a
# sprite at the right place/orientation) block on the framebuffer oracle (O-T6 / M3-T6).
# Statements are joined with `:` so each case stays a single source line.
cases:
  # -- SPSET auto-allocate: returns an in-range slot and marks it in use -------------------
  - name: alloc_returns_usable_slot
    code: 'SPCLR:X=SPSET(0):PRINT (X>=0)*(X<=511);SPUSED(X)'
    expect: { stdout: "11" }
  - name: alloc_twice_gives_distinct_in_use_slots
    code: 'SPCLR:A=SPSET(0):B=SPSET(0):PRINT (A!=B);SPUSED(A);SPUSED(B)'
    expect: { stdout: "111" }
  - name: alloc_out_form_equals_function_form
    code: 'SPCLR:SPSET 0 OUT IX:PRINT IX>=0'
    expect: { stdout: "1" }

  # -- SPSET range form: allocate within [start,end] --------------------------------------
  - name: range_alloc_stays_in_range
    code: 'SPCLR:X=SPSET(10,20,0):PRINT (X>=10)*(X<=20);SPUSED(X)'
    expect: { stdout: "11" }
  - name: range_alloc_direct_image_stays_in_range
    code: 'SPCLR:X=SPSET(5,9,0,0,16,16,1):PRINT (X>=5)*(X<=9);SPUSED(X)'
    expect: { stdout: "11" }

  # -- SPSET when the pool / range is exhausted: -1 "no available number" -----------------
  - name: full_pool_returns_minus_one
    code: 'SPCLR:FOR I=0 TO 511:SPSET I,0:NEXT:X=SPSET(0):PRINT X'
    expect: { stdout: "-1" }
  - name: full_then_clear_one_reallocates_that_slot
    code: 'SPCLR:FOR I=0 TO 511:SPSET I,0:NEXT:SPCLR 100:X=SPSET(0):PRINT X'
    expect: { stdout: "100" }
  - name: range_full_returns_minus_one
    code: 'SPCLR:SPSET 7,0:X=SPSET(7,7,0):PRINT X'
    expect: { stdout: "-1" }

  # -- SPUSED reflects SPSET / SPCLR -------------------------------------------------------
  - name: used_after_spset_then_free_after_spclr
    code: 'SPCLR:SPSET 3,0:A=SPUSED(3):SPCLR 3:B=SPUSED(3):PRINT A;B'
    expect: { stdout: "10" }
  - name: spclr_all_frees_every_slot
    code: 'SPSET 0,0:SPSET 1,0:SPCLR:PRINT SPUSED(0);SPUSED(1)'
    expect: { stdout: "00" }

  # -- SPSHOW / SPHIDE require a live sprite, but do not destroy it ------------------------
  - name: show_hide_keep_slot_in_use
    code: 'SPCLR:SPSET 0,0:SPHIDE 0:SPSHOW 0:PRINT SPUSED(0)'
    expect: { stdout: "1" }
  - name: show_before_spset_is_illegal
    code: 'SPCLR:SPSHOW 0'
    expect: { error: { errnum: 4 } }
  - name: hide_before_spset_is_illegal
    code: 'SPCLR:SPHIDE 0'
    expect: { error: { errnum: 4 } }

  # -- explicit-slot SPSET range / arg-count guards (hw_verified s_t8a) --------------------
  - name: spset_mgmt_out_of_range
    code: 'SPSET 512,0'
    expect: { error: { errnum: 10 } }
  - name: spset_too_many_args_no_out
    code: 'SPSET 0,0,0,0,0,0,0'
    expect: { error: { errnum: 4 } }
  - name: spset_one_arg_no_out_is_illegal
    code: 'SPSET 510'
    expect: { error: { errnum: 4 } }
