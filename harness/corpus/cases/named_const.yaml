# Built-in `#NAME` named constants (M1-T14 increment). Every value is hw_verified
# (sb-oracle S-T14c, frozen in spec/reference/constants.yaml). `#NAME` is folded to an
# inline Integer literal wherever it appears — an expression, a DATA item, an argument.
# SmileBASIC Integer is i32, so a color word (&HFFF8F8F8) PRINTs as its signed value.
cases:
  - name: button_up
    code: 'PRINT #UP'
    expect: { stdout: "1" }
  - name: button_l
    code: 'PRINT #L'
    expect: { stdout: "256" }
  - name: button_r
    code: 'PRINT #R'
    expect: { stdout: "512" }
  - name: button_a
    code: 'PRINT #A'
    expect: { stdout: "16" }
  # Color words: the unsigned ARGB value reinterpreted as a signed i32.
  - name: color_white
    code: 'PRINT #WHITE'
    expect: { stdout: "-460552" }      # &HFFF8F8F8
  - name: color_red
    code: 'PRINT #RED'
    expect: { stdout: "-524288" }      # &HFFF80000
  # Oracle-corrected vs docs (constants.yaml header): #BLUE / #CYAN==#AQUA.
  - name: color_blue
    code: 'PRINT #BLUE'
    expect: { stdout: "-16776968" }    # &HFF0000F8
  # Text-color / flag constants are small positive ints.
  - name: text_white
    code: 'PRINT #TWHITE'
    expect: { stdout: "15" }
  - name: bgrot_180
    code: 'PRINT #BGROT180'
    expect: { stdout: "8192" }         # &H2000 (oracle-corrected)
  # In an expression (folds with arithmetic).
  - name: const_in_expr
    code: 'PRINT #L+1'
    expect: { stdout: "257" }
  - name: const_bitor
    code: 'PRINT #L OR #R'
    expect: { stdout: "768" }          # 256 | 512
  # As DATA items, read back by READ (hw_verified data.yaml data_named_const).
  - name: data_named_const
    code: "READ A\nDATA #L\nPRINT A"
    expect: { stdout: "256" }
  - name: data_two_named_consts
    code: "READ A,B\nDATA #UP,#DOWN\nPRINT A;\",\";B"
    expect: { stdout: "1,2" }
  # Unknown #NAME → Syntax error (errnum 3) at PARSE time, not silently 0. Case-insensitive
  # lookup: #white / #White fold to the same value as #WHITE, but #ZZZ / #Foo (which don't
  # case-fold to a known name) are rejected. hw_verified (sb-oracle 2026-06-26,
  # sb-interpreter-fkv): PRINT/A=/A%= /DATA/arg/IF-condition forms all → errnum 3.
  - name: case_insensitive_white
    code: 'PRINT #white'
    expect: { stdout: "-460552" }
  - name: case_insensitive_White
    code: 'PRINT #White'
    expect: { stdout: "-460552" }
  - name: undef_const_print
    code: 'PRINT #NOTACONST'
    expect: { error: { errnum: 3 } }
  - name: undef_const_short
    code: 'PRINT #ZZZ'
    expect: { error: { errnum: 3 } }
  - name: undef_const_assign_real
    code: 'A=#FOO'
    expect: { error: { errnum: 3 } }
  - name: undef_const_assign_int
    code: 'A%=#FOO'
    expect: { error: { errnum: 3 } }
  - name: undef_const_case
    code: 'PRINT #Foo'
    expect: { error: { errnum: 3 } }
  - name: undef_const_digits
    code: 'PRINT #123'
    expect: { error: { errnum: 3 } }
  - name: undef_const_bare_hash
    code: 'PRINT #'
    expect: { error: { errnum: 3 } }
  - name: undef_const_data_item
    code: "DATA #BAR"
    expect: { error: { errnum: 3 } }
  - name: undef_const_stmt_arg
    code: 'COLOR #NOPE'
    expect: { error: { errnum: 3 } }
  - name: undef_const_if_cond
    code: 'IF #FOO THEN ?"X"'
    expect: { error: { errnum: 3 } }
