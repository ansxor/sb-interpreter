# SWAP — value exchange with destination-type coercion.
# A %/#/$-typed target re-coerces the incoming value to its declared type (an
# Integer target truncates like an assignment); an untyped numeric target takes
# the value VERBATIM. swap.yaml hw_verified (sb-oracle 2026-06-22 cross-numeric +
# 2026-06-23 typed truncation: A%=1:B#=2.34567:SWAP A%,B# -> A%=2,B#=1).
cases:
  - name: swap_int_scalars
    code: "A=1\nB=2\nSWAP A,B\nPRINT A;B"
    expect: { stdout: "21" }
  - name: swap_strings
    code: "A$=\"X\"\nB$=\"Y\"\nSWAP A$,B$\nPRINT A$;B$"
    expect: { stdout: "YX" }
  # Array-element operands (`Op::PushArrayRef`, M1-T14): a ref shares the array Rc
  # and writes through to the element, re-coercing to its element type. swap.yaml
  # hw_verified (sb-oracle 2026-06-22): SWAP A[0],A[2] (10,99) -> 99,10; SWAP X,B[1].
  - name: swap_array_elements
    code: "DIM A[3]\nA[0]=10\nA[2]=99\nSWAP A[0],A[2]\nPRINT A[0];A[2]"
    expect: { stdout: "9910" }
  - name: swap_scalar_and_array_element
    code: "X=5\nDIM B[3]\nB[1]=9\nSWAP X,B[1]\nPRINT X;B[1]"
    expect: { stdout: "95" }
  - name: swap_string_array_elements
    code: "DIM S$[3]\nS$[0]=\"A\"\nS$[2]=\"B\"\nSWAP S$[0],S$[2]\nPRINT S$[0];S$[2]"
    expect: { stdout: "BA" }
  # Untyped numeric var takes the value verbatim — A becomes the Double 2.5,
  # B# coerces 1 to its double slot. (oracle 2026-06-22)
  - name: swap_untyped_keeps_double
    code: "A=1\nB#=2.5\nSWAP A,B#\nPRINT A;\",\";B#"
    expect: { stdout: "2.5,1" }
  # Integer-typed target truncates the swapped-in Double like an assignment
  # (otya SWAPTEST): A% holds 2, B# holds 1.0.
  - name: swap_typed_int_truncates
    code: "A%=1\nB#=2.34567\nSWAP A%,B#\nPRINT A%;\",\";B#"
    expect: { stdout: "2,1" }
  # String ↔ numeric is a Type mismatch (8).
  - name: swap_string_numeric_mismatch
    code: "A=1\nB$=\"x\"\nSWAP A,B$"
    expect: { error: { errnum: 8 } }
