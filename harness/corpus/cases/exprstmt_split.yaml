# Expr-as-statement errnum is ARG-COUNT driven (beads sb-interpreter-5iu, sb-interpreter-imk) —
# hw_verified via the sb-oracle skill (real SB 3.6.0), harness/harvest/out/exprstmt_argcount.tsv
# (2026-06-27, self-validating capture: consecutive cases carry distinct expected errnums so each
# ERRNUM read is proven fresh, not stale).
#
# A *registered builtin* written in the whole-parenthesised STATEMENT form `NAME(args)` (no `OUT`,
# no assignment) is classified by ARGUMENT COUNT, not by a per-builtin keyword flag:
#   * args.len() != 1  (empty `()` or a 2+ comma list)  -> Syntax error (3), rejected at parse.
#   * args.len() == 1, value-returning function          -> Illegal function call (4) at runtime
#     (the handler rejects the discarded return; disasm: ABS @0x147a34 / RGB @0x154ed0 end at
#     `mov r0,#0x4; bl 0x1fffdc`). Deferred via StmtKind::IllegalFnStmt.
#   * args.len() == 1, command                           -> runs as a normal command call (NOERR).
# The SAME builtin flips 4<->3 purely by arg count: ABS(5)->4 but ABS(5,6)->3; RGB(5)->4 but
# RGB(1,2,3)->3; POW(2)->4 but POW(2,3)->3; LEN("AB")->4 but LEN("AB","X")->3.
#
# This SUPERSEDES the 5iu reading of the split as a per-builtin flag. That came from comparing
# builtins at different arg counts (RGB(1,2,3) 3 args vs RGBREAD(0) 1 arg) and from harvesting
# GCOLOR()/GPAGE()/GCLS()/SPPAGE() with EMPTY parens (3 for EVERY builtin, even ABS()->3) — so
# GCLS/GCOLOR/SPPAGE were mislabeled Syntax-error when their 1-arg form actually runs, and
# GPAGE(0) is really Illegal-function-call (4). A bare expression as a statement (`5`, `1+2`,
# `"HI"`, `A`) is Syntax error 3. User DEFs/variables are exempt (a 3-arg `SIMPLE_INIT(...)`
# subroutine call still compiles), so the `!=1 arg -> 3` rule is gated on builtins only.
cases:
  # -- Illegal function call (4): value-returning function, EXACTLY ONE argument --------
  - { name: abs_stmt,     code: 'ABS(5)',          expect: { error: { errnum: 4 } } }
  - { name: floor_stmt,   code: 'FLOOR(2.5)',      expect: { error: { errnum: 4 } } }
  - { name: sqr_stmt,     code: 'SQR(4)',          expect: { error: { errnum: 4 } } }
  - { name: len_stmt,     code: 'LEN("AB")',       expect: { error: { errnum: 4 } } }
  - { name: rnd_stmt,     code: 'RND(10)',         expect: { error: { errnum: 4 } } }
  - { name: rgbread_stmt, code: 'RGBREAD(0)',      expect: { error: { errnum: 4 } } }
  - { name: sprot_stmt,   code: 'SPROT(0)',        expect: { error: { errnum: 4 } } }
  - { name: bgcolor_stmt, code: 'BGCOLOR(0)',      expect: { error: { errnum: 4 } } }
  - { name: rgb1_stmt,    code: 'RGB(5)',          expect: { error: { errnum: 4 } } }
  - { name: pow1_stmt,    code: 'POW(2)',          expect: { error: { errnum: 4 } } }
  - { name: max1_stmt,    code: 'MAX(1)',          expect: { error: { errnum: 4 } } }
  - { name: chr_stmt,     code: 'CHR$(65)',        expect: { error: { errnum: 4 } } }
  - { name: str_fn_stmt,  code: 'STR$(5)',         expect: { error: { errnum: 4 } } }
  - { name: asc_stmt,     code: 'ASC("A")',        expect: { error: { errnum: 4 } } }
  # GPAGE(0) is the 1-arg value-getter form -> 4 (was mislabeled 3 from the GPAGE() empty harvest)
  - { name: gpage1_stmt,  code: 'GPAGE(0)',        expect: { error: { errnum: 4 } } }

  # -- Illegal function call (4): VM-routed value getters, 1-arg whole-paren statement form
  # (bead sb-interpreter-imk; hw_verified sb-oracle 2026-06-27, harness/harvest/out/
  # exprstmt_getters.tsv, anchored GPAGE(0)->4 / SPPAGE(0)->NOERR / GCLS(0)->NOERR for fresh
  # reads). These used to fall through as BuiltinCommand and RUN their 1-arg form; the per-
  # builtin value-vs-command split now classifies them as value functions. CHKCHR/BUTTON are
  # 2-/0-arg in their normal form but their single-arg whole-paren statement still -> 4;
  # VISIBLE is a 4-arg command yet VISIBLE(0) -> 4 (wrong-arity command and value-fn-as-
  # statement are indistinguishable by errnum, both raise runtime 4).
  - { name: spused_stmt,  code: 'SPUSED(0)',      expect: { error: { errnum: 4 } } }
  - { name: spchk_stmt,   code: 'SPCHK(0)',       expect: { error: { errnum: 4 } } }
  - { name: bgchk_stmt,   code: 'BGCHK(0)',       expect: { error: { errnum: 4 } } }
  - { name: bgmchk_stmt,  code: 'BGMCHK(0)',      expect: { error: { errnum: 4 } } }
  - { name: chkfile_stmt, code: 'CHKFILE("TEST")', expect: { error: { errnum: 4 } } }
  - { name: chkchr1_stmt, code: 'CHKCHR(0)',      expect: { error: { errnum: 4 } } }
  - { name: button_stmt,  code: 'BUTTON(0)',      expect: { error: { errnum: 4 } } }
  - { name: talkchk_stmt, code: 'TALKCHK(0)',     expect: { error: { errnum: 4 } } }
  - { name: fadechk_stmt, code: 'FADECHK(0)',     expect: { error: { errnum: 4 } } }
  - { name: prgname_stmt, code: 'PRGNAME$(0)',    expect: { error: { errnum: 4 } } }
  - { name: mpstat_stmt,  code: 'MPSTAT(0)',      expect: { error: { errnum: 4 } } }
  - { name: mpname_stmt,  code: 'MPNAME$(0)',     expect: { error: { errnum: 4 } } }
  - { name: splink_stmt,  code: 'SPLINK(0)',      expect: { error: { errnum: 4 } } }
  - { name: visible_stmt, code: 'VISIBLE(0)',     expect: { error: { errnum: 4 } } }

  # -- Syntax error (3): HARDWARE is a zero-arg system constant, not a callable. ANY whole-
  # paren form is a parse error (hw_verified HARDWARE(0) -> 3, exprstmt_getters.tsv).
  - { name: hardware1_stmt, code: 'HARDWARE(0)',  expect: { error: { errnum: 3 } } }

  # -- NOERR: DISPLAY is a true command — its 1-arg whole-paren form runs (DISPLAY(0) selects
  # the output screen; hw_verified -> NOERR, exprstmt_getters.tsv).
  - { name: display1_stmt, code: 'DISPLAY(0)',    expect: { stdout: "" } }

  # -- Syntax error (3): a value function with ZERO or 2+ arguments ---------------------
  - { name: abs2_stmt,    code: 'ABS(5,6)',        expect: { error: { errnum: 3 } } }
  - { name: rgb_stmt,     code: 'RGB(1,2,3)',      expect: { error: { errnum: 3 } } }
  - { name: pow2_stmt,    code: 'POW(2,3)',        expect: { error: { errnum: 3 } } }
  - { name: len2_stmt,    code: 'LEN("AB","X")',   expect: { error: { errnum: 3 } } }
  - { name: max2_stmt,    code: 'MAX(1,2)',        expect: { error: { errnum: 3 } } }
  - { name: instr_stmt,   code: 'INSTR("ABC","B")', expect: { error: { errnum: 3 } } }
  - { name: left_stmt,    code: 'LEFT$("ABC",2)',  expect: { error: { errnum: 3 } } }
  - { name: gspoit_stmt,  code: 'GSPOIT(0,0)',     expect: { error: { errnum: 3 } } }
  # 0-arg pure functions: arg count 0 -> 3.
  - { name: pi_stmt,      code: 'PI()',            expect: { error: { errnum: 3 } } }
  - { name: rndf_stmt,    code: 'RNDF()',          expect: { error: { errnum: 3 } } }
  # Empty parens are Syntax error 3 for EVERY builtin (even a 1-arg function): arg count 0.
  - { name: abs_empty,    code: 'ABS()',           expect: { error: { errnum: 3 } } }

  # -- Syntax error (3): a command with ZERO or 2+ arguments ---------------------------
  - { name: gcolor_stmt,  code: 'GCOLOR()',        expect: { error: { errnum: 3 } } }
  - { name: gcls_stmt,    code: 'GCLS()',          expect: { error: { errnum: 3 } } }
  - { name: sppage_stmt,  code: 'SPPAGE()',        expect: { error: { errnum: 3 } } }
  - { name: gcls2_stmt,   code: 'GCLS(0,0)',       expect: { error: { errnum: 3 } } }
  - { name: gpset_stmt,   code: 'GPSET(0,0)',      expect: { error: { errnum: 3 } } }
  - { name: gline_stmt,   code: 'GLINE(0,0,10,10)', expect: { error: { errnum: 3 } } }
  - { name: locate_stmt,  code: 'LOCATE(0,0)',     expect: { error: { errnum: 3 } } }
  - { name: color2_stmt,  code: 'COLOR(0,0)',      expect: { error: { errnum: 3 } } }

  # -- Syntax error (3): the ≠1-arg rule is GENERIC — it applies to EVERY registered builtin,
  # not just the handful with an explicit value-fn/command entry (bead sb-interpreter-imk:
  # the parser now consults the whole BUILTIN_NAMES registry). These VM-routed commands used
  # to fall through as Unknown and RUN their whole-paren multi-arg/zero-arg form; the arg-count
  # rule (hw_verified exprstmt_argcount.tsv) rejects them at parse. Per-builtin oracle harvest
  # of these exact forms is queued; the errnum follows deterministically from the proven rule.
  - { name: spset3_stmt,   code: 'SPSET(0,1,2)',         expect: { error: { errnum: 3 } } }
  - { name: gfill5_stmt,   code: 'GFILL(0,0,1,1,1)',     expect: { error: { errnum: 3 } } }
  - { name: gbox4_stmt,    code: 'GBOX(0,0,1,1)',        expect: { error: { errnum: 3 } } }
  - { name: gcircle_stmt,  code: 'GCIRCLE(0,0,5)',       expect: { error: { errnum: 3 } } }
  - { name: bgput4_stmt,   code: 'BGPUT(0,0,0,0)',       expect: { error: { errnum: 3 } } }
  - { name: spofs_empty,   code: 'SPOFS()',              expect: { error: { errnum: 3 } } }
  - { name: bgscreen_stmt, code: 'BGSCREEN(0,32,32)',    expect: { error: { errnum: 3 } } }

  # -- NOERR: a command with EXACTLY ONE argument runs as a normal command call ---------
  # (These were WRONGLY rejected as Syntax error 3 by the 5iu empty-paren classification.)
  - { name: gcls1_stmt,   code: 'GCLS(0)',         expect: { stdout: "" } }
  - { name: gcolor1_stmt, code: 'GCOLOR(0)',       expect: { stdout: "" } }
  - { name: sppage1_stmt, code: 'SPPAGE(0)',       expect: { stdout: "" } }
  - { name: color_stmt,   code: 'COLOR(0)',        expect: { stdout: "" } }
  - { name: print_stmt,   code: 'PRINT(1)',        expect: { stdout: "1" } }

  # -- Bare expression as a statement is also Syntax error 3 ----------------------------
  - { name: five_stmt,    code: '5',               expect: { error: { errnum: 3 } } }
  - { name: aplusb_stmt,  code: '1+2',             expect: { error: { errnum: 3 } } }
  - { name: str_stmt,     code: '"HI"',            expect: { error: { errnum: 3 } } }
  # A lone bareword identifier used as a statement is the same bucket (bead sb-interpreter-boi,
  # hw_verified exprstmt2.tsv `var_stmt` = `A` -> errnum 3 errline 1). It reaches the compiler
  # as an empty `Call` only because it is neither a parser keyword, a registered builtin
  # command, nor a user DEF — i.e. a plain variable name — so it is rejected as Syntax error 3
  # at compile time, NOT dispatched as an empty builtin call (which would give the runtime
  # Undefined function 16).
  - { name: var_stmt,     code: 'A',               expect: { error: { errnum: 3 } } }
  # A bareword that names an ALREADY-DEFINED variable is still not a statement -> 3 (sb-core
  # consistency check; same compile-time gate. Oracle confirmation of `A=5:A` queued in
  # sb-interpreter-boi).
  - { name: defvar_stmt,  code: 'A=5:A',           expect: { error: { errnum: 3 } } }
